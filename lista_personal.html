<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Médico - OHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0e1a; margin: 0; padding: 20px; text-transform: uppercase; }
        .hoja-sistema { background-color: white; width: 100%; max-width: 1200px; margin: 0 auto; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); overflow: hidden; }
        .btn-volver-top { max-width: 1200px; margin: 0 auto 15px auto; width: 100%; }
        @media print { .no-print { display: none !important; } .btn-volver-top { display: none !important; } }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <div class="btn-volver-top">
        <button onclick="location.href='index.html'" class="bg-slate-800/80 text-white px-6 py-2 rounded-lg text-[10px] font-black flex items-center gap-2">
            <i class="fa-solid fa-house"></i> IR AL INICIO
        </button>
    </div>
    <div class="hoja-sistema">
        <div class="p-10 border-b border-gray-100 flex justify-between items-center">
            <h1 class="text-4xl font-black text-blue-900">PERSONAL MÉDICO</h1>
            <a href="registro_personal.html" class="bg-blue-700 text-white px-8 py-3 rounded-full font-black text-[11px]">+ REGISTRAR NUEVO</a>
        </div>
        <div class="p-10">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-blue-700 text-white text-[11px] font-black">
                        <th class="p-5">C.I.</th>
                        <th class="p-5">Nombre Completo</th>
                        <th class="p-5">Cargo</th>
                        <th class="p-5 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-personal" class="text-[11px] font-bold text-gray-700"></tbody>
            </table>
        </div>
    </div>
    <script>
        async function cargar() {
            const res = await fetch('https://historial-clinico-nube.onrender.com/personal/');
            const data = await res.json();
            const t = document.getElementById('tabla-personal');
            t.innerHTML = '';
            
            const add = (p, tipo, id, nom, ap) => {
                const row = document.createElement('tr');
                row.className = "border-b";
                row.innerHTML = `
                    <td class="p-5">${id}</td>
                    <td class="p-5">${nom} ${ap}</td>
                    <td class="p-5">${p.especialidad}</td>
                    <td class="p-5 no-print text-center">
                        <button onclick="editar('${id}', '${tipo}')" class="bg-orange-500 text-white p-2 rounded"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="eliminar('${id}', '${tipo}')" class="bg-red-600 text-white p-2 rounded"><i class="fa-solid fa-trash"></i></button>
                    </td>
                `;
                t.appendChild(row);
            };
            data.doctores.forEach(p => add(p, 'doctor', p.ci_doc, p.nombre_doc, p.appaterno_doc));
            data.enfermeras.forEach(p => add(p, 'enfermera', p.ci_enfe, p.nombre_enfe, p.appaterno_enfe));
        }

        function editar(id, tipo) { window.location.href = `registro_personal.html?id=${id}&tipo=${tipo}`; }

        async function eliminar(id, tipo) {
            if(!confirm('¿Eliminar?')) return;
            await fetch(`https://historial-clinico-nube.onrender.com/${tipo}/${id}`, { method: 'DELETE' });
            cargar();
        }
        cargar();
    </script>
</body>
</html>
