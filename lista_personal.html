<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LISTA DE PERSONAL OHS - NANCY ELEGANTE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --nancy-blue: #0046ad; --nancy-green: #2ecc71; --text-dark: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; text-transform: uppercase; color: var(--text-dark); }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 4px solid var(--nancy-blue); padding-bottom: 15px; }
        .logo-small { height: 110px; } /* TAMAÑO EQUILIBRADO */
        .actions-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn-new { background: var(--nancy-green); color: white; padding: 12px 25px; text-decoration: none; border-radius: 4px; font-weight: 900; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; color: var(--nancy-blue); text-align: left; padding: 15px; font-size: 11px; font-weight: 900; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px; font-size: 13px; border-bottom: 1px solid #f1f5f9; font-weight: 700; }
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 10px; color: white; display: flex; align-items: center; gap: 5px; width: fit-content; }
        .bg-doc { background: var(--nancy-blue); }
        .bg-enfe { background: var(--nancy-green); }
        .btn-action { border: none; background: none; cursor: pointer; font-size: 18px; margin: 0 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-small">
        <div class="title-area"><h2>GESTIÓN DE PERSONAL REGISTRADO</h2></div>
    </div>
    <div class="actions-bar">
        <a href="registro_personal.html" class="btn-new">+ REGISTRAR NUEVO</a>
        <div style="font-weight: 900; color: #64748b;">TOTAL: <span id="total-count">0</span></div>
    </div>
    <table>
        <thead>
            <tr>
                <th>TIPO / ROL</th>
                <th>C.I. PROFESIONAL</th>
                <th>NOMBRE COMPLETO</th>
                <th>TURNO</th>
                <th>ESPECIALIDAD / CARGO</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody id="lista-cuerpo"></tbody>
    </table>
</div>
<script>
    const API_URL = "https://tu-servicio-en-render.com/api"; // CAMBIAR POR TU URL REAL

    async function cargarPersonal() {
        try {
            const res = await fetch(`${API_URL}/get-personal`);
            const data = await res.json();
            const cuerpo = document.getElementById('lista-cuerpo');
            cuerpo.innerHTML = "";
            let total = 0;

            data.doctores.forEach(d => {
                total++;
                cuerpo.innerHTML += rowTemplate('DOCTOR', '👨‍⚕️', 'bg-doc', d.ci_doc, `${d.nombre_doc} ${d.appaterno_doc}`, d.turno_doc, d.especialidad);
            });
            data.enfermeras.forEach(e => {
                total++;
                cuerpo.innerHTML += rowTemplate('ENFERMERA', '👩‍⚕️', 'bg-enfe', e.ci_enfe, `${e.nombre_enfe} ${e.appaterno_enfe}`, e.turno_enfe, e.edu_enfe);
            });
            document.getElementById('total-count').innerText = total;
        } catch (e) { console.error(e); }
    }

    function rowTemplate(tipo, icon, bg, ci, nombre, turno, detalle) {
        return `<tr>
            <td><span class="badge ${bg}">${icon} ${tipo}</span></td>
            <td>${ci}</td>
            <td>${nombre}</td>
            <td>${turno}</td>
            <td>${detalle}</td>
            <td>
                <button class="btn-action" onclick="alert('EDITAR PRÓXIMAMENTE')">📝</button>
                <button class="btn-action" onclick="eliminar('${tipo}', '${ci}')">🗑️</button>
            </td>
        </tr>`;
    }

    async function eliminar(tipo, ci) {
        if(confirm(`¿ELIMINAR ${tipo} CON C.I. ${ci}?`)) {
            const res = await fetch(`${API_URL}/delete-personal/${tipo}/${ci}`, { method: 'DELETE' });
            if(res.ok) { alert("ELIMINADO"); cargarPersonal(); }
        }
    }
    window.onload = cargarPersonal;
</script>
</body>
</html>
