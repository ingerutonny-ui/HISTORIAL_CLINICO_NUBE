<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Médico - OHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0e1a; margin: 0; padding: 20px; text-transform: uppercase; }
        
        .hoja-sistema {
            background-color: white;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .btn-volver-top {
            max-width: 1200px;
            margin: 0 auto 15px auto;
            width: 100%;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="btn-volver-top">
        <button onclick="location.href='index.html'" class="bg-slate-800/80 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition text-[10px] font-black flex items-center gap-2 border border-slate-700 shadow-2xl">
            <i class="fa-solid fa-house"></i> IR AL INICIO
        </button>
    </div>

    <div class="hoja-sistema">
        <div class="p-8 md:p-10 flex flex-col md:flex-row justify-between items-center border-b border-gray-100 gap-6">
            <img src="logo.png" alt="Logo OHS" class="h-16 md:h-20">
            <div class="text-center md:text-right">
                <h1 class="text-3xl md:text-4xl font-black text-blue-900 tracking-tighter">PERSONAL MÉDICO</h1>
                <p class="text-[10px] md:text-[12px] font-bold text-emerald-600 tracking-[0.3em]">SISTEMA OHS EN LA NUBE</p>
            </div>
        </div>

        <div class="p-6 md:p-10">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h2 class="text-[11px] font-black text-gray-400 tracking-widest">
                    <i class="fa-solid fa-users-gear text-orange-500 mr-2"></i> PROFESIONALES ACTIVOS EN SISTEMA
                </h2>
                <a href="registro_personal.html" class="w-full md:w-auto bg-blue-700 text-white px-8 py-3 rounded-full font-black text-[11px] shadow-xl hover:bg-blue-800 transition transform hover:scale-105 text-center">
                    + REGISTRAR NUEVO PROFESIONAL
                </a>
            </div>

            <div class="overflow-x-auto rounded-2xl border border-gray-200 shadow-sm">
                <table class="w-full text-left min-w-[800px]">
                    <thead>
                        <tr class="bg-blue-700 text-white text-[11px] font-black tracking-widest">
                            <th class="p-5">C.I.</th>
                            <th class="p-5">Nombre Completo</th>
                            <th class="p-5">Especialidad / Cargo</th>
                            <th class="p-5">Turno</th>
                            <th class="p-5 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-personal" class="text-[11px] font-bold text-gray-700">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-gray-50 p-6 text-center border-t border-gray-100">
            <p class="text-[9px] text-gray-400 font-black tracking-widest">SISTEMA OHS NANCY V1.0 - GESTIÓN DE PERSONAL</p>
        </div>
    </div>

    <script>
        async function cargarPersonal() {
            try {
                const response = await fetch('https://historial-clinico-nube.onrender.com/personal/');
                const data = await response.json();
                const tabla = document.getElementById('tabla-personal');
                tabla.innerHTML = '';

                const agregarFila = (p, tipo) => {
                    const row = document.createElement('tr');
                    const id = tipo === 'doc' ? p.ci_doc : p.ci_enfe;
                    row.className = "border-b border-gray-50 hover:bg-blue-50/50 transition";
                    row.innerHTML = `
                        <td class="p-5 text-blue-700 font-black">${id}</td>
                        <td class="p-5">${tipo === 'doc' ? (p.nombre_doc + ' ' + p.appaterno_doc) : (p.nombre_enfe + ' ' + p.appaterno_enfe)}</td>
                        <td class="p-5">
                            <span class="bg-${tipo === 'doc' ? 'green' : 'blue'}-100 text-${tipo === 'doc' ? 'green' : 'blue'}-700 px-4 py-1.5 rounded-full flex items-center gap-2 w-fit border border-${tipo === 'doc' ? 'green' : 'blue'}-200">
                                <i class="fa-solid fa-user-${tipo === 'doc' ? 'doctor' : 'nurse'}"></i> ${tipo === 'doc' ? 'DOCTOR: ' + p.especialidad : 'ENFERMERA: ' + p.especialidad}
                            </span>
                        </td>
                        <td class="p-5 text-gray-400">${tipo === 'doc' ? p.turno_doc : p.turno_enfe}</td>
                        <td class="p-5">
                            <div class="flex justify-center gap-2">
                                <button onclick="editar('${id}', '${tipo}')" class="bg-orange-500 text-white p-2.5 rounded shadow-lg"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button onclick="eliminar('${id}', '${tipo}')" class="bg-red-600 text-white p-2.5 rounded shadow-lg"><i class="fa-solid fa-trash"></i></button>
                                <button onclick="imprimir('${id}')" class="bg-slate-700 text-white p-2.5 rounded shadow-lg"><i class="fa-solid fa-file-pdf"></i></button>
                            </div>
                        </td>
                    `;
                    tabla.appendChild(row);
                };

                data.doctores.forEach(d => agregarFila(d, 'doc'));
                data.enfermeras.forEach(e => agregarFila(e, 'enf'));
            } catch (error) {
                console.error("Error al cargar personal:", error);
            }
        }

        async function eliminar(id, tipo) {
            if(confirm('¿Está seguro de eliminar este profesional?')) {
                const endpoint = tipo === 'doc' ? 'doctor' : 'enfermera';
                await fetch(`https://historial-clinico-nube.onrender.com/${endpoint}/${id}`, { method: 'DELETE' });
                cargarPersonal();
            }
        }

        function editar(id, tipo) { alert('Funcionalidad de edición para: ' + id); }
        function imprimir(id) { window.print(); }

        cargarPersonal();
    </script>
</body>
</html>
