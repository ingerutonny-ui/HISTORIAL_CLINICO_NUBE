<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LISTA DE PERSONAL - OHS NANCY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; text-transform: uppercase; background-color: #f8fafc; }
        .bg-ohs-blue { background-color: #1e40af; }
        .text-ohs-blue { color: #1e40af; }
        .text-ohs-green { color: #059669; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden border-t-8 border-blue-900">
        
        <div class="p-8 bg-white flex flex-col md:flex-row justify-between items-center border-b-2 border-gray-100">
            <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="h-24 mb-4 md:mb-0">
            <div class="text-right">
                <h1 class="text-3xl font-black text-ohs-blue">PERSONAL MÉDICO</h1>
                <p class="text-ohs-green font-bold tracking-widest">SISTEMA OHS EN LA NUBE</p>
            </div>
        </div>

        <div class="p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-slate-700 uppercase">📋 MEDICOS EN SISTEMA</h2>
                <a href="registro_personal.html" class="bg-ohs-blue text-white px-8 py-3 rounded-full font-black text-sm hover:scale-105 transition-transform">
                    + REGISTRAR NUEVO
                </a>
            </div>

            <div class="overflow-x-auto rounded-xl border border-gray-200 shadow-sm">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-ohs-blue text-white text-xs tracking-tighter">
                            <th class="p-5 font-black">C.I.</th>
                            <th class="p-5 font-black">NOMBRE COMPLETO</th>
                            <th class="p-5 font-black">APELLIDOS</th>
                            <th class="p-5 font-black">ESPECIALIDAD</th>
                            <th class="p-5 font-black text-center">TURNO</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-doctores" class="text-slate-700 text-sm font-bold">
                        <tr>
                            <td colspan="5" class="p-20 text-center text-slate-400 animate-pulse">SINCRONIZANDO CON POSTGRESQL...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://historial-clinico-936s.onrender.com";

        async function cargarDoctores() {
            const tabla = document.getElementById('tabla-doctores');
            try {
                // LLAMADA EXACTA SIN BARRA FINAL
                const response = await fetch(`${API_BASE}/doctores`);
                
                if (!response.ok) throw new Error("ERROR_404_OR_500");
                
                const doctores = await response.json();
                tabla.innerHTML = '';

                if (doctores.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-red-500 font-black">LA BASE DE DATOS ESTA VACIA</td></tr>';
                    return;
                }

                doctores.forEach(doc => {
                    tabla.innerHTML += `
                        <tr class="border-b border-gray-50 hover:bg-blue-50 transition">
                            <td class="p-5 text-ohs-blue font-black">${doc.ci_doc}</td>
                            <td class="p-5">${doc.nombre_doc}</td>
                            <td class="p-5">${doc.appaterno_doc} ${doc.apmaterno_doc || ''}</td>
                            <td class="p-5"><span class="bg-green-100 text-ohs-green px-4 py-1 rounded-full text-[10px] font-black">${doc.especialidad}</span></td>
                            <td class="p-5 text-center"><span class="bg-slate-100 px-3 py-1 rounded text-[10px]">${doc.turno_doc}</span></td>
                        </tr>`;
                });
            } catch (error) {
                tabla.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-red-600 font-black">❌ ERROR DE ENLACE: REVISA QUE EL MAIN.PY ESTÉ ACTUALIZADO EN RENDER</td></tr>';
            }
        }
        
        // Ejecución inmediata
        cargarDoctores();
    </script>
</body>
</html>
