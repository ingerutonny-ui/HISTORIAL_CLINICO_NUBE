<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LISTA DE PERSONAL - OHS NANCY</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen p-4 md:p-10">
    <div class="max-w-6xl mx-auto bg-slate-900 rounded-3xl shadow-2xl overflow-hidden border border-slate-800">
        
        <div class="p-8 flex justify-between items-center border-b border-slate-800">
            <button onclick="location.href='index.html'" class="text-slate-400 hover:text-white transition">← INICIO</button>
            <div class="text-right">
                <h1 class="text-2xl font-black text-white">PERSONAL MÉDICO</h1>
                <p class="text-blue-500 font-bold text-[10px] tracking-[0.3em]">SISTEMA OHS EN LA NUBE</p>
            </div>
        </div>

        <div class="p-8">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest italic underline decoration-blue-500">Listado de Profesionales</h2>
                <button onclick="location.href='registro_personal.html'" class="bg-blue-600 text-white px-6 py-2 rounded-full font-black text-[10px] hover:bg-blue-700 transition">
                    + NUEVO REGISTRO
                </button>
            </div>

            <div class="overflow-x-auto rounded-2xl border border-slate-800 bg-slate-950/50">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-800/50 text-slate-400 text-[10px] uppercase tracking-widest">
                            <th class="p-5 font-black">C.I.</th>
                            <th class="p-5 font-black">Nombre Completo</th>
                            <th class="p-5 font-black">Especialidad</th>
                            <th class="p-5 text-center font-black">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-doctores" class="text-slate-300 text-xs font-bold">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const data = [
            {ci: "1234567", nombre: "JUAN CARLOS GARCIA", rol: "DOCTOR", esp: "CARDIOLOGÍA"},
            {ci: "8822334", nombre: "ANA BEATRIZ SOSA", rol: "DOCTORA", esp: "PEDIATRÍA"},
            {ci: "7654321", nombre: "MARIA ELENA MENDOZA", rol: "ENFERMERA", esp: "GRAL."},
            {ci: "4455667", nombre: "PEDRO LUIS RODRIGUEZ", rol: "ENFERMERO", esp: "INSTRUM."}
        ];

        window.onload = () => {
            const t = document.getElementById('tabla-doctores');
            data.forEach(p => {
                t.innerHTML += `
                <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition">
                    <td class="p-5 text-blue-400 font-black">${p.ci}</td>
                    <td class="p-5 uppercase">${p.nombre}</td>
                    <td class="p-5"><span class="bg-slate-800 px-3 py-1 rounded-full text-[9px] border border-slate-700">${p.rol}: ${p.esp}</span></td>
                    <td class="p-5 text-center">
                        <button onclick="alert('PDF GENERADO')" class="bg-red-900/20 text-red-500 p-2 rounded-lg border border-red-900/50 hover:bg-red-600 hover:text-white transition">📄</button>
                    </td>
                </tr>`;
            });
        };
    </script>
</body>
</html>
