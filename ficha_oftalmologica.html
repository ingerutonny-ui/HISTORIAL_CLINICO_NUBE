<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VISOR FICHA OFTALMOLÓGICA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; padding: 20px; font-family: 'Inter', sans-serif; }
        .form-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; border: 1.5px solid #000; }
        .header-nancy { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #10b981; padding-bottom: 10px; margin-bottom: 20px; }
        .header-nancy img { height: 50px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: left; }
        .section-title { background-color: #e2e8f0; font-weight: bold; padding: 5px; text-align: center; border: 1px solid #000; }
        
        /* ESTO FUERZA LAS MAYÚSCULAS EN EL INPUT */
        #codigo_busqueda { text-transform: uppercase; }
        
        @media print { .no-print { display: none !important; } body { background: white; } }
    </style>
</head>
<body>

<div class="form-container">
    <div class="no-print">
        <a href="d_menu.html" class="btn btn-secondary">← VOLVER AL MENÚ</a>
        <button onclick="window.print()" class="btn btn-dark">🖨️ IMPRIMIR FICHA</button>
        <hr>
        <div class="input-group mb-3">
            <input type="text" id="codigo_busqueda" class="form-control" placeholder="INTRODUZCA CÓDIGO (Ej: EH1111)">
            <button onclick="buscarFicha()" class="btn btn-primary">BUSCAR FICHA</button>
        </div>
    </div>

    <div id="fichaContent" style="display: none;">
        <div class="header-nancy">
            <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="Logo">
            <div class="text-end">
                <h5 class="m-0 fw-bold">ESPECIALIDAD OFTALMOLÓGICA</h5>
                <small class="text-success fw-bold">SALUD OCUPACIONAL - DOCUMENTO LEGAL</small>
            </div>
        </div>
        <div id="datos_ficha"></div>
    </div>
</div>

<script>
    const API_BASE = 'https://historial-clinico-nube.onrender.com';

    async function buscarFicha() {
        // FORZAMOS A MAYÚSCULAS AL LEER EL VALOR
        const codigo = document.getElementById('codigo_busqueda').value.trim().toUpperCase();
        const contenedor = document.getElementById('datos_ficha');
        const display = document.getElementById('fichaContent');

        if (!codigo) { alert("Por favor ingresa un código"); return; }

        try {
            const resId = await fetch(`${API_BASE}/buscar-id-por-codigo/${codigo}`);
            if (!resId.ok) throw new Error("No se encontró ningún paciente con ese código.");
            const dataId = await resId.json();

            const resFicha = await fetch(`${API_BASE}/ficha-oftalmo/${dataId.id}`);
            if (!resFicha.ok) throw new Error("No existe una ficha oftalmológica para este paciente.");
            const f = await resFicha.json();

            display.style.display = 'block';
            // AGREGAMOS TEXT-UPPERCASE TAMBIÉN EN LA TABLA PARA QUE AL IMPRIMIR TODO SALGA EN MAYÚSCULAS
            contenedor.innerHTML = `
                <div style="text-transform: uppercase;">
                    <table class="table table-bordered">
                        <tr><td colspan="4" class="section-title">II. ANTECEDENTES (PATOLOGICAS Y NO PATOLOGICAS)</td></tr>
                        <tr>
                            <td><b>Usa Lentes:</b> ${f.lentes || ''}</td>
                            <td><b>Daltonismo:</b> ${f.daltonismo || ''}</td>
                            <td colspan="2"><b>Diabetes:</b> ${f.diabetes || ''}</td>
                        </tr>
                        <tr>
                            <td><b>Estrabismo:</b> ${f.estrabismo || ''}</td>
                            <td><b>Infecciones:</b> ${f.infecciones || ''}</td>
                            <td colspan="2"><b>Presión Alta:</b> ${f.presion_alta || ''}</td>
                        </tr>
                        <tr><td colspan="4"><b>Observaciones:</b> ${f.ana_obs || ''}</td></tr>
                        <tr><td><b>Anamnesis:</b> ${f.anamnesis || ''}</td><td colspan="3"><b>Examen Externo:</b> ${f.examen_externo || ''}</td></tr>
                        
                        <tr><td colspan="4" class="section-title">III. AGUDEZA VISUAL</td></tr>
                        <tr>
                            <td><b>OD Lejos:</b> SC:${f.od_c_sc || ''} CC:${f.od_c_cc || ''}</td>
                            <td><b>OI Lejos:</b> SC:${f.oi_l_sc || ''} CC:${f.oi_c_cc || ''}</td>
                            <td><b>OD Cerca:</b> SC:${f.od_c_sc_cerca || ''} CC:${f.od_c_cc_cerca || ''}</td>
                            <td><b>OI Cerca:</b> SC:${f.oi_l_sc_cerca || ''} CC:${f.oi_c_cc_cerca || ''}</td>
                        </tr>
                        
                        <tr><td colspan="4" class="section-title">V. EXAMENES COMPLEMENTARIOS</td></tr>
                        <tr>
                            <td><b>PIO OD:</b> ${f.pio_od || ''} mmHg</td>
                            <td><b>PIO OI:</b> ${f.pio_oi || ''} mmHg</td>
                            <td colspan="2"><b>Fondo Ojo:</b> ${f.fo || ''}</td>
                        </tr>
                        <tr>
                            <td><b>Ishihara:</b> ${f.ish || ''}</td>
                            <td><b>Estereoscópica:</b> ${f.vision_estereo || ''}</td>
                            <td colspan="2"><b>Otras:</b> ${f.otras_pruebas || ''}</td>
                        </tr>
                        <tr><td colspan="4"><b>VI. DIAGNOSTICO Y RECOMENDACIONES:</b><br>${f.diagnostico || ''}</td></tr>
                    </table>
                </div>
                <br><br>
                <div class="row text-center">
                    <div class="col-6"><hr style="border-top: 1px solid #000;">FIRMA DEL PACIENTE</div>
                    <div class="col-6"><hr style="border-top: 1px solid #000;">FIRMA Y SELLO MÉDICO</div>
                </div>`;
        } catch (err) {
            display.style.display = 'none';
            alert(err.message);
        }
    }
</script>
</body>
</html>
