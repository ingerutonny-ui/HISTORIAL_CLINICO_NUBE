<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HC NUBE | P3 FINAL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-size: 12px; }
        .container { max-width: 1000px; background: white; margin: 20px auto; padding: 25px; border-radius: 15px; border-top: 5px solid #198754; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .section-title { color: #145a32; font-weight: bold; border-bottom: 2px solid #d4efdf; margin: 15px 0; padding-bottom: 5px; text-transform: uppercase; }
        .label-custom { font-weight: bold; color: #444; margin-bottom: 2px; display: block; }
        .form-control, .form-select { font-size: 12px; text-transform: uppercase; }
        .btn-add { background: #6c757d; color: white; font-size: 10px; font-weight: bold; margin-bottom: 10px; border-radius: 5px; }
        .btn-save { background: #198754; color: white; width: 100%; padding: 15px; font-weight: bold; border-radius: 50px; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="text-center mb-4"><img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" height="50"></div>
    <div class="alert alert-light border text-center fw-bold">
        PACIENTE: <span id="p_nombre" class="text-success">---</span> | CI: <span id="p_ci" class="text-success">---</span>
    </div>

    <form id="formP3">
        <div class="section-title">I. HÁBITOS</div>
        <div class="row g-2">
            <div class="col-md-4"><label class="label-custom">FUMA</label><select id="fuma" class="form-select"><option>NO</option><option>SI</option></select></div>
            <div class="col-md-4"><label class="label-custom">ALCOHOL</label><select id="bebe" class="form-select"><option>NO</option><option>SI</option></select></div>
            <div class="col-md-4"><label class="label-custom">DROGAS</label><select id="drogas" class="form-select"><option>NO</option><option>SI</option></select></div>
            <div class="col-md-4"><label class="label-custom">PIJCHAR (COCA)</label><select id="p_coca" class="form-select"><option>NO</option><option>SI</option></select></div>
            <div class="col-md-4"><label class="label-custom">DEPORTES</label><select id="ejercicio" class="form-select"><option>NO</option><option>SI</option></select></div>
            <div class="col-md-4"><label class="label-custom">GRUPO SANGUÍNEO</label><input type="text" id="grupo_sangre" class="form-control" placeholder="ORH+"></div>
        </div>

        <div class="section-title">II. HISTORIA LABORAL</div>
        <button type="button" class="btn btn-add" onclick="agregarFila()">+ AGREGAR FILA</button>
        <table class="table table-bordered text-center">
            <thead><tr><th>EDAD</th><th>EMPRESA</th><th>OCUPACIÓN</th><th>TIEMPO</th><th>RIESGOS</th><th>EPP</th></tr></thead>
            <tbody id="tablaLaboral">
                <tr>
                    <td><input type="number" class="form-control ed"></td>
                    <td><input type="text" class="form-control em"></td>
                    <td><input type="text" class="form-control oc"></td>
                    <td><input type="text" class="form-control ti"></td>
                    <td><input type="text" class="form-control ri"></td>
                    <td><select class="form-select ep"><option>NO</option><option>SI</option></select></td>
                </tr>
            </tbody>
        </table>

        <div class="section-title">III. RIESGOS EXPUESTOS</div>
        <div class="row g-3 px-2">
            <div class="col-6 col-md-3"><input type="checkbox" class="rx" value="RUIDO"> RUIDO</div>
            <div class="col-6 col-md-3"><input type="checkbox" class="rx" value="VIBRACIÓN"> VIBRACIÓN</div>
            <div class="col-6 col-md-3"><input type="checkbox" class="rx" value="POLVOS"> POLVOS</div>
            <div class="col-6 col-md-3"><input type="checkbox" class="rx" value="ERGONÓMICOS"> ERGONÓMICOS</div>
        </div>

        <button type="submit" id="btnFinal" class="btn-save">⌛ GUARDAR REGISTRO FINAL</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';

    function agregarFila() {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="number" class="form-control ed"></td><td><input type="text" class="form-control em"></td><td><input type="text" class="form-control oc"></td><td><input type="text" class="form-control ti"></td><td><input type="text" class="form-control ri"></td><td><select class="form-select ep"><option>NO</option><option>SI</option></select></td>`;
        document.getElementById('tablaLaboral').appendChild(tr);
    }

    window.onload = async () => {
        const id = localStorage.getItem('p_id');
        const res = await fetch(`${API}/api/paciente-completo/${id}`);
        const d = await res.json();
        document.getElementById('p_nombre').innerText = `${d.paciente.apellido} ${d.paciente.nombre}`;
        document.getElementById('p_ci').innerText = d.paciente.ci;
    };

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnFinal');
        btn.disabled = true; btn.innerText = "⏳ GUARDANDO...";

        const laboral = [];
        document.querySelectorAll('#tablaLaboral tr').forEach(tr => {
            laboral.push({
                edad: tr.querySelector('.ed').value,
                empresa: tr.querySelector('.em').value.toUpperCase(),
                ocupacion: tr.querySelector('.oc').value.toUpperCase(),
                tiempo: tr.querySelector('.ti').value,
                riesgos: tr.querySelector('.ri').value,
                epp: tr.querySelector('.ep').value
            });
        });

        const payload = {
            paciente_id: parseInt(localStorage.getItem('p_id')),
            fuma: document.getElementById('fuma').value,
            bebe: document.getElementById('bebe').value,
            ejercicio: document.getElementById('ejercicio').value,
            drogas: document.getElementById('drogas').value,
            p_coca: document.getElementById('p_coca').value,
            grupo_sangre: document.getElementById('grupo_sangre').value.toUpperCase(),
            historia_laboral: laboral,
            riesgos_detallados: Array.from(document.querySelectorAll('.rx:checked')).map(i => i.value),
            r_fisico: "DETALLE EN TABLA"
        };

        const r = await fetch(`${API}/p3/`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        if(r.ok) { alert("¡ÉXITO!"); window.location.href = "lista_historial.html"; }
        else { alert("ERROR EN SERVIDOR"); btn.disabled = false; }
    };
</script>
</body>
</html>
