<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <style>
        :root { --primary: #2ecc71; --dark: #1e4d2b; --soft: #f8f9fa; --accent: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 20px; text-transform: uppercase; color: #333; }
        
        .container { max-width: 1000px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        
        /* CABECERA CORPORATIVA OHS */
        .ohs-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .logo-txt { font-size: 28px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }
        .logo-subtitle { font-size: 11px; color: #7f8c8d; font-weight: 400; display: block; margin-top: -5px; }
        
        /* BANNER DE PACIENTE (RESTAURADO) */
        .patient-banner { background: #f0fff4; padding: 18px 25px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #d1f2eb; margin-bottom: 30px; }
        .info-group { display: flex; flex-direction: column; }
        .info-label { font-size: 10px; color: var(--primary); font-weight: 800; margin-bottom: 3px; }
        .info-value { font-size: 14px; font-weight: 900; color: #2c3e50; }
        .code-badge { background: white; padding: 5px 15px; border-radius: 6px; border: 2px solid var(--accent); color: var(--accent); font-size: 16px; font-weight: 900; }

        .section-header { border-left: 6px solid var(--primary); padding-left: 15px; margin: 35px 0 20px 0; font-size: 16px; font-weight: 800; color: var(--dark); display: flex; justify-content: space-between; align-items: center; }

        /* GRILLAS Y CAMPOS */
        .grid-habitos { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .field-box { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 800; color: #7f8c8d; margin-bottom: 6px; }
        select, input { padding: 12px; border: 1px solid #ced4da; border-radius: 8px; font-weight: 700; font-size: 13px; outline: none; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(46, 204, 113, 0.2); }

        /* TABLA LABORAL ELEGANTE */
        .table-wrapper { overflow-x: auto; margin-top: 10px; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--soft); font-size: 10px; padding: 15px; border: 1px solid #dee2e6; color: #555; text-align: left; }
        td { padding: 10px; border: 1px solid #dee2e6; }
        .btn-add { background: #34495e; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.3s; }
        .btn-add:hover { background: #2c3e50; }

        /* RIESGOS SECCIÓN III (ORDEN HORIZONTAL) */
        .riesgos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 25px; background: #fafafa; border-radius: 12px; border: 1px solid #eee; }
        .check-item { display: flex; align-items: center; font-size: 11px; font-weight: 800; color: #444; cursor: pointer; }
        .check-item input { width: 18px; height: 18px; margin-right: 12px; accent-color: var(--primary); }

        /* BOTÓN SINCRONIZAR */
        .btn-sync { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 900; cursor: pointer; margin-top: 40px; box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3); transition: 0.4s; letter-spacing: 1px; }
        .btn-sync:hover { background: #27ae60; transform: translateY(-3px); box-shadow: 0 12px 25px rgba(46, 204, 113, 0.4); }
        .btn-sync:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="ohs-header">
        <div>
            <span class="logo-txt">OHS</span>
            <span class="logo-subtitle">TRABAJO SANO Y SEGURO</span>
        </div>
        <div style="text-align: right; font-weight: 900; color: #34495e;">3. HÁBITOS Y ANTECEDENTES LABORALES (P3)</div>
    </div>

    <div class="patient-banner">
        <div class="info-group">
            <span class="info-label">PACIENTE SELECCIONADO:</span>
            <span id="p_nombre" class="info-value">CARGANDO...</span>
        </div>
        <div class="info-group">
            <span class="info-label">CÉDULA DE IDENTIDAD:</span>
            <span id="p_ci" class="info-value">---</span>
        </div>
        <div class="info-group">
            <span class="info-label">CÓDIGO INTERNO:</span>
            <span id="p_codigo" class="code-badge">...</span>
        </div>
    </div>

    <div class="section-header">I. HÁBITOS PERSONALES</div>
    <div class="grid-habitos">
        <div class="field-box"><label>¿FUMA?</label><select id="fuma"><option>NO</option><option>SI</option></select></div>
        <div class="field-box"><label>¿ALCOHOL?</label><select id="alcohol"><option>NO</option><option>SI</option></select></div>
        <div class="field-box"><label>¿DROGAS?</label><select id="drogas"><option>NO</option><option>SI</option></select></div>
        <div class="field-box"><label>PIJCHAR?</label><select id="coca"><option>NO</option><option>SI</option></select></div>
        <div class="field-box"><label>¿DEPORTE?</label><select id="deporte"><option>NO</option><option>SI</option></select></div>
        <div class="field-box"><label>G. SANGUÍNEO</label><input type="text" id="gs" placeholder="ORH+"></div>
    </div>

    <div class="section-header">
        II. HISTORIA LABORAL (ÚLTIMOS EMPLEOS)
        <button class="btn-add" onclick="addRow()">+ AGREGAR FILA</button>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 80px;">EDAD INICIO</th>
                    <th>EMPRESA</th>
                    <th>OCUPACIÓN</th>
                    <th style="width: 80px;">AÑOS</th>
                    <th>RIESGOS</th>
                    <th style="width: 80px;">EPP</th>
                </tr>
            </thead>
            <tbody id="tabla_body">
                <tr>
                    <td><input type="number" style="width: 100%;"></td>
                    <td><input type="text" style="width: 100%;"></td>
                    <td><input type="text" style="width: 100%;"></td>
                    <td><input type="number" style="width: 100%;"></td>
                    <td><input type="text" style="width: 100%;"></td>
                    <td><select style="width: 100%;"><option>SI</option><option>NO</option></select></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="section-header">III. RIESGOS EXPUESTOS EN SU VIDA LABORAL</div>
    <div class="riesgos-grid" id="riesgos_p3">
        <label class="check-item"><input type="checkbox" value="RUIDO"> RUIDO</label>
        <label class="check-item"><input type="checkbox" value="POLVOS"> POLVOS</label>
        <label class="check-item"><input type="checkbox" value="ERGONÓMICO"> ERGONÓMICO</label>
        <label class="check-item"><input type="checkbox" value="VIBRACIÓN"> VIBRACIÓN</label>
        <label class="check-item"><input type="checkbox" value="GASES/VAPORES"> GASES/VAPORES</label>
        <label class="check-item"><input type="checkbox" value="BIOLÓGICO"> BIOLÓGICO</label>
        <label class="check-item"><input type="checkbox" value="RADIACIÓN"> RADIACIÓN</label>
        <label class="check-item"><input type="checkbox" value="ILUMINACIÓN"> ILUMINACIÓN</label>
        <label class="check-item"><input type="checkbox" value="PSICOSOCIAL"> PSICOSOCIAL</label>
        <label class="check-item"><input type="checkbox" value="TEMP. EXTREMAS"> TEMP. EXTREMAS</label>
        <label class="check-item"><input type="checkbox" value="QUÍMICOS"> QUÍMICOS</label>
        <label class="check-item"><input type="checkbox" value="ALTURA"> ALTURA</label>
    </div>

    <button class="btn-sync" id="btnSincronizar" onclick="guardarP3()">💾 GUARDAR REGISTRO Y SINCRONIZAR P3</button>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    let p_id = localStorage.getItem('paciente_id');

    window.onload = async () => {
        if (!p_id) { alert("⚠️ PACIENTE NO SELECCIONADO. REGRESE AL INICIO."); return; }
        
        try {
            const res = await fetch(`${API}/api/pacientes`);
            const data = await res.json();
            const p = data.find(x => x.id == p_id);
            if (p) {
                document.getElementById('p_nombre').innerText = `${p.apellido} ${p.nombre}`;
                document.getElementById('p_ci').innerText = p.ci || '568765456678';
                
                // LIMPIEZA TOTAL DEL UNDEFINED
                let finalCode = (p.codigo && p.codigo !== "undefined") ? p.codigo : "S/C";
                document.getElementById('p_codigo').innerText = finalCode;
            }
        } catch (e) { console.error("Error al cargar datos:", e); }
    };

    function addRow() {
        const row = document.getElementById('tabla_body').insertRow();
        row.innerHTML = `<td><input type="number" style="width: 100%;"></td><td><input type="text" style="width: 100%;"></td><td><input type="text" style="width: 100%;"></td><td><input type="number" style="width: 100%;"></td><td><input type="text" style="width: 100%;"></td><td><select style="width: 100%;"><option>SI</option><option>NO</option></select></td>`;
    }

    async function guardarP3() {
        const btn = document.getElementById('btnSincronizar');
        btn.disabled = true;
        btn.innerHTML = "⏳ SINCRONIZANDO CON LA NUBE...";

        const historia = [];
        document.querySelectorAll("#tabla_body tr").forEach(tr => {
            const inps = tr.querySelectorAll("input, select");
            if(inps[1].value) {
                historia.push({
                    edad: inps[0].value, empresa: inps[1].value, 
                    cargo: inps[2].value, tiempo: inps[3].value,
                    riesgos: inps[4].value, epp: inps[5].value
                });
            }
        });

        const riesgos = [];
        document.querySelectorAll("#riesgos_p3 input:checked").forEach(c => riesgos.push(c.value));

        const payload = {
            paciente_id: parseInt(p_id),
            fuma: document.getElementById('fuma').value,
            alcohol: document.getElementById('alcohol').value,
            drogas: document.getElementById('drogas').value,
            coca: document.getElementById('coca').value,
            deporte: document.getElementById('deporte').value,
            grupo_sanguineo: document.getElementById('gs').value || "S/D",
            historia_laboral: JSON.stringify(historia),
            riesgos_expuestos: JSON.stringify(riesgos),
            observaciones: "REGISTRO COMPLETADO"
        };

        try {
            const response = await fetch(`${API}/api/guardar-p3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("🚀 P3 SINCRONIZADO CORRECTAMENTE");
                window.location.href = "index.html";
            } else { alert("❌ ERROR 500: EL SERVIDOR NO PUDO PROCESAR LOS DATOS."); }
        } catch (e) { alert("❌ ERROR DE RED: VERIFIQUE SU CONEXIÓN A INTERNET."); }
        finally { btn.disabled = false; btn.innerHTML = "💾 GUARDAR REGISTRO Y SINCRONIZAR P3"; }
    }
</script>
</body>
</html>
