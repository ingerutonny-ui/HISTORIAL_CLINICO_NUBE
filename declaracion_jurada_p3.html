<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; background: white; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid #28a745; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .logo { width: 120px; height: auto; }
        .paciente-banner { background: #e9f7ef; padding: 10px 20px; border-radius: 5px; color: #155724; font-weight: bold; font-size: 14px; }
        h3 { color: #1e4d2b; border-left: 4px solid #28a745; padding-left: 10px; margin-top: 25px; font-size: 18px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th { background: #f8f9fa; color: #333; padding: 10px; border: 1px solid #ddd; text-align: center; }
        td { border: 1px solid #ddd; padding: 5px; }
        .checkbox-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .checkbox-item { display: flex; align-items: center; font-size: 13px; color: #333; }
        .checkbox-item input { width: auto; margin-right: 8px; }
        #btn-guardar { width: 100%; background: #28a745; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        #btn-guardar:hover { background: #218838; }
        #btn-guardar:disabled { background: #ccc; cursor: not-allowed; }
        .btn-add { background: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="Logo OHS" class="logo">
            <div id="paciente-info" class="paciente-banner">IDENTIFICANDO PACIENTE...</div>
        </div>

        <form id="form-p3">
            <h3>I. HÁBITOS</h3>
            <div class="grid">
                <div><label>FUMA</label><select id="fuma"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div><label>ALCOHOL</label><select id="bebe"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div><label>DROGAS</label><select id="drogas"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div><label>PIJCHAR (COCA)</label><select id="p_coca"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div><label>DEPORTES</label><select id="ejercicio"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div><label>GRUPO SANGUÍNEO</label><input type="text" id="grupo_sangre" value="ORH+"></div>
            </div>

            <h3>II. HISTORIA LABORAL (ÚLTIMOS EMPLEOS)</h3>
            <button type="button" class="btn-add" onclick="agregarFila()">+ AGREGAR FILA</button>
            <table id="tabla-laboral">
                <thead>
                    <tr>
                        <th style="width: 80px;">EDAD INICIO</th>
                        <th>EMPRESA</th>
                        <th>OCUPACIÓN</th>
                        <th style="width: 80px;">AÑOS</th>
                        <th>RIESGOS</th>
                        <th style="width: 70px;">EPP</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="number" class="edad_inicio" placeholder="Ej: 20"></td>
                        <td><input type="text" class="empresa" placeholder="Nombre empresa"></td>
                        <td><input type="text" class="ocupacion" placeholder="Cargo"></td>
                        <td><input type="number" class="tiempo" placeholder="Cant."></td>
                        <td><input type="text" class="riesgos_job" placeholder="Ej: Polvo, Ruido"></td>
                        <td><select class="epp"><option value="NO">NO</option><option value="SI">SI</option></select></td>
                    </tr>
                </tbody>
            </table>

            <h3>III. RIESGOS EXPUESTOS DURANTE SU VIDA LABORAL</h3>
            <div class="checkbox-grid">
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="RUIDO"> RUIDO</div>
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="VIBRACIÓN"> VIBRACIÓN</div>
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="RADIACIÓN"> RADIACIÓN</div>
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="POLVOS"> POLVOS</div>
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="GASES"> GASES/VAPORES</div>
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="ERGONÓMICOS"> ERGONÓMICOS</div>
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="BIOLÓGICOS"> BIOLÓGICOS</div>
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="QUÍMICOS"> QUÍMICOS</div>
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="PSICOSOCIAL"> PSICOSOCIAL</div>
            </div>

            <button type="submit" id="btn-guardar">GUARDAR EN LA NUBE</button>
        </form>
    </div>

    <script>
        // Carga de datos desde memoria local (P1 y P2 deben haber guardado estos datos)
        const storageId = localStorage.getItem('paciente_id');
        const storageNombre = localStorage.getItem('paciente_nombre') || "PACIENTE NUEVO";
        const storageCi = localStorage.getItem('paciente_ci') || "S/CI";

        // Mostrar encabezado
        document.getElementById('paciente-info').innerText = `PACIENTE: ${storageNombre} | CI: ${storageCi}`;

        function agregarFila() {
            const tbody = document.querySelector('#tabla-laboral tbody');
            const row = `<tr>
                <td><input type="number" class="edad_inicio"></td>
                <td><input type="text" class="empresa"></td>
                <td><input type="text" class="ocupacion"></td>
                <td><input type="number" class="tiempo"></td>
                <td><input type="text" class="riesgos_job"></td>
                <td><select class="epp"><option value="NO">NO</option><option value="SI">SI</option></select></td>
            </tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        }

        document.getElementById('form-p3').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar');
            btn.innerText = "⌛ GUARDANDO EN RENDER...";
            btn.disabled = true;

            // Recopilar tabla laboral
            const historiaLaboral = [];
            document.querySelectorAll('#tabla-laboral tbody tr').forEach(tr => {
                const empresa = tr.querySelector('.empresa').value;
                if (empresa) {
                    historiaLaboral.push({
                        edad_inicio: tr.querySelector('.edad_inicio').value,
                        empresa: empresa,
                        ocupacion: tr.querySelector('.ocupacion').value,
                        tiempo: tr.querySelector('.tiempo').value,
                        riesgos: tr.querySelector('.riesgos_job').value,
                        epp: tr.querySelector('.epp').value
                    });
                }
            });

            // Recopilar riesgos marcados
            const riesgosSeleccionados = Array.from(document.querySelectorAll('input[name="riesgo"]:checked')).map(cb => cb.value);

            const datosParaEnviar = {
                paciente_id: storageId || 1,
                fuma: document.getElementById('fuma').value,
                bebe: document.getElementById('bebe').value,
                drogas: document.getElementById('drogas').value,
                p_coca: document.getElementById('p_coca').value,
                ejercicio: document.getElementById('ejercicio').value,
                grupo_sangre: document.getElementById('grupo_sangre').value,
                historia_laboral: historiaLaboral,
                riesgos_detallados: riesgosSeleccionados
            };

            try {
                const respuesta = await fetch('https://historial-clinico-936s.onrender.com/p3/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datosParaEnviar)
                });

                const resultado = await respuesta.json();

                if (resultado.status === 'success') {
                    alert("✅ ÉXITO: REGISTRO P3 COMPLETADO.");
                    window.location.href = "generar_reporte.html";
                } else {
                    alert("❌ ERROR DEL SERVIDOR: " + (resultado.message || "Fallo interno"));
                }
            } catch (error) {
                console.error("Error:", error);
                alert("❌ ERROR DE CONEXIÓN: Verifica que el Backend esté online.");
            } finally {
                btn.innerText = "GUARDAR EN LA NUBE";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
