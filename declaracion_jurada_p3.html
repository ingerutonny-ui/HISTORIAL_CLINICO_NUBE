<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde-ohs: #2ecc71; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .barra-paciente { background: #e8f8f5; padding: 15px; border-radius: 8px; border-left: 6px solid var(--verde-ohs); display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px; }
        .text-blue { color: #0d6efd; text-transform: uppercase; }
        .section-tag { border-left: 4px solid var(--verde-ohs); color: #1e4d2b; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; padding-left: 10px; margin: 25px 0 10px; background: #f9f9f9; }
        .form-control, .form-select { text-transform: uppercase; font-size: 0.8rem; }
        .btn-final { background: #27ae60; color: white; font-weight: bold; width: 100%; padding: 15px; border-radius: 8px; border: none; margin-top: 25px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="OHS" style="height: 55px;">
        <h5 class="fw-bold text-success m-0">3. HÁBITOS Y ANTECEDENTES LABORALES (P3)</h5>
    </div>

    <div class="barra-paciente">
        <div>PACIENTE: <span id="v_nombre" class="text-blue">SINCRONIZANDO...</span></div>
        <div>CI: <span id="v_ci" class="text-blue">---</span></div>
        <div>CÓDIGO: <span id="v_codigo" class="text-success" style="font-family: monospace;">---</span></div>
    </div>

    <form id="formP3">
        <div class="section-tag">I. HÁBITOS PERSONALES</div>
        <div class="row g-2 mb-4">
            <div class="col-md-2"><label class="fw-bold small">¿FUMA?</label><select id="fuma" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold small">¿ALCOHOL?</label><select id="alcohol" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold small">¿DROGAS?</label><select id="drogas" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold small">PIJCHAR?</label><select id="pijchar" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold small">¿DEPORTE?</label><select id="deporte" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold small">G. SANGUÍNEO</label><input type="text" id="grupo_sanguineo" class="form-control" placeholder="EJ. ORH+"></div>
        </div>

        <div class="section-tag">II. HISTORIA LABORAL <button type="button" class="btn btn-sm btn-dark float-end" onclick="addRow()">+ FILA</button></div>
        <table class="table table-bordered align-middle">
            <thead class="table-light text-center" style="font-size: 0.75rem;">
                <tr><th>EDAD</th><th>EMPRESA</th><th>OCUPACIÓN</th><th>AÑOS</th><th>RIESGOS</th><th>EPP</th></tr>
            </thead>
            <tbody id="tablaLaboral">
                <tr>
                    <td><input type="number" class="form-control row-edad"></td>
                    <td><input type="text" class="form-control row-empresa"></td>
                    <td><input type="text" class="form-control row-cargo"></td>
                    <td><input type="number" class="form-control row-tiempo"></td>
                    <td><input type="text" class="form-control row-riesgos"></td>
                    <td><select class="form-select row-epp"><option value="SI">SI</option><option value="NO">NO</option></select></td>
                </tr>
            </tbody>
        </table>

        <div class="section-tag">III. RIESGOS EXPUESTOS</div>
        <div class="row g-3 px-2">
            <div class="col-md-3"><input type="checkbox" class="check-riesgo" value="RUIDO" id="r1"> <label for="r1">RUIDO</label></div>
            <div class="col-md-3"><input type="checkbox" class="check-riesgo" value="POLVOS" id="r2"> <label for="r2">POLVOS</label></div>
            <div class="col-md-3"><input type="checkbox" class="check-riesgo" value="ERGONÓMICO" id="r3"> <label for="r3">ERGONÓMICO</label></div>
            <div class="col-md-3"><input type="checkbox" class="check-riesgo" value="QUÍMICOS" id="r4"> <label for="r4">QUÍMICOS</label></div>
        </div>

        <button type="submit" class="btn-final" id="btnFinalizar">💾 GUARDAR Y FINALIZAR P3</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    
    // FORZAMOS EL ID 1 (Ruben Almendras) para que no te bote al index
    let p_id = localStorage.getItem('paciente_id') || "1"; 

    async function cargarDatos() {
        try {
            const res = await fetch(`${API}/api/pacientes`);
            const data = await res.json();
            // Buscamos a Ruben Almendras específicamente o por ID
            const p = data.find(x => x.id == p_id || x.nombre.includes("RUBEN"));
            
            if (p) {
                document.getElementById('v_nombre').innerText = `${p.nombre} ${p.apellido}`.toUpperCase();
                document.getElementById('v_ci').innerText = p.ci || '---';
                document.getElementById('v_codigo').innerText = (p.codigo && p.codigo !== "undefined") ? p.codigo : "S/C";
                // Guardamos el ID correcto por si acaso
                p_id = p.id;
            }
        } catch (e) {
            document.getElementById('v_nombre').innerText = "REINTENTANDO CONEXIÓN...";
            setTimeout(cargarDatos, 1500); 
        }
    }

    window.onload = cargarDatos;

    function addRow() {
        const row = `<tr><td><input type="number" class="form-control row-edad"></td><td><input type="text" class="form-control row-empresa"></td><td><input type="text" class="form-control row-cargo"></td><td><input type="number" class="form-control row-tiempo"></td><td><input type="text" class="form-control row-riesgos"></td><td><select class="form-select row-epp"><option value="SI">SI</option><option value="NO">NO</option></select></td></tr>`;
        document.getElementById('tablaLaboral').insertAdjacentHTML('beforeend', row);
    }

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnFinalizar');
        btn.disabled = true; btn.innerText = "⏳ GUARDANDO...";

        const historia = [];
        document.querySelectorAll('#tablaLaboral tr').forEach(tr => {
            const emp = tr.querySelector('.row-empresa').value;
            if(emp) {
                historia.push({
                    edad: tr.querySelector('.row-edad').value,
                    empresa: emp.toUpperCase(),
                    cargo: tr.querySelector('.row-cargo').value.toUpperCase(),
                    tiempo: tr.querySelector('.row-tiempo').value,
                    riesgos: tr.querySelector('.row-riesgos').value.toUpperCase(),
                    epp: tr.querySelector('.row-epp').value
                });
            }
        });

        const riesgos_exp = [];
        document.querySelectorAll('.check-riesgo:checked').forEach(ch => riesgos_exp.push(ch.value));

        const payload = {
            paciente_id: parseInt(p_id),
            fuma: document.getElementById('fuma').value,
            alcohol: document.getElementById('alcohol').value,
            drogas: document.getElementById('drogas').value,
            coca: document.getElementById('pijchar').value,
            deporte: document.getElementById('deporte').value,
            grupo_sanguineo: document.getElementById('grupo_sanguineo').value.toUpperCase() || "S/D",
            historia_laboral: JSON.stringify(historia),
            riesgos_expuestos: JSON.stringify(riesgos_exp)
        };

        try {
            const res = await fetch(`${API}/api/guardar-p3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if(res.ok) {
                alert("✅ P3 GUARDADO CORRECTAMENTE.");
                window.location.href = "index.html";
            }
        } catch (err) {
            alert("❌ ERROR AL GUARDAR.");
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
