<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo.png" alt="Logo" class="logo">
            <div id="paciente-info" class="paciente-banner">Cargando paciente...</div>
        </div>

        <form id="form-p3">
            <h3>I. HÁBITOS</h3>
            <div class="grid">
                <div>
                    <label>FUMA</label>
                    <select id="fuma"><option value="NO">NO</option><option value="SI">SI</option></select>
                </div>
                <div>
                    <label>ALCOHOL</label>
                    <select id="bebe"><option value="NO">NO</option><option value="SI">SI</option></select>
                </div>
                <div>
                    <label>DROGAS</label>
                    <select id="drogas"><option value="NO">NO</option><option value="SI">SI</option></select>
                </div>
                <div>
                    <label>PIJCHAR (COCA)</label>
                    <select id="p_coca"><option value="NO">NO</option><option value="SI">SI</option></select>
                </div>
                <div>
                    <label>DEPORTES</label>
                    <select id="ejercicio"><option value="NO">NO</option><option value="SI">SI</option></select>
                </div>
                <div>
                    <label>GRUPO SANGUÍNEO</label>
                    <input type="text" id="grupo_sangre" placeholder="Ej: ORH+">
                </div>
            </div>

            <h3>II. HISTORIA LABORAL (ÚLTIMOS EMPLEOS)</h3>
            <button type="button" onclick="agregarFila()">+ AGREGAR FILA</button>
            <table id="tabla-laboral">
                <thead>
                    <tr>
                        <th>EMPRESA</th>
                        <th>OCUPACIÓN</th>
                        <th>TIEMPO (AÑOS)</th>
                        <th>RIESGOS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" class="empresa"></td>
                        <td><input type="text" class="ocupacion"></td>
                        <td><input type="number" class="tiempo"></td>
                        <td><input type="text" class="riesgos"></td>
                    </tr>
                </tbody>
            </table>

            <h3>III. RIESGOS EXPUESTOS DURANTE SU VIDA LABORAL</h3>
            <div class="checkbox-grid">
                <label><input type="checkbox" name="riesgo" value="RUIDO"> RUIDO</label>
                <label><input type="checkbox" name="riesgo" value="VIBRACIÓN"> VIBRACIÓN</label>
                <label><input type="checkbox" name="riesgo" value="RADIACIÓN"> RADIACIÓN</label>
                <label><input type="checkbox" name="riesgo" value="POLVOS"> POLVOS</label>
                <label><input type="checkbox" name="riesgo" value="GASES"> GASES/VAPORES</label>
                <label><input type="checkbox" name="riesgo" value="ERGONÓMICOS"> ERGONÓMICOS</label>
            </div>

            <button type="submit" id="btn-guardar">GUARDAR EN LA NUBE</button>
        </form>
    </div>

    <script>
        const pacienteId = localStorage.getItem('paciente_id');

        function agregarFila() {
            const tbody = document.querySelector('#tabla-laboral tbody');
            const row = `<tr>
                <td><input type="text" class="empresa"></td>
                <td><input type="text" class="ocupacion"></td>
                <td><input type="number" class="tiempo"></td>
                <td><input type="text" class="riesgos"></td>
            </tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        }

        document.getElementById('form-p3').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar');
            btn.innerText = "GUARDANDO...";
            btn.disabled = true;

            // Capturar tabla laboral
            const historia = [];
            document.querySelectorAll('#tabla-laboral tbody tr').forEach(tr => {
                historia.push({
                    empresa: tr.querySelector('.empresa').value,
                    ocupacion: tr.querySelector('.ocupacion').value,
                    tiempo: tr.querySelector('.tiempo').value,
                    riesgos: tr.querySelector('.riesgos').value
                });
            });

            // Capturar riesgos (checkboxes)
            const riesgos = Array.from(document.querySelectorAll('input[name="riesgo"]:checked')).map(cb => cb.value);

            const payload = {
                paciente_id: pacienteId,
                fuma: document.getElementById('fuma').value,
                bebe: document.getElementById('bebe').value,
                drogas: document.getElementById('drogas').value,
                p_coca: document.getElementById('p_coca').value,
                ejercicio: document.getElementById('ejercicio').value,
                grupo_sangre: document.getElementById('grupo_sangre').value,
                historia_laboral: historia,
                riesgos_detallados: riesgos
            };

            try {
                const response = await fetch('https://historial-clinico-936s.onrender.com/p3/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                if (result.status === 'success') {
                    alert("✅ ÉXITO: DATOS DE P3 GUARDADOS.");
                    window.location.href = "generar_reporte.html";
                } else {
                    alert("❌ ERROR: " + result.message);
                }
            } catch (error) {
                alert("❌ ERROR DE CONEXIÓN");
            } finally {
                btn.innerText = "GUARDAR EN LA NUBE";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
