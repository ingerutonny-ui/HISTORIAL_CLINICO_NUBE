<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - FINALIZAR REGISTRO | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde-ohs: #2ecc71; --verde-boton: #27ae60; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; font-size: 0.8rem; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .barra-paciente { background: #e8f8f5; padding: 15px; border-radius: 8px; border-left: 5px solid var(--verde-ohs); display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px; }
        .form-control, .form-select { text-transform: uppercase; }
        .btn-final { background: var(--verde-boton); color: white; font-weight: bold; width: 100%; padding: 15px; border-radius: 8px; border: none; font-size: 1.1rem; margin-top: 20px; }
        .section-tag { background: #f8f9fa; padding: 8px; font-weight: bold; margin: 15px 0; border-bottom: 2px solid var(--verde-ohs); }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="OHS" style="height: 50px;">
    </div>

    <div class="barra-paciente">
        <div>PACIENTE: <span id="v_nombre" class="text-primary">CARGANDO...</span></div>
        <div>CÓDIGO: <span id="v_codigo" class="text-success">---</span></div>
    </div>

    <form id="formP3">
        <div class="section-tag">I. HÁBITOS PERSONALES</div>
        <div class="row g-3">
            <div class="col-md-2"><label>¿FUMA?</label><select id="fuma" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>¿ALCOHOL?</label><select id="alcohol" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>¿DROGAS?</label><select id="drogas" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>¿PIJCHA?</label><select id="pijchar" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>¿DEPORTE?</label><select id="deporte" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>G. SANGRE</label><input type="text" id="grupo_sanguineo" class="form-control" value="ORH+"></div>
        </div>

        <div class="section-tag">II. HISTORIA LABORAL</div>
        <div class="table-responsive">
            <table class="table table-bordered">
                <thead class="table-light">
                    <tr><th>EMPRESA</th><th>OCUPACIÓN</th><th>TIEMPO</th><th>RIESGOS</th></tr>
                </thead>
                <tbody id="tablaLaboral">
                    <tr>
                        <td><input type="text" class="form-control row-empresa"></td>
                        <td><input type="text" class="form-control row-cargo"></td>
                        <td><input type="text" class="form-control row-tiempo"></td>
                        <td><input type="text" class="form-control row-riesgos"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="section-tag">III. RIESGOS EXPUESTOS</div>
        <div class="row px-3">
            <div class="col-4 form-check"><input type="checkbox" class="check-riesgo" value="RUIDO" id="r1"> <label for="r1">RUIDO</label></div>
            <div class="col-4 form-check"><input type="checkbox" class="check-riesgo" value="POLVOS" id="r2"> <label for="r2">POLVOS</label></div>
            <div class="col-4 form-check"><input type="checkbox" class="check-riesgo" value="ALTURA" id="r3"> <label for="r3">ALTURA</label></div>
        </div>

        <button type="submit" class="btn-final" id="btnAccion">💾 GUARDAR Y FINALIZAR</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const id_paciente = localStorage.getItem('p_id') || localStorage.getItem('p_id_edicion');

    window.onload = async () => {
        if (!id_paciente) { alert("Sesión expirada"); window.location.href="index.html"; return; }
        
        // Obtener datos del paciente para la cabecera
        try {
            const res = await fetch(`${API}/api/pacientes/${id_paciente}`);
            const data = await res.json();
            document.getElementById('v_nombre').innerText = (data.nombre + " " + data.apellido).toUpperCase();
            document.getElementById('v_codigo').innerText = data.codigo_paciente || 'S/C';
        } catch (e) { console.error("Error cabecera"); }
    };

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnAccion');
        const nombreP = document.getElementById('v_nombre').innerText;
        const codigoP = document.getElementById('v_codigo').innerText;

        btn.disabled = true;
        btn.innerText = "⏳ PROCESANDO EN LA NUBE...";

        const historia = [];
        document.querySelectorAll('#tablaLaboral tr').forEach(tr => {
            const emp = tr.querySelector('.row-empresa').value;
            if(emp) {
                historia.push({
                    empresa: emp.toUpperCase(),
                    cargo: tr.querySelector('.row-cargo').value.toUpperCase(),
                    tiempo: tr.querySelector('.row-tiempo').value,
                    riesgos: tr.querySelector('.row-riesgos').value.toUpperCase()
                });
            }
        });

        // ESTRUCTURA EXACTA QUE ESPERA TU BACKEND PARA P3
        const payload = {
            paciente_id: id_paciente,
            seccion: 'P3',
            datos: {
                fuma: document.getElementById('fuma').value,
                alcohol: document.getElementById('alcohol').value,
                drogas: document.getElementById('drogas').value,
                pijcha: document.getElementById('pijchar').value,
                deporte: document.getElementById('deporte').value,
                grupo_sangre: document.getElementById('grupo_sanguineo').value,
                historia_laboral: historia,
                riesgos_seleccionados: Array.from(document.querySelectorAll('.check-riesgo:checked')).map(c => c.value)
            }
        };

        try {
            // USAMOS LA RUTA MAESTRA QUE SÍ EXISTE EN TU RENDER
            const response = await fetch(`${API}/api/guardar_declaracion`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("NUEVO PACIENTE: " + nombreP + "\nCÓDIGO: " + codigoP);
                localStorage.clear();
                window.location.href = "index.html";
            } else {
                throw new Error("Error en respuesta");
            }
        } catch (err) {
            alert("⚠️ EL SERVIDOR ESTÁ DESPERTANDO. POR FAVOR, INTENTA DARLE AL BOTÓN UNA VEZ MÁS.");
            btn.disabled = false;
            btn.innerText = "💾 REINTENTAR GUARDAR";
        }
    };
</script>
</body>
</html>
