<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; padding: 10px; }
        .form-container { max-width: 950px; margin: 15px auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); }
        .header-ohs { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #22c55e; padding-bottom: 15px; margin-bottom: 20px; }
        .title-center h2 { font-size: 1.2rem; font-weight: 800; color: #1e293b; text-transform: uppercase; margin: 0; }
        .data-banner { background: #e8f8f5; padding: 15px; border-radius: 15px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-around; border: 1px solid #22c55e; }
        .data-val { color: #1e293b; font-weight: 900; font-size: 13px; }
        .section-title { background: #f8fafc; padding: 8px 12px; font-weight: 800; margin-top: 20px; border-left: 4px solid #22c55e; color: #1e293b; font-size: 14px; text-transform: uppercase; }
        .form-control, .form-select { border-radius: 10px; padding: 8px; font-size: 14px; text-transform: uppercase; border: 2px solid #f1f5f9; font-weight: 600; }
        .btn-finalizar { background: #22c55e; color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; text-transform: uppercase; margin-top: 25px; font-size: 16px; transition: 0.3s; }
        .btn-finalizar:hover { background: #16a34a; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-ohs">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" height="50">
        <div class="title-center"><h2>III. Hábitos y Antecedentes Laborales</h2></div>
    </div>

    <div class="data-banner">
        <div>PACIENTE: <span id="v_nombre" class="data-val">---</span></div>
        <div>CI: <span id="v_ci" class="data-val">---</span></div>
        <div>CÓDIGO: <span id="v_codigo" class="data-val">---</span></div>
    </div>

    <form id="formP3">
        <div class="section-title">1. Hábitos Personales</div>
        <div class="row g-3 p-2">
            <div class="col-md-3"><label>¿Fuma?</label><select id="fuma" class="form-select"><option>NO</option><option>SI</option></select></div>
            <div class="col-md-3"><label>¿Alcohol?</label><select id="alcohol" class="form-select"><option>NO</option><option>SOCIAL</option><option>FRECUENTE</option></select></div>
            <div class="col-md-3"><label>¿Drogas?</label><select id="drogas" class="form-select"><option>NO</option><option>SI</option></select></div>
            <div class="col-md-3"><label>Grupo Sanguíneo</label><input type="text" id="gs" class="form-control" value="ORH+"></div>
        </div>

        <div class="section-title">2. Historia Laboral</div>
        <div class="row g-3 p-2">
            <div class="col-md-6"><label>Empresa Anterior</label><input type="text" id="empresa" class="form-control" value="S/D"></div>
            <div class="col-md-6"><label>Cargo / Función</label><input type="text" id="cargo" class="form-control" value="S/D"></div>
        </div>

        <div class="section-title">3. Riesgos Expuestos</div>
        <div class="row g-3 p-2">
            <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input check-riesgo" type="checkbox" value="RUIDO" id="r1"><label class="form-check-label">RUIDO</label></div></div>
            <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input check-riesgo" type="checkbox" value="POLVOS" id="r2"><label class="form-check-label">POLVOS</label></div></div>
            <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input check-riesgo" type="checkbox" value="ERGONOMICO" id="r3"><label class="form-check-label">ERGONÓMICO</label></div></div>
            <div class="col-6 col-md-3"><div class="form-check"><input class="form-check-input check-riesgo" type="checkbox" value="BIOLOGICO" id="r4"><label class="form-check-label">BIOLÓGICO</label></div></div>
        </div>

        <button type="submit" id="btnFinal" class="btn-finalizar">💾 FINALIZAR Y GENERAR REPORTE</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const p_id = localStorage.getItem('p_id_edicion') || localStorage.getItem('p_id');

    window.onload = () => {
        if (!p_id) { window.location.href = "registro_paciente.html"; return; }
        document.getElementById('v_nombre').innerText = (localStorage.getItem('p_nom') || "---").toUpperCase();
        document.getElementById('v_ci').innerText = localStorage.getItem('p_ci') || "---";
        document.getElementById('v_codigo').innerText = localStorage.getItem('p_cod') || "---";
    };

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnFinal');
        btn.innerText = "⏳ PROCESANDO...";
        btn.disabled = true;

        // Recolectar P3
        const riesgos = [];
        document.querySelectorAll('.check-riesgo:checked').forEach(c => riesgos.push(c.value));
        
        const datosP3 = {
            fuma: document.getElementById('fuma').value,
            alcohol: document.getElementById('alcohol').value,
            drogas: document.getElementById('drogas').value,
            grupo_sanguineo: document.getElementById('gs').value.toUpperCase(),
            empresa: document.getElementById('empresa').value.toUpperCase(),
            cargo: document.getElementById('cargo').value.toUpperCase(),
            riesgos: riesgos.join(', ')
        };

        // INTEGRACIÓN FINAL: P1 + P2 + P3
        const p1 = JSON.parse(localStorage.getItem('datos_temporales_p1') || "{}");
        const p2 = JSON.parse(localStorage.getItem('datos_temporales_p2') || "{}");

        const payloadFinal = {
            paciente_id: parseInt(p_id),
            ...p1,
            ...p2,
            ...datosP3
        };

        try {
            // Usamos la ruta correcta definida en tu backend
            const res = await fetch(`${API}/api/save-p2`, { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payloadFinal)
            });

            if (res.ok) {
                alert("✅ HISTORIAL COMPLETADO EXITOSAMENTE.");
                window.location.href = "generar_reporte.html";
            } else {
                alert("❌ ERROR DEL SERVIDOR: " + res.statusText);
            }
        } catch (error) {
            alert("❌ ERROR DE CONEXIÓN.");
        } finally {
            btn.disabled = false;
            btn.innerText = "💾 FINALIZAR Y GENERAR REPORTE";
        }
    };
</script>
</body>
</html>
