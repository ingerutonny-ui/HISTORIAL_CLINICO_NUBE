<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | HÁBITOS Y LABORAL (3/3)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; padding: 10px; }
        .form-container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .section-title { border-left: 5px solid #22c55e; padding-left: 10px; margin: 20px 0 15px; font-weight: 800; color: #1e293b; text-transform: uppercase; font-size: 14px; }
        .data-banner { background: #f1f5f9; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-around; font-size: 11px; font-weight: 800; border: 1px solid #cbd5e1; color: #1e293b; }
        .grid-habitos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; background: #f8fafc; padding: 15px; border-radius: 10px; }
        label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; }
        select, input { font-size: 12px !important; font-weight: 600 !important; text-transform: uppercase; }
        .btn-save { background: #22c55e; color: white; width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 800; margin-top: 20px; }
        .table-custom { font-size: 11px; width: 100%; border-collapse: collapse; }
        .table-custom th { background: #f1f5f9; color: #475569; padding: 8px; border: 1px solid #e2e8f0; text-align: center; }
        .table-custom td { padding: 5px; border: 1px solid #e2e8f0; }
        .risk-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; }
        .risk-item { font-size: 10px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="data-banner">
        <div>PACIENTE: <span id="b_paciente">---</span></div>
        <div>CÓDIGO: <span id="b_codigo">---</span></div>
    </div>

    <form id="formP3">
        <div class="section-title">I. HÁBITOS</div>
        <div class="grid-habitos">
            <div><label>FUMA</label><select id="fuma" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select><input id="fuma_det" value="NO FUMA" class="form-control mt-1"></div>
            <div><label>ALCOHOL</label><select id="alcohol" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select><input id="alcohol_det" value="NO CONSUME" class="form-control mt-1"></div>
            <div><label>DROGAS</label><select id="drogas" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select><input id="drogas_det" value="NO CONSUME" class="form-control mt-1"></div>
            <div><label>PIJCHAR (COCA)</label><select id="coca" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div><label>DEPORTES</label><select id="deportes" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select><input id="deportes_det" value="NINGUNO" class="form-control mt-1"></div>
            <div><label>GRUPO SANGUÍNEO</label><input id="grupo_sangre" value="ORH+" class="form-control"></div>
        </div>

        <div class="section-title">II. HISTORIA LABORAL (ÚLTIMOS EMPLEOS)</div>
        <table class="table-custom">
            <thead>
                <tr><th>EDAD INICIO</th><th>EMPRESA</th><th>OCUPACIÓN</th><th>TIEMPO (AÑOS)</th><th>RIESGOS</th><th>EPP</th></tr>
            </thead>
            <tbody id="tablaLaboral"></tbody>
        </table>

        <div class="section-title">III. RIESGOS EXPUESTOS</div>
        <div class="risk-grid" id="riesgosCheck">
            <div class="risk-item"><input type="checkbox" value="RUIDO"> RUIDO</div>
            <div class="risk-item"><input type="checkbox" value="VIBRACIÓN"> VIBRACIÓN</div>
            <div class="risk-item"><input type="checkbox" value="POLVOS"> POLVOS</div>
            <div class="risk-item"><input type="checkbox" value="ERGONÓMICOS"> ERGONÓMICOS</div>
        </div>

        <button type="submit" id="btnG" class="btn-save">💾 GUARDAR DECLARACIÓN COMPLETA (P2+P3)</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const id_p = localStorage.getItem('p_id');

    function addRow() {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input class="form-control edad"></td><td><input class="form-control empresa"></td><td><input class="form-control cargo"></td><td><input class="form-control tiempo"></td><td><input class="form-control riesgos"></td><td><select class="form-select epp"><option value="NO">NO</option><option value="SI">SI</option></select></td>`;
        document.getElementById('tablaLaboral').appendChild(tr);
    }

    window.onload = async () => {
        if(!id_p) return;
        for(let i=0; i<2; i++) addRow();
        const r = await fetch(`${API}/api/paciente-completo/${id_p}`);
        const d = await r.json();
        if(d.paciente) {
            document.getElementById('b_paciente').innerText = `${d.paciente.apellido} ${d.paciente.nombre}`;
            document.getElementById('b_codigo').innerText = d.paciente.codigo_paciente;
        }
    };

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnG');
        btn.innerText = "PROCESANDO TODO..."; btn.disabled = true;

        // Recuperar datos de P2 guardados en localStorage
        const dataP2 = JSON.parse(localStorage.getItem('temp_p2') || '{}');
        
        const laboral = [];
        document.querySelectorAll('#tablaLaboral tr').forEach(tr => {
            const emp = tr.querySelector('.empresa').value;
            if(emp) laboral.push({
                edad_inicio: tr.querySelector('.edad').value,
                empresa: emp.toUpperCase(),
                cargo: tr.querySelector('.cargo').value.toUpperCase(),
                tiempo: tr.querySelector('.tiempo').value,
                riesgos: tr.querySelector('.riesgos').value.toUpperCase(),
                epp: tr.querySelector('.epp').value
            });
        });

        const riesgos = [];
        document.querySelectorAll('#riesgosCheck input:checked').forEach(i => riesgos.push(i.value));

        // OBJETO ÚNICO CONSOLIDADO
        const payload = {
            ...dataP2,
            paciente_id: parseInt(id_p),
            fuma: document.getElementById('fuma').value,
            fuma_det: document.getElementById('fuma_det').value.toUpperCase(),
            alcohol: document.getElementById('alcohol').value,
            alcohol_det: document.getElementById('alcohol_det').value.toUpperCase(),
            drogas: document.getElementById('drogas').value,
            drogas_det: document.getElementById('drogas_det').value.toUpperCase(),
            pijchar: document.getElementById('coca').value,
            deportes: document.getElementById('deportes').value,
            deportes_det: document.getElementById('deportes_det').value.toUpperCase(),
            grupo_sanguineo: document.getElementById('grupo_sangre').value.toUpperCase(),
            historia_laboral: JSON.stringify(laboral),
            riesgos_expuestos: riesgos.join(', ')
        };

        try {
            const res = await fetch(`${API}/api/guardar-declaracion-unificada/`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) {
                alert("✅ DECLARACIÓN GUARDADA");
                localStorage.removeItem('temp_p2');
                window.location.href = "lista_historial.html";
            } else { alert("❌ ERROR EN ENVÍO"); }
        } catch(err) { alert("❌ ERROR DE RED"); }
        finally { btn.innerText = "💾 GUARDAR DECLARACIÓN COMPLETA (P2+P3)"; btn.disabled = false; }
    };
</script>
</body>
</html>
