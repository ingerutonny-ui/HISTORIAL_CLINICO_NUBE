<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde-ohs: #2ecc71; --verde-oscuro: #27ae60; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; color: #333; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .barra-paciente { background: #e8f8f5; padding: 15px; border-radius: 8px; border-left: 5px solid var(--verde-ohs); display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 25px; }
        .text-blue { color: #0d6efd; text-transform: uppercase; }
        .text-codigo { color: #27ae60; font-family: 'Courier New', monospace; font-weight: 800; }
        .section-tag { border-left: 5px solid var(--verde-ohs); color: #1e4d2b; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; padding-left: 15px; margin: 25px 0 15px; background: #fcfcfc; }
        label { font-size: 0.75rem; font-weight: bold; color: #7f8c8d; margin-bottom: 5px; }
        .form-control, .form-select { text-transform: uppercase; font-size: 0.85rem; border-radius: 6px; }
        .btn-final { background: var(--verde-oscuro); color: white; font-weight: bold; width: 100%; padding: 15px; border-radius: 8px; border: none; margin-top: 30px; font-size: 1.1rem; transition: 0.3s; }
        .btn-final:hover { background: #1e8449; transform: translateY(-2px); }
        #successOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

<div id="successOverlay">
    <h1 style="color: var(--verde-oscuro); font-weight: 800; font-size: 3rem;">✅ REGISTRO P3 GUARDADO</h1>
    <h2 id="res_nombre" style="text-transform: uppercase; color: #2c3e50;">---</h2>
    <p class="mt-3">SINCRONIZACIÓN EXITOSA CON SERVIDOR STARTER</p>
</div>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="OHS" style="height: 60px;">
        <h4 class="fw-bold text-success m-0">3. HÁBITOS Y ANTECEDENTES LABORALES (P3)</h4>
    </div>

    <div class="barra-paciente">
        <div>PACIENTE: <span id="v_nombre" class="text-blue">BUSCANDO EN SERVIDOR...</span></div>
        <div>CI: <span id="v_ci" class="text-blue">---</span></div>
        <div>CÓDIGO: <span id="v_codigo" class="text-codigo">---</span></div>
    </div>

    <form id="formP3">
        <div class="section-tag">I. HÁBITOS PERSONALES</div>
        <div class="row g-3 mb-4">
            <div class="col-md-2"><label>¿FUMA?</label><select id="fuma" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>¿ALCOHOL?</label><select id="alcohol" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>¿DROGAS?</label><select id="drogas" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>PIJCHAR (COCA)?</label><select id="pijchar" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>¿DEPORTE?</label><select id="deporte" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>GRUPO SANGUÍNEO</label><input type="text" id="grupo_sanguineo" class="form-control" placeholder="EJ. ORH+"></div>
        </div>

        <div class="section-tag">II. HISTORIA LABORAL <button type="button" class="btn btn-sm btn-dark float-end" onclick="addRow()">+ AGREGAR FILA</button></div>
        <div class="table-responsive">
            <table class="table table-bordered align-middle text-center" style="font-size: 0.8rem;">
                <thead class="table-light">
                    <tr><th>EDAD</th><th>EMPRESA</th><th>OCUPACIÓN</th><th>AÑOS</th><th>RIESGOS</th><th>EPP</th></tr>
                </thead>
                <tbody id="tablaLaboral">
                    <tr>
                        <td><input type="number" class="form-control row-edad"></td>
                        <td><input type="text" class="form-control row-empresa"></td>
                        <td><input type="text" class="form-control row-cargo"></td>
                        <td><input type="number" class="form-control row-tiempo"></td>
                        <td><input type="text" class="form-control row-riesgos"></td>
                        <td><select class="form-select row-epp"><option value="SI">SI</option><option value="NO">NO</option></select></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="section-tag">III. RIESGOS EXPUESTOS EN SU VIDA LABORAL</div>
        <div class="row g-3 px-3">
            <div class="col-md-3 form-check"><input class="form-check-input check-riesgo" type="checkbox" value="RUIDO" id="r1"><label class="form-check-label" for="r1">RUIDO</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input check-riesgo" type="checkbox" value="POLVOS" id="r2"><label class="form-check-label" for="r2">POLVOS</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input check-riesgo" type="checkbox" value="ERGONÓMICO" id="r3"><label class="form-check-label" for="r3">ERGONÓMICO</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input check-riesgo" type="checkbox" value="VIBRACIÓN" id="r4"><label class="form-check-label" for="r4">VIBRACIÓN</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input check-riesgo" type="checkbox" value="QUÍMICOS" id="r5"><label class="form-check-label" for="r5">QUÍMICOS</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input check-riesgo" type="checkbox" value="BIOLÓGICO" id="r6"><label class="form-check-label" for="r6">BIOLÓGICO</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input check-riesgo" type="checkbox" value="PSICOSOCIAL" id="r7"><label class="form-check-label" for="r7">PSICOSOCIAL</label></div>
            <div class="col-md-3 form-check"><input class="form-check-input check-riesgo" type="checkbox" value="ALTURA" id="r8"><label class="form-check-label" for="r8">ALTURA</label></div>
        </div>

        <button type="submit" class="btn-final" id="btnFinalizar">💾 GUARDAR REGISTRO Y FINALIZAR P3</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    let p_id = localStorage.getItem('paciente_id') || localStorage.getItem('p_id');

    async function cargarPaciente() {
        if (!p_id) {
            alert("⚠️ PACIENTE NO SELECCIONADO. REGRESANDO AL INICIO.");
            window.location.href = "index.html";
            return;
        }
        
        try {
            const res = await fetch(`${API}/api/pacientes`);
            const data = await res.json();
            const p = data.find(x => x.id == p_id);
            
            if (p) {
                const n = `${p.nombre} ${p.apellido}`.toUpperCase();
                document.getElementById('v_nombre').innerText = n;
                document.getElementById('v_ci').innerText = p.ci || '---';
                document.getElementById('v_codigo').innerText = (p.codigo && p.codigo !== "undefined") ? p.codigo : "S/C";
                document.getElementById('res_nombre').innerText = n;
            } else {
                document.getElementById('v_nombre').innerText = "ERROR: PACIENTE NO ENCONTRADO";
            }
        } catch (e) {
            document.getElementById('v_nombre').innerText = "CONECTANDO CON SERVIDOR...";
            setTimeout(cargarPaciente, 1000); 
        }
    }

    window.onload = cargarPaciente;

    function addRow() {
        const row = `<tr><td><input type="number" class="form-control row-edad"></td><td><input type="text" class="form-control row-empresa"></td><td><input type="text" class="form-control row-cargo"></td><td><input type="number" class="form-control row-tiempo"></td><td><input type="text" class="form-control row-riesgos"></td><td><select class="form-select row-epp"><option value="SI">SI</option><option value="NO">NO</option></select></td></tr>`;
        document.getElementById('tablaLaboral').insertAdjacentHTML('beforeend', row);
    }

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnFinalizar');
        btn.disabled = true; btn.innerText = "⏳ GUARDANDO EN LA NUBE...";

        const historia = [];
        document.querySelectorAll('#tablaLaboral tr').forEach(tr => {
            const emp = tr.querySelector('.row-empresa').value;
            if(emp) {
                historia.push({
                    edad: tr.querySelector('.row-edad').value,
                    empresa: emp.toUpperCase(),
                    cargo: tr.querySelector('.row-cargo').value.toUpperCase(),
                    tiempo: tr.querySelector('.row-tiempo').value,
                    riesgos: tr.querySelector('.row-riesgos').value.toUpperCase(),
                    epp: tr.querySelector('.row-epp').value
                });
            }
        });

        const riesgos_exp = [];
        document.querySelectorAll('.check-riesgo:checked').forEach(ch => riesgos_exp.push(ch.value));

        const payload = {
            paciente_id: parseInt(p_id),
            fuma: document.getElementById('fuma').value,
            alcohol: document.getElementById('alcohol').value,
            drogas: document.getElementById('drogas').value,
            coca: document.getElementById('pijchar').value,
            deporte: document.getElementById('deporte').value,
            grupo_sanguineo: document.getElementById('grupo_sanguineo').value.toUpperCase() || "S/D",
            historia_laboral: JSON.stringify(historia),
            riesgos_expuestos: JSON.stringify(riesgos_exp)
        };

        try {
            const res = await fetch(`${API}/api/guardar-p3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if(res.ok) {
                document.getElementById('successOverlay').style.display = 'flex';
                setTimeout(() => { window.location.href = "index.html"; }, 2000);
            } else { throw new Error(); }
        } catch (err) {
            alert("❌ ERROR DE CONEXIÓN AL GUARDAR.");
            btn.disabled = false; btn.innerText = "💾 GUARDAR REGISTRO Y FINALIZAR P3";
        }
    };
</script>
</body>
</html>
