<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y LABORAL</title>
    <style>
        :root { --primary: #2ecc71; --dark: #1e293b; --ghost: #cbd5e1; --bg: #f0f2f5; --line: #e2e8f0; --blue-info: #2563eb; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--dark); display: flex; justify-content: center; }
        
        .container { background: white; width: 100%; max-width: 1000px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .header-top { display: flex; justify-content: center; margin-bottom: 15px; }
        .logo-img { height: 65px; width: auto; }

        h2 { text-align: center; color: var(--primary); font-weight: 900; text-transform: uppercase; margin: 10px 0 25px 0; font-size: 1.5rem; letter-spacing: 0.5px; }

        /* Banner Paciente Estilo P1/P2 */
        .patient-banner { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 15px; background: #f8fafc; padding: 15px 25px; border-radius: 12px; border-left: 6px solid var(--primary); margin-bottom: 25px; align-items: center; }
        .info-group label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .info-group span { font-size: 15px; font-weight: 900; color: var(--blue-info); text-transform: uppercase; }

        /* Secciones con borde verde */
        .section-box { border-top: 2px solid var(--line); margin-bottom: 25px; padding-top: 10px; }
        .section-title { font-size: 14px; font-weight: 900; color: #0f172a; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ""; width: 4px; height: 18px; background: var(--primary); display: inline-block; border-radius: 2px; }

        /* Grilla de campos */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px 20px; }
        .field { display: flex; flex-direction: column; }
        .field label { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; color: #475569; }
        
        input, select { 
            padding: 10px 14px; 
            border: 1.5px solid var(--line); 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--dark); 
            text-transform: uppercase;
        }

        /* Checkboxes para Riesgos */
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; padding: 10px; background: #fcfdfc; border-radius: 10px; }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 800; color: #334155; text-transform: uppercase; cursor: pointer; }
        .check-item input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }

        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 14px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-top: 20px; box-shadow: 0 8px 20px rgba(46, 204, 113, 0.25); transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-save:hover { transform: translateY(-2px); filter: brightness(1.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img">
    </div>

    <h2>III. HÁBITOS Y ANTECEDENTES LABORALES (P3)</h2>

    <div class="patient-banner">
        <div class="info-group"><label>Paciente</label><span id="top_nombre">---</span></div>
        <div class="info-group"><label>Documento CI</label><span id="top_ci">---</span></div>
        <div class="info-group"><label>Código</label><span id="top_codigo">---</span></div>
    </div>

    <div class="section-box">
        <div class="section-title">1. HÁBITOS PERSONALES</div>
        <div class="form-grid">
            <div class="field"><label>¿Fuma?</label>
                <select id="fuma"><option value="NO">NO</option><option value="SI">SI</option></select>
            </div>
            <div class="field"><label>¿Alcohol?</label>
                <select id="alcohol"><option value="NO">NO</option><option value="SOCIAL">SOCIAL</option><option value="SI">SI</option></select>
            </div>
            <div class="field"><label>¿Drogas?</label>
                <select id="drogas"><option value="NO">NO</option><option value="SI">SI</option></select>
            </div>
            <div class="field"><label>Grupo Sanguíneo</label>
                <input type="text" id="grupo_sangre" placeholder="Ej. ORH+">
            </div>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">2. HISTORIA LABORAL (EMPRESA ANTERIOR)</div>
        <div class="form-grid">
            <div class="field" style="grid-column: span 2;"><label>Empresa Anterior</label>
                <input type="text" id="empresa_ant" placeholder="Nombre de la empresa">
            </div>
            <div class="field" style="grid-column: span 2;"><label>Cargo / Función</label>
                <input type="text" id="cargo_ant" placeholder="Ej. Operario">
            </div>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">3. RIESGOS EXPUESTOS ACTUALES</div>
        <div class="checkbox-grid">
            <label class="check-item"><input type="checkbox" class="riesgo" value="RUIDO"> RUIDO</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="POLVOS"> POLVOS</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="ERGONÓMICO"> ERGONÓMICO</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="BIOLÓGICO"> BIOLÓGICO</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="QUÍMICO"> QUÍMICO</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="ALTURA"> ALTURA</label>
        </div>
    </div>

    <button class="btn-save" onclick="finalizarP3()">💾 FINAL DE DECLARACIÓN JURADA... </button>
</div>

<script>
    window.onload = () => {
        // Jalamos los trillizos del Registro [cite: 2026-02-11]
        document.getElementById('top_nombre').innerText = localStorage.getItem('p_nom') || "---";
        document.getElementById('top_ci').innerText = localStorage.getItem('p_ci') || "---";
        document.getElementById('top_codigo').innerText = localStorage.getItem('p_cod') || "---";
    };

    function finalizarP3() {
        // Recolectar riesgos seleccionados
        const riesgosArr = [];
        document.querySelectorAll('.riesgo:checked').forEach(i => riesgosArr.push(i.value));

        const p3_data = {
            fuma: document.getElementById('fuma').value,
            alcohol: document.getElementById('alcohol').value,
            drogas: document.getElementById('drogas').value,
            grupo_sangre: document.getElementById('grupo_sangre').value.toUpperCase(),
            empresa_ant: document.getElementById('empresa_ant').value.toUpperCase(),
            cargo_ant: document.getElementById('cargo_ant').value.toUpperCase(),
            riesgos: riesgosArr.join(', ')
        };

        localStorage.setItem('datos_p3', JSON.stringify(p3_data));
        
        // El siguiente paso es generar el reporte final HTML [cite: 2026-02-11]
        alert("✅ Datos de P3 guardados localmente.");
        // window.location.href = 'generar_reporte.html';
    }
</script>
</body>
</html>
