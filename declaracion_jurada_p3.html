<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde-ohs: #2ecc71; --verde-boton: #27ae60; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; font-size: 0.75rem; }
        .container { max-width: 950px; margin: 10px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .barra-paciente { background: #e8f8f5; padding: 12px; border-radius: 8px; border-left: 5px solid var(--verde-ohs); display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; }
        .text-blue { color: #0d6efd; text-transform: uppercase; }
        .section-tag { background: #f8f9fa; padding: 5px 10px; font-weight: bold; margin-top: 15px; margin-bottom: 5px; border-bottom: 2px solid var(--verde-ohs); color: #2c3e50; }
        .form-control, .form-select { text-transform: uppercase; font-size: 0.75rem; height: 32px; border-radius: 6px; }
        .btn-final { background: var(--verde-boton); color: white; font-weight: bold; width: 100%; padding: 12px; border-radius: 8px; border: none; margin-top: 20px; font-size: 1rem; cursor: pointer; }
        .btn-add { background: #2c3e50; color: white; font-size: 0.65rem; font-weight: bold; border-radius: 4px; padding: 5px 12px; border: none; margin-bottom: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="mb-3"><img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="OHS" style="height: 45px;"></div>
    <h6 class="fw-bold mb-3" style="color: #1b5e20;">III. HÁBITOS Y ANTECEDENTES LABORALES (P3)</h6>

    <div class="barra-paciente">
        <div>PACIENTE: <span id="v_nombre" class="text-blue">CARGANDO...</span></div>
        <div>CI: <span id="v_ci" class="text-primary">---</span></div>
        <div>CÓDIGO: <span id="v_codigo" class="text-success">---</span></div>
    </div>

    <form id="formP3">
        <div class="section-tag">I. HÁBITOS PERSONALES</div>
        <div class="row g-2 mb-3">
            <div class="col-md-2"><label class="fw-bold">¿FUMA?</label><select id="fuma" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold">¿ALCOHOL?</label><select id="alcohol" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold">¿DROGAS?</label><select id="drogas" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold">¿PIJCHA?</label><select id="pijchar" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold">¿DEPORTE?</label><select id="deporte" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold">G. SANGRE</label><input type="text" id="grupo_sanguineo" class="form-control" value="ORH+"></div>
        </div>

        <div class="section-tag">II. HISTORIA LABORAL</div>
        <button type="button" class="btn-add" onclick="addRow()">+ AGREGAR FILA</button>
        <div class="table-responsive">
            <table class="table table-sm table-bordered">
                <thead class="table-light text-center">
                    <tr style="font-size: 0.65rem;"><th>EDAD</th><th>EMPRESA</th><th>OCUPACIÓN</th><th>TIEMPO (AÑOS)</th><th>RIESGOS</th><th>EPP</th></tr>
                </thead>
                <tbody id="tablaLaboral">
                    <tr>
                        <td><input type="number" class="row-edad form-control"></td>
                        <td><input type="text" class="row-empresa form-control"></td>
                        <td><input type="text" class="row-cargo form-control"></td>
                        <td><input type="number" class="row-tiempo form-control"></td>
                        <td><input type="text" class="row-riesgos form-control"></td>
                        <td><select class="row-epp form-select"><option value="SI">SI</option><option value="NO">NO</option></select></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="section-tag">III. RIESGOS EXPUESTOS</div>
        <div class="row g-2 px-2">
            <div class="col-md-3"><input type="checkbox" class="check-riesgo" value="RUIDO" id="r1"> <label for="r1">RUIDO</label></div>
            <div class="col-md-3"><input type="checkbox" class="check-riesgo" value="POLVOS" id="r2"> <label for="r2">POLVOS</label></div>
            <div class="col-md-3"><input type="checkbox" class="check-riesgo" value="ERGONÓMICO" id="r3"> <label for="r3">ERGONÓMICO</label></div>
            <div class="col-md-3"><input type="checkbox" class="check-riesgo" value="QUÍMICOS" id="r4"> <label for="r4">QUÍMICOS</label></div>
            <div class="col-md-3"><input type="checkbox" class="check-riesgo" value="BIOLÓGICO" id="r5"> <label for="r5">BIOLÓGICO</label></div>
            <div class="col-md-3"><input type="checkbox" class="check-riesgo" value="VIBRACIÓN" id="r6"> <label for="r6">VIBRACIÓN</label></div>
            <div class="col-md-3"><input type="checkbox" class="check-riesgo" value="ALTURA" id="r7"> <label for="r7">ALTURA</label></div>
            <div class="col-md-3"><input type="checkbox" class="check-riesgo" value="PSICOSOCIAL" id="r8"> <label for="r8">PSICOSOCIAL</label></div>
        </div>

        <button type="submit" class="btn-final" id="btnAccion">💾 GUARDAR REGISTRO Y FINALIZAR P3</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const id_paciente = localStorage.getItem('p_id') || localStorage.getItem('p_id_edicion');

    window.onload = async () => {
        if (!id_paciente) { alert("Error: Sesión no encontrada."); return; }
        
        // Prioridad: Datos guardados localmente para evitar el "Undefined"
        const localNombre = localStorage.getItem('p_nombre');
        const localCodigo = localStorage.getItem('p_codigo');
        const localCI = localStorage.getItem('p_ci');

        if (localNombre && localCodigo) {
            document.getElementById('v_nombre').innerText = localNombre.toUpperCase();
            document.getElementById('v_codigo').innerText = localCodigo.toUpperCase();
            document.getElementById('v_ci').innerText = localCI || "---";
        } else {
            // Si no hay local, consultamos al servidor
            try {
                const res = await fetch(`${API}/api/pacientes/${id_paciente}`);
                const d = await res.json();
                document.getElementById('v_nombre').innerText = (d.nombre + " " + d.apellido).toUpperCase();
                document.getElementById('v_codigo').innerText = d.codigo_paciente || 'S/C';
                document.getElementById('v_ci').innerText = d.ci || "---";
            } catch (e) { document.getElementById('v_nombre').innerText = "ERROR CARGA"; }
        }
    };

    function addRow() {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="number" class="row-edad form-control"></td><td><input type="text" class="row-empresa form-control"></td><td><input type="text" class="row-cargo form-control"></td><td><input type="number" class="row-tiempo form-control"></td><td><input type="text" class="row-riesgos form-control"></td><td><select class="row-epp form-select"><option value="SI">SI</option><option value="NO">NO</option></select></td>`;
        document.getElementById('tablaLaboral').appendChild(tr);
    }

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnAccion');
        btn.innerText = "⏳ GUARDANDO...";
        btn.disabled = true;

        const historia = [];
        document.querySelectorAll('#tablaLaboral tr').forEach(tr => {
            const emp = tr.querySelector('.row-empresa').value;
            if(emp) {
                historia.push({
                    edad: tr.querySelector('.row-edad').value,
                    empresa: emp.toUpperCase(),
                    cargo: tr.querySelector('.row-cargo').value.toUpperCase(),
                    tiempo: tr.querySelector('.row-tiempo').value,
                    riesgos: tr.querySelector('.row-riesgos').value.toUpperCase(),
                    epp: tr.querySelector('.row-epp').value
                });
            }
        });

        const data = {
            paciente_id: parseInt(id_paciente),
            fuma: document.getElementById('fuma').value,
            alcohol: document.getElementById('alcohol').value,
            drogas: document.getElementById('drogas').value,
            pijchar: document.getElementById('pijchar').value,
            deporte: document.getElementById('deporte').value,
            grupo_sanguineo: document.getElementById('grupo_sanguineo').value.toUpperCase(),
            historia_laboral: JSON.stringify(historia),
            riesgos_expuestos: JSON.stringify(Array.from(document.querySelectorAll('.check-riesgo:checked')).map(c => c.value))
        };

        try {
            // Usamos la ruta que Render reconoció en tus logs de consola
            const response = await fetch(`${API}/api/guardar_p3_completo`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert("✅ REGISTRO FINALIZADO CON ÉXITO\nPACIENTE: " + document.getElementById('v_nombre').innerText);
                localStorage.clear();
                window.location.href = "index.html";
            } else {
                throw new Error();
            }
        } catch (err) {
            alert("⚠️ Error crítico en servidor. Intenta una vez más.");
            btn.disabled = false; btn.innerText = "💾 REINTENTAR GUARDAR";
        }
    };
</script>
</body>
</html>
