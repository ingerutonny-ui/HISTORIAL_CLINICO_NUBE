<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | HÁBITOS Y LABORAL (3/3)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --ohs-cyan: #00a0a5; --ohs-green: #22c55e; --dark: #1e293b; }
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; padding: 10px; color: var(--dark); }
        .form-container { max-width: 1100px; margin: 10px auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .header-ohs { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--ohs-cyan); padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .title-center h2 { font-size: 1.3rem; font-weight: 800; text-transform: uppercase; margin: 0; }
        .data-banner { background: #f8fafc; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-around; font-size: 12px; font-weight: 800; border: 1px solid #e2e8f0; text-transform: uppercase; flex-wrap: wrap; gap: 10px; }
        .section-title { background: #f1f5f9; padding: 8px 15px; border-left: 5px solid var(--ohs-cyan); margin: 25px 0 15px; font-weight: 800; font-size: 13px; text-transform: uppercase; }
        .grid-habitos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .field-card { background: white; padding: 12px; border-radius: 12px; border: 1px solid #cbd5e1; }
        .label-text { font-size: 10px; font-weight: 800; color: #64748b; display: block; margin-bottom: 5px; }
        .input-group-custom { display: flex; gap: 8px; }
        .select-yn { width: 70px; font-weight: 700; border: 2px solid var(--ohs-green); border-radius: 8px; font-size: 12px; }
        .input-det { flex: 1; font-size: 12px; border-radius: 8px; text-transform: uppercase; font-weight: 600; }
        .table-responsive-custom { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .table-responsive-custom th { background: white; color: var(--ohs-cyan); padding: 10px; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid var(--ohs-cyan); }
        .table-responsive-custom td { padding: 5px; }
        .table-responsive-custom input, .table-responsive-custom select { width: 100%; border: 1px solid #cbd5e1; padding: 8px; border-radius: 8px; font-size: 12px; text-transform: uppercase; }
        .risk-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; padding: 15px; background: #f8fafc; border-radius: 15px; border: 1px solid #e2e8f0; }
        .risk-item { font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .btn-save { background: var(--ohs-green); color: white; width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 800; font-size: 15px; margin-top: 30px; text-transform: uppercase; transition: 0.3s; box-shadow: 0 8px 20px rgba(34, 197, 94, 0.2); }
        .btn-save:hover { background: #16a34a; transform: translateY(-3px); }
    </style>
</head>
<body>
<div class="form-container">
    <div class="header-ohs">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" height="45">
        <div class="title-center"><h2>3. HÁBITOS Y ANTECEDENTES LABORALES</h2></div>
        <div style="font-size: 10px; font-weight: 800; color: #94a3b8;">PARTE 3 / 3</div>
    </div>
    <div class="data-banner">
        <div>PACIENTE: <span id="b_paciente">CARGANDO...</span></div>
        <div>CÓDIGO: <span id="b_codigo">---</span></div>
    </div>
    <form id="formP3">
        <div class="section-title">I. HÁBITOS PERSONALES</div>
        <div class="grid-habitos">
            <div class="field-card"><span class="label-text">¿FUMA?</span><div class="input-group-custom"><select id="fuma" class="form-select select-yn"><option value="NO">NO</option><option value="SI">SI</option></select><input id="fuma_cantidad" class="form-control input-det" value="NO FUMA"></div></div>
            <div class="field-card"><span class="label-text">¿CONSUME ALCOHOL?</span><div class="input-group-custom"><select id="alcohol" class="form-select select-yn"><option value="NO">NO</option><option value="SI">SI</option></select><input id="alcohol_frecuencia" class="form-control input-det" value="NO CONSUME"></div></div>
            <div class="field-card"><span class="label-text">¿CONSUME DROGAS?</span><div class="input-group-custom"><select id="drogas" class="form-select select-yn"><option value="NO">NO</option><option value="SI">SI</option></select><input id="drogas_tipo" class="form-control input-det" value="NO CONSUME"></div></div>
            <div class="field-card"><span class="label-text">PIJCHAR (COCA)</span><select id="coca" class="form-select select-yn w-100"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="field-card"><span class="label-text">¿PRACTICA DEPORTES?</span><div class="input-group-custom"><select id="deporte" class="form-select select-yn"><option value="NO">NO</option><option value="SI">SI</option></select><input id="deporte_detalle" class="form-control input-det" value="NINGUNO"></div></div>
            <div class="field-card"><span class="label-text">GRUPO SANGUÍNEO</span><input id="grupo_sanguineo" class="form-control input-det w-100" value="S/D"></div>
        </div>
        <div class="section-title">II. HISTORIA LABORAL Y RIESGOS</div>
        <div class="field-card mb-3"><span class="label-text">RESUMEN HISTORIA LABORAL</span><textarea id="historia_laboral" class="form-control input-det" rows="2">PARTICULAR / OPERARIO / 1 AÑO / NINGUNO</textarea></div>
        <div class="risk-grid" id="riesgosCheck">
            <label class="risk-item"><input type="checkbox" value="RUIDO"> RUIDO</label>
            <label class="risk-item"><input type="checkbox" value="VIBRACIÓN"> VIBRACIÓN</label>
            <label class="risk-item"><input type="checkbox" value="RADIACIÓN"> RADIACIÓN</label>
            <label class="risk-item"><input type="checkbox" value="TEMP. EXTREMAS"> TEMP. EXTREMAS</label>
            <label class="risk-item"><input type="checkbox" value="POLVOS"> POLVOS</label>
            <label class="risk-item"><input type="checkbox" value="GASES/VAPORES"> GASES/VAPORES</label>
            <label class="risk-item"><input type="checkbox" value="ERGONÓMICOS"> ERGONÓMICOS</label>
            <label class="risk-item"><input type="checkbox" value="PSICOSOCIAL"> PSICOSOCIAL</label>
        </div>
        <div class="section-title">III. OBSERVACIONES GENERALES</div>
        <div class="field-card"><textarea id="observaciones" class="form-control input-det" rows="2">SIN OBSERVACIONES ADICIONALES</textarea></div>
        <button type="submit" id="btnG" class="btn-save">💾 FINALIZAR Y GUARDAR EXPEDIENTE</button>
    </form>
</div>
<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const id_p = localStorage.getItem('p_id');

    window.onload = async () => {
        if(!id_p) return;
        try {
            const r = await fetch(`${API}/api/paciente-completo/${id_p}/`);
            const d = await r.json();
            if(d.paciente) {
                document.getElementById('b_paciente').innerText = `${d.paciente.apellido} ${d.paciente.nombre}`;
                document.getElementById('b_codigo').innerText = d.paciente.codigo_paciente;
            }
        } catch(e) { console.error("Error banner"); }
    };

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnG');
        btn.innerHTML = "⏳ GUARDANDO EXPEDIENTE..."; btn.disabled = true;

        const dataP2Raw = JSON.parse(localStorage.getItem('temp_p2') || '{}');
        const riesgos = [];
        document.querySelectorAll('#riesgosCheck input:checked').forEach(i => riesgos.push(i.value));

        // MAPEAMOS P2 SEGÚN SCHEMAS.PY
        const dataP2Limpia = {
            paciente_id: parseInt(id_p),
            vista: dataP2Raw.vista,
            auditivo: dataP2Raw.auditivo,
            respiratorio: dataP2Raw.respiratorio,
            cardio: dataP2Raw.cardio,
            digestivos: dataP2Raw.digestivos,
            sangre: dataP2Raw.sangre,
            genitourinario: dataP2Raw.genitourinario,
            sistema_nervioso: dataP2Raw.sistema_nervioso,
            psiquiatricos: dataP2Raw.psiquiatricos,
            osteomusculares: dataP2Raw.osteomusculares,
            reumatologicos: dataP2Raw.reumatologicos,
            dermatologicas: dataP2Raw.dermatologicas,
            alergias: dataP2Raw.alergias,
            cirugias: dataP2Raw.cirugias,
            infecciones: dataP2Raw.infecciones,
            acc_personales: dataP2Raw.acc_personales,
            acc_trabajo: dataP2Raw.acc_trabajo,
            medicamentos: dataP2Raw.medicamentos,
            endocrino: dataP2Raw.endocrino,
            familiares: dataP2Raw.familiares,
            otros_especificos: dataP2Raw.otros_especificos,
            generales: dataP2Raw.generales
        };

        try {
            // ENVÍO P2
            const resP2 = await fetch(`${API}/p2/`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dataP2Limpia)
            });

            if(!resP2.ok) throw new Error("Error en Antecedentes P2");

            // ENVÍO P3 MAPEADO SEGÚN SCHEMAS.PY
            const resP3 = await fetch(`${API}/p3/`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    paciente_id: parseInt(id_p),
                    fuma: document.getElementById('fuma').value,
                    fuma_cantidad: document.getElementById('fuma_cantidad').value.toUpperCase(),
                    alcohol: document.getElementById('alcohol').value,
                    alcohol_frecuencia: document.getElementById('alcohol_frecuencia').value.toUpperCase(),
                    drogas: document.getElementById('drogas').value,
                    drogas_tipo: document.getElementById('drogas_tipo').value.toUpperCase(),
                    coca: document.getElementById('coca').value,
                    deporte: document.getElementById('deporte').value,
                    deporte_detalle: document.getElementById('deporte_detalle').value.toUpperCase(),
                    grupo_sanguineo: document.getElementById('grupo_sanguineo').value.toUpperCase(),
                    historia_laboral: document.getElementById('historia_laboral').value.toUpperCase(),
                    riesgos_expuestos: riesgos.join(', ') || "NINGUNO",
                    observaciones: document.getElementById('observaciones').value.toUpperCase()
                })
            });

            if(resP3.ok) {
                alert("✅ EXPEDIENTE COMPLETO GUARDADO");
                localStorage.removeItem('temp_p2');
                window.location.href = "lista_historial.html";
            } else { alert("❌ ERROR 500 EN PARTE 3. REVISE DATOS."); }
        } catch(err) {
            alert("❌ ERROR DE COMUNICACIÓN CON EL SERVIDOR.");
        } finally {
            btn.innerHTML = "💾 FINALIZAR Y GUARDAR EXPEDIENTE"; btn.disabled = false;
        }
    };
</script>
</body>
</html>
