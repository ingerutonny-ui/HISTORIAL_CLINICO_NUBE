<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --v-ohs: #2ecc71; }
        body { background: #f4f7f6; font-family: sans-serif; font-size: 0.75rem; }
        .container { max-width: 950px; margin: 10px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .barra { background: #e8f8f5; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; border-left: 5px solid var(--v-ohs); }
        .section { background: #f8f9fa; padding: 5px 10px; font-weight: bold; border-bottom: 2px solid var(--v-ohs); margin: 15px 0 10px; }
        .btn-save { background: #27ae60; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .form-control, .form-select { text-transform: uppercase; font-size: 0.75rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="barra">
        <div>PACIENTE: <span id="v_nom" style="color:#0d6efd">CARGANDO...</span></div>
        <div>CI: <span id="v_ci">---</span></div>
        <div>CÓDIGO: <span id="v_cod">---</span></div>
    </div>
    <form id="fP3">
        <div class="section">1. HÁBITOS PERSONALES</div>
        <div class="row g-2">
            <div class="col-md-2">¿FUMA?<select id="fuma" class="form-select"><option>NO</option><option>SI</option></select></div>
            <div class="col-md-2">¿ALCOHOL?<select id="alc" class="form-select"><option>NO</option><option>SI</option></select></div>
            <div class="col-md-2">¿DROGAS?<select id="dro" class="form-select"><option>NO</option><option>SI</option></select></div>
            <div class="col-md-2">¿PIJCHA?<select id="pij" class="form-select"><option>NO</option><option>SI</option></select></div>
            <div class="col-md-2">¿DEPORTE?<select id="dep" class="form-select"><option>NO</option><option>SI</option></select></div>
            <div class="col-md-2">G. SANGRE<input id="gs" class="form-control" value="ORH+"></div>
        </div>
        <div class="section">2. HISTORIA LABORAL</div>
        <table class="table table-sm table-bordered">
            <thead class="table-light"><tr><th>EDAD</th><th>EMPRESA</th><th>CARGO</th><th>TIEMPO</th><th>RIESGOS</th><th>EPP</th></tr></thead>
            <tbody id="tBody">
                <tr>
                    <td><input type="number" class="form-control r-ed"></td>
                    <td><input type="text" class="form-control r-em"></td>
                    <td><input type="text" class="form-control r-ca"></td>
                    <td><input type="number" class="form-control r-ti"></td>
                    <td><input type="text" class="form-control r-ri"></td>
                    <td><select class="form-select r-ep"><option>SI</option><option>NO</option></select></td>
                </tr>
            </tbody>
        </table>
        <div class="section">3. RIESGOS EXPUESTOS</div>
        <div class="row g-2 p-2">
            <div class="col-3"><input type="checkbox" class="c-ri" value="RUIDO"> RUIDO</div>
            <div class="col-3"><input type="checkbox" class="c-ri" value="POLVOS"> POLVOS</div>
            <div class="col-3"><input type="checkbox" class="c-ri" value="ERGONOMICO"> ERGONÓMICO</div>
            <div class="col-3"><input type="checkbox" class="c-ri" value="QUIMICOS"> QUÍMICOS</div>
        </div>
        <button type="submit" id="btnS" class="btn-save">💾 GUARDAR EN POSTGRESQL</button>
    </form>
</div>
<script>
    const API = "https://historial-clinico-936s.onrender.com";
    const pid = localStorage.getItem('p_id_edicion') || localStorage.getItem('p_id');

    window.onload = async () => {
        const res = await fetch(`${API}/api/paciente-completo/${pid}`);
        if(res.ok) {
            const d = await res.json();
            document.getElementById('v_nom').innerText = (d.paciente.nombre + " " + d.paciente.apellido).toUpperCase();
            document.getElementById('v_ci').innerText = d.paciente.ci;
            document.getElementById('v_cod').innerText = d.paciente.codigo_paciente;
        }
    };

    document.getElementById('fP3').onsubmit = async (e) => {
        e.preventDefault();
        const b = document.getElementById('btnS');
        b.innerText = "⏳ ENVIANDO..."; b.disabled = true;

        const hist = [];
        document.querySelectorAll('#tBody tr').forEach(tr => {
            const em = tr.querySelector('.r-em').value;
            if(em) {
                hist.push({
                    edad: tr.querySelector('.r-ed').value || "0",
                    empresa: em.toUpperCase(),
                    cargo: tr.querySelector('.r-ca').value.toUpperCase(),
                    tiempo: tr.querySelector('.r-ti').value || "0",
                    riesgos: tr.querySelector('.r-ri').value.toUpperCase(),
                    epp: tr.querySelector('.r-ep').value
                });
            }
        });

        const payload = {
            paciente_id: parseInt(pid),
            fuma: document.getElementById('fuma').value, fuma_cantidad: "S/D",
            alcohol: document.getElementById('alc').value, alcohol_frecuencia: "S/D",
            drogas: document.getElementById('dro').value, drogas_tipo: "S/D",
            coca: document.getElementById('pij').value,
            deporte: document.getElementById('dep').value, deporte_detalle: "S/D",
            grupo_sanguineo: document.getElementById('gs').value.toUpperCase(),
            historia_laboral: JSON.stringify(hist),
            riesgos_expuestos: JSON.stringify(Array.from(document.querySelectorAll('.c-ri:checked')).map(c => c.value)),
            observaciones: "P3 COMPLETADO"
        };

        try {
            const r = await fetch(`${API}/api/guardar-p3`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(r.ok) { alert("✅ ÉXITO"); window.location.href = "index.html"; }
            else { alert("❌ ERROR 404/500"); b.disabled = false; b.innerText = "💾 GUARDAR"; }
        } catch(err) { alert("❌ ERROR DE RED"); b.disabled = false; }
    };
</script>
</body>
</html>
