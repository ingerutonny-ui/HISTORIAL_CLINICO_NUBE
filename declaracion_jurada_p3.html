<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - COMPLETO | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --ohs: #2ecc71; --dark: #2c3e50; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header-logo { height: 60px; display: block; margin: 0 auto 15px; }
        .barra-paciente { background: #e8f6ef; padding: 15px; border-radius: 8px; border-left: 5px solid var(--ohs); margin-bottom: 25px; display: flex; justify-content: space-between; font-weight: 700; color: var(--dark); }
        .section-tag { background: var(--dark); color: white; padding: 8px 15px; font-weight: 600; margin: 20px 0 15px; border-radius: 4px; text-transform: uppercase; font-size: 0.8rem; }
        .form-label { font-weight: 700; font-size: 0.7rem; color: #555; text-transform: uppercase; }
        .form-control, .form-select { font-size: 0.85rem; text-transform: uppercase; border-radius: 5px; }
        .btn-save { background: var(--ohs); color: white; font-weight: 800; width: 100%; padding: 15px; border: none; border-radius: 8px; margin-top: 30px; transition: 0.3s; }
        .btn-save:hover { background: #27ae60; transform: scale(1.01); }
    </style>
</head>
<body>

<div class="container">
    <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="header-logo">
    <h5 class="text-center fw-bold mb-4">III. HÁBITOS Y ANTECEDENTES LABORALES (P3)</h5>

    <div class="barra-paciente">
        <span>PACIENTE: <span id="v_nom" style="color: #2980b9;">...</span></span>
        <span>CI: <span id="v_ci">...</span></span>
        <span>CÓDIGO: <span id="v_cod">...</span></span>
    </div>

    <form id="formP3">
        <div class="section-tag">1. HÁBITOS PERSONALES</div>
        <div class="row g-3">
            <div class="col-md-2"><label class="form-label">¿FUMA?</label><select id="fuma" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="form-label">CANTIDAD/DÍA</label><input type="number" id="fuma_cantidad" class="form-control" value="0"></div>
            <div class="col-md-2"><label class="form-label">¿ALCOHOL?</label><select id="alcohol" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="form-label">FRECUENCIA</label><input type="text" id="alcohol_frecuencia" class="form-control" value="SOCIAL"></div>
            <div class="col-md-2"><label class="form-label">¿DROGAS?</label><select id="drogas" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="form-label">TIPO</label><input type="text" id="drogas_tipo" class="form-control" value="S/D"></div>
            
            <div class="col-md-3"><label class="form-label">COCA (PIJCHA)</label><select id="coca" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-3"><label class="form-label">¿DEPORTE?</label><select id="deporte" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-3"><label class="form-label">DETALLE ACTIVIDAD</label><input type="text" id="deporte_detalle" class="form-control" value="S/D"></div>
            <div class="col-md-3"><label class="form-label">GRUPO SANGUÍNEO</label><input type="text" id="grupo_sanguineo" class="form-control" value="ORH+"></div>
        </div>

        <div class="section-tag">2. HISTORIA LABORAL (EMPRESAS ANTERIORES)</div>
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="table-light text-center small fw-bold">
                    <tr><th>EDAD</th><th>EMPRESA</th><th>CARGO / ACTIVIDAD</th><th>TIEMPO</th><th>RIESGOS</th><th>¿EPP?</th></tr>
                </thead>
                <tbody id="tBody">
                    <tr>
                        <td><input type="text" class="form-control r-ed"></td>
                        <td><input type="text" class="form-control r-em"></td>
                        <td><input type="text" class="form-control r-ca"></td>
                        <td><input type="text" class="form-control r-ti"></td>
                        <td><input type="text" class="form-control r-ri"></td>
                        <td><select class="form-select r-ep"><option value="SI">SI</option><option value="NO">NO</option></select></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <button type="button" class="btn btn-dark btn-sm" onclick="addFila()">+ AGREGAR OTRA EXPERIENCIA</button>

        <div class="section-tag">3. RIESGOS EXPUESTOS EN PUESTO ACTUAL</div>
        <div class="row g-3 px-2">
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="RUIDO"> RUIDO</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="POLVOS"> POLVOS</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="ERGONOMICO"> ERGONÓMICO</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="BIOLOGICO"> BIOLÓGICO</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="VIBRACION"> VIBRACIÓN</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="ALTURA"> ALTURA</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="QUIMICO"> QUÍMICO</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="PSICOSOCIAL"> PSICOSOCIAL</div>
        </div>

        <button type="submit" class="btn-save" id="btnS">💾 GUARDAR DECLARACIÓN P3 EN POSTGRESQL</button>
    </form>
</div>

<script>
    const API_URL = "https://historial-clinico-936s.onrender.com";

    function addFila() {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="text" class="form-control r-ed"></td><td><input type="text" class="form-control r-em"></td><td><input type="text" class="form-control r-ca"></td><td><input type="text" class="form-control r-ti"></td><td><input type="text" class="form-control r-ri"></td><td><select class="form-select r-ep"><option value="SI">SI</option><option value="NO">NO</option></select></td>`;
        document.getElementById('tBody').appendChild(tr);
    }

    window.onload = () => {
        // Mapeo exacto de los datos guardados en registro_paciente.html
        document.getElementById('v_nom').innerText = (localStorage.getItem('p_nom') || "SIN NOMBRE").toUpperCase();
        document.getElementById('v_ci').innerText = localStorage.getItem('p_ci') || "---";
        document.getElementById('v_cod').innerText = localStorage.getItem('p_cod') || "---";
    };

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const pid = localStorage.getItem('p_id');
        if(!pid) { Swal.fire('Error', 'ID de paciente no encontrado', 'error'); return; }

        const btn = document.getElementById('btnS');
        btn.disabled = true; btn.innerText = "⏳ PROCESANDO...";

        const payload = {
            paciente_id: parseInt(pid),
            fuma: document.getElementById('fuma').value,
            fuma_cantidad: document.getElementById('fuma_cantidad').value,
            alcohol: document.getElementById('alcohol').value,
            alcohol_frecuencia: document.getElementById('alcohol_frecuencia').value,
            drogas: document.getElementById('drogas').value,
            drogas_tipo: document.getElementById('drogas_tipo').value,
            coca: document.getElementById('coca').value,
            deporte: document.getElementById('deporte').value,
            deporte_detalle: document.getElementById('deporte_detalle').value,
            grupo_sanguineo: document.getElementById('grupo_sanguineo').value.toUpperCase(),
            historia_laboral: JSON.stringify(Array.from(document.querySelectorAll('#tBody tr')).map(tr => ({
                ed: tr.querySelector('.r-ed').value, em: tr.querySelector('.r-em').value,
                ca: tr.querySelector('.r-ca').value, ti: tr.querySelector('.r-ti').value,
                ri: tr.querySelector('.r-ri').value, ep: tr.querySelector('.r-ep').value
            }))),
            riesgos_expuestos: JSON.stringify(Array.from(document.querySelectorAll('.c-ri:checked')).map(c => c.value)),
            observaciones: "REGISTRO P3"
        };

        try {
            // USAMOS LA RUTA BASE DIRECTA SIN /API/ SI EL BACKEND ASÍ LO DEFINE
            const res = await fetch(`${API_URL}/save-p3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                Swal.fire({
                    title: '¡PACIENTE REGISTRADO!',
                    html: `<div style="text-align: left; padding: 10px; border: 1px dashed #2ecc71;">
                            <b>NOMBRE:</b> ${localStorage.getItem('p_nom')}<br>
                            <b>CÓDIGO:</b> ${localStorage.getItem('p_cod')}</div>`,
                    icon: 'success',
                    confirmButtonText: 'IR AL MENÚ'
                }).then(() => { window.location.href = "index.html"; });
            } else {
                throw new Error();
            }
        } catch (err) {
            Swal.fire('Error de Conexión', 'No se pudo guardar en Render. Revisa la ruta /save-p3', 'error');
            btn.disabled = false; btn.innerText = "💾 GUARDAR DECLARACIÓN P3 EN POSTGRESQL";
        }
    };
</script>
</body>
</html>
