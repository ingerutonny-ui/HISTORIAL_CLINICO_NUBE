<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css?v=1.1" rel="stylesheet">
    <style>
        /* DEFINICIÓN DE COLORES ELEGANTES */
        :root { 
            --verde-ohs: #2ecc71 !important; 
            --gris-oscuro: #2c3e50 !important; 
            --blanco: #ffffff !important;
        }

        body { 
            background-color: #f4f7f6 !important; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
            color: #2c3e50 !important;
        }

        .container { 
            max-width: 950px !important; 
            margin-top: 30px !important; 
            background: white !important; 
            padding: 40px !important; 
            border-radius: 12px !important; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05) !important; 
        }

        .header-logo { height: 70px; display: block; margin: 0 auto 15px; }
        
        /* TÍTULO PRINCIPAL */
        .header-title { 
            color: #27ae60 !important; 
            font-weight: 800 !important; 
            text-align: center !important; 
            margin-bottom: 30px !important;
            letter-spacing: 1px;
        }

        /* BARRA DE DATOS DEL PACIENTE */
        .barra-paciente { 
            background: #f8f9fa !important; 
            padding: 15px 25px !important; 
            border-radius: 8px !important; 
            border-left: 6px solid #2ecc71 !important; 
            margin-bottom: 30px !important;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* SECCIONES - AQUÍ ELIMINAMOS EL AZUL DEFINITIVAMENTE */
        .section-tag { 
            background-color: #2c3e50 !important; /* GRIS MUY OSCURO / AZUL MARINO OSCURO ELEGANTE */
            color: white !important; 
            padding: 12px 20px !important; 
            font-weight: 600 !important; 
            border-radius: 5px !important; 
            margin: 30px 0 15px 0 !important; 
            font-size: 0.85rem !important;
            text-transform: uppercase !important;
        }

        /* TABLA Y FORMULARIOS */
        .table thead th { 
            background-color: #f1f3f5 !important; 
            color: #2c3e50 !important; 
            font-size: 0.75rem !important;
            text-transform: uppercase;
        }

        .form-label { font-weight: 700 !important; color: #444 !important; font-size: 0.7rem !important; }
        .form-control, .form-select { border: 1px solid #ced4da !important; text-transform: uppercase !important; }

        /* BOTONES */
        .btn-add { 
            background-color: #34495e !important; 
            color: white !important; 
            border: none !important; 
            padding: 8px 15px !important; 
            border-radius: 5px !important; 
            font-size: 0.75rem !important;
            font-weight: bold !important;
            margin-top: 10px;
        }

        /* BOTÓN GUARDAR - EL VERDE QUE TE GUSTA */
        .btn-save { 
            background-color: #2ecc71 !important; 
            color: white !important; 
            font-weight: 800 !important; 
            width: 100% !important; 
            padding: 18px !important; 
            border: none !important; 
            border-radius: 8px !important; 
            margin-top: 40px !important; 
            text-transform: uppercase !important; 
            font-size: 1rem !important;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3) !important;
        }
        .btn-save:hover { background-color: #27ae60 !important; transform: translateY(-2px); }

    </style>
</head>
<body>

<div class="container">
    <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="Logo OHS" class="header-logo">
    <h3 class="header-title">III. HÁBITOS Y ANTECEDENTES LABORALES (P3)</h3>

    <div class="barra-paciente">
        <div>PACIENTE: <span id="v_nom" style="color: #2980b9;">CARGANDO...</span></div>
        <div>CI: <span id="v_ci">---</span></div>
        <div>CÓDIGO: <span id="v_cod">---</span></div>
    </div>

    <form id="formP3">
        <div class="section-tag">1. HÁBITOS PERSONALES</div>
        <div class="row g-3">
            <div class="col-md-2"><label class="form-label">¿FUMA?</label><select id="fuma" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="form-label">CANTIDAD/DÍA</label><input type="text" id="fuma_cantidad" class="form-control" value="0"></div>
            <div class="col-md-2"><label class="form-label">¿ALCOHOL?</label><select id="alcohol" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="form-label">FRECUENCIA</label><input type="text" id="alcohol_frecuencia" class="form-control" value="SOCIAL"></div>
            <div class="col-md-2"><label class="form-label">¿DROGAS?</label><select id="drogas" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="form-label">TIPO</label><input type="text" id="drogas_tipo" class="form-control" value="S/D"></div>
        </div>
        
        <div class="row g-3 mt-2">
            <div class="col-md-2"><label class="form-label">COCA (PIJCHA)</label><select id="coca" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="form-label">¿DEPORTE?</label><select id="deporte" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-5"><label class="form-label">DETALLE ACTIVIDAD FÍSICA</label><input type="text" id="deporte_detalle" class="form-control" value="S/D"></div>
            <div class="col-md-3"><label class="form-label">GRUPO SANGUÍNEO</label><input type="text" id="grupo_sanguineo" class="form-control" value="ORH+"></div>
        </div>

        <div class="section-tag">2. HISTORIA LABORAL (EMPRESAS ANTERIORES)</div>
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead class="text-center">
                    <tr><th>EDAD</th><th>EMPRESA</th><th>CARGO / ACTIVIDAD</th><th>TIEMPO</th><th>RIESGOS</th><th>¿EPP?</th></tr>
                </thead>
                <tbody id="tBody">
                    <tr>
                        <td><input type="text" class="form-control r-ed"></td>
                        <td><input type="text" class="form-control r-em"></td>
                        <td><input type="text" class="form-control r-ca"></td>
                        <td><input type="text" class="form-control r-ti"></td>
                        <td><input type="text" class="form-control r-ri"></td>
                        <td><select class="form-select r-ep"><option value="SI">SI</option><option value="NO">NO</option></select></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <button type="button" class="btn-add" onclick="addFila()">+ AGREGAR OTRA EXPERIENCIA</button>

        <div class="section-tag">3. RIESGOS EXPUESTOS EN PUESTO ACTUAL</div>
        <div class="row g-3 px-2">
            <div class="col-md-3"><div class="form-check"><input class="form-check-input c-ri" type="checkbox" value="RUIDO"> <label class="form-check-label">RUIDO</label></div></div>
            <div class="col-md-3"><div class="form-check"><input class="form-check-input c-ri" type="checkbox" value="POLVOS"> <label class="form-check-label">POLVOS</label></div></div>
            <div class="col-md-3"><div class="form-check"><input class="form-check-input c-ri" type="checkbox" value="ERGONOMICO"> <label class="form-check-label">ERGONÓMICO</label></div></div>
            <div class="col-md-3"><div class="form-check"><input class="form-check-input c-ri" type="checkbox" value="BIOLOGICO"> <label class="form-check-label">BIOLÓGICO</label></div></div>
            <div class="col-md-3"><div class="form-check"><input class="form-check-input c-ri" type="checkbox" value="VIBRACION"> <label class="form-check-label">VIBRACIÓN</label></div></div>
            <div class="col-md-3"><div class="form-check"><input class="form-check-input c-ri" type="checkbox" value="ALTURA"> <label class="form-check-label">ALTURA</label></div></div>
            <div class="col-md-3"><div class="form-check"><input class="form-check-input c-ri" type="checkbox" value="QUIMICO"> <label class="form-check-label">QUÍMICO</label></div></div>
            <div class="col-md-3"><div class="form-check"><input class="form-check-input c-ri" type="checkbox" value="PSICOSOCIAL"> <label class="form-check-label">PSICOSOCIAL</label></div></div>
        </div>

        <button type="submit" class="btn-save" id="btnS">
            💾 GUARDAR DECLARACIÓN P3 EN POSTGRESQL
        </button>
    </form>
</div>

<script>
    const API_BASE = "https://historial-clinico-936s.onrender.com/api";

    function addFila() {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="text" class="form-control r-ed"></td><td><input type="text" class="form-control r-em"></td><td><input type="text" class="form-control r-ca"></td><td><input type="text" class="form-control r-ti"></td><td><input type="text" class="form-control r-ri"></td><td><select class="form-select r-ep"><option value="SI">SI</option><option value="NO">NO</option></select></td>`;
        document.getElementById('tBody').appendChild(tr);
    }

    window.onload = () => {
        document.getElementById('v_nom').innerText = (localStorage.getItem('p_nom') || "NOMBRE NO ENCONTRADO").toUpperCase();
        document.getElementById('v_ci').innerText = localStorage.getItem('p_ci') || "---";
        document.getElementById('v_cod').innerText = localStorage.getItem('p_cod') || "---";
    };

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const pid = localStorage.getItem('p_id');
        if(!pid) return alert("❌ ERROR: ID del paciente no encontrado.");

        const btn = document.getElementById('btnS');
        btn.innerHTML = "⏳ GUARDANDO EN NUBE...";
        btn.disabled = true;

        const historia = Array.from(document.querySelectorAll('#tBody tr')).map(tr => ({
            ed: tr.querySelector('.r-ed').value || "0",
            em: tr.querySelector('.r-em').value || "N/A",
            ca: tr.querySelector('.r-ca').value || "N/A",
            ti: tr.querySelector('.r-ti').value || "0",
            ri: tr.querySelector('.r-ri').value || "N/A",
            ep: tr.querySelector('.r-ep').value
        }));

        const riesgos = Array.from(document.querySelectorAll('.c-ri:checked')).map(c => c.value);

        const payload = {
            paciente_id: parseInt(pid),
            fuma: document.getElementById('fuma').value,
            fuma_cantidad: document.getElementById('fuma_cantidad').value,
            alcohol: document.getElementById('alcohol').value,
            alcohol_frecuencia: document.getElementById('alcohol_frecuencia').value,
            drogas: document.getElementById('drogas').value,
            drogas_tipo: document.getElementById('drogas_tipo').value,
            coca: document.getElementById('coca').value,
            deporte: document.getElementById('deporte').value,
            deporte_detalle: document.getElementById('deporte_detalle').value,
            grupo_sanguineo: document.getElementById('grupo_sanguineo').value.toUpperCase(),
            historia_laboral: JSON.stringify(historia),
            riesgos_expuestos: JSON.stringify(riesgos),
            observaciones: "P3_OHS_FINAL"
        };

        try {
            // USAMOS /save-p3 porque es lo que está definido en tu backend actual
            const res = await fetch(`${API_BASE}/save-p3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("✅ DATOS GUARDADOS EN POSTGRESQL CON ÉXITO");
                window.location.href = "index.html";
            } else {
                alert("❌ ERROR EN SERVIDOR (404/500): Not Found");
            }
        } catch (err) {
            alert("❌ ERROR DE CONEXIÓN CON RENDER");
        } finally {
            btn.disabled = false;
            btn.innerHTML = "💾 GUARDAR DECLARACIÓN P3 EN POSTGRESQL";
        }
    };
</script>
</body>
</html>
