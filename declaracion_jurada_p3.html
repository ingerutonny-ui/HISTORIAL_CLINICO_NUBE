<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <style>
        :root { --primary: #2ecc71; --dark: #1e4d2b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-transform: uppercase; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; border-top: 8px solid var(--primary); }
        .header-box { display: flex; justify-content: space-between; background: #e8f8f5; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; }
        .section-title { color: var(--dark); border-bottom: 2px solid var(--primary); margin-top: 20px; font-size: 14px; }
        .checkbox-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .check-item { font-size: 11px; font-weight: bold; display: flex; align-items: center; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div>PACIENTE: <span id="p_nombre" style="color:#2c3e50;">CARGANDO...</span></div>
        <div>CÓDIGO: <span id="p_codigo" style="color:var(--primary);">...</span></div>
    </div>

    <h3 class="section-title">I. HÁBITOS PERSONALES</h3>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
        <label>FUMA<select id="fuma"><option>NO</option><option>SI</option></select></label>
        <label>ALCOHOL<select id="alcohol"><option>NO</option><option>SI</option></select></label>
        <label>PIJCHAR<select id="coca"><option>NO</option><option>SI</option></select></label>
    </div>

    <h3 class="section-title">III. RIESGOS EXPUESTOS (SECCIÓN COMPLETA)</h3>
    <div class="checkbox-group" id="grupo_riesgos">
        <label class="check-item"><input type="checkbox" value="RUIDO"> RUIDO</label>
        <label class="check-item"><input type="checkbox" value="POLVOS"> POLVOS</label>
        <label class="check-item"><input type="checkbox" value="ERGONÓMICO"> ERGONÓMICO</label>
        <label class="check-item"><input type="checkbox" value="VIBRACIÓN"> VIBRACIÓN</label>
        <label class="check-item"><input type="checkbox" value="GASES/VAPORES"> GASES/VAPORES</label>
        <label class="check-item"><input type="checkbox" value="BIOLÓGICO"> BIOLÓGICO</label>
        <label class="check-item"><input type="checkbox" value="RADIACIÓN"> RADIACIÓN</label>
        <label class="check-item"><input type="checkbox" value="ILUMINACIÓN"> ILUMINACIÓN</label>
        <label class="check-item"><input type="checkbox" value="PSICOSOCIAL"> PSICOSOCIAL</label>
        <label class="check-item"><input type="checkbox" value="TEMP. EXTREMAS"> TEMP. EXTREMAS</label>
        <label class="check-item"><input type="checkbox" value="QUÍMICOS"> QUÍMICOS</label>
        <label class="check-item"><input type="checkbox" value="ALTURA"> ALTURA</label>
    </div>

    <button class="btn-save" onclick="guardarP3()">💾 GUARDAR Y SINCRONIZAR P3</button>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    // USAMOS EL ID GUARDADO DESDE EL INDEX
    let p_id = localStorage.getItem('paciente_id');

    window.onload = async () => {
        if (!p_id) { 
            alert("PACIENTE NO SELECCIONADO. REGRESE AL INICIO."); 
            return; 
        }
        const res = await fetch(`${API}/api/pacientes`);
        const data = await res.json();
        const p = data.find(x => x.id == p_id);
        if (p) {
            document.getElementById('p_nombre').innerText = p.nombre + " " + p.apellido;
            // SI EL CÓDIGO NO EXISTE, PONEMOS S/C PARA EVITAR EL "UNDEFINED"
            document.getElementById('p_codigo').innerText = p.codigo || "S/C";
        }
    };

    async function guardarP3() {
        const riesgos = [];
        document.querySelectorAll("#grupo_riesgos input:checked").forEach(c => riesgos.push(c.value));

        const payload = {
            paciente_id: parseInt(p_id),
            fuma: document.getElementById('fuma').value,
            alcohol: document.getElementById('alcohol').value,
            drogas: "NO",
            coca: document.getElementById('coca').value,
            deporte: "SI",
            grupo_sanguineo: "ORH+",
            historia_laboral: "[]",
            riesgos_expuestos: JSON.stringify(riesgos),
            observaciones: "SINCRONIZADO"
        };

        const response = await fetch(`${API}/api/guardar-p3`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            alert("P3 GUARDADO EXITOSAMENTE");
            window.location.href = "index.html";
        } else {
            alert("ERROR AL GUARDAR");
        }
    }
</script>
</body>
</html>
