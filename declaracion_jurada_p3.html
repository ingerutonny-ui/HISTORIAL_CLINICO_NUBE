<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 1000px; margin-top: 20px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .section-title { color: #1e4d2b; border-left: 5px solid #28a745; padding-left: 15px; margin: 20px 0; font-weight: bold; text-transform: uppercase; }
        .form-control, .form-select { text-transform: uppercase; border-radius: 8px; }
        .btn-add { background: #007bff; color: white; margin-bottom: 10px; border-radius: 5px; font-size: 0.8rem; border: none; padding: 5px 15px; }
        .btn-save { background: #28a745; color: white; font-weight: bold; width: 100%; padding: 15px; border-radius: 10px; border: none; margin-top: 20px; }
        .banner-paciente { background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="Logo" height="50">
        <div class="banner-paciente text-success" id="info_p">CARGANDO...</div>
    </div>

    <form id="formP3">
        <h5 class="section-title">I. HÁBITOS PERSONALES</h5>
        <div class="row g-3">
            <div class="col-md-2"><label>¿FUMA?</label><select id="fuma" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>¿ALCOHOL?</label><select id="alcohol" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>¿DROGAS?</label><select id="drogas" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>¿COCA?</label><select id="coca" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>¿DEPORTE?</label><select id="deporte" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>GRUPO SANGUÍNEO</label><input type="text" id="grupo_sanguineo" class="form-control" value="ORH+"></div>
        </div>

        <h5 class="section-title">II. HISTORIA LABORAL (ÚLTIMOS EMPLEOS)</h5>
        <button type="button" class="btn-add" onclick="agregarFila()">+ AGREGAR FILA</button>
        <div class="table-responsive">
            <table class="table table-bordered align-middle" id="tablaLaboral">
                <thead class="table-light text-center" style="font-size: 0.75rem;">
                    <tr>
                        <th>EDAD INICIO</th><th>EMPRESA</th><th>OCUPACIÓN</th><th>TIEMPO (AÑOS)</th><th>RIESGOS</th><th>EPP</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    <tr>
                        <td><input type="text" class="form-control text-center edad"></td>
                        <td><input type="text" class="form-control empresa"></td>
                        <td><input type="text" class="form-control cargo"></td>
                        <td><input type="text" class="form-control text-center tiempo"></td>
                        <td><input type="text" class="form-control riesgos"></td>
                        <td><select class="form-select epp"><option value="SI">SI</option><option value="NO">NO</option></select></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <h5 class="section-title">III. FACTORES DE RIESGO EN SU VIDA LABORAL</h5>
        <div class="row px-3">
            <div class="col-md-4 form-check"><input class="form-check-input f-riesgo" type="checkbox" value="RUIDO" id="f1"><label class="form-check-label" for="f1">RUIDO</label></div>
            <div class="col-md-4 form-check"><input class="form-check-input f-riesgo" type="checkbox" value="VIBRACION" id="f2"><label class="form-check-label" for="f2">VIBRACIÓN</label></div>
            <div class="col-md-4 form-check"><input class="form-check-input f-riesgo" type="checkbox" value="RADIACION" id="f3"><label class="form-check-label" for="f3">RADIACIÓN</label></div>
            <div class="col-md-4 form-check"><input class="form-check-input f-riesgo" type="checkbox" value="POLVOS" id="f4"><label class="form-check-label" for="f4">POLVOS</label></div>
            <div class="col-md-4 form-check"><input class="form-check-input f-riesgo" type="checkbox" value="GASES" id="f5"><label class="form-check-label" for="f5">GASES / VAPORES</label></div>
            <div class="col-md-4 form-check"><input class="form-check-input f-riesgo" type="checkbox" value="ILUMINACION" id="f6"><label class="form-check-label" for="f6">ILUMINACIÓN</label></div>
            <div class="col-md-4 form-check"><input class="form-check-input f-riesgo" type="checkbox" value="ERGONOMICO" id="f7"><label class="form-check-label" for="f7">ERGONÓMICO</label></div>
            <div class="col-md-4 form-check"><input class="form-check-input f-riesgo" type="checkbox" value="BIOLOGICO" id="f8"><label class="form-check-label" for="f8">BIOLÓGICO</label></div>
            <div class="col-md-4 form-check"><input class="form-check-input f-riesgo" type="checkbox" value="PSICOSOCIAL" id="f9"><label class="form-check-label" for="f9">PSICOSOCIAL</label></div>
        </div>

        <button type="submit" class="btn-save" id="btnFinalizar">💾 GUARDAR Y GENERAR REPORTE FINAL</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const p_id = localStorage.getItem('p_id');

    window.onload = async () => {
        if(!p_id) { location.href="registro_paciente.html"; return; }
        const res = await fetch(`${API}/api/paciente-completo/${p_id}`);
        const d = await res.json();
        document.getElementById('info_p').innerText = `PACIENTE: ${d.paciente.nombre} ${d.paciente.apellido} | CI: ${d.paciente.ci}`;
    };

    function agregarFila() {
        const fila = `<tr>
            <td><input type="text" class="form-control text-center edad"></td>
            <td><input type="text" class="form-control empresa"></td>
            <td><input type="text" class="form-control cargo"></td>
            <td><input type="text" class="form-control text-center tiempo"></td>
            <td><input type="text" class="form-control riesgos"></td>
            <td><select class="form-select epp"><option value="SI">SI</option><option value="NO">NO</option></select></td>
        </tr>`;
        document.getElementById('cuerpoTabla').innerHTML += fila;
    }

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnFinalizar');
        btn.innerText = "⌛ ENVIANDO...";

        let historia = "";
        document.querySelectorAll('#cuerpoTabla tr').forEach(tr => {
            const e = tr.querySelector('.edad').value;
            const m = tr.querySelector('.empresa').value;
            const c = tr.querySelector('.cargo').value;
            if(m) historia += `EDAD:${e} EMPRESA:${m} CARGO:${c} / `;
        });

        const riesgos_v = Array.from(document.querySelectorAll('.f-riesgo:checked')).map(c => c.value).join(', ');

        const payload = {
            paciente_id: p_id,
            fuma: document.getElementById('fuma').value,
            alcohol: document.getElementById('alcohol').value,
            drogas: document.getElementById('drogas').value,
            coca: document.getElementById('coca').value,
            deporte: document.getElementById('deporte').value,
            grupo_sanguineo: document.getElementById('grupo_sanguineo').value.toUpperCase(),
            historia_laboral: historia.toUpperCase(),
            riesgos_expuestos: riesgos_v.toUpperCase(),
            observaciones: "REVISIÓN COMPLETADA"
        };

        const res = await fetch(`${API}/p3/`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        if(res.ok) { location.href = "generar_reporte.html"; }
        else { alert("ERROR AL GUARDAR"); btn.innerText = "💾 GUARDAR Y GENERAR REPORTE FINAL"; }
    };
</script>
</body>
</html>
