<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --ohs: #2ecc71; --ohs-dark: #27ae60; --dark: #2c3e50; }
        body { background: #f4f7f6; font-family: 'Roboto', sans-serif; color: var(--dark); font-size: 0.85rem; }
        .container { max-width: 1100px; margin: 20px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .header-logo { height: 70px; display: block; margin: 0 auto 10px; }
        .header-title { color: var(--ohs-dark); font-weight: 700; text-align: center; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 1px; }
        .barra-paciente { background: #f1f9f7; padding: 20px; border-radius: 10px; border-left: 8px solid var(--ohs); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; font-weight: 500; }
        .section-tag { background: #f8f9fa; padding: 12px; font-weight: 700; border-bottom: 3px solid var(--ohs); margin: 25px 0 15px 0; color: var(--dark); text-transform: uppercase; }
        .form-control, .form-select { border-radius: 6px; text-transform: uppercase; font-size: 0.85rem; border: 1px solid #dcdde1; padding: 8px; }
        .btn-add { background: var(--dark); color: white; border: none; padding: 8px 20px; border-radius: 6px; font-size: 0.8rem; margin-top: 10px; cursor: pointer; }
        .btn-save { background: var(--ohs); color: white; font-weight: 700; width: 100%; padding: 18px; border: none; border-radius: 10px; margin-top: 40px; text-transform: uppercase; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="Logo" class="header-logo">
    <h4 class="header-title">III. HÁBITOS Y ANTECEDENTES LABORALES (P3)</h4>

    <div class="barra-paciente">
        <div>PACIENTE: <span id="v_nom" style="color: #2980b9; font-weight: 800;">CARGANDO...</span></div>
        <div>CI: <span id="v_ci" style="font-weight: 700;">---</span></div>
        <div>CÓDIGO: <span id="v_cod" style="font-weight: 700;">---</span></div>
    </div>

    <form id="formP3">
        <div class="section-tag">1. HÁBITOS PERSONALES</div>
        <div class="row g-3">
            <div class="col-md-2"><label class="form-label small fw-bold">¿FUMA?</label><select id="fuma" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="form-label small fw-bold">CANTIDAD</label><input type="text" id="fuma_cantidad" class="form-control" value="0"></div>
            <div class="col-md-2"><label class="form-label small fw-bold">¿ALCOHOL?</label><select id="alcohol" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="form-label small fw-bold">FRECUENCIA</label><input type="text" id="alcohol_frecuencia" class="form-control" value="SOCIAL"></div>
            <div class="col-md-2"><label class="form-label small fw-bold">¿DROGAS?</label><select id="drogas" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="form-label small fw-bold">TIPO</label><input type="text" id="drogas_tipo" class="form-control" value="S/D"></div>
        </div>

        <div class="section-tag">2. HISTORIA LABORAL</div>
        <div class="table-responsive">
            <table class="table table-bordered">
                <thead class="table-light"><tr><th>EDAD</th><th>EMPRESA</th><th>CARGO</th><th>TIEMPO</th><th>RIESGOS</th><th>¿EPP?</th></tr></thead>
                <tbody id="tBody">
                    <tr>
                        <td><input type="text" class="form-control r-ed"></td>
                        <td><input type="text" class="form-control r-em"></td>
                        <td><input type="text" class="form-control r-ca"></td>
                        <td><input type="text" class="form-control r-ti"></td>
                        <td><input type="text" class="form-control r-ri"></td>
                        <td><select class="form-select r-ep"><option value="SI">SI</option><option value="NO">NO</option></select></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <button type="button" class="btn-add" onclick="addFila()">+ AGREGAR EXPERIENCIA</button>

        <div class="section-tag">3. RIESGOS EXPUESTOS ACTUALES</div>
        <div class="row g-3">
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="RUIDO"> RUIDO</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="POLVOS"> POLVOS</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="ERGONOMICO"> ERGONÓMICO</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="BIOLOGICO"> BIOLÓGICO</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="VIBRACION"> VIBRACIÓN</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="ALTURA"> ALTURA</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="QUIMICO"> QUÍMICO</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="PSICOSOCIAL"> PSICOSOCIAL</div>
        </div>

        <button type="submit" class="btn-save" id="btnS">💾 GUARDAR TODO EL HISTORIAL P3</button>
    </form>
</div>

<script>
    function addFila() {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="text" class="form-control r-ed"></td><td><input type="text" class="form-control r-em"></td><td><input type="text" class="form-control r-ca"></td><td><input type="text" class="form-control r-ti"></td><td><input type="text" class="form-control r-ri"></td><td><select class="form-select r-ep"><option value="SI">SI</option><option value="NO">NO</option></select></td>`;
        document.getElementById('tBody').appendChild(tr);
    }

    window.onload = () => {
        const nom = localStorage.getItem('p_nom') || "SIN NOMBRE";
        const ci = localStorage.getItem('p_ci') || "---";
        const cod = localStorage.getItem('p_cod') || "---";
        document.getElementById('v_nom').innerText = nom.toUpperCase();
        document.getElementById('v_ci').innerText = ci;
        document.getElementById('v_cod').innerText = cod;
    };

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const pid = localStorage.getItem('p_id');
        const p_nom = localStorage.getItem('p_nom');
        const p_cod = localStorage.getItem('p_cod');

        if(!pid) return Swal.fire('Error', 'No hay ID de paciente', 'error');

        const btn = document.getElementById('btnS');
        btn.disabled = true;
        btn.innerText = "⏳ GUARDANDO...";

        const payload = {
            paciente_id: parseInt(pid),
            fuma: document.getElementById('fuma').value,
            fuma_cantidad: document.getElementById('fuma_cantidad').value,
            alcohol: document.getElementById('alcohol').value,
            alcohol_frecuencia: document.getElementById('alcohol_frecuencia').value,
            drogas: document.getElementById('drogas').value,
            drogas_tipo: document.getElementById('drogas_tipo').value,
            coca: "NO",
            deporte: "NO",
            deporte_detalle: "S/D",
            grupo_sanguineo: "ORH+",
            historia_laboral: JSON.stringify(Array.from(document.querySelectorAll('#tBody tr')).map(tr => ({
                ed: tr.querySelector('.r-ed').value,
                em: tr.querySelector('.r-em').value,
                ca: tr.querySelector('.r-ca').value,
                ti: tr.querySelector('.r-ti').value,
                ri: tr.querySelector('.r-ri').value,
                ep: tr.querySelector('.r-ep').value
            }))),
            riesgos_expuestos: JSON.stringify(Array.from(document.querySelectorAll('.c-ri:checked')).map(c => c.value)),
            observaciones: "REGISTRO P3"
        };

        try {
            // CORRECCIÓN DE RUTA: Eliminamos el /api/ repetido si es necesario
            const res = await fetch(`https://historial-clinico-936s.onrender.com/save-p3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                Swal.fire({
                    title: '¡REGISTRO P3 EXITOSO!',
                    html: `<div style="text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px;">
                            <p style="margin: 5px 0;"><b>PACIENTE:</b> ${p_nom}</p>
                            <p style="margin: 5px 0;"><b>CÓDIGO:</b> ${p_cod}</p>
                           </div><br>Los datos están seguros en la nube.`,
                    icon: 'success',
                    confirmButtonColor: '#2ecc71',
                    confirmButtonText: 'EXCELENTE'
                }).then(() => { window.location.href = "index.html"; });
            } else {
                Swal.fire('Error 404', 'La ruta de guardado no es correcta en el servidor.', 'error');
                btn.disabled = false;
                btn.innerText = "💾 GUARDAR TODO EL HISTORIAL P3";
            }
        } catch (err) {
            Swal.fire('Error Fatal', 'No se pudo conectar con Render.', 'error');
            btn.disabled = false;
            btn.innerText = "💾 GUARDAR TODO EL HISTORIAL P3";
        }
    };
</script>
</body>
</html>
