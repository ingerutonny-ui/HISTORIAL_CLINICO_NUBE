<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --ohs: #2ecc71; --ohs-dark: #27ae60; }
        body { background: #f4f7f6; font-size: 0.85rem; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .barra-paciente { background: #f1f9f7; padding: 15px; border-radius: 8px; border-left: 6px solid var(--ohs); margin-bottom: 25px; display: flex; justify-content: space-between; font-weight: bold; }
        .btn-save { background: var(--ohs); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <img src="./logo.png" alt="Logo OHS" style="height: 60px;">
        <h4 class="mt-2" style="color: var(--ohs-dark); font-weight: 700;">III. HÁBITOS Y ANTECEDENTES LABORALES (P3)</h4>
    </div>

    <div class="barra-paciente">
        <div>PACIENTE: <span id="v_nom" style="color: #2980b9;">CARGANDO...</span></div>
        <div>CI: <span id="v_ci">---</span></div>
        <div>CÓDIGO: <span id="v_cod">---</span></div>
        <div class="badge bg-dark">ID: <span id="v_id">---</span></div>
    </div>

    <form id="formP3">
        <div class="row g-3">
            <div class="col-md-3"><label class="form-label">¿FUMA?</label><select id="fuma" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-3"><label class="form-label">CANTIDAD</label><input type="text" id="fuma_cantidad" class="form-control" value="0"></div>
            <div class="col-md-3"><label class="form-label">¿ALCOHOL?</label><select id="alcohol" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-3"><label class="form-label">FRECUENCIA</label><input type="text" id="alcohol_frecuencia" class="form-control" value="SOCIAL"></div>
        </div>
        <button type="submit" id="btnS" class="btn-save">💾 GUARDAR HISTORIAL P3</button>
    </form>
</div>

<script>
    const pid = localStorage.getItem('p_id');
    const API_BASE = "https://historial-clinico-936s.onrender.com/api";

    window.onload = async () => {
        if (!pid) {
            document.getElementById('v_nom').innerText = "SIN ID EN MEMORIA";
            return;
        }
        document.getElementById('v_id').innerText = pid;

        try {
            // Intento 1: Consultar al Backend
            const res = await fetch(`${API_BASE}/get-paciente/${pid}`);
            if (res.ok) {
                const p = await res.json();
                document.getElementById('v_nom').innerText = `${p.nombre} ${p.apellido}`.toUpperCase();
                document.getElementById('v_ci').innerText = p.ci || "---";
                document.getElementById('v_cod').innerText = p.codigo_paciente || "---";
            } else {
                // Intento 2: Si el servidor da 404, rescatamos de localStorage (Plan B)
                console.warn("Paciente no hallado en BD, usando datos locales...");
                const localNom = localStorage.getItem('p_nombre') || "PACIENTE DESCONOCIDO";
                document.getElementById('v_nom').innerText = localNom.toUpperCase();
            }
        } catch (error) {
            // Intento 3: Fallo de red, mostrar lo que tengamos
            document.getElementById('v_nom').innerText = (localStorage.getItem('p_nombre') || "ERROR DE CONEXIÓN").toUpperCase();
        }
    };

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnS');
        btn.disabled = true;
        btn.innerText = "⏳ GUARDANDO...";

        const payload = {
            paciente_id: parseInt(pid),
            fuma: document.getElementById('fuma').value,
            fuma_cantidad: document.getElementById('fuma_cantidad').value,
            alcohol: document.getElementById('alcohol').value,
            alcohol_frecuencia: document.getElementById('alcohol_frecuencia').value,
            drogas: "NO", drogas_tipo: "S/D", coca: "NO", deporte: "NO", 
            deporte_detalle: "S/D", grupo_sanguineo: "S/D", 
            historia_laboral: "[]", riesgos_expuestos: "[]", observaciones: "CARGA_P3"
        };

        try {
            const res = await fetch(`${API_BASE}/save-p3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                alert("✅ P3 GUARDADO");
                window.location.href = "index.html";
            } else {
                alert("❌ ERROR EN SERVIDOR");
                btn.disabled = false;
            }
        } catch (e) {
            alert("❌ ERROR DE RED");
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
