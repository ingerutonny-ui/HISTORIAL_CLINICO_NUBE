<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; background: white; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid #28a745; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .logo { width: 120px; height: auto; }
        .paciente-banner { background: #e9f7ef; padding: 10px 20px; border-radius: 5px; color: #155724; font-weight: bold; font-size: 14px; }
        h3 { color: #1e4d2b; border-left: 4px solid #28a745; padding-left: 10px; margin-top: 25px; font-size: 18px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #555; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th { background: #f8f9fa; color: #333; padding: 10px; border: 1px solid #ddd; }
        td { border: 1px solid #ddd; padding: 5px; }
        .checkbox-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .checkbox-item { display: flex; align-items: center; font-size: 13px; }
        .checkbox-item input { width: auto; margin-right: 8px; }
        #btn-guardar { width: 100%; background: #28a745; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        #btn-guardar:disabled { background: #6c757d; cursor: not-allowed; }
        .btn-add { background: #007bff; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="Logo" class="logo">
            <div id="paciente-info" class="paciente-banner">CARGANDO...</div>
        </div>

        <form id="form-p3">
            <h3>I. HÁBITOS</h3>
            <div class="grid">
                <div><label>FUMA</label><select id="fuma"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div><label>ALCOHOL</label><select id="bebe"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div><label>DROGAS</label><select id="drogas"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div><label>PIJCHAR (COCA)</label><select id="p_coca"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div><label>DEPORTES</label><select id="ejercicio"><option value="NO">NO</option><option value="SI">SI</option></select></div>
                <div><label>GRUPO SANGUÍNEO</label><input type="text" id="grupo_sangre" value="ORH+"></div>
            </div>

            <h3>II. HISTORIA LABORAL</h3>
            <button type="button" class="btn-add" onclick="agregarFila()">+ AGREGAR EMPLEO</button>
            <table id="tabla-laboral">
                <thead>
                    <tr>
                        <th>EDAD</th>
                        <th>EMPRESA</th>
                        <th>OCUPACIÓN</th>
                        <th>AÑOS</th>
                        <th>RIESGOS</th>
                        <th>EPP</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="number" class="edad_inicio"></td>
                        <td><input type="text" class="empresa"></td>
                        <td><input type="text" class="ocupacion"></td>
                        <td><input type="number" class="tiempo"></td>
                        <td><input type="text" class="riesgos_job"></td>
                        <td><select class="epp"><option value="NO">NO</option><option value="SI">SI</option></select></td>
                    </tr>
                </tbody>
            </table>

            <h3>III. RIESGOS EXPUESTOS</h3>
            <div class="checkbox-grid">
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="RUIDO"> RUIDO</div>
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="VIBRACIÓN"> VIBRACIÓN</div>
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="RADIACIÓN"> RADIACIÓN</div>
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="POLVOS"> POLVOS</div>
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="GASES"> GASES/VAPORES</div>
                <div class="checkbox-item"><input type="checkbox" name="riesgo" value="ERGONÓMICOS"> ERGONÓMICOS</div>
            </div>

            <button type="submit" id="btn-guardar">GUARDAR FINALIZAR P3</button>
        </form>
    </div>

    <script>
        const pId = localStorage.getItem('paciente_id') || "1";
        const pNom = localStorage.getItem('paciente_nombre') || "PACIENTE PRUEBA";
        const pCi = localStorage.getItem('paciente_ci') || "0000";

        document.getElementById('paciente-info').innerText = `PACIENTE: ${pNom} | CI: ${pCi}`;

        function agregarFila() {
            const tbody = document.querySelector('#tabla-laboral tbody');
            const row = `<tr>
                <td><input type="number" class="edad_inicio"></td>
                <td><input type="text" class="empresa"></td>
                <td><input type="text" class="ocupacion"></td>
                <td><input type="number" class="tiempo"></td>
                <td><input type="text" class="riesgos_job"></td>
                <td><select class="epp"><option value="NO">NO</option><option value="SI">SI</option></select></td>
            </tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        }

        document.getElementById('form-p3').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar');
            btn.innerText = "⌛ PROCESANDO EN LA NUBE...";
            btn.disabled = true;

            const historia = [];
            document.querySelectorAll('#tabla-laboral tbody tr').forEach(tr => {
                const emp = tr.querySelector('.empresa').value;
                if(emp) {
                    historia.push({
                        edad_inicio: tr.querySelector('.edad_inicio').value,
                        empresa: emp,
                        ocupacion: tr.querySelector('.ocupacion').value,
                        tiempo: tr.querySelector('.tiempo').value,
                        riesgos: tr.querySelector('.riesgos_job').value,
                        epp: tr.querySelector('.epp').value
                    });
                }
            });

            const riesgos = Array.from(document.querySelectorAll('input[name="riesgo"]:checked')).map(cb => cb.value);

            const payload = {
                paciente_id: parseInt(pId),
                fuma: document.getElementById('fuma').value,
                bebe: document.getElementById('bebe').value,
                drogas: document.getElementById('drogas').value,
                p_coca: document.getElementById('p_coca').value,
                ejercicio: document.getElementById('ejercicio').value,
                grupo_sangre: document.getElementById('grupo_sangre').value,
                historia_laboral: historia,
                riesgos_detallados: riesgos
            };

            try {
                // He añadido una barra final a la URL para asegurar compatibilidad con Render
                const response = await fetch('https://historial-clinico-936s.onrender.com/p3/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("✅ DATOS GUARDADOS EN LA NUBE");
                    window.location.href = "generar_reporte.html";
                } else {
                    const errData = await response.json();
                    alert("❌ ERROR EN SERVIDOR: " + JSON.stringify(errData));
                }
            } catch (error) {
                alert("❌ ERROR DE CONEXIÓN: El servidor Render no responde.");
            } finally {
                btn.innerText = "GUARDAR FINALIZAR P3";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
