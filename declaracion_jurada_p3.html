<script>
    // Sincronizado con el p_id que usa tu P2
    const p_id = localStorage.getItem('p_id');
    
    window.onload = async () => {
        if (!p_id) { alert("No hay paciente seleccionado"); return; }
        try {
            const res = await fetch(`https://historial-clinico-936s.onrender.com/api/paciente-completo/${p_id}`);
            const data = await res.json();
            document.getElementById('paciente-info').innerText = `PACIENTE: ${data.paciente.apellido} ${data.paciente.nombre} | CI: ${data.paciente.ci}`;
        } catch (e) { console.error("Error al identificar paciente"); }
    };

    document.getElementById('form-p3').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-guardar');
        btn.innerText = "⌛ GUARDANDO...";
        
        const historia = [];
        document.querySelectorAll('#tabla-laboral tbody tr').forEach(tr => {
            if(tr.querySelector('.empresa').value) {
                historia.push({
                    edad_inicio: tr.querySelector('.edad_inicio').value,
                    empresa: tr.querySelector('.empresa').value,
                    ocupacion: tr.querySelector('.ocupacion').value,
                    tiempo: tr.querySelector('.tiempo').value,
                    riesgos: tr.querySelector('.riesgos_job').value,
                    epp: tr.querySelector('.epp').value
                });
            }
        });

        const payload = {
            paciente_id: p_id,
            fuma: document.getElementById('fuma').value,
            bebe: document.getElementById('bebe').value,
            drogas: document.getElementById('drogas').value,
            p_coca: document.getElementById('p_coca').value,
            ejercicio: document.getElementById('ejercicio').value,
            grupo_sangre: document.getElementById('grupo_sangre').value,
            historia_laboral: historia,
            riesgos_detallados: Array.from(document.querySelectorAll('input[name="riesgo"]:checked')).map(cb => cb.value)
        };

        try {
            const res = await fetch('https://historial-clinico-936s.onrender.com/p3/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                alert("✅ P3 GUARDADO EXITOSAMENTE");
                window.location.href = "generar_reporte.html";
            }
        } catch (err) { alert("❌ ERROR DE CONEXIÓN"); }
    };
</script>
