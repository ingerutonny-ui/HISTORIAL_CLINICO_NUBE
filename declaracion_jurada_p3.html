<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --primary: #2ecc71; --dark: #1e4d2b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; text-transform: uppercase; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header-box { display: flex; justify-content: space-between; align-items: center; background: #e8f8f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid var(--primary); }
        .section-title { color: var(--dark); font-weight: 800; border-bottom: 2px solid var(--primary); padding-bottom: 5px; margin-top: 25px; }
        .grid-habitos { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 10px; }
        select, input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-weight: bold; }
        .btn-add { background: #5d6d7e; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-save:hover { background: #27ae60; }
        table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 11px; }
        .checkbox-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; background: #fafafa; border-radius: 8px; }
        .check-item { display: flex; align-items: center; font-size: 11px; font-weight: bold; color: #555; }
        .check-item input { width: auto; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div>
            <span style="color:var(--primary); font-weight:800;">PACIENTE:</span> 
            <span id="p_nombre" style="color:#2c3e50; font-weight:800;">---</span>
        </div>
        <div>
            <span style="color:var(--primary); font-weight:800;">CÓDIGO:</span> 
            <span id="p_codigo" style="color:#27ae60; font-weight:900;">---</span>
        </div>
    </div>

    <h3 class="section-title">I. HÁBITOS PERSONALES</h3>
    <div class="grid-habitos">
        <div><label>¿FUMA?</label><select id="fuma"><option>NO</option><option>SI</option></select></div>
        <div><label>¿ALCOHOL?</label><select id="alcohol"><option>NO</option><option>SI</option></select></div>
        <div><label>¿DROGAS?</label><select id="drogas"><option>NO</option><option>SI</option></select></div>
        <div><label>¿PIJCHAR?</label><select id="coca"><option>NO</option><option>SI</option></select></div>
        <div><label>¿DEPORTE?</label><select id="deporte"><option>NO</option><option>SI</option></select></div>
        <div><label>GRUPO SANGUÍNEO</label><input type="text" id="gs" placeholder="EJ. ORH+"></div>
    </div>

    <h3 class="section-title">II. HISTORIA LABORAL <button class="btn-add" onclick="addRow()">+ AGREGAR FILA</button></h3>
    <table id="tabla_laboral">
        <thead>
            <tr>
                <th>EDAD INICIO</th>
                <th>EMPRESA</th>
                <th>OCUPACIÓN</th>
                <th>TIEMPO (AÑOS)</th>
                <th>RIESGOS</th>
                <th>EPP</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="number"></td>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><input type="number"></td>
                <td><input type="text"></td>
                <td><select><option>SI</option><option>NO</option></select></td>
            </tr>
        </tbody>
    </table>

    <h3 class="section-title">III. RIESGOS EXPUESTOS EN SU VIDA LABORAL</h3>
    <div class="checkbox-group" id="grupo_riesgos">
        <label class="check-item"><input type="checkbox" value="RUIDO"> RUIDO</label>
        <label class="check-item"><input type="checkbox" value="POLVOS"> POLVOS</label>
        <label class="check-item"><input type="checkbox" value="ERGONÓMICO"> ERGONÓMICO</label>
        <label class="check-item"><input type="checkbox" value="VIBRACIÓN"> VIBRACIÓN</label>
        <label class="check-item"><input type="checkbox" value="GASES/VAPORES"> GASES/VAPORES</label>
        <label class="check-item"><input type="checkbox" value="BIOLÓGICO"> BIOLÓGICO</label>
        <label class="check-item"><input type="checkbox" value="RADIACIÓN"> RADIACIÓN</label>
        <label class="check-item"><input type="checkbox" value="ILUMINACIÓN"> ILUMINACIÓN</label>
        <label class="check-item"><input type="checkbox" value="PSICOSOCIAL"> PSICOSOCIAL</label>
        <label class="check-item"><input type="checkbox" value="TEMP. EXTREMAS"> TEMP. EXTREMAS</label>
    </div>

    <button class="btn-save" id="btnSincronizar" onclick="guardarP3()">⏳ SINCRONIZANDO...</button>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    let pacienteID = localStorage.getItem('paciente_id');

    window.onload = async () => {
        if (!pacienteID) { alert("No se seleccionó paciente"); return; }
        
        // Cargar datos básicos del paciente
        const res = await fetch(`${API}/api/pacientes`);
        const pacientes = await res.json();
        const p = pacientes.find(item => item.id == pacienteID);
        
        if (p) {
            document.getElementById('p_nombre').innerText = `${p.apellido} ${p.nombre}`;
            // CORRECCIÓN DE CÓDIGO UNDEFINED
            const cod = (p.codigo && p.codigo !== "undefined") ? p.codigo : "S/C";
            document.getElementById('p_codigo').innerText = cod;
            document.getElementById('btnSincronizar').innerText = "✅ GUARDAR Y SINCRONIZAR P3";
        }
    };

    function addRow() {
        const tbody = document.querySelector("#tabla_laboral tbody");
        const row = tbody.insertRow();
        row.innerHTML = `<td><input type="number"></td><td><input type="text"></td><td><input type="text"></td><td><input type="number"></td><td><input type="text"></td><td><select><option>SI</option><option>NO</option></select></td>`;
    }

    async function guardarP3() {
        const btn = document.getElementById('btnSincronizar');
        btn.disabled = true;
        btn.innerText = "⏳ GUARDANDO...";

        // Recolectar Historia Laboral
        const historia = [];
        document.querySelectorAll("#tabla_laboral tbody tr").forEach(tr => {
            const inputs = tr.querySelectorAll("input, select");
            historia.push({
                edad_inicio: inputs[0].value,
                empresa: inputs[1].value,
                ocupacion: inputs[2].value,
                tiempo: inputs[3].value,
                riesgos: inputs[4].value,
                epp: inputs[5].value
            });
        });

        // Recolectar Riesgos (Checkboxes)
        const riesgos = [];
        document.querySelectorAll("#grupo_riesgos input:checked").forEach(ch => riesgos.push(ch.value));

        const payload = {
            paciente_id: pacienteID,
            fuma: document.getElementById('fuma').value,
            alcohol: document.getElementById('alcohol').value,
            drogas: document.getElementById('drogas').value,
            coca: document.getElementById('coca').value,
            deporte: document.getElementById('deporte').value,
            grupo_sanguineo: document.getElementById('gs').value,
            historia_laboral: JSON.stringify(historia),
            riesgos_expuestos: JSON.stringify(riesgos),
            observaciones: "REGISTRO COMPLETADO"
        };

        try {
            const response = await fetch(`${API}/api/guardar-p3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("🚀 P3 SINCRONIZADO CON ÉXITO");
                window.location.href = "index.html";
            } else {
                throw new Error("Error en servidor");
            }
        } catch (error) {
            alert("❌ ERROR AL GUARDAR. VERIFIQUE CONEXIÓN.");
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.innerText = "✅ GUARDAR Y SINCRONIZAR P3";
        }
    }
</script>

</body>
</html>
