<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --ohs: #2ecc71; --ohs-dark: #27ae60; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .barra-paciente { background: #e8f5e9; padding: 15px; border-radius: 8px; border-left: 5px solid var(--ohs); margin-bottom: 20px; display: flex; justify-content: space-between; font-weight: bold; }
        .section-tag { background: #34495e; color: white; padding: 8px 15px; border-radius: 5px; margin: 20px 0 10px 0; text-transform: uppercase; font-size: 0.8rem; }
        .form-control, .form-select { font-size: 0.8rem; text-transform: uppercase; }
        .btn-save { background: var(--ohs); color: white; font-weight: bold; width: 100%; padding: 15px; border: none; border-radius: 8px; margin-top: 20px; transition: 0.3s; }
        .btn-save:hover { background: var(--ohs-dark); }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <img src="logo.png" alt="OHS" style="height: 60px;">
        <h4 class="mt-2" style="color: var(--ohs-dark); font-weight: 700;">III. HÁBITOS Y ANTECEDENTES LABORALES (P3)</h4>
    </div>

    <div class="barra-paciente">
        <div>PACIENTE: <span id="v_nom">CARGANDO...</span></div>
        <div>CI: <span id="v_ci">---</span></div>
        <div>CÓDIGO: <span id="v_cod">---</span></div>
    </div>

    <form id="formP3">
        <div class="section-tag">1. HÁBITOS PERSONALES</div>
        <div class="row g-2">
            <div class="col-md-2"><label>¿FUMA?</label><select id="fuma" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>CANTIDAD</label><input type="text" id="fuma_cantidad" class="form-control" value="0"></div>
            <div class="col-md-2"><label>¿ALCOHOL?</label><select id="alcohol" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>FRECUENCIA</label><input type="text" id="alcohol_frecuencia" class="form-control" value="SOCIAL"></div>
            <div class="col-md-2"><label>¿DROGAS?</label><select id="drogas" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>TIPO</label><input type="text" id="drogas_tipo" class="form-control" value="S/D"></div>
        </div>
        <div class="row g-2 mt-2">
            <div class="col-md-2"><label>PIJCHA</label><select id="coca" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label>DEPORTE</label><select id="deporte" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-5"><label>DETALLE</label><input type="text" id="deporte_detalle" class="form-control" value="S/D"></div>
            <div class="col-md-3"><label>GRUPO SANGUÍNEO</label><input type="text" id="grupo_sanguineo" class="form-control" value="ORH+"></div>
        </div>

        <div class="section-tag">2. HISTORIA LABORAL</div>
        <table class="table table-sm table-bordered">
            <thead class="table-light">
                <tr><th>EDAD</th><th>EMPRESA</th><th>CARGO</th><th>TIEMPO</th><th>RIESGOS</th><th>EPP</th></tr>
            </thead>
            <tbody id="tBody">
                <tr>
                    <td><input type="text" class="form-control r-ed"></td>
                    <td><input type="text" class="form-control r-em"></td>
                    <td><input type="text" class="form-control r-ca"></td>
                    <td><input type="text" class="form-control r-ti"></td>
                    <td><input type="text" class="form-control r-ri"></td>
                    <td><select class="form-select r-ep"><option value="SI">SI</option><option value="NO">NO</option></select></td>
                </tr>
            </tbody>
        </table>

        <div class="section-tag">3. RIESGOS ACTUALES</div>
        <div class="row">
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="RUIDO"> RUIDO</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="POLVOS"> POLVOS</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="ERGONOMICO"> ERGONÓMICO</div>
            <div class="col-md-3"><input type="checkbox" class="c-ri" value="BIOLOGICO"> BIOLÓGICO</div>
        </div>

        <button type="submit" id="btnS" class="btn-save">💾 GUARDAR TODO EL HISTORIAL P3</button>
    </form>
</div>

<script>
    const API_BASE = "https://historial-clinico-936s.onrender.com/api";

    async function cargarDatos() {
        const pid = localStorage.getItem('p_id') || localStorage.getItem('id');
        
        // 1. Intentar traer del servidor primero para asegurar Nombre y Código
        if(pid) {
            try {
                const res = await fetch(`${API_BASE}/get-paciente/${pid}`);
                if(res.ok) {
                    const p = await res.json();
                    document.getElementById('v_nom').innerText = `${p.nombre} ${p.apellido}`.toUpperCase();
                    document.getElementById('v_ci').innerText = p.ci;
                    document.getElementById('v_cod').innerText = p.codigo_paciente || "S/C";
                    return;
                }
            } catch(e) { console.log("Error servidor, usando locales"); }
        }

        // 2. Si falla el servidor, usar locales de emergencia
        const nom = localStorage.getItem('p_nombre') || localStorage.getItem('nombre') || "SIN NOMBRE";
        const ci = localStorage.getItem('p_ci') || localStorage.getItem('ci') || "---";
        const cod = localStorage.getItem('p_codigo') || localStorage.getItem('codigo_paciente') || "---";
        
        document.getElementById('v_nom').innerText = nom.toUpperCase();
        document.getElementById('v_ci').innerText = ci;
        document.getElementById('v_cod').innerText = cod;
    }

    window.onload = cargarDatos;

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const pid = localStorage.getItem('p_id') || localStorage.getItem('id');
        if(!pid) return alert("Error: No hay ID de paciente");

        const payload = {
            paciente_id: parseInt(pid),
            fuma: document.getElementById('fuma').value,
            fuma_cantidad: document.getElementById('fuma_cantidad').value,
            alcohol: document.getElementById('alcohol').value,
            alcohol_frecuencia: document.getElementById('alcohol_frecuencia').value,
            drogas: document.getElementById('drogas').value,
            drogas_tipo: document.getElementById('drogas_tipo').value,
            coca: document.getElementById('coca').value,
            deporte: document.getElementById('deporte').value,
            deporte_detalle: document.getElementById('deporte_detalle').value,
            grupo_sanguineo: document.getElementById('grupo_sanguineo').value.toUpperCase(),
            historia_laboral: JSON.stringify([]),
            riesgos_expuestos: JSON.stringify(Array.from(document.querySelectorAll('.c-ri:checked')).map(c => c.value)),
            observaciones: "P3_OK"
        };

        try {
            const res = await fetch(`${API_BASE}/save-p3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) { alert("✅ GUARDADO CON ÉXITO"); window.location.href = "index.html"; }
        } catch (error) { alert("❌ ERROR DE CONEXIÓN"); }
    };
</script>
</body>
</html>
