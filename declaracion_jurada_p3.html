<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | HÁBITOS P3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e9ecef; font-family: sans-serif; }
        .container { max-width: 1000px; margin-top: 20px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-section { border-bottom: 2px solid #28a745; margin-bottom: 20px; padding-bottom: 10px; }
        .banner-paciente { background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px solid #dee2e6; margin-bottom: 20px; font-weight: bold; font-size: 0.9rem; }
        .section-title { background: #f1f3f5; padding: 8px; font-weight: bold; border-left: 5px solid #28a745; margin-top: 20px; text-transform: uppercase; font-size: 0.85rem; }
        label { font-weight: bold; font-size: 0.75rem; color: #495057; text-transform: uppercase; margin-top: 10px; display: block; }
        .form-control { text-transform: uppercase; font-size: 0.9rem; border-radius: 5px; }
        .btn-normal { font-size: 0.7rem; padding: 2px 8px; margin-bottom: 5px; }
        .btn-save { background: #28a745; color: white; font-weight: bold; width: 100%; padding: 15px; margin-top: 30px; border: none; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section d-flex justify-content-between align-items-center">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" height="50">
        <h4 class="m-0">3. HÁBITOS Y RIESGOS (P3)</h4>
        <button class="btn btn-outline-secondary btn-sm" onclick="marcarTodoNormal()">✅ TODO NORMAL</button>
    </div>

    <div class="banner-paciente row">
        <div class="col-md-4">PACIENTE: <span id="p_nombre" class="text-primary">---</span></div>
        <div class="col-md-4">CI: <span id="p_ci" class="text-primary">---</span></div>
        <div class="col-md-4">CÓDIGO: <span id="p_codigo" class="text-primary">---</span></div>
    </div>

    <form id="formP3">
        <div class="section-title">Hábitos Personales</div>
        <div class="row">
            <div class="col-md-4">
                <label>Fuma (Tabaco)</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setVal('fuma','NO')">NO</button>
                <input type="text" id="fuma" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Bebe (Alcohol)</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setVal('bebe','OCASIONAL')">OCASIONAL</button>
                <input type="text" id="bebe" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Actividad Física</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setVal('ejercicio','REGULAR')">REGULAR</button>
                <input type="text" id="ejercicio" class="form-control">
            </div>
        </div>

        <div class="section-title">Riesgos Laborales Anteriores</div>
        <div class="row">
            <div class="col-md-4">
                <label>Riesgo Físico</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setVal('r_fisico','NINGUNO')">NINGUNO</button>
                <input type="text" id="r_fisico" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Riesgo Químico</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setVal('r_quimico','NINGUNO')">NINGUNO</button>
                <input type="text" id="r_quimico" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Riesgo Biológico</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setVal('r_biologico','NINGUNO')">NINGUNO</button>
                <input type="text" id="r_biologico" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Riesgo Ergonómico</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setVal('r_ergonomico','NINGUNO')">NINGUNO</button>
                <input type="text" id="r_ergonomico" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Riesgo Psicosocial</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setVal('r_psicosocial','NINGUNO')">NINGUNO</button>
                <input type="text" id="r_psicosocial" class="form-control">
            </div>
        </div>

        <div class="section-title">Equipo de Protección (EPP)</div>
        <div class="col-12">
            <label>EPP Utilizado Anteriormente</label>
            <input type="text" id="epp" class="form-control" placeholder="EJ: CASCO, BOTAS, LENTES">
        </div>

        <button type="submit" class="btn-save">💾 FINALIZAR Y GUARDAR DECLARACIÓN</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const campos = ['fuma','bebe','ejercicio','r_fisico','r_quimico','r_biologico','r_ergonomico','r_psicosocial','epp'];

    function setVal(id, val) { document.getElementById(id).value = val; }
    function marcarTodoNormal() { 
        setVal('fuma','NO'); setVal('bebe','OCASIONAL'); setVal('ejercicio','REGULAR');
        ['r_fisico','r_quimico','r_biologico','r_ergonomico','r_psicosocial'].forEach(c => setVal(c,'NINGUNO'));
    }

    window.onload = async () => {
        const p_id = localStorage.getItem('p_id');
        try {
            const res = await fetch(`${API}/api/paciente-completo/${p_id}`);
            const data = await res.json();
            document.getElementById('p_nombre').innerText = `${data.paciente.apellido} ${data.paciente.nombre}`;
            document.getElementById('p_ci').innerText = data.paciente.ci;
            document.getElementById('p_codigo').innerText = data.paciente.codigo_paciente;
        } catch (e) { console.error("Error al cargar"); }
    };

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const payload = { paciente_id: parseInt(localStorage.getItem('p_id')) };
        campos.forEach(c => { payload[c] = document.getElementById(c).value.toUpperCase(); });

        try {
            const r = await fetch(`${API}/p3/`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (r.ok) {
                alert("¡HISTORIAL COMPLETADO EXITOSAMENTE!");
                window.location.href = "lista_historial.html";
            }
        } catch (err) { alert("Error de red"); }
    };
</script>
</body>
</html>
