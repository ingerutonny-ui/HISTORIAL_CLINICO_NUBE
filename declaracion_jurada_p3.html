<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde-ohs: #2ecc71; --verde-boton: #27ae60; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; font-size: 0.8rem; }
        .container { max-width: 950px; margin: 10px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .barra-paciente { background: #e8f8f5; padding: 10px 15px; border-radius: 6px; border-left: 5px solid var(--verde-ohs); display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; }
        .text-blue { color: #0d6efd; text-transform: uppercase; }
        .section-tag { background: #f8f9fa; padding: 5px 10px; font-weight: bold; margin-top: 15px; margin-bottom: 10px; border-bottom: 2px solid var(--verde-ohs); color: #2c3e50; }
        .form-control, .form-select { text-transform: uppercase; font-size: 0.75rem; height: 32px; }
        .btn-final { background: var(--verde-boton); color: white; font-weight: bold; width: 100%; padding: 12px; border-radius: 6px; border: none; margin-top: 20px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="mb-3"><img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="OHS" style="height: 45px;"></div>

    <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="fw-bold m-0" style="color: #1b5e20;">III. HÁBITOS Y ANTECEDENTES LABORALES (P3)</h6>
    </div>

    <div class="barra-paciente">
        <div>PACIENTE: <span id="v_nombre" class="text-blue">...</span></div>
        <div>CÓDIGO: <span id="v_codigo" class="text-success" style="font-family: monospace;">---</span></div>
    </div>

    <form id="formP3">
        <div class="section-tag">I. HÁBITOS PERSONALES</div>
        <div class="row g-2 mb-3">
            <div class="col-md-2"><label class="fw-bold">¿FUMA?</label><select id="fuma" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold">¿ALCOHOL?</label><select id="alcohol" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold">¿DROGAS?</label><select id="drogas" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold">¿PIJCHA?</label><select id="pijchar" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold">¿DEPORTE?</label><select id="deporte" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select></div>
            <div class="col-md-2"><label class="fw-bold">G. SANGRE</label><input type="text" id="grupo_sanguineo" class="form-control" placeholder="EJ. ORH+"></div>
        </div>

        <div class="section-tag">II. HISTORIA LABORAL <button type="button" class="btn btn-xs btn-dark float-end" onclick="addRow()" style="font-size: 0.6rem;">+ AGREGAR FILA</button></div>
        <table class="table table-sm table-bordered">
            <thead class="table-light text-center">
                <tr style="font-size: 0.7rem;"><th>EDAD</th><th>EMPRESA</th><th>OCUPACIÓN</th><th>TIEMPO</th><th>RIESGOS</th><th>EPP</th></tr>
            </thead>
            <tbody id="tablaLaboral">
                <tr>
                    <td><input type="number" class="form-control row-edad"></td>
                    <td><input type="text" class="form-control row-empresa"></td>
                    <td><input type="text" class="form-control row-cargo"></td>
                    <td><input type="number" class="form-control row-tiempo"></td>
                    <td><input type="text" class="form-control row-riesgos"></td>
                    <td><select class="form-select row-epp"><option value="SI">SI</option><option value="NO">NO</option></select></td>
                </tr>
            </tbody>
        </table>

        <div class="section-tag">III. RIESGOS EXPUESTOS</div>
        <div class="row g-2 px-2">
            <div class="col-md-3 form-check"><input type="checkbox" class="check-riesgo" value="RUIDO" id="r1"> <label for="r1">RUIDO</label></div>
            <div class="col-md-3 form-check"><input type="checkbox" class="check-riesgo" value="POLVOS" id="r2"> <label for="r2">POLVOS</label></div>
            <div class="col-md-3 form-check"><input type="checkbox" class="check-riesgo" value="ERGONÓMICO" id="r3"> <label for="r3">ERGONÓMICO</label></div>
            <div class="col-md-3 form-check"><input type="checkbox" class="check-riesgo" value="QUÍMICOS" id="r4"> <label for="r4">QUÍMICOS</label></div>
            <div class="col-md-3 form-check"><input type="checkbox" class="check-riesgo" value="BIOLÓGICO" id="r5"> <label for="r5">BIOLÓGICO</label></div>
            <div class="col-md-3 form-check"><input type="checkbox" class="check-riesgo" value="ALTURA" id="r6"> <label for="r6">ALTURA</label></div>
            <div class="col-md-3 form-check"><input type="checkbox" class="check-riesgo" value="PSICOSOCIAL" id="r7"> <label for="r7">PSICOSOCIAL</label></div>
            <div class="col-md-3 form-check"><input type="checkbox" class="check-riesgo" value="VIBRACIÓN" id="r8"> <label for="r8">VIBRACIÓN</label></div>
        </div>

        <button type="submit" class="btn-final" id="btnAccion">💾 GUARDAR Y FINALIZAR P3</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    // USAMOS p_id igual que en tu P2
    const p_id = localStorage.getItem('p_id');

    window.onload = async () => {
        if (!p_id) {
            document.getElementById('v_nombre').innerText = "NO SELECCIONADO";
            return;
        }
        try {
            const res = await fetch(`${API}/api/paciente-completo/${p_id}`);
            const d = await res.json();
            document.getElementById('v_nombre').innerText = `${d.paciente.nombre} ${d.paciente.apellido}`.toUpperCase();
            document.getElementById('v_codigo').innerText = d.paciente.codigo_paciente || d.paciente.codigo || 'S/C';
        } catch (e) { console.error("Error cargando paciente:", e); }
    };

    function addRow() {
        const row = `<tr><td><input type="number" class="form-control row-edad"></td><td><input type="text" class="form-control row-empresa"></td><td><input type="text" class="form-control row-cargo"></td><td><input type="number" class="form-control row-tiempo"></td><td><input type="text" class="form-control row-riesgos"></td><td><select class="form-select row-epp"><option value="SI">SI</option><option value="NO">NO</option></select></td></tr>`;
        document.getElementById('tablaLaboral').insertAdjacentHTML('beforeend', row);
    }

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnAccion');
        btn.innerText = "⏳ GUARDANDO...";
        btn.disabled = true;

        const historia = [];
        document.querySelectorAll('#tablaLaboral tr').forEach(tr => {
            const emp = tr.querySelector('.row-empresa').value;
            if(emp) {
                historia.push({
                    edad: tr.querySelector('.row-edad').value,
                    empresa: emp.toUpperCase(),
                    cargo: tr.querySelector('.row-cargo').value.toUpperCase(),
                    tiempo: tr.querySelector('.row-tiempo').value,
                    riesgos: tr.querySelector('.row-riesgos').value.toUpperCase(),
                    epp: tr.querySelector('.row-epp').value
                });
            }
        });

        const riesgos_exp = [];
        document.querySelectorAll('.check-riesgo:checked').forEach(ch => riesgos_exp.push(ch.value));

        const data = {
            paciente_id: parseInt(p_id),
            fuma: document.getElementById('fuma').value,
            alcohol: document.getElementById('alcohol').value,
            drogas: document.getElementById('drogas').value,
            coca: document.getElementById('pijchar').value,
            deporte: document.getElementById('deporte').value,
            grupo_sanguineo: document.getElementById('grupo_sanguineo').value.toUpperCase() || "S/D",
            historia_laboral: JSON.stringify(historia),
            riesgos_expuestos: JSON.stringify(riesgos_exp)
        };

        try {
            await fetch(`${API}/api/guardar-p3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            alert("✅ P3 GUARDADO CON ÉXITO");
            location.href = "index.html";
        } catch (err) {
            alert("❌ ERROR AL GUARDAR");
            btn.disabled = false;
            btn.innerText = "💾 GUARDAR Y FINALIZAR P3";
        }
    };
</script>
</body>
</html>
