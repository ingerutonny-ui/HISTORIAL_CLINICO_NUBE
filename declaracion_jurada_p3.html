<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y RIESGOS | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --ohs: #2ecc71; --ohs-dark: #27ae60; --bg: #f8fafb; }
        body { background-color: var(--bg); font-family: 'Roboto', sans-serif; color: #2c3e50; font-size: 0.85rem; }
        .container { max-width: 1050px; margin: 30px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .header-title { color: var(--ohs-dark); font-weight: 700; text-align: center; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .barra-paciente { background: #f1f9f7; padding: 20px; border-radius: 10px; border-left: 6px solid var(--ohs); margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; font-weight: 500; }
        .section-tag { background: #fdfdfd; padding: 12px; font-weight: 700; border-bottom: 2px solid var(--ohs); margin: 25px 0 15px 0; color: #16a085; text-transform: uppercase; font-size: 0.9rem; }
        .form-label { font-weight: 500; color: #7f8c8d; margin-bottom: 5px; font-size: 0.75rem; }
        .form-control, .form-select { border-radius: 6px; border: 1px solid #dcdde1; padding: 8px 12px; text-transform: uppercase; font-size: 0.8rem; transition: all 0.3s; }
        .form-control:focus { border-color: var(--ohs); box-shadow: 0 0 0 0.2rem rgba(46, 204, 113, 0.15); }
        .btn-add { background: #34495e; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 500; margin-top: 10px; transition: 0.3s; }
        .btn-add:hover { background: #2c3e50; }
        .btn-save { background: var(--ohs); color: white; font-weight: 700; width: 100%; padding: 15px; border: none; border-radius: 8px; margin-top: 30px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-save:hover { background: var(--ohs-dark); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); }
        .check-group { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo_ohs.png" alt="Logo" style="height: 60px;">
        <h4 class="header-title mt-3">III. HÁBITOS Y ANTECEDENTES LABORALES (P3)</h4>
    </div>

    <div class="barra-paciente">
        <div>PACIENTE: <span id="v_nom" style="color: #2980b9;">CARGANDO...</span></div>
        <div>CI: <span id="v_ci">---</span></div>
        <div>CÓDIGO: <span id="v_cod">---</span></div>
        <div>ID: <span id="v_id" class="badge bg-secondary">---</span></div>
    </div>

    <form id="formP3">
        <div class="section-tag">1. HÁBITOS PERSONALES</div>
        <div class="row g-3">
            <div class="col-md-2">
                <label class="form-label">¿FUMA?</label>
                <select id="fuma" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select>
            </div>
            <div class="col-md-2">
                <label class="form-label">CANTIDAD</label>
                <input type="text" id="fuma_cantidad" class="form-control" value="0">
            </div>
            <div class="col-md-2">
                <label class="form-label">¿ALCOHOL?</label>
                <select id="alcohol" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select>
            </div>
            <div class="col-md-2">
                <label class="form-label">FRECUENCIA</label>
                <input type="text" id="alcohol_frecuencia" class="form-control" value="SOCIAL">
            </div>
            <div class="col-md-2">
                <label class="form-label">¿DROGAS?</label>
                <select id="drogas" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select>
            </div>
            <div class="col-md-2">
                <label class="form-label">TIPO</label>
                <input type="text" id="drogas_tipo" class="form-control" value="S/D">
            </div>
        </div>

        <div class="row g-3 mt-2">
            <div class="col-md-2">
                <label class="form-label">COCA/PIJCHA</label>
                <select id="coca" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select>
            </div>
            <div class="col-md-2">
                <label class="form-label">¿DEPORTE?</label>
                <select id="deporte" class="form-select"><option value="NO">NO</option><option value="SI">SI</option></select>
            </div>
            <div class="col-md-5">
                <label class="form-label">DETALLE DEPORTE</label>
                <input type="text" id="deporte_detalle" class="form-control" value="S/D">
            </div>
            <div class="col-md-3">
                <label class="form-label">GRUPO SANGUÍNEO</label>
                <input type="text" id="grupo_sanguineo" class="form-control" value="ORH+">
            </div>
        </div>

        <div class="section-tag">2. HISTORIA LABORAL RECIENTE</div>
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-light text-center" style="font-size: 0.7rem;">
                    <tr>
                        <th width="8%">EDAD</th>
                        <th width="25%">EMPRESA</th>
                        <th width="20%">CARGO</th>
                        <th width="12%">TIEMPO</th>
                        <th width="25%">RIESGOS</th>
                        <th width="10%">EPP</th>
                    </tr>
                </thead>
                <tbody id="tBody">
                    <tr>
                        <td><input type="text" class="form-control r-ed"></td>
                        <td><input type="text" class="form-control r-em"></td>
                        <td><input type="text" class="form-control r-ca"></td>
                        <td><input type="text" class="form-control r-ti"></td>
                        <td><input type="text" class="form-control r-ri"></td>
                        <td><select class="form-select r-ep"><option value="SI">SI</option><option value="NO">NO</option></select></td>
                    </tr>
                </tbody>
            </table>
            <button type="button" class="btn-add btn-sm" onclick="addFila()">+ AGREGAR EMPRESA</button>
        </div>

        <div class="section-tag">3. RIESGOS EXPUESTOS ACTUALES</div>
        <div class="check-group">
            <div class="row g-3">
                <div class="col-md-3"><div class="form-check"><input type="checkbox" class="form-check-input c-ri" value="RUIDO"> RUIDO</div></div>
                <div class="col-md-3"><div class="form-check"><input type="checkbox" class="form-check-input c-ri" value="POLVOS"> POLVOS</div></div>
                <div class="col-md-3"><div class="form-check"><input type="checkbox" class="form-check-input c-ri" value="ERGONOMICO"> ERGONÓMICO</div></div>
                <div class="col-md-3"><div class="form-check"><input type="checkbox" class="form-check-input c-ri" value="BIOLOGICO"> BIOLÓGICO</div></div>
                <div class="col-md-3"><div class="form-check"><input type="checkbox" class="form-check-input c-ri" value="VIBRACION"> VIBRACIÓN</div></div>
                <div class="col-md-3"><div class="form-check"><input type="checkbox" class="form-check-input c-ri" value="ALTURA"> ALTURA</div></div>
                <div class="col-md-3"><div class="form-check"><input type="checkbox" class="form-check-input c-ri" value="PSICOSOCIAL"> PSICOSOCIAL</div></div>
                <div class="col-md-3"><div class="form-check"><input type="checkbox" class="form-check-input c-ri" value="QUIMICO"> QUÍMICO</div></div>
            </div>
        </div>

        <button type="submit" id="btnS" class="btn-save">💾 GUARDAR TODO EL HISTORIAL P3 EN POSTGRESQL</button>
    </form>
</div>

<script>
    const pid = localStorage.getItem('p_id_edicion') || localStorage.getItem('p_id');
    const API_URL = "https://historial-clinico-936s.onrender.com/api";

    function addFila() {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input type="text" class="form-control r-ed"></td><td><input type="text" class="form-control r-em"></td><td><input type="text" class="form-control r-ca"></td><td><input type="text" class="form-control r-ti"></td><td><input type="text" class="form-control r-ri"></td><td><select class="form-select r-ep"><option value="SI">SI</option><option value="NO">NO</option></select></td>`;
        document.getElementById('tBody').appendChild(tr);
    }

    window.onload = async () => {
        if (!pid) { alert("ID DE PACIENTE NO DETECTADO"); return; }
        document.getElementById('v_id').innerText = pid;

        try {
            const res = await fetch(`${API_URL}/get-paciente/${pid}`);
            if (res.ok) {
                const p = await res.json();
                document.getElementById('v_nom').innerText = (p.nombre + " " + p.apellido).toUpperCase();
                document.getElementById('v_ci').innerText = p.ci;
                document.getElementById('v_cod').innerText = p.codigo_paciente;
            } else {
                document.getElementById('v_nom').innerText = "ERROR 404: NO ENCONTRADO";
            }
        } catch (e) { 
            console.error(e);
            document.getElementById('v_nom').innerText = "ERROR DE CONEXIÓN";
        }
    };

    document.getElementById('formP3').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnS');
        btn.innerText = "⏳ SINCRONIZANDO...";
        btn.disabled = true;

        const hist = [];
        document.querySelectorAll('#tBody tr').forEach(tr => {
            const em = tr.querySelector('.r-em').value;
            if (em) {
                hist.push({
                    edad: tr.querySelector('.r-ed').value,
                    empresa: em.toUpperCase(),
                    cargo: tr.querySelector('.r-ca').value.toUpperCase(),
                    tiempo: tr.querySelector('.r-ti').value,
                    riesgos: tr.querySelector('.r-ri').value.toUpperCase(),
                    epp: tr.querySelector('.r-ep').value
                });
            }
        });

        const payload = {
            paciente_id: parseInt(pid),
            fuma: document.getElementById('fuma').value,
            fuma_cantidad: document.getElementById('fuma_cantidad').value,
            alcohol: document.getElementById('alcohol').value,
            alcohol_frecuencia: document.getElementById('alcohol_frecuencia').value,
            drogas: document.getElementById('drogas').value,
            drogas_tipo: document.getElementById('drogas_tipo').value,
            coca: document.getElementById('coca').value,
            deporte: document.getElementById('deporte').value,
            deporte_detalle: document.getElementById('deporte_detalle').value,
            grupo_sanguineo: document.getElementById('grupo_sanguineo').value.toUpperCase(),
            historia_laboral: JSON.stringify(hist),
            riesgos_expuestos: JSON.stringify(Array.from(document.querySelectorAll('.c-ri:checked')).map(c => c.value)),
            observaciones: "SINCRONIZACION_EXITOSA"
        };

        try {
            const res = await fetch(`${API_URL}/save-p3`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("✅ P3 GUARDADO CORRECTAMENTE");
                window.location.href = "index.html";
            } else {
                alert("❌ ERROR EN EL SERVIDOR (NOT FOUND)");
                btn.disabled = false; btn.innerText = "💾 GUARDAR TODO EL HISTORIAL P3";
            }
        } catch (e) {
            alert("❌ ERROR DE RED O BACKEND FUERA DE LÍNEA");
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
