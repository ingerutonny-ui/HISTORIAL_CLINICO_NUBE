<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - HÁBITOS Y LABORAL | RESPONSIVO</title>
    <style>
        :root { --primary: #2ecc71; --dark: #1e293b; --bg: #f0f2f5; --blue-info: #2563eb; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: var(--dark); }
        
        .container { background: white; width: 95%; max-width: 1050px; margin: auto; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-top { text-align: center; margin-bottom: 15px; }
        .logo-img { height: 55px; width: auto; }

        h2 { text-align: center; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 20px; font-size: 1.2rem; }

        /* Banner Paciente Responsivo */
        .patient-banner { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; background: #f8fafc; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); margin-bottom: 20px; }
        .info-group label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; display: block; }
        .info-group span { font-size: 13px; font-weight: 800; color: var(--blue-info); text-transform: uppercase; }

        .section-box { border-top: 2.5px solid var(--primary); margin-bottom: 20px; padding-top: 10px; }
        .section-title { font-size: 12px; font-weight: 800; color: #0f172a; text-transform: uppercase; margin-bottom: 15px; background: #f1f5f9; padding: 8px 12px; border-radius: 4px; }

        /* Grilla adaptable: 6 columnas en PC, 1 en Móvil */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; }
        .field label { font-size: 10px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; color: #475569; }
        
        input, select { padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; text-transform: uppercase; background: #fdfdfd; width: 100%; box-sizing: border-box; }

        /* Tabla Laboral Responsiva */
        .table-wrapper { overflow-x: auto; margin-bottom: 15px; }
        table { width: 100%; min-width: 600px; border-collapse: collapse; }
        th { font-size: 10px; font-weight: 800; padding: 8px; border-bottom: 2px solid var(--primary); text-align: center; }
        
        /* Riesgos Checkboxes */
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; padding: 10px; }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 10.5px; font-weight: 700; text-transform: uppercase; cursor: pointer; }

        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        #modalExito { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; border-top: 8px solid var(--primary); width: 80%; max-width: 350px; }

        /* Ajustes para pantallas pequeñas */
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr 1fr; } /* 2 columnas en móvil para ahorrar espacio */
            .full-mobile { grid-column: span 2; }
            h2 { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top"><img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img"></div>
    <h2>III. HÁBITOS Y ANTECEDENTES LABORALES (P3)</h2>

    <div class="patient-banner">
        <div class="info-group"><label>Paciente</label><span id="top_nombre">---</span></div>
        <div class="info-group"><label>CI</label><span id="top_ci">---</span></div>
        <div class="info-group"><label>Código</label><span id="top_codigo">---</span></div>
    </div>

    <div class="section-box">
        <div class="section-title">1. HÁBITOS PERSONALES</div>
        <div class="form-grid">
            <div class="field"><label>¿Fuma?</label><select id="fuma"><option>NO</option><option>SI</option></select></div>
            <div class="field"><label>Cant/Día</label><input type="number" id="fuma_cant" value="0"></div>
            <div class="field"><label>¿Alcohol?</label><select id="alcohol"><option>NO</option><option>SI</option></select></div>
            <div class="field"><label>Frecuencia</label><select id="alcohol_frec"><option>SOCIAL</option><option>SEMANAL</option><option>DIARIO</option></select></div>
            <div class="field"><label>¿Drogas?</label><select id="drogas"><option>NO</option><option>SI</option></select></div>
            <div class="field"><label>Tipo</label><input type="text" id="drogas_tipo" value="S/D"></div>
            <div class="field"><label>Coca (Pijcha)</label><select id="coca"><option>NO</option><option>SI</option></select></div>
            <div class="field"><label>¿Deporte?</label><select id="deporte"><option>NO</option><option>SI</option></select></div>
            <div class="field full-mobile"><label>Detalle Actividad Física</label><input type="text" id="deporte_det" value="S/D"></div>
            <div class="field full-mobile"><label>Grupo Sanguíneo</label><input type="text" id="grupo_sangre" value="ORH+"></div>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">2. HISTORIA LABORAL (EMPRESAS ANTERIORES)</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Edad</th><th>Empresa</th><th>Cargo</th><th>Tiempo</th><th>Riesgos</th><th>¿EPP?</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="number" id="lab_edad"></td>
                        <td><input type="text" id="lab_empresa"></td>
                        <td><input type="text" id="lab_cargo"></td>
                        <td><input type="number" id="lab_tiempo"></td>
                        <td><input type="text" id="lab_riesgos"></td>
                        <td><select id="lab_epp"><option>SI</option><option>NO</option></select></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">3. RIESGOS EXPUESTOS ACTUALES</div>
        <div class="checkbox-grid">
            <label class="check-item"><input type="checkbox" class="riesgo" value="RUIDO"> RUIDO</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="POLVOS"> POLVOS</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="ERGONÓMICO"> ERGONÓMICO</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="BIOLÓGICO"> BIOLÓGICO</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="VIBRACIÓN"> VIBRACIÓN</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="ALTURA"> ALTURA</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="QUÍMICO"> QUÍMICO</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="PSICOSOCIAL"> PSICOSOCIAL</label>
        </div>
    </div>

    <button class="btn-save" onclick="guardarDeclaracion()">💾 GUARDAR DECLARACIÓN JURADA</button>
</div>

<div id="modalExito">
    <div class="modal-content">
        <h3 style="color: var(--primary); margin-top: 0;">✅ NUEVO PACIENTE</h3>
        <p style="font-weight: 700; margin-bottom: 5px;" id="m_nom">---</p>
        <p style="font-weight: 900; color: var(--blue-info); font-size: 20px; margin: 0;" id="m_cod">---</p>
        <p style="font-size: 11px; color: #64748b; margin-top: 15px;">Sincronizando con la nube...</p>
    </div>
</div>

<script>
    window.onload = () => {
        document.getElementById('top_nombre').innerText = localStorage.getItem('p_nom') || "---";
        document.getElementById('top_ci').innerText = localStorage.getItem('p_ci') || "---";
        document.getElementById('top_codigo').innerText = localStorage.getItem('p_cod') || "---";
    };

    function guardarDeclaracion() {
        document.getElementById('m_nom').innerText = localStorage.getItem('p_nom');
        document.getElementById('m_cod').innerText = localStorage.getItem('p_cod');
        document.getElementById('modalExito').style.display = 'flex';
        setTimeout(() => { 
            localStorage.clear(); 
            window.location.href = 'index.html'; 
        }, 3000);
    }
</script>
</body>
</html>
