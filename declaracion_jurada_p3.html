<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P3 - FINALIZAR DECLARACIÓN</title>
    <style>
        :root { --primary: #2ecc71; --dark: #1e293b; --bg: #f0f2f5; --blue-info: #2563eb; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 1000px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header-top { display: flex; justify-content: center; margin-bottom: 15px; }
        .logo-img { height: 65px; width: auto; }
        h2 { text-align: center; color: var(--primary); font-weight: 900; text-transform: uppercase; margin-bottom: 25px; }
        .patient-banner { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 15px; background: #f8fafc; padding: 15px 25px; border-radius: 12px; border-left: 6px solid var(--primary); margin-bottom: 25px; }
        .info-group label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; display: block; }
        .info-group span { font-size: 15px; font-weight: 900; color: var(--blue-info); text-transform: uppercase; }
        .section-box { border-top: 2px solid #e2e8f0; margin-bottom: 25px; padding-top: 10px; }
        .section-title { font-size: 14px; font-weight: 900; color: #0f172a; text-transform: uppercase; margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px 20px; }
        .field { display: flex; flex-direction: column; }
        .field label { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        input, select { padding: 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-weight: 700; text-transform: uppercase; }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; padding: 15px; background: #fcfdfc; border-radius: 10px; }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 800; text-transform: uppercase; }
        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 14px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-top: 20px; }

        /* Estilo para la Ventana de Éxito */
        #modalExito { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 999; }
        .modal-content { background: white; padding: 40px; border-radius: 25px; text-align: center; max-width: 400px; width: 90%; }
        .modal-content h3 { color: var(--primary); font-size: 24px; margin-bottom: 10px; }
        .modal-content p { font-weight: 800; color: var(--dark); text-transform: uppercase; margin: 5px 0; }
        .modal-content .tag-cod { color: var(--blue-info); font-size: 22px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top"><img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img"></div>
    <h2>III. HÁBITOS Y ANTECEDENTES LABORALES (P3)</h2>

    <div class="patient-banner">
        <div class="info-group"><label>Paciente</label><span id="top_nombre">---</span></div>
        <div class="info-group"><label>Documento CI</label><span id="top_ci">---</span></div>
        <div class="info-group"><label>Código</label><span id="top_codigo">---</span></div>
    </div>

    <div class="section-box">
        <div class="section-title">1. HÁBITOS PERSONALES</div>
        <div class="form-grid">
            <div class="field"><label>¿Fuma?</label><select id="fuma"><option>NO</option><option>SI</option></select></div>
            <div class="field"><label>¿Alcohol?</label><select id="alcohol"><option>NO</option><option>SOCIAL</option><option>SI</option></select></div>
            <div class="field"><label>¿Drogas?</label><select id="drogas"><option>NO</option><option>SI</option></select></div>
            <div class="field"><label>Grupo Sanguíneo</label><input type="text" id="grupo_sangre" placeholder="Ej. ORH+"></div>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">2. HISTORIA LABORAL</div>
        <div class="form-grid">
            <div class="field" style="grid-column: span 2;"><label>Empresa Anterior</label><input type="text" id="empresa_ant"></div>
            <div class="field" style="grid-column: span 2;"><label>Cargo / Función</label><input type="text" id="cargo_ant"></div>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">3. RIESGOS EXPUESTOS</div>
        <div class="checkbox-grid">
            <label class="check-item"><input type="checkbox" class="riesgo" value="RUIDO"> RUIDO</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="POLVOS"> POLVOS</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="ERGONÓMICO"> ERGONÓMICO</label>
            <label class="check-item"><input type="checkbox" class="riesgo" value="BIOLÓGICO"> BIOLÓGICO</label>
        </div>
    </div>

    <button class="btn-save" onclick="guardarTodo()">💾 GUARDAR DECLARACIÓN P3</button>
</div>

<div id="modalExito">
    <div class="modal-content">
        <h3>✅ NUEVO PACIENTE</h3>
        <p id="modal_nom">---</p>
        <p class="tag-cod" id="modal_cod">---</p>
        <small>Redirigiendo al menú...</small>
    </div>
</div>

<script>
    window.onload = () => {
        document.getElementById('top_nombre').innerText = localStorage.getItem('p_nom') || "---";
        document.getElementById('top_ci').innerText = localStorage.getItem('p_ci') || "---";
        document.getElementById('top_codigo').innerText = localStorage.getItem('p_cod') || "---";
    };

    async function guardarTodo() {
        // 1. Recopilar P3
        const riesgosArr = [];
        document.querySelectorAll('.riesgo:checked').forEach(i => riesgosArr.push(i.value));

        const dataFinal = {
            ...JSON.parse(localStorage.getItem('datos_p1') || '{}'),
            ...JSON.parse(localStorage.getItem('datos_p2') || '{}'),
            fuma: document.getElementById('fuma').value,
            alcohol: document.getElementById('alcohol').value,
            drogas: document.getElementById('drogas').value,
            grupo_sangre: document.getElementById('grupo_sangre').value.toUpperCase(),
            empresa_ant: document.getElementById('empresa_ant').value.toUpperCase(),
            cargo_ant: document.getElementById('cargo_ant').value.toUpperCase(),
            riesgos: riesgosArr.join(', '),
            nombre: localStorage.getItem('p_nom'),
            ci: localStorage.getItem('p_ci'),
            codigo: localStorage.getItem('p_cod')
        };

        // 2. Simular envío y mostrar Modal
        document.getElementById('modal_nom').innerText = dataFinal.nombre;
        document.getElementById('modal_cod').innerText = dataFinal.codigo;
        document.getElementById('modalExito').style.display = 'flex';

        // 3. Limpiar y Redirigir tras 3 segundos [cite: 2026-01-20]
        setTimeout(() => {
            localStorage.clear();
            window.location.href = 'index.html';
        }, 3000);
    }
</script>
</body>
</html>
