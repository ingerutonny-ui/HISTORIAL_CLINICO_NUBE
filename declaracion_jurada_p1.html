<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | FILIACIÓN (1/3)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --ohs-cyan: #00a0a5; --dark: #1e293b; }
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; padding: 10px; }
        .form-container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .header-ohs { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--ohs-cyan); padding-bottom: 15px; margin-bottom: 25px; }
        .section-title { background: #f1f5f9; padding: 10px; border-left: 5px solid var(--ohs-cyan); margin: 20px 0; font-weight: 800; font-size: 14px; text-transform: uppercase; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select { border-radius: 8px !important; font-weight: 600; text-transform: uppercase; font-size: 13px !important; }
        .nav-controls { display: flex; gap: 15px; margin-top: 25px; }
        .btn-volver { background: #64748b; color: white; padding: 15px; border-radius: 12px; text-decoration: none; text-align: center; flex: 1; border: none; font-weight: 800; }
        .btn-next { background: var(--ohs-cyan); color: white; padding: 15px; border-radius: 12px; border: none; font-weight: 800; flex: 2; transition: 0.3s; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-ohs">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" height="50">
        <div class="text-end">
            <h5 class="m-0" style="font-weight: 800; color: var(--dark);">DECLARACIÓN JURADA</h5>
            <small style="color: var(--ohs-cyan); font-weight: 800;">PASO 1: FILIACIÓN</small>
        </div>
    </div>

    <form id="formP1">
        <div class="section-title">I. Datos Personales</div>
        <div class="grid-inputs">
            <div><label>Apellidos</label><input id="apellido" class="form-control" readonly></div>
            <div><label>Nombres</label><input id="nombre" class="form-control" readonly></div>
            <div><label>Cédula Identidad</label><input id="ci" class="form-control" readonly></div>
            <div><label>Código Paciente</label><input id="codigo_paciente" class="form-control" readonly style="background:#f8fafc;"></div>
        </div>

        <div class="grid-inputs mt-3">
            <div><label>Edad</label><input id="edad" type="number" class="form-control" required></div>
            <div><label>Sexo</label><select id="sexo" class="form-select"><option value="MASCULINO">MASCULINO</option><option value="FEMENINO">FEMENINO</option></select></div>
            <div><label>Fecha Nacimiento</label><input id="fecha_nacimiento" type="date" class="form-control" required></div>
            <div><label>Lugar Nacimiento</label><input id="lugar_nacimiento" class="form-control"></div>
        </div>

        <div class="section-title">II. Ubicación y Contacto</div>
        <div class="grid-inputs">
            <div><label>Domicilio (Calle/Av)</label><input id="domicilio" class="form-control"></div>
            <div><label>N° Casa</label><input id="n_casa" class="form-control"></div>
            <div><label>Zona / Barrio</label><input id="zona_barrio" class="form-control"></div>
            <div><label>Ciudad</label><input id="ciudad" class="form-control"></div>
            <div><label>País</label><input id="pais" class="form-control" value="BOLIVIA"></div>
            <div><label>Teléfono/Celular</label><input id="telefono" class="form-control"></div>
        </div>

        <div class="section-title">III. Datos Complementarios</div>
        <div class="grid-inputs">
            <div><label>Estado Civil</label>
                <select id="estado_civil" class="form-select" required>
                    <option value="SOLTERO(A)">SOLTERO(A)</option>
                    <option value="CASADO(A)">CASADO(A)</option>
                    <option value="DIVORCIADO(A)">DIVORCIADO(A)</option>
                    <option value="VIUDO(A)">VIUDO(A)</option>
                </select>
            </div>
            <div><label>Profesión / Oficio</label><input id="profesion_oficio" class="form-control"></div>
        </div>

        <div class="nav-controls">
            <button type="button" class="btn-volver" onclick="location.href='lista_historial.html'">✖ CANCELAR</button>
            <button type="submit" class="btn-next">SIGUIENTE: ANTECEDENTES (P2) →</button>
        </div>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const p_id = localStorage.getItem('p_id');

    window.onload = async () => {
        if (!p_id) return;
        try {
            const resp = await fetch(`${API}/api/paciente-completo/${p_id}`);
            const data = await resp.json();
            if (data.paciente) {
                document.getElementById('apellido').value = data.paciente.apellido || '';
                document.getElementById('nombre').value = data.paciente.nombre || '';
                document.getElementById('ci').value = data.paciente.ci || '';
                document.getElementById('codigo_paciente').value = data.paciente.codigo_paciente || '';
                
                if (data.filiacion) {
                    document.getElementById('edad').value = data.filiacion.edad || '';
                    document.getElementById('sexo').value = data.filiacion.sexo || 'MASCULINO';
                    document.getElementById('fecha_nacimiento').value = data.filiacion.fecha_nacimiento || '';
                    document.getElementById('lugar_nacimiento').value = data.filiacion.lugar_nacimiento || '';
                    document.getElementById('domicilio').value = data.filiacion.domicilio || '';
                    document.getElementById('n_casa').value = data.filiacion.n_casa || '';
                    document.getElementById('zona_barrio').value = data.filiacion.zona_barrio || '';
                    document.getElementById('ciudad').value = data.filiacion.ciudad || '';
                    document.getElementById('pais').value = data.filiacion.pais || 'BOLIVIA';
                    document.getElementById('telefono').value = data.filiacion.telefono || '';
                    document.getElementById('profesion_oficio').value = data.filiacion.profesion_oficio || '';
                    
                    // CORRECCIÓN RADICAL: Comparación de strings limpia para Estado Civil
                    const valEC = String(data.filiacion.estado_civil).trim().toUpperCase();
                    const selectEC = document.getElementById('estado_civil');
                    for (let i = 0; i < selectEC.options.length; i++) {
                        if (selectEC.options[i].value === valEC) {
                            selectEC.selectedIndex = i;
                            break;
                        }
                    }
                }
            }
        } catch (e) { console.error("Error al cargar:", e); }
    };

    document.getElementById('formP1').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            paciente_id: parseInt(p_id),
            edad: document.getElementById('edad').value,
            sexo: document.getElementById('sexo').value,
            fecha_nacimiento: document.getElementById('fecha_nacimiento').value,
            lugar_nacimiento: document.getElementById('lugar_nacimiento').value.toUpperCase(),
            domicilio: document.getElementById('domicilio').value.toUpperCase(),
            n_casa: document.getElementById('n_casa').value,
            zona_barrio: document.getElementById('zona_barrio').value.toUpperCase(),
            ciudad: document.getElementById('ciudad').value.toUpperCase(),
            pais: document.getElementById('pais').value.toUpperCase(),
            telefono: document.getElementById('telefono').value,
            estado_civil: document.getElementById('estado_civil').value,
            profesion_oficio: document.getElementById('profesion_oficio').value.toUpperCase()
        };

        try {
            // CORRECCIÓN DE RUTA: Se envía a /p1 sin el ID al final para evitar el 404
            const res = await fetch(`${API}/p1`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                window.location.href = "declaracion_jurada_p2.html";
            } else {
                alert("ERROR DE SERVIDOR: No se pudo procesar la solicitud.");
            }
        } catch (err) { alert("ERROR DE CONEXIÓN: Revise su internet."); }
    };
</script>
</body>
</html>
