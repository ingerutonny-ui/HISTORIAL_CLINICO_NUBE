<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P1 - DATOS DE FILIACIÓN</title>
    <style>
        :root { --primary: #2ecc71; --dark: #475569; --bg: #f8fafc; --line: #e2e8f0; --accent: #2563eb; }
        
        /* Aumentamos el tamaño base de la fuente */
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: var(--dark); font-size: 16px; }
        
        .container { 
            background: white; 
            width: 100%; 
            max-width: 1100px; /* Más ancho para aprovechar el espacio */
            margin: 15px auto; 
            padding: 35px; /* Más aire interno */
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); 
            box-sizing: border-box;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo-img { height: 55px; } /* Logo un poco más grande */
        .status { font-size: 12px; font-weight: 700; color: #f39c12; text-transform: uppercase; }

        /* Banner Paciente - Escalado */
        .patient-banner { 
            background: #f1f5f9; 
            padding: 18px 25px; 
            border-radius: 10px; 
            border-left: 5px solid var(--primary); 
            margin-bottom: 35px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .info-group label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin-right: 8px; }
        .info-group span { font-size: 16px; font-weight: 700; color: var(--accent); text-transform: uppercase; }

        .section-header { 
            font-size: 19px; /* Título más imponente */
            font-weight: 700; 
            color: #1e293b;
            text-align: center;
            margin-bottom: 30px; 
            border-bottom: 1px solid var(--line); 
            padding-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Grilla más grande y cómoda */
        .form-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 25px; 
            margin-bottom: 35px; 
        }

        .field { display: flex; flex-direction: column; }
        .field label { font-size: 12px; font-weight: 700; margin-bottom: 10px; color: #64748b; text-transform: uppercase; }
        
        /* Inputs más altos y con letra más clara */
        input, select { 
            padding: 14px 16px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            font-size: 15px; 
            font-weight: 500; 
            color: #1e293b;
            background: #ffffff;
            text-transform: uppercase;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.1); }

        .btn-save { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 20px; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 17px; 
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
            transition: 0.2s;
        }

        .btn-save:active { transform: scale(0.98); }

        .full-width { grid-column: 1 / -1; }

        /* Ajustes para Móvil (Pantallas pequeñas) */
        @media (max-width: 600px) {
            .container { padding: 20px; margin: 5px; }
            .header { margin-bottom: 15px; }
            .logo-img { height: 40px; }
            .patient-banner { padding: 15px; flex-direction: column; align-items: flex-start; gap: 8px; }
            .section-header { font-size: 16px; }
            .form-grid { gap: 15px; }
            input, select { padding: 12px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img">
        <span class="status" id="tag_estado">NUEVO REGISTRO</span>
    </div>

    <div class="patient-banner">
        <div class="info-group">
            <label>PACIENTE:</label>
            <span id="top_nombre">---</span>
        </div>
        <div class="info-group">
            <label>CÓDIGO:</label>
            <span id="top_codigo">---</span>
        </div>
    </div>

    <div class="section-header">1. DATOS DE FILIACIÓN</div>

    <div class="form-grid">
        <div class="field"><label>Edad</label><input type="number" id="edad"></div>
        <div class="field">
            <label>Sexo</label>
            <select id="sexo">
                <option value="MASCULINO">MASCULINO</option>
                <option value="FEMENINO">FEMENINO</option>
            </select>
        </div>
        <div class="field"><label>Fecha Nacimiento</label><input type="date" id="fecha_nac"></div>
        <div class="field"><label>Lugar Nacimiento</label><input type="text" id="lugar_nac"></div>
        <div class="field"><label>Domicilio Actual</label><input type="text" id="domicilio"></div>
        <div class="field"><label>N° Casa</label><input type="text" id="n_casa"></div>
        <div class="field"><label>Zona / Barrio</label><input type="text" id="zona"></div>
        <div class="field"><label>Ciudad</label><input type="text" id="ciudad"></div>
        <div class="field"><label>País</label><input type="text" id="pais" value="BOLIVIA"></div>
        <div class="field"><label>Teléfono/Celular</label><input type="number" id="celular"></div>
        <div class="field">
            <label>Estado Civil</label>
            <select id="estado_civil">
                <option value="SOLTERO/A">SOLTERO/A</option>
                <option value="CASADO/A">CASADO/A</option>
                <option value="DIVORCIADO/A">DIVORCIADO/A</option>
                <option value="VIUDO/A">VIUDO/A</option>
            </select>
        </div>
        <div class="field full-width"><label>Profesión / Oficio</label><input type="text" id="profesion"></div>
    </div>

    <button class="btn-save" onclick="guardarP1()">💾 GUARDAR Y CONTINUAR P2</button>
</div>

<script>
    window.onload = () => {
        const nombre = localStorage.getItem('p_nom');
        const codigo = localStorage.getItem('p_cod');
        const idEdicion = localStorage.getItem('p_id_edicion');

        if (nombre) document.getElementById('top_nombre').innerText = nombre.toUpperCase();
        if (codigo) document.getElementById('top_codigo').innerText = codigo.toUpperCase();
        
        if (idEdicion) {
            document.getElementById('tag_estado').innerText = "MODO EDICIÓN";
        }
    };

    function guardarP1() {
        const p1_data = {
            edad: document.getElementById('edad').value,
            sexo: document.getElementById('sexo').value,
            fecha_nac: document.getElementById('fecha_nac').value,
            lugar_nac: document.getElementById('lugar_nac').value.toUpperCase(),
            domicilio: document.getElementById('domicilio').value.toUpperCase(),
            n_casa: document.getElementById('n_casa').value,
            zona: document.getElementById('zona').value.toUpperCase(),
            ciudad: document.getElementById('ciudad').value.toUpperCase(),
            pais: document.getElementById('pais').value.toUpperCase(),
            celular: document.getElementById('celular').value,
            estado_civil: document.getElementById('estado_civil').value,
            profesion: document.getElementById('profesion').value.toUpperCase()
        };
        localStorage.setItem('datos_p1', JSON.stringify(p1_data));
        window.location.href = 'declaracion_jurada_p2.html';
    }
</script>
</body>
</html>
