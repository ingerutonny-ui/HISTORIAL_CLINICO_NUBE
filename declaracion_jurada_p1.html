<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P1 - FILIACIÓN | HC NUBE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Fondo y reseteo de márgenes */
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Contenedor que ocupa toda la pantalla con 15px de margen a los lados */
        .form-container { 
            max-width: 100%; 
            margin: 15px; 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        .header-ohs { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #22c55e; padding-bottom: 15px; margin-bottom: 20px; }
        .title-center h2 { font-size: 1.3rem; font-weight: 800; color: #1e293b; text-transform: uppercase; margin: 0; }
        
        /* Banner de datos con AZUL NOTORIO */
        .data-banner { background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: space-around; border: 1px solid #e2e8f0; }
        .data-val { color: #0056b3; font-weight: 900; font-size: 16px; text-shadow: 0.5px 0.5px 0px rgba(0,0,0,0.1); }
        
        .label-custom { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 6px; }
        .form-control, .form-select { border-radius: 10px; padding: 12px; font-size: 14px; text-transform: uppercase; border: 2px solid #f1f5f9; font-weight: 600; }
        
        .btn-next { background: #22c55e; color: white; border: none; padding: 20px; border-radius: 15px; width: 100%; font-weight: 800; text-transform: uppercase; margin-top: 25px; font-size: 18px; transition: 0.3s; cursor: pointer; }
        .btn-next:hover { background: #16a34a; transform: scale(1.01); }

        /* Ajustes para móviles */
        @media (max-width: 768px) {
            .form-container { margin: 10px; padding: 15px; }
            .title-center h2 { font-size: 1rem; }
            .data-val { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-ohs">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" height="50">
        <div class="title-center"><h2>1. Datos de Filiación</h2></div>
    </div>

    <div class="data-banner">
        <div>PACIENTE: <span id="p_nombre" class="data-val">---</span></div>
        <div>CI: <span id="p_ci" class="data-val">---</span></div>
        <div>CÓDIGO: <span id="p_codigo" class="data-val">---</span></div>
    </div>

    <form id="formP1" class="row g-3">
        <div class="col-md-3"><label class="label-custom">Edad</label><input type="number" id="edad" class="form-control" required></div>
        <div class="col-md-3">
            <label class="label-custom">Sexo</label>
            <select id="sexo" class="form-select">
                <option value="MASCULINO">MASCULINO</option>
                <option value="FEMENINO">FEMENINO</option>
            </select>
        </div>
        <div class="col-md-3"><label class="label-custom">Fecha Nacimiento</label><input type="date" id="fecha_nac" class="form-control" required></div>
        <div class="col-md-3"><label class="label-custom">Lugar Nacimiento</label><input type="text" id="lugar_nac" class="form-control" value="S/D"></div>
        
        <div class="col-md-6"><label class="label-custom">Domicilio Actual</label><input type="text" id="domicilio" class="form-control" value="S/D"></div>
        <div class="col-md-2"><label class="label-custom">N° Casa</label><input type="text" id="n_casa" class="form-control" value="S/N"></div>
        <div class="col-md-4"><label class="label-custom">Zona / Barrio</label><input type="text" id="zona" class="form-control" value="S/D"></div>
        
        <div class="col-md-4"><label class="label-custom">Ciudad</label><input type="text" id="ciudad" class="form-control" value="S/D"></div>
        <div class="col-md-4"><label class="label-custom">País</label><input type="text" id="pais" class="form-control" value="BOLIVIA"></div>
        <div class="col-md-4"><label class="label-custom">Teléfono/Celular</label><input type="text" id="tel" class="form-control" value="0"></div>
        
        <div class="col-md-6">
            <label class="label-custom">Estado Civil</label>
            <select id="est_civil" class="form-select">
                <option value="SOLTERO/A">SOLTERO/A</option>
                <option value="CASADO/A">CASADO/A</option>
                <option value="DIVORCIADO/A">DIVORCIADO/A</option>
                <option value="VIUDO/A">VIUDO/A</option>
            </select>
        </div>
        <div class="col-md-6"><label class="label-custom">Profesión / Oficio</label><input type="text" id="profesion" class="form-control" value="S/D"></div>

        <button type="submit" id="btnNext" class="btn-next">💾 Guardar P1 y Continuar</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const p_id = localStorage.getItem('p_id_edicion') || localStorage.getItem('p_id');

    window.onload = () => {
        if (!p_id) { window.location.href = "registro_paciente.html"; return; }
        document.getElementById('p_nombre').innerText = (localStorage.getItem('p_nom') || "---").toUpperCase();
        document.getElementById('p_ci').innerText = localStorage.getItem('p_ci') || "---";
        document.getElementById('p_codigo').innerText = localStorage.getItem('p_cod') || "---";
    };

    document.getElementById('formP1').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnNext');
        btn.innerText = "⏳ GUARDANDO...";
        btn.disabled = true;

        const payload = {
            paciente_id: parseInt(p_id),
            edad: document.getElementById('edad').value,
            sexo: document.getElementById('sexo').value,
            fecha_nacimiento: document.getElementById('fecha_nac').value,
            lugar_nacimiento: document.getElementById('lugar_nac').value.toUpperCase(),
            domicilio: document.getElementById('domicilio').value.toUpperCase(),
            n_casa: document.getElementById('n_casa').value,
            zona_barrio: document.getElementById('zona').value.toUpperCase(),
            ciudad: document.getElementById('ciudad').value.toUpperCase(),
            pais: document.getElementById('pais').value.toUpperCase(),
            telefono: document.getElementById('tel').value,
            estado_civil: document.getElementById('est_civil').value,
            profesion_oficio: document.getElementById('profesion').value.toUpperCase()
        };

        localStorage.setItem('datos_temporales_p1', JSON.stringify(payload));

        try {
            const res = await fetch(`${API}/filiacion/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                window.location.href = "declaracion_jurada_p2.html";
            } else {
                window.location.href = "declaracion_jurada_p2.html"; 
            }
        } catch (error) {
            window.location.href = "declaracion_jurada_p2.html";
        }
    };
</script>
</body>
</html>
