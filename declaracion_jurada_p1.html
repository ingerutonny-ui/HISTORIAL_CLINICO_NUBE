<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P1 - DATOS DE FILIACIÓN</title>
    <style>
        :root { --primary: #2ecc71; --dark: #475569; --bg: #f8fafc; --line: #e2e8f0; --accent: #2563eb; }
        
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: var(--dark); }
        
        .container { 
            background: white; 
            width: 100%; 
            max-width: 950px; 
            margin: 10px auto; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            box-sizing: border-box;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-img { height: 45px; }
        .status { font-size: 10px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Banner Paciente - Estilo Fino */
        .patient-banner { 
            background: #f1f5f9; 
            padding: 12px 20px; 
            border-radius: 8px; 
            border-left: 4px solid var(--primary); 
            margin-bottom: 25px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .info-group label { font-size: 9px; font-weight: 600; color: #94a3b8; text-transform: uppercase; margin-right: 5px; }
        .info-group span { font-size: 13px; font-weight: 700; color: var(--accent); text-transform: uppercase; }

        .section-header { 
            font-size: 15px; 
            font-weight: 700; 
            color: #1e293b;
            text-align: center;
            margin-bottom: 20px; 
            border-bottom: 1px solid var(--line); 
            padding-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Grilla Adaptativa Limpia */
        .form-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-bottom: 25px; 
        }

        .field { display: flex; flex-direction: column; }
        .field label { font-size: 10px; font-weight: 700; margin-bottom: 6px; color: #64748b; text-transform: uppercase; }
        
        input, select { 
            padding: 10px 12px; 
            border: 1px solid #d1d5db; 
            border-radius: 6px; 
            font-size: 13px; 
            font-weight: 500; 
            color: #1e293b;
            background: #ffffff;
            text-transform: uppercase;
            width: 100%;
            box-sizing: border-box;
            transition: border 0.2s;
        }

        input:focus { border-color: var(--primary); outline: none; background: #fff; }

        .btn-save { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 14px; 
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(46, 204, 113, 0.3);
        }

        .full-width { grid-column: 1 / -1; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .patient-banner { flex-direction: column; align-items: flex-start; gap: 5px; }
            .section-header { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img">
        <span class="status" id="tag_estado">NUEVO REGISTRO</span>
    </div>

    <div class="patient-banner">
        <div class="info-group">
            <label>PACIENTE:</label>
            <span id="top_nombre">---</span>
        </div>
        <div class="info-group">
            <label>CÓDIGO:</label>
            <span id="top_codigo">---</span>
        </div>
    </div>

    <div class="section-header">1. DATOS DE FILIACIÓN</div>

    <div class="form-grid">
        <div class="field"><label>Edad</label><input type="number" id="edad"></div>
        <div class="field">
            <label>Sexo</label>
            <select id="sexo">
                <option value="MASCULINO">MASCULINO</option>
                <option value="FEMENINO">FEMENINO</option>
            </select>
        </div>
        <div class="field"><label>Fecha Nacimiento</label><input type="date" id="fecha_nac"></div>
        <div class="field"><label>Lugar Nacimiento</label><input type="text" id="lugar_nac"></div>
        <div class="field"><label>Domicilio Actual</label><input type="text" id="domicilio"></div>
        <div class="field"><label>N° Casa</label><input type="text" id="n_casa"></div>
        <div class="field"><label>Zona / Barrio</label><input type="text" id="zona"></div>
        <div class="field"><label>Ciudad</label><input type="text" id="ciudad"></div>
        <div class="field"><label>País</label><input type="text" id="pais" value="BOLIVIA"></div>
        <div class="field"><label>Teléfono/Celular</label><input type="number" id="celular"></div>
        <div class="field">
            <label>Estado Civil</label>
            <select id="estado_civil">
                <option value="SOLTERO/A">SOLTERO/A</option>
                <option value="CASADO/A">CASADO/A</option>
                <option value="DIVORCIADO/A">DIVORCIADO/A</option>
                <option value="VIUDO/A">VIUDO/A</option>
            </select>
        </div>
        <div class="field full-width"><label>Profesión / Oficio</label><input type="text" id="profesion"></div>
    </div>

    <button class="btn-save" onclick="guardarP1()">💾 GUARDAR Y CONTINUAR</button>
</div>

<script>
    window.onload = () => {
        const nombre = localStorage.getItem('p_nom');
        const codigo = localStorage.getItem('p_cod');
        const idEdicion = localStorage.getItem('p_id_edicion');

        if (nombre) document.getElementById('top_nombre').innerText = nombre.toUpperCase();
        if (codigo) document.getElementById('top_codigo').innerText = codigo.toUpperCase();
        
        if (idEdicion) {
            document.getElementById('tag_estado').innerText = "MODO EDICIÓN";
            document.getElementById('tag_estado').style.color = "#f39c12";
        }
    };

    function guardarP1() {
        const p1_data = {
            edad: document.getElementById('edad').value,
            sexo: document.getElementById('sexo').value,
            fecha_nac: document.getElementById('fecha_nac').value,
            lugar_nac: document.getElementById('lugar_nac').value.toUpperCase(),
            domicilio: document.getElementById('domicilio').value.toUpperCase(),
            n_casa: document.getElementById('n_casa').value,
            zona: document.getElementById('zona').value.toUpperCase(),
            ciudad: document.getElementById('ciudad').value.toUpperCase(),
            pais: document.getElementById('pais').value.toUpperCase(),
            celular: document.getElementById('celular').value,
            estado_civil: document.getElementById('estado_civil').value,
            profesion: document.getElementById('profesion').value.toUpperCase()
        };
        localStorage.setItem('datos_p1', JSON.stringify(p1_data));
        window.location.href = 'declaracion_jurada_p2.html';
    }
</script>
</body>
</html>
