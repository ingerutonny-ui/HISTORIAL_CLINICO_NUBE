<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P1 - DATOS DE FILIACIÓN</title>
    <style>
        :root { --primary: #2ecc71; --dark: #1e293b; --bg: #f0f2f5; --line: #e2e8f0; }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; color: var(--dark); }
        
        .container { 
            background: white; 
            width: 100%; 
            max-width: 900px; 
            margin: auto; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
            box-sizing: border-box;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-img { height: 40px; }

        /* Banner de Paciente Responsivo */
        .patient-banner { 
            background: #f8fafc; 
            padding: 15px; 
            border-radius: 10px; 
            border-left: 5px solid var(--primary); 
            margin-bottom: 20px; 
            display: flex;
            flex-direction: column; /* Apilado en móviles por defecto */
            gap: 5px;
        }
        
        .info-group label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; }
        .info-group span { font-size: 15px; font-weight: 900; color: #2563eb; text-transform: uppercase; }

        .section-title { font-size: 16px; font-weight: 900; text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--line); padding-bottom: 10px; }

        /* Grilla de formulario adaptativa */
        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr; /* Una columna en móvil */
            gap: 12px; 
        }

        /* En tablets y PC, dos o tres columnas */
        @media (min-width: 600px) {
            .form-grid { grid-template-columns: repeat(2, 1fr); }
            .patient-banner { flex-direction: row; justify-content: space-between; align-items: center; }
        }
        
        @media (min-width: 900px) {
            .form-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .field { display: flex; flex-direction: column; }
        .field label { font-size: 11px; font-weight: 800; margin-bottom: 5px; color: #475569; }
        
        input, select { 
            padding: 12px; 
            border: 1.5px solid var(--line); 
            border-radius: 8px; 
            font-size: 14px; 
            font-weight: 700; 
            text-transform: uppercase;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-save { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 10px; 
            font-weight: 900; 
            font-size: 16px; 
            margin-top: 25px; 
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Estilo para el campo largo de profesión */
        .full-width { grid-column: 1 / -1; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img">
        <span style="font-size: 10px; font-weight: 900; color: var(--primary);">NUEVO REGISTRO</span>
    </div>

    <div class="patient-banner">
        <div class="info-group">
            <label>Paciente:</label>
            <span id="top_nombre">CARGANDO...</span>
        </div>
        <div class="info-group">
            <label>Código:</label>
            <span id="top_codigo">---</span>
        </div>
    </div>

    <div class="section-title">1. DATOS DE FILIACIÓN</div>

    <div class="form-grid">
        <div class="field"><label>Edad</label><input type="number" id="edad"></div>
        <div class="field"><label>Sexo</label>
            <select id="sexo">
                <option value="MASCULINO">MASCULINO</option>
                <option value="FEMENINO">FEMENINO</option>
            </select>
        </div>
        <div class="field"><label>Fecha Nacimiento</label><input type="date" id="fecha_nac"></div>
        <div class="field"><label>Lugar Nacimiento</label><input type="text" id="lugar_nac"></div>
        <div class="field"><label>Domicilio Actual</label><input type="text" id="domicilio"></div>
        <div class="field"><label>N° Casa</label><input type="text" id="n_casa"></div>
        <div class="field"><label>Zona / Barrio</label><input type="text" id="zona"></div>
        <div class="field"><label>Ciudad</label><input type="text" id="ciudad"></div>
        <div class="field"><label>País</label><input type="text" id="pais" value="BOLIVIA"></div>
        <div class="field"><label>Teléfono/Celular</label><input type="number" id="celular"></div>
        <div class="field"><label>Estado Civil</label>
            <select id="estado_civil">
                <option value="SOLTERO/A">SOLTERO/A</option>
                <option value="CASADO/A">CASADO/A</option>
                <option value="DIVORCIADO/A">DIVORCIADO/A</option>
                <option value="VIUDO/A">VIUDO/A</option>
            </select>
        </div>
        <div class="field full-width"><label>Profesión / Oficio</label><input type="text" id="profesion"></div>
    </div>

    <button class="btn-save" onclick="guardarP1()">🖫 GUARDAR Y CONTINUAR</button>
</div>

<script>
    // Carga inmediata al abrir la página
    window.onload = () => {
        const nombre = localStorage.getItem('p_nom');
        const codigo = localStorage.getItem('p_cod');

        if (nombre && codigo) {
            document.getElementById('top_nombre').innerText = nombre.toUpperCase();
            document.getElementById('top_codigo').innerText = codigo.toUpperCase();
        } else {
            // Si no hay datos, volver al registro para no quedar en blanco
            alert("No hay un paciente seleccionado.");
            window.location.replace('registro_paciente.html');
        }
    };

    function guardarP1() {
        const p1_data = {
            edad: document.getElementById('edad').value,
            sexo: document.getElementById('sexo').value,
            fecha_nac: document.getElementById('fecha_nac').value,
            lugar_nac: document.getElementById('lugar_nac').value.toUpperCase(),
            domicilio: document.getElementById('domicilio').value.toUpperCase(),
            n_casa: document.getElementById('n_casa').value,
            zona: document.getElementById('zona').value.toUpperCase(),
            ciudad: document.getElementById('ciudad').value.toUpperCase(),
            pais: document.getElementById('pais').value.toUpperCase(),
            celular: document.getElementById('celular').value,
            estado_civil: document.getElementById('estado_civil').value,
            profesion: document.getElementById('profesion').value.toUpperCase()
        };
        
        localStorage.setItem('datos_p1', JSON.stringify(p1_data));
        window.location.href = 'declaracion_jurada_p2.html';
    }
</script>
</body>
</html>
