<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P1 - DATOS DE FILIACIÓN</title>
    <style>
        :root { --primary: #2ecc71; --dark: #1e293b; --bg: #f0f2f5; --line: #e2e8f0; --blue-text: #2563eb; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: var(--dark); }
        
        .container { 
            background: white; 
            width: 100%; 
            max-width: 1000px; 
            margin: auto; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            box-sizing: border-box;
        }

        /* Cabecera */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo-img { height: 50px; }
        .status-tag { font-size: 11px; font-weight: 900; color: var(--primary); letter-spacing: 1px; text-transform: uppercase; }

        /* Banner Paciente - Estilo Profesional */
        .patient-banner { 
            background: #f8fafc; 
            padding: 18px 25px; 
            border-radius: 12px; 
            border-left: 6px solid var(--primary); 
            margin-bottom: 30px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .info-group label { display: block; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 2px; }
        .info-group span { font-size: 16px; font-weight: 900; color: var(--blue-text); text-transform: uppercase; }

        .section-title { 
            font-size: 18px; 
            font-weight: 900; 
            color: #0f172a;
            margin-bottom: 25px; 
            border-bottom: 2.5px solid var(--line); 
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Grilla Adaptativa */
        .form-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }

        .field { display: flex; flex-direction: column; }
        .field label { font-size: 11px; font-weight: 800; margin-bottom: 8px; color: #475569; text-transform: uppercase; }
        
        input, select { 
            padding: 12px 15px; 
            border: 1.5px solid var(--line); 
            border-radius: 10px; 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--dark);
            background: #ffffff;
            text-transform: uppercase;
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1); }

        .btn-save { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 20px; 
            border-radius: 15px; 
            font-weight: 900; 
            font-size: 16px; 
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }

        .btn-save:hover { filter: brightness(1.05); transform: translateY(-1px); }

        /* Profesión a lo largo */
        .full-width { grid-column: 1 / -1; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            .patient-banner { padding: 15px; }
            .info-group span { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img">
        <span class="status-tag" id="tag_estado">NUEVO REGISTRO</span>
    </div>

    <div class="patient-banner">
        <div class="info-group">
            <label>Paciente:</label>
            <span id="top_nombre">---</span>
        </div>
        <div class="info-group">
            <label>Código:</label>
            <span id="top_codigo">---</span>
        </div>
    </div>

    <div class="section-title">1. DATOS DE FILIACIÓN</div>

    <div class="form-grid">
        <div class="field"><label>Edad</label><input type="number" id="edad" placeholder="0"></div>
        <div class="field">
            <label>Sexo</label>
            <select id="sexo">
                <option value="MASCULINO">MASCULINO</option>
                <option value="FEMENINO">FEMENINO</option>
            </select>
        </div>
        <div class="field"><label>Fecha Nacimiento</label><input type="date" id="fecha_nac"></div>
        <div class="field"><label>Lugar Nacimiento</label><input type="text" id="lugar_nac" placeholder="CIUDAD/PAÍS"></div>
        <div class="field"><label>Domicilio Actual</label><input type="text" id="domicilio" placeholder="AVENIDA / CALLE"></div>
        <div class="field"><label>N° Casa</label><input type="text" id="n_casa" placeholder="S/N"></div>
        <div class="field"><label>Zona / Barrio</label><input type="text" id="zona" placeholder="ZONA"></div>
        <div class="field"><label>Ciudad</label><input type="text" id="ciudad" placeholder="CIUDAD"></div>
        <div class="field"><label>País</label><input type="text" id="pais" value="BOLIVIA"></div>
        <div class="field"><label>Teléfono/Celular</label><input type="number" id="celular" placeholder="00000000"></div>
        <div class="field">
            <label>Estado Civil</label>
            <select id="estado_civil">
                <option value="SOLTERO/A">SOLTERO/A</option>
                <option value="CASADO/A">CASADO/A</option>
                <option value="DIVORCIADO/A">DIVORCIADO/A</option>
                <option value="VIUDO/A">VIUDO/A</option>
            </select>
        </div>
        <div class="field full-width"><label>Profesión / Oficio</label><input type="text" id="profesion" placeholder="OFICIO ACTUAL"></div>
    </div>

    <button class="btn-save" onclick="guardarP1()">🖫 GUARDAR Y CONTINUAR</button>
</div>

<script>
    window.onload = () => {
        const nombre = localStorage.getItem('p_nom');
        const codigo = localStorage.getItem('p_cod');
        const idEdicion = localStorage.getItem('p_id_edicion');

        if (nombre) document.getElementById('top_nombre').innerText = nombre.toUpperCase();
        if (codigo) document.getElementById('top_codigo').innerText = codigo.toUpperCase();
        
        if (idEdicion) {
            document.getElementById('tag_estado').innerText = "MODO EDICIÓN";
            document.getElementById('tag_estado').style.color = "#f39c12";
        }

        if (!nombre && !idEdicion) {
            window.location.replace('registro_paciente.html');
        }
    };

    function guardarP1() {
        const p1_data = {
            edad: document.getElementById('edad').value,
            sexo: document.getElementById('sexo').value,
            fecha_nac: document.getElementById('fecha_nac').value,
            lugar_nac: document.getElementById('lugar_nac').value.toUpperCase(),
            domicilio: document.getElementById('domicilio').value.toUpperCase(),
            n_casa: document.getElementById('n_casa').value,
            zona: document.getElementById('zona').value.toUpperCase(),
            ciudad: document.getElementById('ciudad').value.toUpperCase(),
            pais: document.getElementById('pais').value.toUpperCase(),
            celular: document.getElementById('celular').value,
            estado_civil: document.getElementById('estado_civil').value,
            profesion: document.getElementById('profesion').value.toUpperCase()
        };
        
        localStorage.setItem('datos_p1', JSON.stringify(p1_data));
        window.location.href = 'declaracion_jurada_p2.html';
    }
</script>
</body>
</html>
