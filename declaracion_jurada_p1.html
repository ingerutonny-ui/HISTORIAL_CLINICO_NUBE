<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P1 - FILIACIÓN | HISTORIAL CLÍNICO</title>
    <style>
        :root { --primary: #2ecc71; --dark: #1e293b; --ghost: #cbd5e1; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px 35px; color: var(--dark); display: flex; justify-content: center; }
        
        .container { background: white; width: 100%; max-width: 1100px; padding: 25px 45px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); }
        
        /* Logo con tamaño corregido y menos margen inferior */
        .logo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-img { height: 70px; width: auto; }
        .reg-tag { color: var(--primary); font-weight: 800; font-size: 12px; letter-spacing: 1px; }

        /* Trillizos más compactos */
        .header-info { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 20px; background: #f8fafc; padding: 15px 25px; border-radius: 15px; margin-bottom: 20px; border-top: 4px solid var(--primary); }
        .info-box label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; display: block; }
        .info-box span { font-size: 17px; font-weight: 900; color: #2563eb; text-transform: uppercase; }

        h2 { text-align: center; text-transform: uppercase; font-weight: 900; margin: 15px 0 25px 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; font-size: 1.4rem; }

        /* Grilla optimizada: Reducimos el GAP vertical a 15px */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px 35px; }
        
        .field { display: flex; flex-direction: column; }
        
        /* Texto en 12px como pediste */
        .field label { font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; color: #475569; padding-left: 2px; }
        
        input, select { 
            padding: 12px 18px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 700; 
            color: var(--dark); 
            background: #fdfdfd; 
            text-transform: uppercase;
        }

        input::placeholder { color: var(--ghost); font-weight: 400; text-transform: none; }
        input:focus { border-color: var(--primary); outline: none; background: white; }

        .btn-container { grid-column: 1 / -1; margin-top: 30px; text-align: center; }
        .btn-next { background: var(--primary); color: white; border: none; padding: 18px 60px; border-radius: 15px; font-weight: 900; font-size: 17px; cursor: pointer; text-transform: uppercase; box-shadow: 0 8px 20px rgba(46, 204, 113, 0.25); }

        @media (max-width: 768px) { body { padding: 10px; } .container { padding: 20px; } .header-info { grid-template-columns: 1fr; gap: 10px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-header">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img">
        <span class="reg-tag">NUEVO REGISTRO</span>
    </div>

    <div class="header-info">
        <div class="info-box"><label>Paciente</label><span id="top_nombre">---</span></div>
        <div class="info-box"><label>Documento CI</label><span id="top_ci">---</span></div>
        <div class="info-box"><label>Código Sistema</label><span id="top_codigo">---</span></div>
    </div>

    <h2>1. DATOS DE FILIACIÓN</h2>

    <div class="form-grid">
        <div class="field"><label>Edad</label><input type="number" id="edad" placeholder="Ej. 25"></div>
        <div class="field">
            <label>Sexo</label>
            <select id="sexo">
                <option value="MASCULINO">MASCULINO</option>
                <option value="FEMENINO">FEMENINO</option>
            </select>
        </div>
        <div class="field"><label>Fecha Nacimiento</label><input type="date" id="fecha_nac"></div>
        <div class="field"><label>Lugar Nacimiento</label><input type="text" id="lugar_nac" placeholder="Ej. La Paz"></div>
        <div class="field"><label>Domicilio Actual</label><input type="text" id="domicilio" placeholder="Ej. Av. 6 de Marzo"></div>
        <div class="field"><label>N° Casa</label><input type="text" id="n_casa" placeholder="Ej. 123"></div>
        <div class="field"><label>Zona / Barrio</label><input type="text" id="zona" placeholder="Ej. El Alto"></div>
        <div class="field"><label>Ciudad</label><input type="text" id="ciudad" placeholder="Ej. El Alto"></div>
        <div class="field"><label>País</label><input type="text" id="pais" value="BOLIVIA"></div>
        <div class="field"><label>Teléfono/Celular</label><input type="number" id="celular" placeholder="Ej. 70000000"></div>
        <div class="field">
            <label>Estado Civil</label>
            <select id="estado_civil">
                <option value="SOLTERO/A">SOLTERO/A</option>
                <option value="CASADO/A">CASADO/A</option>
                <option value="DIVORCIADO/A">DIVORCIADO/A</option>
                <option value="VIUDO/A">VIUDO/A</option>
            </select>
        </div>
        <div class="field"><label>Profesión / Oficio</label><input type="text" id="profesion" placeholder="Ej. Ingeniero"></div>

        <div class="btn-container">
            <button class="btn-next" onclick="guardarP1()">💾 GUARDAR FILIACIÓN Y CONTINUAR</button>
        </div>
    </div>
</div>

<script>
    window.onload = () => {
        const nom = localStorage.getItem('p_nom');
        const ci = localStorage.getItem('p_ci');
        const cod = localStorage.getItem('p_cod');

        if (!nom || !ci || !cod) {
            window.location.replace('registro_paciente.html');
        } else {
            document.getElementById('top_nombre').innerText = nom;
            document.getElementById('top_ci').innerText = ci;
            document.getElementById('top_codigo').innerText = cod;
        }
    };

    function guardarP1() {
        const p1_data = {
            edad: document.getElementById('edad').value,
            sexo: document.getElementById('sexo').value,
            fecha_nac: document.getElementById('fecha_nac').value,
            lugar_nac: document.getElementById('lugar_nac').value.toUpperCase(),
            domicilio: document.getElementById('domicilio').value.toUpperCase(),
            n_casa: document.getElementById('n_casa').value,
            zona: document.getElementById('zona').value.toUpperCase(),
            ciudad: document.getElementById('ciudad').value.toUpperCase(),
            pais: document.getElementById('pais').value.toUpperCase(),
            celular: document.getElementById('celular').value,
            estado_civil: document.getElementById('estado_civil').value,
            profesion: document.getElementById('profesion').value.toUpperCase()
        };
        localStorage.setItem('datos_p1', JSON.stringify(p1_data));
        window.location.href = 'declaracion_jurada_p2.html';
    }
</script>
</body>
</html>
