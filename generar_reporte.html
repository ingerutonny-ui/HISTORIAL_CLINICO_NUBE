<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>REPORTE MÉDICO OHS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #525659; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .sheet { width: 210mm; min-height: 297mm; background: white; padding: 20mm; box-shadow: 0 0 10px rgba(0,0,0,0.5); box-sizing: border-box; }
        .header { display: flex; align-items: center; border-bottom: 3px solid #22c55e; padding-bottom: 15px; margin-bottom: 25px; }
        .logo { height: 60px; }
        .header-title { flex: 1; text-align: center; }
        .section-title { background: #f1f5f9; padding: 8px; font-weight: 800; border-left: 6px solid #22c55e; margin: 20px 0 10px; text-transform: uppercase; font-size: 12px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 11px; }
        .val { font-weight: 700; color: #1e293b; text-transform: uppercase; }
        .btn-print { background: #22c55e; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="no-print" style="margin-bottom: 20px;">
    <button class="btn-print" onclick="window.print()">IMPRIMIR REPORTE COMPLETO</button>
</div>

<div class="sheet">
    <div class="header">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo">
        <div class="header-title"><h1>Historial Clínico Ocupacional</h1></div>
    </div>

    <div class="section-title">I. Afiliación del Trabajador (P1)</div>
    <div class="data-grid">
        <div>Paciente: <span class="val" id="r_paciente">---</span></div>
        <div>Cédula: <span class="val" id="r_ci">---</span></div>
        <div>Edad: <span class="val" id="r_edad">---</span></div>
        <div>Sexo: <span class="val" id="r_sexo">---</span></div>
        <div>Nacimiento: <span class="val" id="r_nac">---</span></div>
        <div>Teléfono: <span class="val" id="r_tel">---</span></div>
        <div>Profesión: <span class="val" id="r_profesion">---</span></div>
        <div>Código: <span class="val" id="r_cod">---</span></div>
    </div>

    <div class="section-title">II. Antecedentes Patológicos (P2)</div>
    <div class="data-grid" id="grid_p2"></div>

    <div class="section-title">III. Hábitos y Estilos de Vida (P3)</div>
    <div class="data-grid" id="grid_p3"></div>
</div>

<script>
    const API = 'https://historial-clinico-nube.onrender.com';
    const fields_p2 = ["vista","auditivo","respiratorio","cardio","digestivos","sangre","genitourinario","sistema_nervioso","psiquiatricos","osteomusculares","reumatologicos","dermatologicas","alergias","cirugias","infecciones","acc_personales","acc_trabajo","medicamentos","endocrino","familiares","otros_especificos","generales"];
    const fields_p3 = ["fuma","fuma_cantidad","alcohol","alcohol_frecuencia","drogas","drogas_tipo","coca","deporte","deporte_detalle","grupo_sanguineo","historia_laboral","riesgos_expuestos","observaciones"];

    window.onload = async () => {
        const p_id = localStorage.getItem('p_id_reporte');
        if (!p_id) return;
        
        try {
            const resp = await fetch(`${API}/api/paciente-completo/${p_id}`);
            const data = await resp.json();
            
            const p = data.paciente;
            const f1 = data.filiacion || {};
            const ant = data.antecedentes || {};
            const hab = data.habitos || {};

            document.getElementById('r_paciente').innerText = `${p.nombre || ''} ${p.apellido || ''}`;
            document.getElementById('r_ci').innerText = p.ci || '---';
            document.getElementById('r_edad').innerText = f1.edad || '---';
            document.getElementById('r_sexo').innerText = f1.sexo || '---';
            document.getElementById('r_nac').innerText = f1.fecha_nacimiento || '---';
            document.getElementById('r_tel').innerText = f1.telefono || '---';
            document.getElementById('r_profesion').innerText = f1.profesion_oficio || '---';
            document.getElementById('r_cod').innerText = p.codigo_paciente || '---';

            const containerP2 = document.getElementById('grid_p2');
            containerP2.innerHTML = fields_p2.map(f => `
                <div>${f.toUpperCase()}: <span class="val">${ant[f] || 'SIN HALLAZGOS'}</span></div>
            `).join('');

            const containerP3 = document.getElementById('grid_p3');
            containerP3.innerHTML = fields_p3.map(f => `
                <div>${f.replace('_',' ').toUpperCase()}: <span class="val">${hab[f] || '---'}</span></div>
            `).join('');

        } catch (e) {
            console.error("Error:", e);
        }
    }
</script>
</body>
</html>
