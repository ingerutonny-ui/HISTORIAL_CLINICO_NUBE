<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2 - ANTECEDENTES | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde: #27ae60; --oscuro: #2c3e50; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; }
        .container { max-width: 900px; margin-top: 20px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .barra-paciente { background: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 5px solid var(--verde); display: flex; justify-content: space-between; margin-bottom: 25px; font-weight: 600; }
        .section-tag { background: #e8f5e9; color: var(--oscuro); padding: 5px 15px; border-radius: 4px; font-weight: bold; margin: 20px 0 10px; display: inline-block; width: 100%; border-bottom: 2px solid var(--verde); }
        .form-control { text-transform: uppercase; font-size: 0.8rem; border-radius: 5px; }
        .form-control:focus { border-color: var(--verde); box-shadow: 0 0 0 0.2rem rgba(39, 174, 96, 0.25); }
        .btn-enviar { background: var(--verde); color: white; width: 100%; padding: 15px; border: none; font-weight: bold; border-radius: 8px; margin-top: 25px; cursor: pointer; }
        .btn-enviar:disabled { background: #bdc3c7; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold m-0 text-success">2. ANTECEDENTES PATOLÓGICOS (P2)</h4>
        <button type="button" class="btn btn-outline-success btn-sm" onclick="llenarNormal()">✅ TODO NORMAL</button>
    </div>

    <div class="barra-paciente">
        <span>PACIENTE: <span id="v_nombre" class="text-primary">---</span></span>
        <span>CI: <span id="v_ci">---</span></span>
        <span>CÓDIGO: <span id="v_codigo" class="text-success">---</span></span>
    </div>

    <form id="formP2">
        <div class="section-tag">SISTEMAS Y ÓRGANOS</div>
        <div class="row g-3">
            <div class="col-md-4"><label class="form-label">VISTA / OJOS</label><input type="text" id="vista" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">AUDITIVO / OÍDO</label><input type="text" id="auditivo" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">RESPIRATORIO</label><input type="text" id="respiratorio" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">CARDIOVASCULAR</label><input type="text" id="cardiovascular" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">DIGESTIVOS</label><input type="text" id="digestivos" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">SANGRE / LINFA</label><input type="text" id="sangre" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">GENITOURINARIO</label><input type="text" id="genitourinario" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">NERVIOSO</label><input type="text" id="nervioso" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">ENDOCRINO</label><input type="text" id="endocrino" class="form-control f-p2" required></div>
        </div>

        <div class="section-tag">CONDICIONES MÉDICAS</div>
        <div class="row g-3">
            <div class="col-md-4"><label class="form-label">PSIQUIÁTRICOS</label><input type="text" id="psiquiatricos" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">OSTEOMUSCULARES</label><input type="text" id="osteomusculares" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">REUMATOLÓGICOS</label><input type="text" id="reumatologicos" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">DERMATOLÓGICOS</label><input type="text" id="dermatologicos" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">ALERGIAS</label><input type="text" id="alergias" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">CIRUGÍAS</label><input type="text" id="cirugias" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">INFECCIONES</label><input type="text" id="infecciones" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">ACC. PERSONALES</label><input type="text" id="accidentes_personales" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">ACC. TRABAJO</label><input type="text" id="accidentes_trabajo" class="form-control f-p2" required></div>
        </div>

        <div class="section-tag">OTROS</div>
        <div class="row g-3">
            <div class="col-md-4"><label class="form-label">MEDICAMENTOS</label><input type="text" id="medicamentos" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">FAMILIARES</label><input type="text" id="familiares" class="form-control f-p2" required></div>
            <div class="col-md-4"><label class="form-label">OTROS / ESPECÍFICOS</label><input type="text" id="otros" class="form-control f-p2" required></div>
            <div class="col-md-12"><label class="form-label">OBSERVACIONES</label><textarea id="observaciones" class="form-control f-p2" rows="2" required></textarea></div>
        </div>

        <button type="submit" class="btn-enviar" id="btnEnv">💾 GUARDAR EN NUBE Y PASAR A P3</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const p_id = localStorage.getItem('p_id');

    function llenarNormal() {
        document.querySelectorAll('.f-p2').forEach(i => i.value = "SIN PARTICULAR");
    }

    window.onload = async () => {
        if(!p_id) return;
        try {
            const res = await fetch(`${API}/api/paciente-completo/${p_id}`);
            const d = await res.json();
            document.getElementById('v_nombre').innerText = `${d.paciente.nombre} ${d.paciente.apellido}`.toUpperCase();
            document.getElementById('v_ci').innerText = d.paciente.ci;
            document.getElementById('v_codigo').innerText = d.paciente.codigo_paciente || "S/C";
        } catch (e) {
            console.error("Error cargando datos del paciente");
        }
    };

    document.getElementById('formP2').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnv');
        btn.innerText = "⌛ ESCRIBIENDO EN DISCO PERSISTENTE...";
        btn.disabled = true;

        // Estructura exacta de 22 campos + ID
        const payload = {
            paciente_id: parseInt(p_id),
            vista: document.getElementById('vista').value.toUpperCase(),
            auditivo: document.getElementById('auditivo').value.toUpperCase(),
            respiratorio: document.getElementById('respiratorio').value.toUpperCase(),
            cardiovascular: document.getElementById('cardiovascular').value.toUpperCase(),
            digestivos: document.getElementById('digestivos').value.toUpperCase(),
            sangre: document.getElementById('sangre').value.toUpperCase(),
            genitourinario: document.getElementById('genitourinario').value.toUpperCase(),
            nervioso: document.getElementById('nervioso').value.toUpperCase(),
            endocrino: document.getElementById('endocrino').value.toUpperCase(),
            psiquiatricos: document.getElementById('psiquiatricos').value.toUpperCase(),
            osteomusculares: document.getElementById('osteomusculares').value.toUpperCase(),
            reumatologicos: document.getElementById('reumatologicos').value.toUpperCase(),
            dermatologicos: document.getElementById('dermatologicos').value.toUpperCase(),
            alergias: document.getElementById('alergias').value.toUpperCase(),
            cirugias: document.getElementById('cirugias').value.toUpperCase(),
            infecciones: document.getElementById('infecciones').value.toUpperCase(),
            accidentes_personales: document.getElementById('accidentes_personales').value.toUpperCase(),
            accidentes_trabajo: document.getElementById('accidentes_trabajo').value.toUpperCase(),
            medicamentos: document.getElementById('medicamentos').value.toUpperCase(),
            familiares: document.getElementById('familiares').value.toUpperCase(),
            otros: document.getElementById('otros').value.toUpperCase(),
            observaciones: document.getElementById('observaciones').value.toUpperCase()
        };

        try {
            const res = await fetch(`${API}/p2`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                location.href = "declaracion_jurada_p3.html";
            } else {
                throw new Error();
            }
        } catch (err) {
            alert("⚠️ CONEXIÓN INTERRUMPIDA: Render está procesando datos. Espere 5 segundos y presione Guardar de nuevo.");
            btn.disabled = false;
            btn.innerText = "💾 REINTENTAR GUARDADO";
        }
    };
</script>
</body>
</html>
