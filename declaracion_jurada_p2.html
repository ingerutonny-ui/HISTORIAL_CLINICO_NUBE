<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | ANTECEDENTES P2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e9ecef; font-family: sans-serif; }
        .container { max-width: 1000px; margin-top: 20px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-section { border-bottom: 2px solid #28a745; margin-bottom: 20px; padding-bottom: 10px; }
        .banner-paciente { background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px solid #dee2e6; margin-bottom: 20px; font-weight: bold; font-size: 0.9rem; }
        .section-title { background: #f1f3f5; padding: 8px; font-weight: bold; border-left: 5px solid #28a745; margin-top: 20px; text-transform: uppercase; font-size: 0.85rem; }
        label { font-weight: bold; font-size: 0.75rem; color: #495057; text-transform: uppercase; margin-top: 10px; display: block; }
        .form-control { text-transform: uppercase; font-size: 0.9rem; border-radius: 5px; }
        .btn-normal { font-size: 0.7rem; padding: 2px 8px; margin-bottom: 5px; }
        .btn-save { background: #28a745; color: white; font-weight: bold; width: 100%; padding: 15px; margin-top: 30px; border: none; border-radius: 10px; }
        .btn-save:hover { background: #218838; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section d-flex justify-content-between align-items-center">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" height="50">
        <h4 class="m-0">2. ANTECEDENTES PATOLÓGICOS (P2)</h4>
        <button class="btn btn-outline-secondary btn-sm" onclick="marcarTodoNormal()">✅ TODO NORMAL</button>
    </div>

    <div class="banner-paciente row">
        <div class="col-md-4">PACIENTE: <span id="p_nombre" class="text-primary">---</span></div>
        <div class="col-md-4">CI: <span id="p_ci" class="text-primary">---</span></div>
        <div class="col-md-4">CÓDIGO: <span id="p_codigo" class="text-primary">---</span></div>
    </div>

    <form id="formP2">
        <div class="section-title">Sistemas y Órganos</div>
        <div class="row">
            <div class="col-md-4">
                <label>Vista / Ojos</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setNormal('vista')">NORMAL</button>
                <input type="text" id="vista" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Oído / Audición</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setNormal('auditivo')">NORMAL</button>
                <input type="text" id="auditivo" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Respiratorio</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setNormal('respiratorio')">NORMAL</button>
                <input type="text" id="respiratorio" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Cardiovascular</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setNormal('cardio')">NORMAL</button>
                <input type="text" id="cardio" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Digestivos</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setNormal('digestivos')">NORMAL</button>
                <input type="text" id="digestivos" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Sangre / Linfa</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setNormal('sangre')">NORMAL</button>
                <input type="text" id="sangre" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Genitourinario</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setNormal('genitourinario')">NORMAL</button>
                <input type="text" id="genitourinario" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Sistema Nervioso</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setNormal('sistema_nervioso')">NORMAL</button>
                <input type="text" id="sistema_nervioso" class="form-control">
            </div>
            <div class="col-md-4">
                <label>Endocrino</label>
                <button type="button" class="btn btn-light btn-normal border" onclick="setNormal('endocrino')">NORMAL</button>
                <input type="text" id="endocrino" class="form-control">
            </div>
        </div>

        <div class="section-title">Condiciones Médicas y Quirúrgicas</div>
        <div class="row">
            <div class="col-md-4"><label>Psiquiátricos</label><input type="text" id="psiquiatricos" class="form-control"></div>
            <div class="col-md-4"><label>Osteomusculares</label><input type="text" id="osteomusculares" class="form-control"></div>
            <div class="col-md-4"><label>Reumatológicos</label><input type="text" id="reumatologicos" class="form-control"></div>
            <div class="col-md-4"><label>Dermatológicas</label><input type="text" id="dermatologicas" class="form-control"></div>
            <div class="col-md-4"><label>Alergias</label><input type="text" id="alergias" class="form-control"></div>
            <div class="col-md-4"><label>Cirugías</label><input type="text" id="cirugias" class="form-control"></div>
            <div class="col-md-4"><label>Infecciones</label><input type="text" id="infecciones" class="form-control"></div>
            <div class="col-md-4"><label>Accidentes Personales</label><input type="text" id="acc_personales" class="form-control"></div>
            <div class="col-md-4"><label>Accidentes Trabajo</label><input type="text" id="acc_trabajo" class="form-control"></div>
        </div>

        <div class="section-title">Medicamentos y Otros</div>
        <div class="row">
            <div class="col-md-4"><label>Medicamentos</label><input type="text" id="medicamentos" class="form-control"></div>
            <div class="col-md-4"><label>Familiares</label><input type="text" id="familiares" class="form-control"></div>
            <div class="col-md-4"><label>Otros / Específicos</label><input type="text" id="otros_especificos" class="form-control"></div>
            <div class="col-12"><label>Observaciones Generales</label><textarea id="generales" class="form-control"></textarea></div>
        </div>

        <button type="submit" class="btn-save">💾 GUARDAR Y CONTINUAR A PARTE 3</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const campos = ['vista','auditivo','respiratorio','cardio','digestivos','sangre','genitourinario','sistema_nervioso','psiquiatricos','osteomusculares','reumatologicos','dermatologicas','alergias','cirugias','infecciones','acc_personales','acc_trabajo','medicamentos','endocrino','familiares','otros_especificos','generales'];

    function setNormal(id) { document.getElementById(id).value = "SIN PARTICULAR"; }
    function marcarTodoNormal() { campos.forEach(c => { if(document.getElementById(c)) document.getElementById(c).value = "SIN PARTICULAR"; }); }

    window.onload = async () => {
        const p_id = localStorage.getItem('p_id');
        if (!p_id) { window.location.href = "registro_paciente.html"; return; }

        try {
            const res = await fetch(`${API}/api/paciente-completo/${p_id}`);
            const data = await res.json();
            document.getElementById('p_nombre').innerText = `${data.paciente.apellido} ${data.paciente.nombre}`;
            document.getElementById('p_ci').innerText = data.paciente.ci;
            document.getElementById('p_codigo').innerText = data.paciente.codigo_paciente;

            if (data.p2) {
                campos.forEach(c => { if(data.p2[c]) document.getElementById(c).value = data.p2[c]; });
            }
        } catch (e) { console.error("Error al cargar datos"); }
    };

    document.getElementById('formP2').onsubmit = async (e) => {
        e.preventDefault();
        const payload = { paciente_id: parseInt(localStorage.getItem('p_id')) };
        campos.forEach(c => { payload[c] = document.getElementById(c).value.toUpperCase(); });

        try {
            const r = await fetch(`${API}/p2/`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (r.ok) window.location.href = "declaracion_jurada_p3.html";
        } catch (err) { alert("Error de red"); }
    };
</script>
</body>
</html>
