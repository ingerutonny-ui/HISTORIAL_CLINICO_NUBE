<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2 - ANTECEDENTES | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde: #27ae60; --oscuro: #2c3e50; }
        body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; font-size: 0.8rem; }
        .container { max-width: 850px; margin-top: 15px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .barra-paciente { background: #f1f8f5; padding: 12px; border-radius: 8px; border: 1px solid #d1e7dd; display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; }
        .section-tag { background: #e9ecef; color: var(--oscuro); padding: 5px 12px; border-radius: 4px; font-weight: bold; margin: 15px 0 8px; display: block; border-bottom: 2px solid var(--verde); }
        .form-control { text-transform: uppercase; font-size: 0.75rem; height: 34px; border-radius: 5px; }
        .btn-enviar { background: var(--verde); color: white; width: 100%; padding: 14px; border: none; font-weight: bold; border-radius: 8px; margin-top: 20px; transition: 0.3s; }
        .btn-enviar:disabled { background: #95a5a6; cursor: wait; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h5 class="fw-bold m-0 text-success">2. ANTECEDENTES PATOLÓGICOS (P2)</h5>
        <button type="button" class="btn btn-sm btn-outline-success" onclick="llenarNormal()">✅ TODO NORMAL</button>
    </div>

    <div class="barra-paciente">
        <span>PACIENTE: <span id="v_nombre" class="text-primary">---</span></span>
        <span>CI: <span id="v_ci">---</span></span>
        <span>CÓDIGO: <span id="v_codigo" class="text-success">---</span></span>
    </div>

    <form id="formP2">
        <div class="section-tag">SISTEMAS Y ÓRGANOS</div>
        <div class="row g-2">
            <div class="col-md-4"><label>VISTA / OJOS</label><input type="text" id="vista" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>AUDITIVO / OÍDO</label><input type="text" id="auditivo" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>RESPIRATORIO</label><input type="text" id="respiratorio" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>CARDIOVASCULAR</label><input type="text" id="cardiovascular" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>DIGESTIVOS</label><input type="text" id="digestivos" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>SANGRE / LINFA</label><input type="text" id="sangre" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>GENITOURINARIO</label><input type="text" id="genitourinario" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>NERVIOSO</label><input type="text" id="nervioso" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>ENDOCRINO</label><input type="text" id="endocrino" class="form-control f-p2" required></div>
        </div>

        <div class="section-tag">CONDICIONES MÉDICAS</div>
        <div class="row g-2">
            <div class="col-md-4"><label>PSIQUIÁTRICOS</label><input type="text" id="psiquiatricos" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>OSTEOMUSCULARES</label><input type="text" id="osteomusculares" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>REUMATOLÓGICOS</label><input type="text" id="reumatologicos" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>DERMATOLÓGICOS</label><input type="text" id="dermatologicos" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>ALERGIAS</label><input type="text" id="alergias" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>CIRUGÍAS</label><input type="text" id="cirugias" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>INFECCIONES</label><input type="text" id="infecciones" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>ACC. PERSONALES</label><input type="text" id="accidentes_personales" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>ACC. TRABAJO</label><input type="text" id="accidentes_trabajo" class="form-control f-p2" required></div>
        </div>

        <div class="section-tag">OTROS</div>
        <div class="row g-2">
            <div class="col-md-4"><label>MEDICAMENTOS</label><input type="text" id="medicamentos" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>FAMILIARES</label><input type="text" id="familiares" class="form-control f-p2" required></div>
            <div class="col-md-4"><label>OTROS / ESPECÍFICOS</label><input type="text" id="otros" class="form-control f-p2" required></div>
            <div class="col-md-12"><label>OBSERVACIONES</label><textarea id="observaciones" class="form-control f-p2" rows="1" required></textarea></div>
        </div>

        <button type="submit" class="btn-enviar" id="btnEnv">💾 GUARDAR Y CONTINUAR (P3)</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const p_id = localStorage.getItem('p_id');

    function llenarNormal() {
        document.querySelectorAll('.f-p2').forEach(i => i.value = "SIN PARTICULAR");
    }

    window.onload = async () => {
        if(!p_id) return;
        try {
            const res = await fetch(`${API}/api/paciente-completo/${p_id}`);
            const d = await res.json();
            document.getElementById('v_nombre').innerText = `${d.paciente.nombre} ${d.paciente.apellido}`.toUpperCase();
            document.getElementById('v_ci').innerText = d.paciente.ci;
            document.getElementById('v_codigo').innerText = d.paciente.codigo_paciente || "S/C";
        } catch (e) { console.error("Error al cargar paciente"); }
    };

    document.getElementById('formP2').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnv');
        btn.innerText = "⌛ ESCRIBIENDO EN DISCO PERSISTENTE...";
        btn.disabled = true;

        const payload = {
            paciente_id: parseInt(p_id),
            vista: document.getElementById('vista').value.trim().toUpperCase(),
            auditivo: document.getElementById('auditivo').value.trim().toUpperCase(),
            respiratorio: document.getElementById('respiratorio').value.trim().toUpperCase(),
            cardiovascular: document.getElementById('cardiovascular').value.trim().toUpperCase(),
            digestivos: document.getElementById('digestivos').value.trim().toUpperCase(),
            sangre: document.getElementById('sangre').value.trim().toUpperCase(),
            genitourinario: document.getElementById('genitourinario').value.trim().toUpperCase(),
            nervioso: document.getElementById('nervioso').value.trim().toUpperCase(),
            endocrino: document.getElementById('endocrino').value.trim().toUpperCase(),
            psiquiatricos: document.getElementById('psiquiatricos').value.trim().toUpperCase(),
            osteomusculares: document.getElementById('osteomusculares').value.trim().toUpperCase(),
            reumatologicos: document.getElementById('reumatologicos').value.trim().toUpperCase(),
            dermatologicos: document.getElementById('dermatologicos').value.trim().toUpperCase(),
            alergias: document.getElementById('alergias').value.trim().toUpperCase(),
            cirugias: document.getElementById('cirugias').value.trim().toUpperCase(),
            infecciones: document.getElementById('infecciones').value.trim().toUpperCase(),
            accidentes_personales: document.getElementById('accidentes_personales').value.trim().toUpperCase(),
            accidentes_trabajo: document.getElementById('accidentes_trabajo').value.trim().toUpperCase(),
            medicamentos: document.getElementById('medicamentos').value.trim().toUpperCase(),
            familiares: document.getElementById('familiares').value.trim().toUpperCase(),
            otros: document.getElementById('otros').value.trim().toUpperCase(),
            observaciones: document.getElementById('observaciones').value.trim().toUpperCase()
        };

        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 segundos de espera

            const res = await fetch(`${API}/p2`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                signal: controller.signal
            });

            clearTimeout(timeoutId);

            if (res.ok) {
                location.href = "declaracion_jurada_p3.html";
            } else {
                throw new Error();
            }
        } catch (err) {
            btn.disabled = false;
            btn.innerText = "💾 REINTENTAR GUARDADO";
            alert("⚠️ AVISO: El servidor está saturado. Espere 3 segundos y presione 'REINTENTAR' para forzar el registro.");
        }
    };
</script>
</body>
</html>
