<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2 - ANTECEDENTES PATOLÓGICOS | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 1000px; margin-top: 20px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .section-title { color: #1e4d2b; border-left: 5px solid #28a745; padding-left: 15px; margin: 20px 0; font-weight: bold; text-transform: uppercase; font-size: 1rem; }
        .form-control { text-transform: uppercase; border-radius: 8px; font-size: 0.85rem; }
        .btn-save { background: #28a745; color: white; font-weight: bold; width: 100%; padding: 15px; border-radius: 10px; border: none; margin-top: 20px; }
        .btn-normal { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; font-weight: bold; font-size: 0.8rem; }
        .banner-paciente { background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-weight: bold; font-size: 0.9rem; }
        label { font-size: 0.7rem; font-weight: bold; color: #555; margin-bottom: 2px; display: block; }
        .badge-codigo { background: #fff3cd; color: #856404; padding: 5px 10px; border-radius: 5px; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="Logo" height="40">
        <div class="d-flex gap-2 align-items-center">
            <button type="button" class="btn btn-normal" onclick="llenarTodoNormal()">✅ TODO NORMAL</button>
            <div class="banner-paciente text-primary" id="info_p">CARGANDO...</div>
        </div>
    </div>

    <form id="formP2">
        <h5 class="section-title">SISTEMAS Y ÓRGANOS</h5>
        <div class="row g-3">
            <div class="col-md-4"><label>VISTA / OJOS</label><input type="text" id="vista" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>OÍDO / AUDICIÓN</label><input type="text" id="auditivo" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>RESPIRATORIO</label><input type="text" id="respiratorio" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>CARDIOVASCULAR</label><input type="text" id="cardiovascular" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>DIGESTIVOS</label><input type="text" id="digestivos" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>SANGRE / LINFA</label><input type="text" id="sangre" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>GENITOURINARIO</label><input type="text" id="genitourinario" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>SISTEMA NERVIOSO</label><input type="text" id="nervioso" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>ENDOCRINO</label><input type="text" id="endocrino" class="form-control campo-p2"></div>
        </div>

        <h5 class="section-title">CONDICIONES MÉDICAS Y QUIRÚRGICAS</h5>
        <div class="row g-3">
            <div class="col-md-4"><label>PSIQUIÁTRICOS</label><input type="text" id="psiquiatricos" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>OSTEOMUSCULARES</label><input type="text" id="osteomusculares" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>REUMATOLÓGICOS</label><input type="text" id="reumatologicos" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>DERMATOLÓGICOS</label><input type="text" id="dermatologicos" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>ALERGIAS</label><input type="text" id="alergias" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>CIRUGÍAS</label><input type="text" id="cirugias" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>INFECCIONES</label><input type="text" id="infecciones" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>ACCIDENTES PERSONALES</label><input type="text" id="accidentes_personales" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>ACCIDENTES TRABAJO</label><input type="text" id="accidentes_trabajo" class="form-control campo-p2"></div>
        </div>

        <h5 class="section-title">MEDICAMENTOS Y OTROS</h5>
        <div class="row g-3">
            <div class="col-md-4"><label>MEDICAMENTOS</label><input type="text" id="medicamentos" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>FAMILIARES</label><input type="text" id="familiares" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>OTROS / ESPECÍFICOS</label><input type="text" id="otros" class="form-control campo-p2"></div>
            <div class="col-md-12"><label>OBSERVACIONES GENERALES</label><textarea id="observaciones" class="form-control campo-p2" rows="2"></textarea></div>
        </div>

        <button type="submit" class="btn-save" id="btnGuardar">💾 GUARDAR Y CONTINUAR A PARTE 3</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const p_id = localStorage.getItem('p_id');

    // Función para llenar todo de golpe (Lo que pediste Inge)
    function llenarTodoNormal() {
        document.querySelectorAll('.campo-p2').forEach(input => {
            input.value = "SIN PARTICULAR";
        });
    }

    window.onload = async () => {
        if(!p_id) { location.href="registro_paciente.html"; return; }
        try {
            const res = await fetch(`${API}/api/paciente-completo/${p_id}`);
            const d = await res.json();
            // Aquí forzamos que muestre el código generado
            document.getElementById('info_p').innerHTML = `
                PACIENTE: <span class="text-uppercase">${d.paciente.nombre} ${d.paciente.apellido}</span> | 
                CÓDIGO: <span class="badge-codigo">${d.paciente.codigo || 'S/C'}</span>`;
        } catch (e) { console.error("Error al cargar datos"); }
    };

    document.getElementById('formP2').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnGuardar');
        btn.innerText = "⌛ GUARDANDO...";

        const payload = {
            paciente_id: p_id,
            vista: document.getElementById('vista').value.toUpperCase() || "SIN PARTICULAR",
            auditivo: document.getElementById('auditivo').value.toUpperCase() || "SIN PARTICULAR",
            respiratorio: document.getElementById('respiratorio').value.toUpperCase() || "SIN PARTICULAR",
            cardiovascular: document.getElementById('cardiovascular').value.toUpperCase() || "SIN PARTICULAR",
            digestivos: document.getElementById('digestivos').value.toUpperCase() || "SIN PARTICULAR",
            sangre: document.getElementById('sangre').value.toUpperCase() || "SIN PARTICULAR",
            genitourinario: document.getElementById('genitourinario').value.toUpperCase() || "SIN PARTICULAR",
            nervioso: document.getElementById('nervioso').value.toUpperCase() || "SIN PARTICULAR",
            endocrino: document.getElementById('endocrino').value.toUpperCase() || "SIN PARTICULAR",
            psiquiatricos: document.getElementById('psiquiatricos').value.toUpperCase() || "SIN PARTICULAR",
            osteomusculares: document.getElementById('osteomusculares').value.toUpperCase() || "SIN PARTICULAR",
            reumatologicos: document.getElementById('reumatologicos').value.toUpperCase() || "SIN PARTICULAR",
            dermatologicos: document.getElementById('dermatologicos').value.toUpperCase() || "SIN PARTICULAR",
            alergias: document.getElementById('alergias').value.toUpperCase() || "SIN PARTICULAR",
            cirugias: document.getElementById('cirugias').value.toUpperCase() || "SIN PARTICULAR",
            infecciones: document.getElementById('infecciones').value.toUpperCase() || "SIN PARTICULAR",
            accidentes_personales: document.getElementById('accidentes_personales').value.toUpperCase() || "SIN PARTICULAR",
            accidentes_trabajo: document.getElementById('accidentes_trabajo').value.toUpperCase() || "SIN PARTICULAR",
            medicamentos: document.getElementById('medicamentos').value.toUpperCase() || "SIN PARTICULAR",
            familiares: document.getElementById('familiares').value.toUpperCase() || "SIN PARTICULAR",
            otros: document.getElementById('otros').value.toUpperCase() || "SIN PARTICULAR",
            observaciones: document.getElementById('observaciones').value.toUpperCase() || "SIN PARTICULAR"
        };

        try {
            const res = await fetch(`${API}/p2/`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if(res.ok) { location.href = "declaracion_jurada_p3.html"; }
            else { alert("Error al guardar. Reintenta."); btn.innerText = "💾 GUARDAR Y CONTINUAR A PARTE 3"; }
        } catch (err) { alert("Error de conexión"); btn.innerText = "💾 GUARDAR Y CONTINUAR A PARTE 3"; }
    };
</script>
</body>
</html>
