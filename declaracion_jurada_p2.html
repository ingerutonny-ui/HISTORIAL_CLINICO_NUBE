<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2 - ANTECEDENTES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --verde-esmeralda: #2ecc71; --verde-boton: #27ae60; --fondo-claro: #f4f7f6; }
        body { background: var(--fondo-claro); font-family: 'Segoe UI', sans-serif; font-size: 0.75rem; overflow-x: hidden; }
        .container { max-width: 900px; background: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 5px; }
        .logo-header { text-align: left; margin-bottom: 5px; }
        .logo-header img { max-height: 50px; }
        .paciente-header { background: #e8f8f5; padding: 8px 15px; border-radius: 6px; margin-bottom: 12px; border-left: 5px solid var(--verde-esmeralda); font-weight: bold; font-size: 0.8rem; }
        .section-title { background: #f8f9fa; padding: 5px 10px; font-weight: bold; margin-top: 10px; margin-bottom: 8px; border-bottom: 2px solid var(--verde-esmeralda); color: #2c3e50; font-size: 0.75rem; }
        .form-control { text-transform: uppercase; font-size: 0.75rem; height: 30px; border: 1px solid #dcdde1; padding: 2px 8px; }
        label { font-weight: 600; color: #57606f; margin-bottom: 2px; display: block; font-size: 0.7rem; }
        .btn-guardar { background-color: var(--verde-boton); color: white; width: 100%; padding: 10px; font-weight: bold; border: none; border-radius: 6px; margin-top: 15px; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
        .btn-guardar:hover { background-color: #1e8449; }
        .text-codigo { color: #27ae60; font-family: 'Courier New', monospace; font-weight: 800; }
        .row.g-2 > div { margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-header">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="Logo">
    </div>

    <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="fw-bold m-0" style="color: #1b5e20;">II. ANTECEDENTES PATOLÓGICOS (P2)</h6>
        <button type="button" class="btn btn-xs btn-outline-success" style="font-size: 0.7rem; padding: 2px 5px;" onclick="marcarNormal()">✅ TODO NORMAL</button>
    </div>

    <div class="paciente-header d-flex justify-content-between align-items-center">
        <div>PACIENTE: <span id="v_nombre" class="text-primary">...</span></div>
        <div>CÓDIGO: <span id="v_codigo" class="text-codigo">---</span></div>
    </div>

    <form id="formP2">
        <div class="section-title">SISTEMAS Y ÓRGANOS</div>
        <div class="row g-2">
            <div class="col-md-4"><label>VISTA / OJOS</label><input type="text" id="vista" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>OÍDO / AUDICIÓN</label><input type="text" id="auditivo" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>RESPIRATORIO</label><input type="text" id="respiratorio" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>CARDIOVASCULAR</label><input type="text" id="cardiovascular" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>DIGESTIVOS</label><input type="text" id="digestivos" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>SANGRE / LINFA</label><input type="text" id="sangre" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>GENITOURINARIO</label><input type="text" id="genitourinario" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>SISTEMA NERVIOSO</label><input type="text" id="nervioso" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>ENDOCRINO</label><input type="text" id="endocrino" class="form-control f-campo" required></div>
        </div>

        <div class="section-title">CONDICIONES MÉDICAS Y QUIRÚRGICAS</div>
        <div class="row g-2">
            <div class="col-md-4"><label>PSIQUIÁTRICOS</label><input type="text" id="psiquiatricos" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>OSTEOMUSCULARES</label><input type="text" id="osteomusculares" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>REUMATOLÓGICOS</label><input type="text" id="reumatologicos" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>DERMATOLÓGICOS</label><input type="text" id="dermatologicos" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>ALERGIAS</label><input type="text" id="alergias" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>CIRUGÍAS</label><input type="text" id="cirugias" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>INFECCIONES</label><input type="text" id="infecciones" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>ACC. PERSONALES</label><input type="text" id="accidentes_personales" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>ACC. TRABAJO</label><input type="text" id="accidentes_trabajo" class="form-control f-campo" required></div>
        </div>

        <div class="section-title">MEDICAMENTOS Y OTROS</div>
        <div class="row g-2">
            <div class="col-md-4"><label>MEDICAMENTOS</label><input type="text" id="medicamentos" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>FAMILIARES</label><input type="text" id="familiares" class="form-control f-campo" required></div>
            <div class="col-md-4"><label>OTROS / ESPECÍFICOS</label><input type="text" id="otros" class="form-control f-campo" required></div>
            <div class="col-md-12"><label>OBSERVACIONES</label><textarea id="observaciones" class="form-control f-campo" style="height: 40px;" required></textarea></div>
        </div>

        <button type="submit" class="btn-guardar" id="btnAccion">💾 SIGUIENTE (HÁBITOS P3)</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const p_id = localStorage.getItem('p_id');

    function marcarNormal() {
        document.querySelectorAll('.f-campo').forEach(i => i.value = "SIN PARTICULAR");
    }

    window.onload = async () => {
        if (!p_id) return;
        try {
            const res = await fetch(`${API}/api/paciente-completo/${p_id}`);
            const d = await res.json();
            document.getElementById('v_nombre').innerText = `${d.paciente.nombre} ${d.paciente.apellido}`.toUpperCase();
            document.getElementById('v_codigo').innerText = d.paciente.codigo_paciente || d.paciente.codigo || 'S/C';
        } catch (e) { console.error("Error:", e); }
    };

    document.getElementById('formP2').onsubmit = (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnAccion');
        btn.innerText = "⏳ PROCESANDO...";
        btn.disabled = true;

        // RECOLECCIÓN LOCAL (No enviamos al servidor todavía)
        const datosP2 = {};
        document.querySelectorAll('.f-campo').forEach(i => datosP2[i.id] = i.value.toUpperCase());
        
        // Guardamos en la memoria del navegador
        localStorage.setItem('datos_temporales_p2', JSON.stringify(datosP2));

        // Saltamos directamente a P3
        location.href = "declaracion_jurada_p3.html";
    };
</script>
</body>
</html>
