<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | ANTECEDENTES (2/3)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --ohs-cyan: #00a0a5; --ohs-green: #22c55e; --dark: #1e293b; }
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; padding: 10px; }
        
        .form-container { 
            max-width: 1300px; margin: 10px auto; background: white; padding: 30px; 
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }

        .header-ohs { 
            display: flex; align-items: center; justify-content: space-between; 
            border-bottom: 3px solid var(--ohs-cyan); padding-bottom: 15px; margin-bottom: 20px; 
            flex-wrap: wrap; gap: 10px;
        }

        .title-center h2 { font-size: 1.4rem; font-weight: 800; color: var(--dark); text-transform: uppercase; margin: 0; }

        /* Banner de Paciente Responsivo */
        .data-banner { 
            background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px; 
            display: flex; justify-content: space-around; font-size: 13px; font-weight: 800; 
            border: 1px solid #e2e8f0; color: var(--dark); text-transform: uppercase; flex-wrap: wrap; gap: 10px;
        }

        .btn-fill { 
            background: transparent; color: var(--ohs-cyan); border: 2px solid var(--ohs-cyan); 
            padding: 10px; border-radius: 10px; font-size: 11px; font-weight: 800; 
            margin-bottom: 20px; transition: 0.3s; width: 100%; text-transform: uppercase;
        }
        .btn-fill:hover { background: var(--ohs-cyan); color: white; }

        /* Grilla Responsiva: 3 col PC, 2 col Tablet, 1 col Móvil */
        .grid-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        @media (max-width: 992px) { .grid-layout { grid-template-columns: repeat(2, 1fr); } }
        
        @media (max-width: 600px) { 
            .grid-layout { grid-template-columns: 1fr; } 
            .field-card { flex-direction: column; align-items: flex-start; gap: 8px; }
            .select-yn { width: 100%; }
            .input-det { width: 100%; margin-left: 0; }
            .header-ohs { justify-content: center; text-align: center; }
            .title-center { width: 100%; }
        }

        .field-card { 
            display: flex; align-items: center; background: white; padding: 12px; 
            border-radius: 12px; border: 1px solid #cbd5e1; transition: 0.2s;
        }
        .field-card:hover { border-color: var(--ohs-cyan); box-shadow: 0 4px 12px rgba(0,160,165,0.1); }

        .label-text { font-size: 10px; font-weight: 800; color: #64748b; flex: 1.2; text-transform: uppercase; }
        .select-yn { width: 65px; font-size: 12px; border: 2px solid var(--ohs-green); border-radius: 8px; padding: 5px; font-weight: 700; color: var(--dark); }
        .input-det { flex: 2; font-size: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-left: 10px; text-transform: uppercase; padding: 8px; font-weight: 600; }

        .btn-next { 
            background: var(--ohs-green); color: white; border: none; padding: 20px; 
            border-radius: 15px; width: 100%; font-weight: 800; text-transform: uppercase; 
            margin-top: 30px; font-size: 15px; transition: 0.3s; cursor: pointer;
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.2);
        }
        .btn-next:hover { background: #16a34a; transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-ohs">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" height="45">
        <div class="title-center"><h2>2. ANTECEDENTES PATOLÓGICOS</h2></div>
        <div style="font-size: 10px; font-weight: 800; color: #94a3b8;">PARTE 2 / 3</div>
    </div>

    <div class="data-banner">
        <div>PACIENTE: <span id="b_paciente">---</span></div>
        <div>CÓDIGO: <span id="b_codigo">---</span></div>
    </div>

    <button type="button" class="btn-fill" onclick="llenarTodoNormal()">✨ MARCAR TODO COMO "NORMAL" (AUTO-COMPLETADO)</button>

    <form id="formP2">
        <div id="gridWrapper" class="grid-layout"></div>
        <button type="submit" id="btnS" class="btn-next">💾 CONTINUAR A PARTE 3 (HÁBITOS)</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const fields = [
        {id:"vista", n:"1. VISTA"}, {id:"auditivo", n:"2. AUDITIVO"}, {id:"respiratorio", n:"3. RESPIRATORIO"},
        {id:"cardio", n:"4. CARDIOVASCULARES"}, {id:"digestivos", n:"5. DIGESTIVOS"}, {id:"sangre", n:"6. SANGRE"},
        {id:"genitourinario", n:"7. GENITOURINARIO"}, {id:"sistema_nervioso", n:"8. SISTEMA NERVIOSO"},
        {id:"psiquiatricos", n:"9. PSIQUIÁTRICOS"}, {id:"osteomusculares", n:"10. OSTEOMUSCULARES"},
        {id:"reumatologicos", n:"11. REUMATOLÓGICOS"}, {id:"dermatologicas", n:"12. DERMATOLÓGICAS"},
        {id:"alergias", n:"13. ALERGIAS"}, {id:"cirugias", n:"14. CIRUGÍAS"}, {id:"infecciones", n:"15. INFECCIONES"},
        {id:"acc_personales", n:"16. ACCIDENTES PERS."}, {id:"acc_trabajo", n:"17. ACCIDENTES TRABAJO"},
        {id:"medicamentos", n:"18. MEDICAMENTOS"}, {id:"endocrino", n:"19. ENDOCRINO"},
        {id:"familiares", n:"20. ANTECEDENTES FAM."}, {id:"otros_especificos", n:"21. OTROS ESPECÍFICOS"},
        {id:"generales", n:"22. GENERALES"}
    ];

    document.getElementById('gridWrapper').innerHTML = fields.map(f => `
        <div class="field-card">
            <span class="label-text">${f.n}</span>
            <select class="select-yn" id="s_${f.id}" onchange="cambioInput('${f.id}')">
                <option value="NO">NO</option>
                <option value="SI">SI</option>
            </select>
            <input type="text" class="input-det" id="d_${f.id}" value="NORMAL" oninput="this.value=this.value.toUpperCase()">
        </div>`).join('');

    function cambioInput(id) {
        const sel = document.getElementById(`s_${id}`);
        const inp = document.getElementById(`d_${id}`);
        if(sel.value === 'NO') { 
            inp.value = 'NORMAL'; 
            inp.style.color = "#94a3b8"; 
        } else { 
            if(inp.value === 'NORMAL') inp.value = ''; 
            inp.style.color = "#1e293b"; 
            inp.focus(); 
        }
    }

    function llenarTodoNormal() {
        fields.forEach(f => {
            document.getElementById(`s_${f.id}`).value = "NO";
            const inp = document.getElementById(`d_${f.id}`);
            inp.value = "NORMAL";
            inp.style.color = "#94a3b8";
        });
    }

    window.onload = async () => {
        const id_p = localStorage.getItem('p_id');
        if (!id_p) return;
        try {
            const resp = await fetch(`${API}/api/paciente-completo/${id_p}`);
            const data = await resp.json();
            if (data.paciente) {
                document.getElementById('b_paciente').innerText = `${data.paciente.apellido} ${data.paciente.nombre}`;
                document.getElementById('b_codigo').innerText = data.paciente.codigo_paciente;
            }
        } catch (err) { console.error(err); }
    };

    document.getElementById('formP2').onsubmit = (e) => {
        e.preventDefault();
        const dataP2 = {};
        fields.forEach(f => {
            const isSi = document.getElementById(`s_${f.id}`).value === "SI";
            dataP2[f.id] = isSi ? document.getElementById(`d_${f.id}`).value.toUpperCase() : "NORMAL";
        });
        localStorage.setItem('temp_p2', JSON.stringify(dataP2));
        window.location.href = "declaracion_jurada_p3.html";
    };
</script>
</body>
</html>
