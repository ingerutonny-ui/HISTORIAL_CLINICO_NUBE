<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2 - ANTECEDENTES PATOLÓGICOS | OHS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { max-width: 1000px; margin-top: 20px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* Encabezado y Datos del Paciente */
        .header-clinico { border-bottom: 2px solid #28a745; margin-bottom: 20px; padding-bottom: 10px; }
        .panel-paciente { background: #eef2f7; padding: 15px; border-radius: 8px; border: 1px solid #d1d9e6; margin-bottom: 15px; }
        .info-label { font-size: 0.75rem; color: #666; text-transform: uppercase; font-weight: bold; }
        .info-value { font-size: 1rem; color: #1e4d2b; font-weight: bold; }
        
        /* Botón Todo Normal (Ubicación solicitada) */
        .btn-normal-control { background: #28a745; color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-normal-control:hover { background: #218838; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

        .section-title { background: #f1f1f1; padding: 8px 15px; border-radius: 5px; color: #1e4d2b; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; margin: 25px 0 15px 0; border-left: 5px solid #28a745; }
        .form-control { text-transform: uppercase; border-radius: 6px; font-size: 0.85rem; border: 1px solid #ced4da; padding: 8px; }
        .form-control:focus { border-color: #28a745; box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25); }
        label { font-size: 0.75rem; font-weight: bold; color: #444; margin-bottom: 3px; display: block; }
        
        .btn-save { background: #1e4d2b; color: white; font-weight: bold; width: 100%; padding: 15px; border-radius: 8px; border: none; margin-top: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-save:hover { background: #15361e; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-clinico d-flex justify-content-between align-items-center">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="Logo" height="45">
        <h4 class="mb-0 fw-bold" style="color: #1e4d2b;">ANTECEDENTES PATOLÓGICOS (P2)</h4>
    </div>

    <div class="panel-paciente">
        <div class="row text-center align-items-center">
            <div class="col-md-5">
                <div class="info-label">Paciente:</div>
                <div class="info-value text-uppercase" id="p_nombre">---</div>
            </div>
            <div class="col-md-3">
                <div class="info-label">Cédula:</div>
                <div class="info-value" id="p_ci">---</div>
            </div>
            <div class="col-md-4">
                <div class="info-label">Código Generado:</div>
                <div class="info-value text-danger" id="p_codigo">---</div>
            </div>
            <div class="col-12">
                <button type="button" class="btn-normal-control" onclick="llenarTodoNormal()">✅ CLIC AQUÍ PARA LLENADO RÁPIDO: "SIN PARTICULAR"</button>
            </div>
        </div>
    </div>

    <form id="formP2">
        <div class="section-title">SISTEMAS Y ÓRGANOS</div>
        <div class="row g-3">
            <div class="col-md-4"><label>VISTA / OJOS</label><input type="text" id="vista" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>OÍDO / AUDICIÓN</label><input type="text" id="auditivo" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>RESPIRATORIO</label><input type="text" id="respiratorio" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>CARDIOVASCULAR</label><input type="text" id="cardiovascular" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>DIGESTIVOS</label><input type="text" id="digestivos" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>SANGRE / LINFA</label><input type="text" id="sangre" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>GENITOURINARIO</label><input type="text" id="genitourinario" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>SISTEMA NERVIOSO</label><input type="text" id="nervioso" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>ENDOCRINO</label><input type="text" id="endocrino" class="form-control campo-p2"></div>
        </div>

        <div class="section-title">CONDICIONES MÉDICAS Y QUIRÚRGICAS</div>
        <div class="row g-3">
            <div class="col-md-4"><label>PSIQUIÁTRICOS</label><input type="text" id="psiquiatricos" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>OSTEOMUSCULARES</label><input type="text" id="osteomusculares" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>REUMATOLÓGICOS</label><input type="text" id="reumatologicos" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>DERMATOLÓGICOS</label><input type="text" id="dermatologicos" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>ALERGIAS</label><input type="text" id="alergias" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>CIRUGÍAS</label><input type="text" id="cirugias" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>INFECCIONES</label><input type="text" id="infecciones" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>ACCIDENTES PERSONALES</label><input type="text" id="accidentes_personales" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>ACCIDENTES TRABAJO</label><input type="text" id="accidentes_trabajo" class="form-control campo-p2"></div>
        </div>

        <div class="section-title">MEDICAMENTOS Y OTROS</div>
        <div class="row g-3">
            <div class="col-md-4"><label>MEDICAMENTOS</label><input type="text" id="medicamentos" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>FAMILIARES</label><input type="text" id="familiares" class="form-control campo-p2"></div>
            <div class="col-md-4"><label>OTROS / ESPECÍFICOS</label><input type="text" id="otros" class="form-control campo-p2"></div>
            <div class="col-md-12"><label>OBSERVACIONES GENERALES</label><textarea id="observaciones" class="form-control campo-p2" rows="2"></textarea></div>
        </div>

        <button type="submit" class="btn-save" id="btnGuardar">💾 GUARDAR Y CONTINUAR A PARTE 3</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';
    const p_id = localStorage.getItem('p_id');

    function llenarTodoNormal() {
        document.querySelectorAll('.campo-p2').forEach(input => {
            input.value = "SIN PARTICULAR";
        });
    }

    window.onload = async () => {
        if(!p_id) { location.href="registro_paciente.html"; return; }
        try {
            const res = await fetch(`${API}/api/paciente-completo/${p_id}`);
            const d = await res.json();
            document.getElementById('p_nombre').innerText = `${d.paciente.nombre} ${d.paciente.apellido}`;
            document.getElementById('p_ci').innerText = d.paciente.ci;
            document.getElementById('p_codigo').innerText = d.paciente.codigo || 'GENERANDO...';
        } catch (e) { console.error("Error al cargar datos del paciente"); }
    };

    document.getElementById('formP2').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnGuardar');
        btn.innerText = "⌛ PROCESANDO ENVÍO...";
        btn.disabled = true;

        const payload = {};
        document.querySelectorAll('.campo-p2').forEach(el => {
            payload[el.id] = el.value.toUpperCase() || "SIN PARTICULAR";
        });
        payload.paciente_id = p_id;

        try {
            const res = await fetch(`${API}/p2/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if(res.ok) { 
                location.href = "declaracion_jurada_p3.html"; 
            } else { 
                const error = await res.json();
                alert("ERROR EN EL SERVIDOR: " + JSON.stringify(error)); 
                btn.innerText = "💾 GUARDAR Y CONTINUAR A PARTE 3";
                btn.disabled = false;
            }
        } catch (err) { 
            alert("ERROR DE CONEXIÓN: No se pudo contactar con el servidor."); 
            btn.innerText = "💾 GUARDAR Y CONTINUAR A PARTE 3";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
