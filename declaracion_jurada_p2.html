<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | ANTECEDENTES (2/3)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; padding: 10px; }
        .form-container { max-width: 950px; margin: 15px auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); }
        .header-ohs { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #3b82f6; padding-bottom: 15px; margin-bottom: 20px; }
        .title-center h2 { font-size: 1.2rem; font-weight: 800; color: #1e293b; text-transform: uppercase; margin: 0; }
        .data-banner { background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-around; border: 1px solid #e2e8f0; }
        .data-item { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .data-val { color: #1e293b; font-weight: 900; display: block; font-size: 13px; }
        .section-title { background: #eff6ff; color: #1e40af; padding: 10px 15px; border-radius: 10px; font-weight: 800; font-size: 14px; margin: 20px 0 15px 0; text-transform: uppercase; border-left: 5px solid #3b82f6; }
        .label-custom { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .form-control { border-radius: 12px; padding: 12px; font-size: 14px; text-transform: uppercase; background: #fdfdfd; border: 2px solid #f1f5f9; font-weight: 600; }
        .form-control:focus { border-color: #3b82f6; box-shadow: none; }
        .btn-next { background: #3b82f6; color: white; border: none; padding: 20px; border-radius: 15px; width: 100%; font-weight: 800; text-transform: uppercase; margin-top: 25px; font-size: 16px; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); transition: 0.3s; }
        .btn-next:hover { background: #2563eb; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header-ohs">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" height="50">
        <div class="title-center"><h2>2. Antecedentes Patológicos</h2></div>
        <div id="modo-indicador" style="font-size: 10px; font-weight: 800; color: #3b82f6;">CARGANDO...</div>
    </div>

    <div class="data-banner shadow-sm">
        <div class="data-item">PACIENTE: <span id="p_nombre" class="data-val">---</span></div>
        <div class="data-item">CI: <span id="p_ci" class="data-val">---</span></div>
        <div class="data-item">CÓDIGO: <span id="p_codigo" class="data-val">---</span></div>
    </div>

    <form id="formP2" class="row g-3">
        <div class="section-title">Sistemas y Órganos</div>
        <div class="col-12 col-md-4"><label class="label-custom">Vista / Ojos</label><input type="text" id="vista" class="form-control"></div>
        <div class="col-12 col-md-4"><label class="label-custom">Oído / Audición</label><input type="text" id="auditivo" class="form-control"></div>
        <div class="col-12 col-md-4"><label class="label-custom">Respiratorio</label><input type="text" id="respiratorio" class="form-control"></div>
        <div class="col-12 col-md-4"><label class="label-custom">Cardiovascular</label><input type="text" id="cardio" class="form-control"></div>
        <div class="col-12 col-md-4"><label class="label-custom">Digestivos</label><input type="text" id="digestivos" class="form-control"></div>
        <div class="col-12 col-md-4"><label class="label-custom">Sangre / Linfa</label><input type="text" id="sangre" class="form-control"></div>
        <div class="col-12 col-md-4"><label class="label-custom">Genitourinario</label><input type="text" id="genitourinario" class="form-control"></div>
        <div class="col-12 col-md-4"><label class="label-custom">Sistema Nervioso</label><input type="text" id="sistema_nervioso" class="form-control"></div>
        <div class="col-12 col-md-4"><label class="label-custom">Endocrino</label><input type="text" id="endocrino" class="form-control"></div>

        <div class="section-title">Condiciones Médicas Específicas</div>
        <div class="col-12 col-md-4"><label class="label-custom">Psiquiátricos</label><input type="text" id="psiquiatricos" class="form-control"></div>
        <div class="col-12 col-md-4"><label class="label-custom">Osteomusculares</label><input type="text" id="osteomusculares" class="form-control"></div>
        <div class="col-12 col-md-4"><label class="label-custom">Reumatológicos</label><input type="text" id="reumatologicos" class="form-control"></div>
        <div class="col-12 col-md-4"><label class="label-custom">Dermatológicas (Piel)</label><input type="text" id="dermatologicas" class="form-control"></div>
        <div class="col-12 col-md-4"><label class="label-custom">Alergias</label><input type="text" id="alergias" class="form-control"></div>
        <div class="col-12 col-md-4"><label class="label-custom">Infecciones / Transmisibles</label><input type="text" id="infecciones" class="form-control"></div>

        <div class="section-title">Historial Quirúrgico y Accidentes</div>
        <div class="col-12 col-md-6"><label class="label-custom">Cirugías Realizadas</label><input type="text" id="cirugias" class="form-control"></div>
        <div class="col-12 col-md-6"><label class="label-custom">Accidentes Personales</label><input type="text" id="acc_personales" class="form-control"></div>
        <div class="col-12 col-md-6"><label class="label-custom">Accidentes de Trabajo</label><input type="text" id="acc_trabajo" class="form-control"></div>
        <div class="col-12 col-md-6"><label class="label-custom">Medicamentos en Uso</label><input type="text" id="medicamentos" class="form-control"></div>

        <div class="section-title">Otros</div>
        <div class="col-12 col-md-6"><label class="label-custom">Antecedentes Familiares</label><input type="text" id="familiares" class="form-control"></div>
        <div class="col-12 col-md-6"><label class="label-custom">Otros / Específicos</label><input type="text" id="otros_especificos" class="form-control"></div>
        <div class="col-12"><label class="label-custom">Observaciones Generales</label><textarea id="generales" class="form-control" rows="2"></textarea></div>

        <button type="submit" id="btnNext" class="btn-next">💾 Guardar y Continuar a Parte 3</button>
    </form>
</div>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';

    window.onload = async () => {
        const id_trabajo = localStorage.getItem('p_id_edicion') || localStorage.getItem('p_id');
        if (!id_trabajo) { window.location.href = "lista_historial.html"; return; }

        try {
            const resp = await fetch(`${API}/api/paciente-completo/${id_trabajo}`);
            const data = await resp.json();
            
            document.getElementById('p_nombre').innerText = `${data.paciente.apellido} ${data.paciente.nombre}`;
            document.getElementById('p_ci').innerText = data.paciente.ci;
            document.getElementById('p_codigo').innerText = data.paciente.codigo_paciente;
            document.getElementById('modo-indicador').innerText = "REGISTRO ACTIVO";

            if (data.p2 && data.p2.paciente_id) {
                const campos = ['vista','auditivo','respiratorio','cardio','digestivos','sangre','genitourinario','sistema_nervioso','psiquiatricos','osteomusculares','reumatologicos','dermatologicas','alergias','cirugias','infecciones','acc_personales','acc_trabajo','medicamentos','endocrino','familiares','otros_especificos','generales'];
                campos.forEach(c => { if(data.p2[c]) document.getElementById(c).value = data.p2[c]; });
            }
        } catch (err) { console.error(err); }
    };

    document.getElementById('formP2').onsubmit = async (e) => {
        e.preventDefault();
        const id_trabajo = localStorage.getItem('p_id_edicion') || localStorage.getItem('p_id');
        const btn = document.getElementById('btnNext');
        btn.innerText = "⏳ GUARDANDO...";
        btn.disabled = true;

        const payload = {
            paciente_id: parseInt(id_trabajo),
            vista: document.getElementById('vista').value.toUpperCase(),
            auditivo: document.getElementById('auditivo').value.toUpperCase(),
            respiratorio: document.getElementById('respiratorio').value.toUpperCase(),
            cardio: document.getElementById('cardio').value.toUpperCase(),
            digestivos: document.getElementById('digestivos').value.toUpperCase(),
            sangre: document.getElementById('sangre').value.toUpperCase(),
            genitourinario: document.getElementById('genitourinario').value.toUpperCase(),
            sistema_nervioso: document.getElementById('sistema_nervioso').value.toUpperCase(),
            psiquiatricos: document.getElementById('psiquiatricos').value.toUpperCase(),
            osteomusculares: document.getElementById('osteomusculares').value.toUpperCase(),
            reumatologicos: document.getElementById('reumatologicos').value.toUpperCase(),
            dermatologicas: document.getElementById('dermatologicas').value.toUpperCase(),
            alergias: document.getElementById('alergias').value.toUpperCase(),
            cirugias: document.getElementById('cirugias').value.toUpperCase(),
            infecciones: document.getElementById('infecciones').value.toUpperCase(),
            acc_personales: document.getElementById('acc_personales').value.toUpperCase(),
            acc_trabajo: document.getElementById('acc_trabajo').value.toUpperCase(),
            medicamentos: document.getElementById('medicamentos').value.toUpperCase(),
            endocrino: document.getElementById('endocrino').value.toUpperCase(),
            familiares: document.getElementById('familiares').value.toUpperCase(),
            otros_especificos: document.getElementById('otros_especificos').value.toUpperCase(),
            generales: document.getElementById('generales').value.toUpperCase()
        };

        try {
            const r = await fetch(`${API}/p2/`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(r.ok) window.location.href = "declaracion_jurada_p3.html";
            else alert("Error al guardar P2");
        } catch(e) { alert("Error de conexión"); }
        finally { btn.disabled = false; btn.innerText = "💾 Guardar y Continuar a Parte 3"; }
    };
</script>
</body>
</html>
