<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | REGISTRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .top-bar { width: 100%; background: #212529; padding: 12px 20px; color: white; display: flex; align-items: center; font-size: 13px; font-weight: 800; text-transform: uppercase; box-sizing: border-box; }
        .top-bar a { color: white; text-decoration: none; cursor: pointer; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; margin-top: 40px; box-sizing: border-box; }
        
        /* LOGO AGRANDADO */
        .logo-img { height: 100px; margin-bottom: 20px; width: auto; }
        
        h2 { color: #1e293b; font-size: 1.6rem; margin-bottom: 35px; text-transform: uppercase; font-weight: 900; letter-spacing: -0.5px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 12px; font-weight: 800; color: #475569; text-transform: uppercase; margin-left: 5px; }
        input { width: 100%; padding: 15px; margin-top: 8px; border: 2px solid #e2e8f0; border-radius: 14px; box-sizing: border-box; font-size: 16px; font-weight: 700; text-transform: uppercase; color: #1e293b; background: #f8fafc; transition: 0.3s; }
        input:focus { border-color: #2ecc71; outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.1); }
        
        .codigo-box { background: #f0f7ff; border: 2.5px dashed #0044ff; border-radius: 18px; padding: 25px; margin: 30px 0; }
        .cod-text { font-size: 11px; color: #0044ff; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; }
        #display-codigo { font-size: 3.5rem; font-weight: 900; color: #0044ff; letter-spacing: 3px; }
        
        /* BOTÓN VERDE ESMERALDA CORREGIDO */
        .btn-guardar { width: 100%; background: #2ecc71; color: white; border: none; padding: 20px; border-radius: 14px; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; text-transform: uppercase; box-shadow: 0 6px 15px rgba(46, 204, 113, 0.3); }
        .btn-guardar:hover { background: #27ae60; transform: translateY(-2px); }
        .btn-guardar:disabled { background: #2ecc71; opacity: 0.8; cursor: wait; }

        .btn-consultar { background: #007bff; color: white; border: none; padding: 16px 40px; border-radius: 10px; font-weight: 800; margin-top: 30px; cursor: pointer; font-size: 16px; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="top-bar"><a href="index.html">← VOLVER AL MENÚ PRINCIPAL</a></div>
<div class="card">
    <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img">
    <h2>REGISTRO DE PACIENTE</h2>
    <div class="input-group"><label>Nombres Completos</label><input type="text" id="nombre" placeholder="EJ. JUAN CARLOS" oninput="generarCodigo()"></div>
    <div class="input-group"><label>Apellidos Paterno/Materno</label><input type="text" id="apellido" placeholder="EJ. LUNA" oninput="generarCodigo()"></div>
    <div class="input-group"><label>Cédula de Identidad (CI)</label><input type="number" id="ci" placeholder="EJ. 48751487" oninput="generarCodigo()"></div>
    <div class="codigo-box"><div class="cod-text">CÓDIGO GENERADO</div><div id="display-codigo">----</div></div>
    <button id="btnFinal" class="btn-guardar" onclick="enviarDatos()">💾 GUARDAR Y EMPEZAR P1</button>
</div>
<button class="btn-consultar" onclick="location.href='lista_historial.html'">CONSULTAR BASE DE DATOS</button>

<script>
    const API_URL = 'https://historial-clinico-936s.onrender.com';

    function generarCodigo() {
        const nom = document.getElementById('nombre').value.trim().toUpperCase();
        const ape = document.getElementById('apellido').value.trim().toUpperCase();
        const ciVal = document.getElementById('ci').value.trim();
        const display = document.getElementById('display-codigo');

        if (nom && ape && ciVal.length >= 4) {
            const codigo = nom[0] + ape[0] + ciVal.slice(-4);
            display.innerText = codigo; return codigo;
        } else if (nom && ape && ciVal) {
            const codigo = nom[0] + ape[0] + ciVal;
            display.innerText = codigo; return codigo;
        }
        display.innerText = "----"; return "";
    }

    async function enviarDatos() {
        const codigo = generarCodigo();
        if (!codigo) { alert("⚠️ POR FAVOR, LLENE TODOS LOS CAMPOS."); return; }

        const btn = document.getElementById('btnFinal');
        btn.innerText = "⏳ ENVIANDO...";
        btn.disabled = true;

        const p = {
            nombre: document.getElementById('nombre').value.toUpperCase(),
            apellido: document.getElementById('apellido').value.toUpperCase(),
            ci: document.getElementById('ci').value,
            codigo_paciente: codigo
        };

        try {
            const res = await fetch(`${API_URL}/pacientes/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(p)
            });

            if (res.ok) {
                const data = await res.json();
                // Persistencia para que P1 cargue los datos automáticamente
                localStorage.setItem('p_id', data.id);
                localStorage.setItem('p_nom', `${data.apellido} ${data.nombre}`);
                localStorage.setItem('p_ci', data.ci);
                localStorage.setItem('p_cod', data.codigo_paciente);
                window.location.href = 'declaracion_jurada_p1.html';
            } else {
                throw new Error();
            }
        } catch (e) {
            // SALVAVIDAS: Si el servidor falla, igual pasamos a P1 con los datos ingresados
            localStorage.setItem('p_nom', `${p.apellido} ${p.nombre}`);
            localStorage.setItem('p_ci', p.ci);
            localStorage.setItem('p_cod', codigo);
            window.location.href = 'declaracion_jurada_p1.html';
        }
    }
</script>
</body>
</html>
