<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | REGISTRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .top-bar { width: 100%; background: #212529; padding: 10px 20px; color: white; display: flex; align-items: center; font-size: 11px; font-weight: 800; text-transform: uppercase; box-sizing: border-box; }
        .top-bar a { color: white; text-decoration: none; }
        
        /* CARD RESPONSIVA */
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 90%; max-width: 420px; text-align: center; margin: 20px 0; box-sizing: border-box; }
        
        /* LOGO GRANDE Y PROPORCIONAL */
        .logo-container { width: 100%; margin-bottom: 15px; display: flex; justify-content: center; }
        .logo-img { width: 140px; height: auto; display: block; }
        
        h2 { color: #1e293b; font-size: 1.4rem; margin-bottom: 20px; text-transform: uppercase; font-weight: 900; letter-spacing: -0.5px; }
        
        /* CELDAS EQUILIBRADAS */
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-left: 5px; }
        
        input { width: 100%; padding: 12px 15px; margin-top: 5px; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 15px; font-weight: 700; text-transform: uppercase; color: #1e293b; background: #f8fafc; transition: 0.3s; }
        input:focus { border-color: #2ecc71; outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.1); }
        
        /* PLACEHOLDERS CON TINTE LEGIBLE */
        input::placeholder { color: #94a3b8; font-weight: 600; text-transform: none; }
        
        /* CÓDIGO VERDE ESMERALDA OHS */
        .codigo-box { background: #f0fff4; border: 2.5px dashed #2ecc71; border-radius: 15px; padding: 15px; margin: 20px 0; }
        .cod-text { font-size: 10px; color: #27ae60; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; }
        #display-codigo { font-size: 2.8rem; font-weight: 900; color: #2ecc71; letter-spacing: 3px; }
        
        /* BOTÓN ESMERALDA */
        .btn-guardar { width: 100%; background: #2ecc71; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.2); }
        .btn-guardar:hover { background: #27ae60; transform: translateY(-1px); }

        .btn-consultar { background: #007bff; color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: 800; margin-bottom: 30px; cursor: pointer; font-size: 14px; text-transform: uppercase; }

        /* AJUSTE PARA MÓVILES PEQUEÑOS */
        @media (max-height: 700px) {
            .card { margin: 10px 0; padding: 15px 25px; }
            .logo-img { width: 110px; }
            h2 { font-size: 1.1rem; margin-bottom: 10px; }
            .input-group { margin-bottom: 10px; }
            #display-codigo { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
<div class="top-bar"><a href="index.html">← VOLVER AL MENÚ PRINCIPAL</a></div>

<div class="card">
    <div class="logo-container">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img" alt="Logo OHS">
    </div>
    <h2>REGISTRO DE PACIENTE</h2>
    
    <div class="input-group">
        <label>Nombres Completos</label>
        <input type="text" id="nombre" placeholder="Ej. Elmer" oninput="generarCodigo()">
    </div>
    
    <div class="input-group">
        <label>Apellidos Paterno/Materno</label>
        <input type="text" id="apellido" placeholder="Ej. Hermosa" oninput="generarCodigo()">
    </div>
    
    <div class="input-group">
        <label>Cédula de Identidad (CI)</label>
        <input type="number" id="ci" placeholder="Ej. 2543253" oninput="generarCodigo()">
    </div>
    
    <div class="codigo-box">
        <div class="cod-text">CÓDIGO GENERADO</div>
        <div id="display-codigo">----</div>
    </div>
    
    <button id="btnFinal" class="btn-guardar" onclick="enviarDatos()">💾 GUARDAR REGISTRO FINAL</button>
</div>

<button class="btn-consultar" onclick="location.href='lista_historial.html'">CONSULTAR BASE DE DATOS</button>

<script>
    function generarCodigo() {
        const nom = document.getElementById('nombre').value.trim().toUpperCase();
        const ape = document.getElementById('apellido').value.trim().toUpperCase();
        const ciVal = document.getElementById('ci').value.trim();
        const display = document.getElementById('display-codigo');

        if (nom && ape && ciVal.length >= 4) {
            const codigo = nom[0] + ape[0] + ciVal.slice(-4);
            display.innerText = codigo; return codigo;
        } else if (nom && ape && ciVal) {
            const codigo = nom[0] + ape[0] + ciVal;
            display.innerText = codigo; return codigo;
        }
        display.innerText = "----"; return "";
    }

    function enviarDatos() {
        console.log("Esperando para arreglar el botón.");
    }
</script>
</body>
</html>
