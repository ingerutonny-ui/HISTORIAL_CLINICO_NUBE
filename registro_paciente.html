<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | REGISTRO</title>
    <style>
        /* RESET PARA PANTALLA COMPLETA */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        .top-bar { width: 100%; background: #212529; padding: 6px 15px; color: white; display: flex; align-items: center; font-size: 10px; font-weight: 800; text-transform: uppercase; box-sizing: border-box; }
        .top-bar a { color: white; text-decoration: none; }
        
        /* CARD COMPACTA */
        .card { background: white; padding: 15px 25px; border-radius: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); width: 92%; max-width: 380px; text-align: center; margin-top: 10px; box-sizing: border-box; }
        
        /* LOGO GRANDE REAL */
        .logo-container { height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        .logo-img { height: 100%; width: auto; object-fit: contain; }
        
        h2 { color: #1e293b; font-size: 1.1rem; margin: 5px 0 15px 0; text-transform: uppercase; font-weight: 900; letter-spacing: -0.5px; }
        
        /* CELDAS UNIDAS */
        .input-group { text-align: left; margin-bottom: 8px; }
        label { font-size: 9px; font-weight: 800; color: #475569; text-transform: uppercase; margin-left: 2px; }
        
        input { width: 100%; padding: 8px 12px; margin-top: 2px; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 13px; font-weight: 700; text-transform: uppercase; color: #1e293b; background: #f8fafc; transition: 0.2s; }
        input:focus { border-color: #2ecc71; outline: none; background: #fff; }
        
        /* PLACEHOLDERS EQUILIBRADOS */
        input::placeholder { color: #cbd5e1; font-weight: 500; text-transform: none; }
        
        /* CÓDIGO VERDE ESMERALDA */
        .codigo-box { background: #f0fff4; border: 2px dashed #2ecc71; border-radius: 10px; padding: 8px; margin: 10px 0; }
        .cod-text { font-size: 8px; color: #27ae60; text-transform: uppercase; font-weight: 800; margin-bottom: 0px; }
        #display-codigo { font-size: 2rem; font-weight: 900; color: #2ecc71; letter-spacing: 2px; line-height: 1; }
        
        /* BOTONES */
        .btn-guardar { width: 100%; background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 900; font-size: 13px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.2); }
        .btn-guardar:hover { background: #27ae60; }

        .btn-consultar { background: #007bff; color: white; border: none; padding: 8px 20px; border-radius: 8px; font-weight: 800; margin-top: 10px; cursor: pointer; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="top-bar"><a href="index.html">← VOLVER AL MENÚ PRINCIPAL</a></div>

<div class="card">
    <div class="logo-container">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img">
    </div>
    <h2>REGISTRO DE PACIENTE</h2>
    
    <div class="input-group">
        <label>Nombres Completos</label>
        <input type="text" id="nombre" placeholder="Ej. Elmer" oninput="generarCodigo()">
    </div>
    
    <div class="input-group">
        <label>Apellidos Paterno/Materno</label>
        <input type="text" id="apellido" placeholder="Ej. Hermosa" oninput="generarCodigo()">
    </div>
    
    <div class="input-group">
        <label>Cédula de Identidad (CI)</label>
        <input type="number" id="ci" placeholder="Ej. 2543253" oninput="generarCodigo()">
    </div>
    
    <div class="codigo-box">
        <div class="cod-text">CÓDIGO GENERADO</div>
        <div id="display-codigo">----</div>
    </div>
    
    <button id="btnFinal" class="btn-guardar" onclick="enviarDatos()">💾 GUARDAR REGISTRO FINAL</button>
</div>

<button class="btn-consultar" onclick="location.href='lista_historial.html'">CONSULTAR BASE DE DATOS</button>

<script>
    const API_URL = 'https://historial-clinico-936s.onrender.com';

    function generarCodigo() {
        const nom = document.getElementById('nombre').value.trim().toUpperCase();
        const ape = document.getElementById('apellido').value.trim().toUpperCase();
        const ciVal = document.getElementById('ci').value.trim();
        const display = document.getElementById('display-codigo');

        if (nom && ape && ciVal.length >= 4) {
            const codigo = nom[0] + ape[0] + ciVal.slice(-4);
            display.innerText = codigo; return codigo;
        } else if (nom && ape && ciVal) {
            const codigo = nom[0] + ape[0] + ciVal;
            display.innerText = codigo; return codigo;
        }
        display.innerText = "----"; return "";
    }

    async function enviarDatos() {
        const codigo = generarCodigo();
        if (!codigo) { alert("⚠️ COMPLETE TODOS LOS CAMPOS."); return; }

        const btn = document.getElementById('btnFinal');
        btn.innerText = "⏳ PROCESANDO...";
        btn.disabled = true;

        const datos = {
            nombre: document.getElementById('nombre').value.toUpperCase(),
            apellido: document.getElementById('apellido').value.toUpperCase(),
            ci: document.getElementById('ci').value,
            codigo_paciente: codigo
        };

        try {
            const res = await fetch(`${API_URL}/pacientes/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            if (res.ok) {
                const paciente = await res.json();
                localStorage.setItem('p_id', paciente.id);
                localStorage.setItem('p_nom', `${paciente.apellido} ${paciente.nombre}`);
                localStorage.setItem('p_ci', paciente.ci);
                localStorage.setItem('p_cod', paciente.codigo_paciente);
                window.location.href = 'declaracion_jurada_p1.html';
            } else {
                throw new Error();
            }
        } catch (e) {
            alert("❌ ERROR DE CONEXIÓN.");
            btn.innerText = "💾 GUARDAR REGISTRO FINAL";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
