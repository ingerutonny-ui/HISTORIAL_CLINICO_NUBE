<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | REGISTRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .top-bar { width: 100%; background: #212529; padding: 12px 20px; color: white; display: flex; align-items: center; font-size: 13px; font-weight: 800; text-transform: uppercase; box-sizing: border-box; }
        .top-bar a { color: white; text-decoration: none; cursor: pointer; }
        .card { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: calc(100% - 30px); max-width: 480px; text-align: center; margin-top: 30px; box-sizing: border-box; }
        .logo-img { height: 50px; margin-bottom: 10px; }
        h2 { color: #1e293b; font-size: 1.5rem; margin-bottom: 30px; text-transform: uppercase; font-weight: 900; letter-spacing: -0.5px; }
        .input-group { text-align: left; margin-bottom: 18px; }
        label { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-left: 2px; }
        input { width: 100%; padding: 14px; margin-top: 6px; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 16px; font-weight: 700; text-transform: uppercase; color: #1e293b; background: #f8fafc; }
        input:focus { border-color: #22c55e; outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1); }
        .codigo-box { background: #f0f7ff; border: 2px dashed #0044ff; border-radius: 15px; padding: 20px; margin: 25px 0; }
        .cod-text { font-size: 10px; color: #0044ff; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; }
        #display-codigo { font-size: 3rem; font-weight: 900; color: #0044ff; letter-spacing: 2px; }
        .btn-guardar { width: 100%; background: #2ecc71; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2); }
        .btn-consultar { background: #007bff; color: white; border: none; padding: 14px 35px; border-radius: 8px; font-weight: 800; margin-top: 25px; cursor: pointer; font-size: 15px; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="top-bar"><a href="index.html">← VOLVER AL MENÚ PRINCIPAL</a></div>
<div class="card">
    <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img">
    <h2>REGISTRO DE PACIENTE</h2>
    <div class="input-group"><label>Nombres Completos</label><input type="text" id="nombre" placeholder="NOMBRES" oninput="generarCodigo()"></div>
    <div class="input-group"><label>Apellidos Paterno/Materno</label><input type="text" id="apellido" placeholder="APELLIDOS" oninput="generarCodigo()"></div>
    <div class="input-group"><label>Cédula de Identidad (CI)</label><input type="number" id="ci" placeholder="C.I." oninput="generarCodigo()"></div>
    <div class="codigo-box"><div class="cod-text">CÓDIGO GENERADO</div><div id="id_cod">----</div></div>
    <button id="btnFinal" class="btn-guardar" onclick="enviarDatos()">💾 GUARDAR EN BASE DE DATOS</button>
</div>
<button class="btn-consultar" onclick="location.href='lista_historial.html'">CONSULTAR BASE DE DATOS</button>

<script>
    const API = 'https://historial-clinico-936s.onrender.com';

    function generarCodigo() {
        const n = document.getElementById('nombre').value.trim().toUpperCase();
        const a = document.getElementById('apellido').value.trim().toUpperCase();
        const c = document.getElementById('ci').value.trim();
        const d = document.getElementById('id_cod');
        if (n && a && c) {
            const cod = n[0] + a[0] + c.slice(-4);
            d.innerText = cod; return cod;
        }
        d.innerText = "----"; return "";
    }

    async function enviarDatos() {
        const cod = generarCodigo();
        if (!cod) { alert("ERROR: LLENE TODOS LOS CAMPOS."); return; }
        
        const btn = document.getElementById('btnFinal');
        btn.innerText = "⏳ ENVIANDO A DB...";
        btn.disabled = true;

        const payload = {
            nombre: document.getElementById('nombre').value.toUpperCase(),
            apellido: document.getElementById('apellido').value.toUpperCase(),
            ci: document.getElementById('ci').value,
            codigo_paciente: cod
        };

        try {
            const res = await fetch(`${API}/pacientes/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("✅ GUARDADO EXITOSO EN LA NUBE.");
                window.location.href = 'declaracion_jurada_p1.html';
            } else {
                throw new Error();
            }
        } catch (e) {
            alert("❌ ERROR CRÍTICO: NO SE PUDO GUARDAR EN EL BACKEND.");
            btn.innerText = "💾 GUARDAR EN BASE DE DATOS";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
