<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | REGISTRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .top-bar { width: 100%; background: #212529; padding: 12px 20px; color: white; display: flex; align-items: center; font-size: 11px; font-weight: 800; text-transform: uppercase; box-sizing: border-box; }
        .top-bar a { color: white; text-decoration: none; }
        .card { background: white; padding: 35px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); width: 90%; max-width: 440px; text-align: center; margin: 25px 0; box-sizing: border-box; }
        .logo-container { width: 100%; margin-bottom: 20px; display: flex; justify-content: center; }
        .logo-img { width: 150px; height: auto; display: block; }
        h2 { color: #1e293b; font-size: 1.5rem; margin-bottom: 25px; text-transform: uppercase; font-weight: 900; letter-spacing: -0.5px; }
        .input-group { text-align: left; margin-bottom: 18px; }
        label { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-left: 5px; }
        input { width: 100%; padding: 14px 18px; margin-top: 6px; border: 2px solid #e2e8f0; border-radius: 14px; box-sizing: border-box; font-size: 16px; font-weight: 700; text-transform: uppercase; color: #1e293b; background: #f8fafc; }
        input::placeholder { color: #8ea2b9; font-weight: 600; text-transform: none; }
        .codigo-box { background: #f0fff4; border: 2.5px dashed #2ecc71; border-radius: 18px; padding: 18px; margin: 25px 0; }
        #display-codigo { font-size: 3.2rem; font-weight: 900; color: #2ecc71; letter-spacing: 4px; line-height: 1; }
        .btn-guardar { width: 100%; background: #2ecc71; color: white; border: none; padding: 18px; border-radius: 14px; font-weight: 900; font-size: 17px; cursor: pointer; text-transform: uppercase; }
        .btn-guardar:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-consultar { background: #007bff; color: white; border: none; padding: 14px 35px; border-radius: 12px; font-weight: 800; margin-bottom: 40px; cursor: pointer; font-size: 14px; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="top-bar"><a href="index.html">← VOLVER AL MENÚ PRINCIPAL</a></div>
<div class="card">
    <div class="logo-container"><img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img"></div>
    <h2>REGISTRO DE PACIENTE</h2>
    <div class="input-group"><label>Nombres Completos</label><input type="text" id="nombre" placeholder="Ej. Rosa" oninput="generarCodigo()"></div>
    <div class="input-group"><label>Apellidos Paterno/Materno</label><input type="text" id="apellido" placeholder="Ej. Laura" oninput="generarCodigo()"></div>
    <div class="input-group"><label>Cédula de Identidad (CI)</label><input type="number" id="ci" placeholder="Ej. 1234" oninput="generarCodigo()"></div>
    <div class="codigo-box"><div id="display-codigo">----</div></div>
    <button id="btnFinal" class="btn-guardar" onclick="enviarDatos()">💾 GUARDAR REGISTRO FINAL</button>
</div>
<button class="btn-consultar" onclick="location.href='lista_historial.html'">CONSULTAR BASE DE DATOS</button>

<script>
    const API_URL = 'https://historial-clinico-936s.onrender.com';

    function generarCodigo() {
        const nom = document.getElementById('nombre').value.trim().toUpperCase();
        const ape = document.getElementById('apellido').value.trim().toUpperCase();
        const ciVal = document.getElementById('ci').value.trim();
        const display = document.getElementById('display-codigo');
        if (nom && ape && ciVal) {
            const codigo = nom[0] + ape[0] + (ciVal.length >= 4 ? ciVal.slice(-4) : ciVal);
            display.innerText = codigo; return codigo;
        }
        display.innerText = "----"; return "";
    }

    async function enviarDatos() {
        const codigo = generarCodigo();
        if (!codigo) { alert("⚠️ COMPLETE TODOS LOS CAMPOS."); return; }

        const btn = document.getElementById('btnFinal');
        btn.innerText = "⏳ ENVIANDO A DB...";
        btn.disabled = true;

        const datos = {
            nombre: document.getElementById('nombre').value.trim().toUpperCase(),
            apellido: document.getElementById('apellido').value.trim().toUpperCase(),
            ci: document.getElementById('ci').value.trim(),
            codigo_paciente: codigo
        };

        try {
            // ENVÍO DIRECTO AL BACKEND EN LA NUBE
            const response = await fetch(`${API_URL}/pacientes/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            if (response.ok) {
                // Éxito: Registro directo en PostgreSQL confirmado
                window.location.href = 'declaracion_jurada_p1.html';
            } else {
                const error = await response.json();
                alert(`❌ ERROR DB: ${error.detail || 'Fallo en la nube'}`);
                btn.innerText = "💾 GUARDAR REGISTRO FINAL";
                btn.disabled = false;
            }
        } catch (err) {
            alert("❌ ERROR DE RED: No se pudo alcanzar el servidor Render.");
            btn.innerText = "💾 GUARDAR REGISTRO FINAL";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
