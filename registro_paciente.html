<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | REGISTRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .top-bar { width: 100%; background: #212529; padding: 15px 20px; color: white; display: flex; align-items: center; box-sizing: border-box; }
        .top-bar a { color: #22c55e; text-decoration: none; font-weight: 800; }
        .main-wrapper { width: calc(100% - 30px); max-width: 500px; margin: 20px auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); text-align: center; box-sizing: border-box; }
        .logo-img { height: 60px; margin-bottom: 15px; }
        h2 { color: #1e293b; font-size: 1.4rem; margin-bottom: 25px; text-transform: uppercase; font-weight: 900; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 16px; font-weight: 700; text-transform: uppercase; box-sizing: border-box; }
        input:focus { border-color: #22c55e; outline: none; }
        .codigo-box { background: #f0f7ff; border: 2px dashed #0044ff; border-radius: 15px; padding: 20px; margin: 20px 0; }
        #display-codigo { font-size: 2.5rem; font-weight: 900; color: #0044ff; letter-spacing: 2px; }
        .btn-guardar { width: 100%; background: #22c55e; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="top-bar"><a href="index.html">← VOLVER</a></div>
<div class="main-wrapper">
    <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img">
    <h2>REGISTRO DE PACIENTE</h2>
    <div class="input-group"><label>Nombres</label><input type="text" id="nombre" oninput="generarCodigo()"></div>
    <div class="input-group"><label>Apellidos</label><input type="text" id="apellido" oninput="generarCodigo()"></div>
    <div class="input-group"><label>CI</label><input type="number" id="ci" oninput="generarCodigo()"></div>
    <div class="codigo-box"><div id="display-codigo">----</div></div>
    <button id="btnFinal" class="btn-guardar" onclick="enviarDatos()">💾 GUARDAR Y EMPEZAR P1</button>
</div>
<script>
    const API_URL = 'https://historial-clinico-936s.onrender.com';
    function generarCodigo() {
        const nom = document.getElementById('nombre').value.trim().toUpperCase();
        const ape = document.getElementById('apellido').value.trim().toUpperCase();
        const ci = document.getElementById('ci').value.trim();
        const display = document.getElementById('display-codigo');
        if(nom && ape && ci) {
            const cod = nom[0] + ape[0] + ci.slice(-4);
            display.innerText = cod; return cod;
        }
        display.innerText = "----"; return "";
    }
    async function enviarDatos() {
        const codigo = generarCodigo();
        if(!codigo) return alert("COMPLETE DATOS");
        const btn = document.getElementById('btnFinal');
        btn.disabled = true; btn.innerText = "GUARDANDO...";
        const datos = {
            nombre: document.getElementById('nombre').value.toUpperCase(),
            apellido: document.getElementById('apellido').value.toUpperCase(),
            ci: document.getElementById('ci').value,
            codigo_paciente: codigo
        };
        try {
            const res = await fetch(`${API_URL}/pacientes/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            if(res.ok) {
                const p = await res.json();
                localStorage.setItem('p_id', p.id);
                localStorage.setItem('p_nom', `${p.apellido} ${p.nombre}`);
                localStorage.setItem('p_ci', p.ci);
                localStorage.setItem('p_cod', p.codigo_paciente);
                window.location.href = 'declaracion_jurada_p1.html';
            }
        } catch(e) { alert("Error de conexión"); btn.disabled = false; }
    }
</script>
</body>
</html>
