<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | REGISTRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .top-bar { width: 100%; background: #212529; padding: 12px 20px; color: white; display: flex; align-items: center; font-size: 13px; font-weight: 800; text-transform: uppercase; box-sizing: border-box; }
        .top-bar a { color: white; text-decoration: none; cursor: pointer; }
        .card { background: white; padding: 35px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: calc(100% - 30px); max-width: 480px; text-align: center; margin-top: 30px; box-sizing: border-box; }
        .logo-img { height: 55px; margin-bottom: 15px; }
        h2 { color: #1e293b; font-size: 1.6rem; margin-bottom: 25px; text-transform: uppercase; font-weight: 900; }
        .input-group { text-align: left; margin-bottom: 18px; }
        label { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-left: 2px; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 15px; box-sizing: border-box; font-size: 16px; font-weight: 700; text-transform: uppercase; color: #1e293b; background: #fff; }
        input:focus { border-color: #22c55e; outline: none; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1); }
        .codigo-box { background: #f0f7ff; border: 2px dashed #0044ff; border-radius: 20px; padding: 25px; margin: 25px 0; }
        .cod-text { font-size: 10px; color: #0044ff; text-transform: uppercase; font-weight: 900; margin-bottom: 5px; }
        #display-codigo { font-size: 3.2rem; font-weight: 900; color: #0044ff; letter-spacing: 3px; }
        .btn-guardar { width: 100%; background: #2ecc71; color: white; border: none; padding: 20px; border-radius: 15px; font-weight: 900; font-size: 17px; cursor: pointer; text-transform: uppercase; box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3); transition: 0.3s; }
        .btn-guardar:hover { background: #27ae60; transform: translateY(-2px); }
        .btn-consultar { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 800; margin-top: 25px; cursor: pointer; font-size: 14px; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="top-bar"><a href="index.html">← VOLVER AL MENÚ PRINCIPAL</a></div>
<div class="card">
    <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img">
    <h2>REGISTRO DE PACIENTE</h2>
    <div class="input-group"><label>Nombres Completos</label><input type="text" id="nombre" placeholder="EJ. BEATRIZ" oninput="generarCodigo()"></div>
    <div class="input-group"><label>Apellidos Paterno/Materno</label><input type="text" id="apellido" placeholder="EJ. SILES" oninput="generarCodigo()"></div>
    <div class="input-group"><label>Cédula de Identidad (CI)</label><input type="number" id="ci" placeholder="EJ. 895794" oninput="generarCodigo()"></div>
    <div class="codigo-box"><div class="cod-text">CÓDIGO GENERADO</div><div id="display-codigo">----</div></div>
    <button id="btnSubmit" class="btn-guardar" onclick="enviarDatos()">💾 GUARDAR Y EMPEZAR P1</button>
</div>
<button class="btn-consultar" onclick="location.href='lista_historial.html'">CONSULTAR BASE DE DATOS</button>

<script>
    const API_URL = 'https://historial-clinico-936s.onrender.com';
    function generarCodigo() {
        const nom = document.getElementById('nombre').value.trim().toUpperCase();
        const ape = document.getElementById('apellido').value.trim().toUpperCase();
        const ciVal = document.getElementById('ci').value.trim();
        const display = document.getElementById('display-codigo');
        if (nom && ape && ciVal) {
            const codigo = nom[0] + ape[0] + ciVal.slice(-4);
            display.innerText = codigo; return codigo;
        }
        display.innerText = "----"; return "";
    }

    async function enviarDatos() {
        const codigo = generarCodigo();
        if (!codigo) { alert("⚠️ POR FAVOR, COMPLETE TODOS LOS CAMPOS."); return; }
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "⏳ PROCESANDO...";

        const datosPaciente = {
            nombre: document.getElementById('nombre').value.toUpperCase(),
            apellido: document.getElementById('apellido').value.toUpperCase(),
            ci: document.getElementById('ci').value,
            codigo_paciente: codigo
        };

        try {
            const response = await fetch(`${API_URL}/pacientes/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datosPaciente)
            });

            if (response.ok) {
                const paciente = await response.json();
                // PASO CLAVE: Solo guardamos ID y datos básicos para que P1 sepa qué "Filiación" llenar
                localStorage.setItem('p_id', paciente.id);
                localStorage.setItem('p_nom', `${paciente.apellido} ${paciente.nombre}`);
                localStorage.setItem('p_ci', paciente.ci);
                localStorage.setItem('p_cod', paciente.codigo_paciente);
                
                window.location.href = 'declaracion_jurada_p1.html';
            } else { alert("❌ ERROR AL GUARDAR EN BACKEND."); btn.disabled = false; btn.innerText = "💾 GUARDAR Y EMPEZAR P1"; }
        } catch (e) { alert("❌ FALLO DE CONEXIÓN CON EL SERVIDOR."); btn.disabled = false; btn.innerText = "💾 GUARDAR Y EMPEZAR P1"; }
    }
</script>
</body>
</html>
