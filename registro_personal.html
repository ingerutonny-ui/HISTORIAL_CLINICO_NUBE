<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO DE PERSONAL - OHS</title>
    <link rel="stylesheet" href="public/style.css"> <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; text-transform: uppercase; }
        .container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { border-bottom: 3px solid #2ecc71; margin-bottom: 25px; padding-bottom: 10px; display: flex; align-items: center; }
        .header img { height: 50px; margin-right: 15px; }
        h2 { color: #0046ad; margin: 0; font-size: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-save { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 20px; font-size: 16px; }
        .btn-save:hover { background: #27ae60; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; background: #e0e0e0; border-radius: 4px; font-weight: bold; }
        .tab.active { background: #0046ad; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="Logo">
        <h2>REGISTRO DE PERSONAL MÉDICO / ASISTENCIAL</h2>
    </div>

    <div class="tab-buttons">
        <div class="tab active" onclick="switchTab('doctor')">DOCTORES</div>
        <div class="tab" onclick="switchTab('enfermera')">ENFERMERAS</div>
    </div>

    <form id="form-doctor">
        <div class="grid">
            <div class="form-group"><label>CÉDULA DE IDENTIDAD</label><input type="text" id="ci_doc" required></div>
            <div class="form-group"><label>NOMBRE(S)</label><input type="text" id="nombre_doc" required></div>
            <div class="form-group"><label>APELLIDO PATERNO</label><input type="text" id="appaterno_doc" required></div>
            <div class="form-group"><label>APELLIDO MATERNO</label><input type="text" id="apmaterno_doc"></div>
            <div class="form-group">
                <label>TURNO</label>
                <select id="turno_doc">
                    <option value="MAÑANA">MAÑANA</option>
                    <option value="TARDE">TARDE</option>
                    <option value="NOCHE">NOCHE</option>
                </select>
            </div>
            <div class="form-group"><label>ESPECIALIDAD</label><input type="text" id="especialidad" placeholder="Ej. MEDICINA DEL TRABAJO"></div>
        </div>
        <button type="button" class="btn-save" onclick="guardarPersonal('doctor')">REGISTRAR DOCTOR</button>
    </form>

    <form id="form-enfermera" style="display:none;">
        <div class="grid">
            <div class="form-group"><label>CÉDULA DE IDENTIDAD</label><input type="text" id="ci_enfe" required></div>
            <div class="form-group"><label>NOMBRE(S)</label><input type="text" id="nombre_enfe" required></div>
            <div class="form-group"><label>APELLIDO PATERNO</label><input type="text" id="appaterno_enfe" required></div>
            <div class="form-group"><label>APELLIDO MATERNO</label><input type="text" id="apmaterno_enfe"></div>
            <div class="form-group">
                <label>TURNO</label>
                <select id="turno_enfe">
                    <option value="MAÑANA">MAÑANA</option>
                    <option value="TARDE">TARDE</option>
                    <option value="NOCHE">NOCHE</option>
                </select>
            </div>
            <div class="form-group"><label>EDUCACIÓN/CARGO</label><input type="text" id="edu_enfe" placeholder="Ej. LICENCIADA / AUXILIAR"></div>
        </div>
        <button type="button" class="btn-save" onclick="guardarPersonal('enfermera')" style="background: #0046ad;">REGISTRAR ENFERMERA</button>
    </form>
</div>

<script>
    function switchTab(tipo) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(tipo === 'doctor') {
            document.getElementById('form-doctor').style.display = 'block';
            document.getElementById('form-enfermera').style.display = 'none';
            document.querySelectorAll('.tab')[0].classList.add('active');
        } else {
            document.getElementById('form-doctor').style.display = 'none';
            document.getElementById('form-enfermera').style.display = 'block';
            document.querySelectorAll('.tab')[1].classList.add('active');
        }
    }

    async function guardarPersonal(tipo) {
        const prefix = tipo === 'doctor' ? '_doc' : '_enfe';
        const data = {};
        
        // Mapeo dinámico basado en sus modelos
        const campos = tipo === 'doctor' 
            ? ['ci_doc', 'nombre_doc', 'appaterno_doc', 'apmaterno_doc', 'turno_doc', 'especialidad']
            : ['ci_enfe', 'nombre_enfe', 'appaterno_enfe', 'apmaterno_enfe', 'turno_enfe', 'edu_enfe'];

        campos.forEach(campo => {
            data[campo] = document.getElementById(campo).value;
        });

        console.log("Enviando datos:", data);
        alert("Personal registrado en memoria local. Listo para el siguiente paso del CRUD.");
        // Aquí conectaremos con el endpoint de Render en el siguiente paso
    }
</script>
</body>
</html>
