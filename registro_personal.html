<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO MÉDICO OHS - FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            text-transform: uppercase; 
            background-color: #f4f6f9;
            zoom: 1.2; 
        }
        .btn-seccion { transition: all 0.3s ease; border-radius: 12px; border: 2px solid #e5e7eb; }
        .active-doc { border-color: #1e40af; background-color: #eff6ff; color: #1e40af; }
        .active-enf { border-color: #059669; background-color: #ecfdf5; color: #065f46; }
        
        .input-ohs { 
            background-color: #edf2f7; 
            border-radius: 8px; 
            border: none; 
            padding: 16px; 
            font-weight: 600; 
            width: 100%; 
            font-size: 13px;
            color: #1a202c;
            text-transform: uppercase;
        }
        .input-ohs::placeholder { color: #a0aec0; font-weight: 500; }
        
        label { 
            font-size: 10px; 
            font-weight: 800; 
            color: #718096; 
            margin-bottom: 6px; 
            display: block; 
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden">
        <div class="h-2 bg-gradient-to-r from-blue-900 via-gold-500 to-green-600"></div>
        
        <div class="p-8 flex justify-between items-center border-b border-gray-100">
            <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="h-14">
            <div class="text-right">
                <h1 class="text-xl font-extrabold text-slate-800 tracking-tighter">REGISTRO DE PERSONAL</h1>
                <h2 class="text-sm font-bold text-blue-800">MÉDICO OHS NANCY</h2>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-6 px-10 my-10">
            <button onclick="setModo('doctor')" id="btn-doc" class="btn-seccion active-doc p-8 flex flex-col items-center justify-center gap-3">
                <i class="fa-solid fa-stethoscope text-5xl"></i>
                <span class="text-[10px] font-extrabold tracking-widest">DOCTORES</span>
            </button>
            <button onclick="setModo('enfermera')" id="btn-enf" class="btn-seccion p-8 flex flex-col items-center justify-center gap-3 text-gray-300">
                <i class="fa-solid fa-syringe text-5xl"></i>
                <span class="text-[10px] font-extrabold tracking-widest">ENFERMERAS</span>
            </button>
        </div>

        <form id="form-registro" class="px-10 pb-12 space-y-8">
            <input type="hidden" id="tipo_empleado" value="doctor">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-8">
                <div>
                    <label id="lbl-ci">C.I. PROFESIONAL MÉDICO</label>
                    <input type="text" id="ci_val" required class="input-ohs" placeholder="INGRESE C.I.">
                </div>
                <div>
                    <label>NOMBRE COMPLETO</label>
                    <input type="text" id="nombre_val" required class="input-ohs" placeholder="NOMBRE">
                </div>
                <div>
                    <label>APELLIDO PATERNO</label>
                    <input type="text" id="paterno_val" required class="input-ohs" placeholder="PATERNO">
                </div>
                <div>
                    <label>APELLIDO MATERNO</label>
                    <input type="text" id="materno_val" class="input-ohs" placeholder="MATERNO">
                </div>
                <div>
                    <label>TURNO DE TRABAJO</label>
                    <select id="turno_val" class="input-ohs cursor-pointer">
                        <option value="MAÑANA">MAÑANA</option>
                        <option value="TARDE">TARDE</option>
                        <option value="NOCHE">NOCHE</option>
                    </select>
                </div>
                <div>
                    <label id="lbl-ext">ESPECIALIDAD MÉDICA</label>
                    <select id="extra_val" class="input-ohs cursor-pointer"></select>
                </div>
            </div>

            <button type="submit" id="btn-save" class="w-full bg-[#1e40af] text-white py-5 rounded-xl font-extrabold tracking-[0.4em] shadow-xl hover:scale-[1.02] transition-transform">
                GUARDAR EN LA NUBE
            </button>
        </form>
    </div>

    <script>
        const API = "https://historial-clinico-936s.onrender.com";
        const docs = ["HISTORIA CLINICA", "PSICOLOGO", "APTITUDES FISICAS", "APTITUDES LABORALES", "ESPIROMETRIA", "TRABAJO EN ALTURAS", "ELECTROENCEFALOGRAMA", "CARDIOLOGIA", "OSTEOMUSCULAR", "OFTALMOLOGIA"];
        const enfs = ["AUXILIAR DE ENFERMERIA", "LICENCIADA EN ENFERMERIA", "INSTRUMENTISTA", "ENFERMERA DE PLANTA"];

        function setModo(tipo) {
            document.getElementById('tipo_empleado').value = tipo;
            const bD = document.getElementById('btn-doc'), bE = document.getElementById('btn-enf'), btnS = document.getElementById('btn-save'), sel = document.getElementById('extra_val');
            sel.innerHTML = "";
            if(tipo === 'doctor') {
                bD.className = "btn-seccion active-doc p-8 flex flex-col items-center justify-center gap-3";
                bE.className = "btn-seccion p-8 flex flex-col items-center justify-center gap-3 text-gray-300";
                btnS.style.backgroundColor = "#1e40af";
                document.getElementById('lbl-ci').innerText = "C.I. PROFESIONAL MÉDICO";
                document.getElementById('lbl-ext').innerText = "ESPECIALIDAD MÉDICA";
                docs.forEach(d => sel.add(new Option(d, d)));
            } else {
                bE.className = "btn-seccion active-enf p-8 flex flex-col items-center justify-center gap-3";
                bD.className = "btn-seccion p-8 flex flex-col items-center justify-center gap-3 text-gray-300";
                btnS.style.backgroundColor = "#059669";
                document.getElementById('lbl-ci').innerText = "C.I. PERSONAL ENFERMERÍA";
                document.getElementById('lbl-ext').innerText = "CARGO / NIVEL";
                enfs.forEach(e => sel.add(new Option(e, e)));
            }
        }
        setModo('doctor');

        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tipo = document.getElementById('tipo_empleado').value;
            
            // Los nombres de campos coinciden con models.py y schemas.py de la RAIZ
            const data = tipo === 'doctor' ? 
                { 
                    ci_doc: document.getElementById('ci_val').value, 
                    nombre_doc: document.getElementById('nombre_val').value, 
                    appaterno_doc: document.getElementById('paterno_val').value, 
                    apmaterno_doc: document.getElementById('materno_val').value, 
                    turno_doc: document.getElementById('turno_val').value, 
                    especialidad: document.getElementById('extra_val').value 
                } :
                { 
                    ci_enfe: document.getElementById('ci_val').value, 
                    nombre_enfe: document.getElementById('nombre_val').value, 
                    appaterno_enfe: document.getElementById('paterno_val').value, 
                    apmaterno_enfe: document.getElementById('materno_val').value, 
                    turno_enfe: document.getElementById('turno_val').value, 
                    edu_enfe: document.getElementById('extra_val').value 
                };

            try {
                // CORRECCIÓN DE RUTAS SEGÚN main.py de la RAIZ
                const endpoint = tipo === 'doctor' ? '/doctor/' : '/enfermera/';
                
                const res = await fetch(`${API}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if(res.ok) { 
                    alert("¡REGISTRO GUARDADO EN LA NUBE!"); 
                    e.target.reset(); 
                    setModo(tipo); 
                } else {
                    const errorData = await res.json();
                    alert("ERROR AL GUARDAR: " + JSON.stringify(errorData.detail));
                }
            } catch (err) { 
                alert("ERROR DE RED O SERVIDOR FUERA DE LÍNEA"); 
            }
        });
    </script>
</body>
</html>
