<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO DE PERSONAL - OHS </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root { 
            --nancy-blue: #0046ad; 
            --nancy-green: #2ecc71; 
            --nancy-gray: #f8fafc; 
            --text-dark: #1e293b;
        }

        /* ESTILO NANCY ELEGANTE: LIMPIO Y MAYÚSCULAS */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0; 
            padding: 20px; 
            text-transform: uppercase; /* TODO EN MAYÚSCULAS */
            color: var(--text-dark);
        }

        .container { 
            max-width: 1000px; 
            margin: 40px auto; 
            background: white; 
            padding: 50px; 
            border-radius: 4px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-top: 6px solid var(--nancy-green);
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 40px; 
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .logo-grande { height: 90px; }

        .title-area h2 { 
            color: var(--nancy-blue); 
            margin: 0; 
            font-size: 24px; 
            font-weight: 900; 
            letter-spacing: 1px;
        }

        /* BOTONES TAB CON ESTILO REFINADO */
        .tab-buttons { 
            display: flex; 
            gap: 2px; 
            margin-bottom: 35px; 
            background: #e2e8f0;
            padding: 5px;
            border-radius: 8px;
        }

        .tab { 
            flex: 1;
            padding: 15px; 
            text-align: center;
            cursor: pointer; 
            background: transparent; 
            border-radius: 6px; 
            font-weight: 900; 
            font-size: 14px;
            transition: 0.3s;
            color: #64748b;
        }

        .tab.active { 
            background: white; 
            color: var(--nancy-blue); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* FORMULARIO Y CAMPOS */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(45%, 1fr)); 
            gap: 25px; 
        }

        .form-group { margin-bottom: 5px; }

        label { 
            font-size: 10px; 
            font-weight: 900; 
            color: var(--nancy-blue); 
            margin-bottom: 8px; 
            display: block;
            letter-spacing: 0.5px;
        }

        input, select { 
            width: 100%;
            padding: 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 4px; 
            font-size: 14px; 
            font-weight: 700; 
            background: var(--nancy-gray);
            text-transform: uppercase;
            box-sizing: border-box;
        }

        input:focus { 
            outline: none; 
            border-color: var(--nancy-blue);
            background: white;
        }

        .btn-save { 
            width: 100%; 
            padding: 18px; 
            color: white; 
            border: none; 
            font-weight: 900; 
            cursor: pointer; 
            border-radius: 4px; 
            margin-top: 40px; 
            font-size: 16px; 
            letter-spacing: 2px;
            transition: 0.4s;
        }

        .bg-doctor { background: var(--nancy-blue); }
        .bg-enfermera { background: var(--nancy-green); }

        .btn-save:hover { filter: brightness(1.1); transform: translateY(-1px); }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-grande">
        <div class="title-area">
            <h2>REGISTRO PROFESIONAL OHS</h2>
            <p style="margin:0; font-size: 10px; font-weight: 700; color: #94a3b8;">PERSONAL MÉDICO Y ASISTENCIAL</p>
        </div>
    </div>

    <div class="tab-buttons">
        <div class="tab active" onclick="switchTab('doctor')">👨‍⚕️ SECCIÓN DOCTORES</div>
        <div class="tab" onclick="switchTab('enfermera')">👩‍⚕️ SECCIÓN ENFERMERAS</div>
    </div>

    <form id="form-doctor">
        <div class="grid">
            <div class="form-group"><label>C.I. PROFESIONAL</label><input type="text" id="ci_doc" required></div>
            <div class="form-group"><label>NOMBRE COMPLETO</label><input type="text" id="nombre_doc" required></div>
            <div class="form-group"><label>APELLIDO PATERNO</label><input type="text" id="appaterno_doc" required></div>
            <div class="form-group"><label>APELLIDO MATERNO</label><input type="text" id="apmaterno_doc"></div>
            <div class="form-group">
                <label>TURNO ASIGNADO</label>
                <select id="turno_doc">
                    <option value="MAÑANA">MAÑANA</option>
                    <option value="TARDE">TARDE</option>
                    <option value="NOCHE">NOCHE</option>
                </select>
            </div>
            <div class="form-group">
                <label>ESPECIALIDAD MÉDICA</label>
                <select id="especialidad">
                    <option value="MEDICINA DEL TRABAJO">MEDICINA DEL TRABAJO</option>
                    <option value="MEDICINA GENERAL">MEDICINA GENERAL</option>
                    <option value="PSICOLOGÍA">PSICOLOGÍA</option>
                    <option value="OFTALMOLOGÍA">OFTALMOLOGÍA</option>
                    <option value="AUDIOLOGÍA">AUDIOLOGÍA</option>
                </select>
            </div>
        </div>
        <button type="button" class="btn-save bg-doctor" onclick="enviarDatos('doctor')">GUARDAR REGISTRO MÉDICO</button>
    </form>

    <form id="form-enfermera" style="display:none;">
        <div class="grid">
            <div class="form-group"><label>C.I. PROFESIONAL</label><input type="text" id="ci_enfe" required></div>
            <div class="form-group"><label>NOMBRE COMPLETO</label><input type="text" id="nombre_enfe" required></div>
            <div class="form-group"><label>APELLIDO PATERNO</label><input type="text" id="appaterno_enfe" required></div>
            <div class="form-group"><label>APELLIDO MATERNO</label><input type="text" id="apmaterno_enfe"></div>
            <div class="form-group">
                <label>TURNO ASIGNADO</label>
                <select id="turno_enfe">
                    <option value="MAÑANA">MAÑANA</option>
                    <option value="TARDE">TARDE</option>
                    <option value="NOCHE">NOCHE</option>
                </select>
            </div>
            <div class="form-group">
                <label>NIVEL ACADÉMICO / CARGO</label>
                <select id="edu_enfe">
                    <option value="LICENCIADA EN ENFERMERÍA">LICENCIADA EN ENFERMERÍA</option>
                    <option value="AUXILIAR DE ENFERMERÍA">AUXILIAR DE ENFERMERÍA</option>
                    <option value="TÉCNICO DE SALUD">TÉCNICO DE SALUD</option>
                </select>
            </div>
        </div>
        <button type="button" class="btn-save bg-enfermera" onclick="enviarDatos('enfermera')">GUARDAR REGISTRO ENFERMERÍA</button>
    </form>
</div>

<script>
    const API_URL = "https://tu-servicio-en-render.com/api"; // CAMBIAR POR TU URL REAL DE RENDER

    function switchTab(tipo) {
        const tabs = document.querySelectorAll('.tab');
        if(tipo === 'doctor') {
            document.getElementById('form-doctor').style.display = 'block';
            document.getElementById('form-enfermera').style.display = 'none';
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        } else {
            document.getElementById('form-doctor').style.display = 'none';
            document.getElementById('form-enfermera').style.display = 'block';
            tabs[1].classList.add('active');
            tabs[0].classList.remove('active');
        }
    }

    async function enviarDatos(tipo) {
        const endpoint = tipo === 'doctor' ? '/save-doctor' : '/save-enfermera';
        const data = {};
        
        const campos = tipo === 'doctor' 
            ? ['ci_doc', 'nombre_doc', 'appaterno_doc', 'apmaterno_doc', 'turno_doc', 'especialidad']
            : ['ci_enfe', 'nombre_enfe', 'appaterno_enfe', 'apmaterno_enfe', 'turno_enfe', 'edu_enfe'];

        campos.forEach(c => data[c] = document.getElementById(c).value);

        try {
            const response = await fetch(API_URL + endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(response.ok) {
                alert("¡ÉXITO! PERSONAL REGISTRADO CORRECTAMENTE EN LA NUBE.");
                location.reload(); // Recarga para limpiar
            } else {
                alert("ERROR AL GUARDAR. VERIFIQUE LA CONEXIÓN.");
            }
        } catch (err) {
            console.error(err);
            alert("NO SE PUDO CONECTAR CON EL SERVIDOR.");
        }
    }
</script>
</body>
</html>
