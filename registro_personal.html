<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO DE PERSONAL - OHS NANCY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; text-transform: uppercase; }
        .tab-active { border-bottom: 6px solid #1e3a8a; color: #1e3a8a; background: #f0f4ff; }
    </style>
</head>
<body class="bg-slate-200 p-4 md:p-8">
    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border-t-8 border-green-600">
        
        <div class="p-8 flex justify-between items-center border-b">
            <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="h-20">
            <div class="text-right">
                <h1 class="text-3xl font-black text-blue-900">REGISTRO DE PERSONAL</h1>
                <p class="text-blue-600 font-bold tracking-tighter">SISTEMA MÉDICO OHS - NUBE</p>
            </div>
        </div>

        <div class="flex w-full bg-slate-50">
            <button onclick="activarSeccion('doctor')" id="btn-doctor" class="flex-1 py-6 text-xl font-black transition all tab-active">
                🩺 SECCIÓN DOCTORES
            </button>
            <button onclick="activarSeccion('enfermera')" id="btn-enfermera" class="flex-1 py-6 text-xl font-black text-slate-400 transition all">
                💉 SECCIÓN ENFERMERAS
            </button>
        </div>

        <form id="form-registro" class="p-8 space-y-8">
            <input type="hidden" id="tipo_empleado" value="doctor">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label id="lbl-ci" class="block text-blue-900 font-black mb-2">C.I. PROFESIONAL MÉDICO</label>
                    <input type="text" id="ci_val" required class="w-full p-4 bg-slate-50 border-2 border-slate-300 rounded-xl focus:border-blue-600 outline-none font-bold text-xl uppercase">
                </div>
                <div>
                    <label class="block text-blue-900 font-black mb-2">NOMBRE COMPLETO</label>
                    <input type="text" id="nombre_val" required class="w-full p-4 bg-slate-50 border-2 border-slate-300 rounded-xl focus:border-blue-600 outline-none font-bold uppercase">
                </div>
                <div>
                    <label class="block text-blue-900 font-black mb-2">APELLIDO PATERNO</label>
                    <input type="text" id="paterno_val" required class="w-full p-4 bg-slate-50 border-2 border-slate-300 rounded-xl focus:border-blue-600 outline-none font-bold uppercase">
                </div>
                <div>
                    <label class="block text-blue-900 font-black mb-2">APELLIDO MATERNO</label>
                    <input type="text" id="materno_val" class="w-full p-4 bg-slate-50 border-2 border-slate-300 rounded-xl focus:border-blue-600 outline-none font-bold uppercase">
                </div>
                <div>
                    <label class="block text-blue-900 font-black mb-2">TURNO ASIGNADO</label>
                    <select id="turno_val" class="w-full p-4 bg-slate-50 border-2 border-slate-300 rounded-xl font-black">
                        <option value="MAÑANA">☀️ MAÑANA</option>
                        <option value="TARDE">🌤️ TARDE</option>
                        <option value="NOCHE">🌙 NOCHE</option>
                    </select>
                </div>
                <div id="div-especialidad">
                    <label id="lbl-extra" class="block text-blue-900 font-black mb-2">ESPECIALIDAD</label>
                    <input type="text" id="extra_val" class="w-full p-4 bg-slate-50 border-2 border-slate-300 rounded-xl font-bold uppercase" placeholder="Ej: MEDICINA DEL TRABAJO">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-black py-6 rounded-2xl shadow-2xl transition transform hover:scale-[1.01] flex justify-center items-center gap-4 text-2xl">
                💾 GUARDAR EN LA NUBE
            </button>
        </form>
    </div>

    <script>
        const API_BASE = "https://historial-clinico-936s.onrender.com";

        function activarSeccion(tipo) {
            document.getElementById('tipo_empleado').value = tipo;
            const btnDoc = document.getElementById('btn-doctor');
            const btnEnfe = document.getElementById('btn-enfermera');
            const lblCi = document.getElementById('lbl-ci');
            const lblExtra = document.getElementById('lbl-extra');
            const inputExtra = document.getElementById('extra_val');

            if(tipo === 'doctor') {
                btnDoc.classList.add('tab-active'); btnDoc.classList.remove('text-slate-400');
                btnEnfe.classList.remove('tab-active'); btnEnfe.classList.add('text-slate-400');
                lblCi.innerText = "C.I. PROFESIONAL MÉDICO";
                lblExtra.innerText = "ESPECIALIDAD";
                inputExtra.placeholder = "Ej: MEDICINA DEL TRABAJO";
            } else {
                btnEnfe.classList.add('tab-active'); btnEnfe.classList.remove('text-slate-400');
                btnDoc.classList.remove('tab-active'); btnDoc.classList.add('text-slate-400');
                lblCi.innerText = "C.I. PERSONAL ENFERMERÍA";
                lblExtra.innerText = "NIVEL ACADÉMICO / CARGO";
                inputExtra.placeholder = "Ej: LICENCIADA EN ENFERMERÍA";
            }
        }

        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tipo = document.getElementById('tipo_empleado').value;
            
            // Construimos el JSON dinámicamente según lo que pide su Backend
            let payload = {};
            if(tipo === 'doctor') {
                payload = {
                    ci_doc: document.getElementById('ci_val').value.trim(),
                    nombre_doc: document.getElementById('nombre_val').value.trim(),
                    appaterno_doc: document.getElementById('paterno_val').value.trim(),
                    apmaterno_doc: document.getElementById('materno_val').value.trim(),
                    turno_doc: document.getElementById('turno_val').value,
                    especialidad: document.getElementById('extra_val').value.trim()
                };
            } else {
                payload = {
                    ci_enfe: document.getElementById('ci_val').value.trim(),
                    nombre_enfe: document.getElementById('nombre_val').value.trim(),
                    appaterno_enfe: document.getElementById('paterno_val').value.trim(),
                    apmaterno_enfe: document.getElementById('materno_val').value.trim(),
                    turno_enfe: document.getElementById('turno_val').value,
                    edu_enfe: document.getElementById('extra_val').value.trim()
                };
            }

            const endpoint = tipo === 'doctor' ? '/api/save-doctor' : '/api/save-enfermera';

            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert(`¡${tipo.toUpperCase()} GUARDADO EN LA NUBE EXITOSAMENTE!`);
                    e.target.reset();
                } else {
                    const error = await response.json();
                    alert("ERROR: " + (error.detail || "DATOS NO VÁLIDOS"));
                }
            } catch (err) {
                alert("EL SERVIDOR NO RESPONDE. REVISE SI RENDER ESTÁ ACTIVO.");
            }
        });
    </script>
</body>
</html>
