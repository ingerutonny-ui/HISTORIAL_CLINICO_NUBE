<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO PRESTIGIO OHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* REGLAS ESTILO NANCY CORIA */
        body { 
            font-family: 'Montserrat', sans-serif; 
            text-transform: uppercase; 
            zoom: 1.3; /* Escala 130% para máxima legibilidad */
            background-color: #f4f4f5;
        }
        .font-elegant { font-family: 'Playfair Display', serif; }
        .input-nancy { 
            border-radius: 0px; 
            border-bottom: 1px solid #d1d5db; 
            padding: 12px 0px;
            transition: all 0.4s;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
        }
        .input-nancy:focus { 
            border-bottom: 2px solid #1e3a8a; 
            outline: none;
            background: rgba(248, 250, 252, 0.5);
        }
        .tab-active-doc { border-bottom: 3px solid #1e3a8a; color: #1e3a8a; font-weight: 700; }
        .tab-active-enf { border-bottom: 3px solid #059669; color: #059669; font-weight: 700; }
        .gold-line { height: 4px; background: linear-gradient(90deg, #d4af37, #f1e5ac, #d4af37); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-4xl bg-white shadow-2xl rounded-sm overflow-hidden">
        <div class="gold-line"></div>
        
        <div class="p-10 flex flex-col md:flex-row justify-between items-center border-b border-stone-100">
            <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="h-16 opacity-90 mb-4 md:mb-0">
            <div class="text-center md:text-right">
                <h1 class="text-2xl font-elegant italic text-slate-800">Registro de Personal</h1>
                <p class="text-[9px] tracking-[0.4em] text-blue-900 font-black">SISTEMA MÉDICO OHS NANCY</p>
            </div>
        </div>

        <div class="flex text-[10px] tracking-[0.2em] bg-stone-50">
            <button onclick="cambiarModo('doctor')" id="tab-doc" class="flex-1 py-4 transition-all tab-active-doc">🩺 DOCTORES</button>
            <button onclick="cambiarModo('enfermera')" id="tab-enf" class="flex-1 py-4 transition-all text-stone-400">💉 ENFERMERAS</button>
        </div>

        <form id="form-registro" class="p-10 space-y-8">
            <input type="hidden" id="tipo_empleado" value="doctor">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                <div class="flex flex-col">
                    <label id="lbl-ci" class="text-[9px] font-bold text-slate-400 mb-1">C.I. PROFESIONAL MÉDICO</label>
                    <input type="text" id="ci_val" required class="input-nancy font-bold uppercase">
                </div>
                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-400 mb-1">NOMBRE COMPLETO</label>
                    <input type="text" id="nombre_val" required class="input-nancy font-bold uppercase">
                </div>
                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-400 mb-1">APELLIDO PATERNO</label>
                    <input type="text" id="paterno_val" required class="input-nancy font-bold uppercase">
                </div>
                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-400 mb-1">APELLIDO MATERNO</label>
                    <input type="text" id="materno_val" class="input-nancy font-bold uppercase">
                </div>
                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-400 mb-1">TURNO DE ATENCIÓN</label>
                    <select id="turno_val" class="input-nancy font-bold cursor-pointer">
                        <option value="MAÑANA">☀️ MAÑANA</option>
                        <option value="TARDE">🌤️ TARDE</option>
                        <option value="NOCHE">🌙 NOCHE</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label id="lbl-extra" class="text-[9px] font-bold text-slate-400 mb-1">ESPECIALIDAD MÉDICA</label>
                    <select id="extra_val" class="input-nancy font-bold cursor-pointer uppercase"></select>
                </div>
            </div>

            <button id="btn-submit" type="submit" class="w-full bg-slate-900 text-white py-4 text-[11px] font-bold tracking-[0.3em] hover:bg-blue-900 transition-all shadow-xl">
                GUARDAR EN LA NUBE
            </button>
        </form>

        <div class="py-6 border-t border-stone-50 text-center">
            <p class="text-[8px] text-stone-300 tracking-[0.5em]">CALIDAD Y PRECISIÓN © 2026</p>
        </div>
    </div>

    <script>
        const API_BASE = "https://historial-clinico-936s.onrender.com";
        // Mapeo exacto image_aa7a7b.png
        const especialidades = ["HISTORIA CLINICA", "PSICOLOGO", "APTITUDES FISICAS", "APTITUDES LABORALES", "ESPIROMETRIA", "TRABAJO EN ALTURAS", "ELECTROENCEFALOGRAMA", "CARDIOLOGIA", "OSTEOMUSCULAR", "OFTALMOLOGIA"];
        const cargos = ["AUXILIAR DE ENFERMERIA", "LICENCIADA EN ENFERMERIA", "INSTRUMENTISTA", "ENFERMERA DE PLANTA"];

        function cambiarModo(tipo) {
            document.getElementById('tipo_empleado').value = tipo;
            const tDoc = document.getElementById('tab-doc');
            const tEnf = document.getElementById('tab-enf');
            const btn = document.getElementById('btn-submit');
            const selExtra = document.getElementById('extra_val');
            
            selExtra.innerHTML = "";
            if(tipo === 'doctor') {
                tDoc.className = "flex-1 py-4 transition-all tab-active-doc";
                tEnf.className = "flex-1 py-4 transition-all text-stone-400";
                btn.className = "w-full bg-slate-900 text-white py-4 text-[11px] font-bold tracking-[0.3em] hover:bg-blue-950 transition-all shadow-xl";
                document.getElementById('lbl-ci').innerText = "C.I. PROFESIONAL MÉDICO";
                document.getElementById('lbl-extra').innerText = "ESPECIALIDAD MÉDICA";
                especialidades.forEach(e => selExtra.add(new Option(e, e)));
            } else {
                tEnf.className = "flex-1 py-4 transition-all tab-active-enf";
                tDoc.className = "flex-1 py-4 transition-all text-stone-400";
                btn.className = "w-full bg-emerald-900 text-white py-4 text-[11px] font-bold tracking-[0.3em] hover:bg-emerald-950 transition-all shadow-xl";
                document.getElementById('lbl-ci').innerText = "C.I. PERSONAL ENFERMERÍA";
                document.getElementById('lbl-extra').innerText = "CARGO / NIVEL";
                cargos.forEach(c => selExtra.add(new Option(c, c)));
            }
        }
        
        cambiarModo('doctor');

        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tipo = document.getElementById('tipo_empleado').value;
            const data = {
                ci: document.getElementById('ci_val').value.trim(),
                nom: document.getElementById('nombre_val').value.trim(),
                pat: document.getElementById('paterno_val').value.trim(),
                mat: document.getElementById('materno_val').value.trim(),
                tur: document.getElementById('turno_val').value,
                ext: document.getElementById('extra_val').value
            };

            const payload = tipo === 'doctor' ? 
                { ci_doc: data.ci, nombre_doc: data.nom, appaterno_doc: data.pat, apmaterno_doc: data.mat, turno_doc: data.tur, especialidad: data.ext } :
                { ci_enfe: data.ci, nombre_enfe: data.nom, appaterno_enfe: data.pat, apmaterno_enfe: data.mat, turno_enfe: data.tur, edu_enfe: data.ext };

            try {
                const res = await fetch(`${API_BASE}${tipo === 'doctor' ? '/api/save-doctor' : '/api/save-enfermera'}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) { 
                    alert("REGISTRO EXITOSO - SISTEMA OHS"); 
                    e.target.reset(); 
                    cambiarModo(tipo);
                } else { alert("ERROR: VERIFIQUE EL C.I."); }
            } catch { alert("SIN CONEXIÓN CON LA NUBE."); }
        });
    </script>
</body>
</html>
