<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO DE PERSONAL - OHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-4xl mx-auto bg-white p-8 mt-10 rounded-lg shadow-xl border-t-4 border-green-600">
        <div class="flex justify-between items-center mb-8">
            <img src="logo.png" alt="Logo OHS" class="h-20">
            <h1 class="text-3xl font-bold text-blue-900 text-right">REGISTRO DE PERSONAL<br><span class="text-blue-700">MÉDICO OHS</span></h1>
        </div>

        <form id="formRegistro" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-blue-900 font-bold mb-2">C.I. PROFESIONAL</label>
                    <input type="text" id="ci_doc" name="ci_doc" required class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 outline-none uppercase">
                </div>
                <div>
                    <label class="block text-blue-900 font-bold mb-2">NOMBRE COMPLETO</label>
                    <input type="text" id="nombre_doc" name="nombre_doc" required class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 outline-none uppercase">
                </div>
                <div>
                    <label class="block text-blue-900 font-bold mb-2">APELLIDO PATERNO</label>
                    <input type="text" id="appaterno_doc" name="appaterno_doc" required class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 outline-none uppercase">
                </div>
                <div>
                    <label class="block text-blue-900 font-bold mb-2">APELLIDO MATERNO</label>
                    <input type="text" id="apmaterno_doc" name="apmaterno_doc" required class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 outline-none uppercase">
                </div>
                <div>
                    <label class="block text-blue-900 font-bold mb-2">TURNO ASIGNADO</label>
                    <select id="turno_doc" name="turno_doc" class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 outline-none">
                        <option value="MAÑANA">☀️ MAÑANA</option>
                        <option value="TARDE">🌤️ TARDE</option>
                        <option value="NOCHE">🌙 NOCHE</option>
                    </select>
                </div>
                <div>
                    <label class="block text-blue-900 font-bold mb-2">ESPECIALIDAD</label>
                    <select id="especialidad" name="especialidad" class="w-full p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 outline-none">
                        <option value="MEDICINA DEL TRABAJO">MEDICINA DEL TRABAJO</option>
                        <option value="MEDICINA GENERAL">MEDICINA GENERAL</option>
                        <option value="ENFERMERÍA">ENFERMERÍA</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-4 rounded-lg shadow-lg transition duration-300 flex justify-center items-center gap-2">
                💾 GUARDAR MÉDICO EN LA NUBE
            </button>
        </form>
    </div>

    <script>
        document.getElementById('formRegistro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('https://historial-clinico-936s.onrender.com/api/save-doctor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('¡DOCTOR REGISTRADO CON ÉXITO EN LA NUBE!');
                    e.target.reset();
                } else {
                    const err = await response.json();
                    alert('ERROR: ' + (err.detail || 'Verifique que el C.I. no esté repetido'));
                }
            } catch (error) {
                alert('ERROR DE CONEXIÓN CON EL SERVIDOR');
            }
        });
    </script>
</body>
</html>
