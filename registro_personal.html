<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO MÉDICO OHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Montserrat', sans-serif; text-transform: uppercase; background-color: #f3f4f6; }
        .btn-seccion { transition: all 0.3s ease; border-radius: 15px; border: 2px solid #e5e7eb; }
        .active-doc { border-color: #2563eb; background-color: #eff6ff; color: #1e40af; }
        .active-enf { border-color: #10b981; background-color: #ecfdf5; color: #065f46; }
        .input-ohs { background-color: #e5e7eb; border-radius: 8px; border: none; padding: 12px; font-weight: 700; width: 100%; font-size: 14px; }
        label { font-size: 10px; font-weight: 900; color: #334155; margin-bottom: 4px; display: block; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden border-t-4 border-green-500">
        
        <div class="p-6 flex justify-between items-center">
            <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="h-16">
            <div class="text-right">
                <h1 class="text-xl font-black text-slate-700">REGISTRO DE PERSONAL</h1>
                <h2 class="text-lg font-black text-blue-900 mt-[-5px]">MÉDICO OHS</h2>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 px-6 mb-8">
            <button onclick="setModo('doctor')" id="btn-doc" class="btn-seccion active-doc p-6 flex flex-col items-center justify-center gap-2">
                <i class="fa-solid fa-stethoscope text-4xl"></i>
                <span class="text-[10px] font-black tracking-widest">SECCIÓN DOCTORES</span>
            </button>
            <button onclick="setModo('enfermera')" id="btn-enf" class="btn-seccion p-6 flex flex-col items-center justify-center gap-2 text-slate-400">
                <i class="fa-solid fa-syringe text-4xl"></i>
                <span class="text-[10px] font-black tracking-widest">SECCIÓN ENFERMERAS</span>
            </button>
        </div>

        <form id="form-registro" class="px-8 pb-10 space-y-6">
            <input type="hidden" id="tipo_empleado" value="doctor">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label id="lbl-ci">C.I. PROFESIONAL</label>
                    <input type="text" id="ci_val" required class="input-ohs" placeholder="4532454">
                </div>
                <div>
                    <label>NOMBRE COMPLETO</label>
                    <input type="text" id="nombre_val" required class="input-ohs" placeholder="TONNY">
                </div>
                <div>
                    <label>APELLIDO PATERNO</label>
                    <input type="text" id="paterno_val" required class="input-ohs" placeholder="ALMENDRAS">
                </div>
                <div>
                    <label>APELLIDO MATERNO</label>
                    <input type="text" id="materno_val" class="input-ohs" placeholder="CONDE">
                </div>
                <div>
                    <label>TURNO</label>
                    <select id="turno_val" class="input-ohs cursor-pointer">
                        <option value="MAÑANA">☀️ MAÑANA</option>
                        <option value="TARDE">🌤️ TARDE</option>
                        <option value="NOCHE">🌙 NOCHE</option>
                    </select>
                </div>
                <div>
                    <label id="lbl-ext">ESPECIALIDAD</label>
                    <select id="extra_val" class="input-ohs cursor-pointer"></select>
                </div>
            </div>

            <button type="submit" id="btn-save" class="w-full bg-[#1e40af] hover:bg-blue-800 text-white py-4 rounded-lg font-black tracking-widest flex items-center justify-center gap-3 mt-4">
                <i class="fa-solid fa-floppy-disk"></i> GUARDAR MÉDICO EN LA NUBE
            </button>
        </form>
    </div>

    <script>
        const API = "https://historial-clinico-936s.onrender.com";
        const docs = ["HISTORIA CLINICA", "PSICOLOGO", "APTITUDES FISICAS", "APTITUDES LABORALES", "ESPIROMETRIA", "TRABAJO EN ALTURAS", "ELECTROENCEFALOGRAMA", "CARDIOLOGIA", "OSTEOMUSCULAR", "OFTALMOLOGIA"];
        const enfs = ["AUXILIAR DE ENFERMERIA", "LICENCIADA EN ENFERMERIA", "INSTRUMENTISTA", "ENFERMERA DE PLANTA"];

        function setModo(tipo) {
            document.getElementById('tipo_empleado').value = tipo;
            const bD = document.getElementById('btn-doc');
            const bE = document.getElementById('btn-enf');
            const btnS = document.getElementById('btn-save');
            const sel = document.getElementById('extra_val');
            
            sel.innerHTML = "";
            if(tipo === 'doctor') {
                bD.className = "btn-seccion active-doc p-6 flex flex-col items-center justify-center gap-2";
                bE.className = "btn-seccion p-6 flex flex-col items-center justify-center gap-2 text-slate-400";
                btnS.className = "w-full bg-[#1e40af] text-white py-4 rounded-lg font-black tracking-widest flex items-center justify-center gap-3";
                btnS.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> GUARDAR MÉDICO EN LA NUBE';
                document.getElementById('lbl-ext').innerText = "ESPECIALIDAD";
                docs.forEach(d => sel.add(new Option(d, d)));
            } else {
                bE.className = "btn-seccion active-enf p-6 flex flex-col items-center justify-center gap-2";
                bD.className = "btn-seccion p-6 flex flex-col items-center justify-center gap-2 text-slate-400";
                btnS.className = "w-full bg-[#065f46] text-white py-4 rounded-lg font-black tracking-widest flex items-center justify-center gap-3";
                btnS.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> GUARDAR ENFERMERA EN LA NUBE';
                document.getElementById('lbl-ext').innerText = "CARGO / NIVEL";
                enfs.forEach(e => sel.add(new Option(e, e)));
            }
        }

        setModo('doctor');

        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tipo = document.getElementById('tipo_empleado').value;
            const payload = tipo === 'doctor' ? 
                { ci_doc: document.getElementById('ci_val').value, nombre_doc: document.getElementById('nombre_val').value, appaterno_doc: document.getElementById('paterno_val').value, apmaterno_doc: document.getElementById('materno_val').value, turno_doc: document.getElementById('turno_val').value, especialidad: document.getElementById('extra_val').value } :
                { ci_enfe: document.getElementById('ci_val').value, nombre_enfe: document.getElementById('nombre_val').value, appaterno_enfe: document.getElementById('paterno_val').value, apmaterno_enfe: document.getElementById('materno_val').value, turno_enfe: document.getElementById('turno_val').value, edu_enfe: document.getElementById('extra_val').value };

            try {
                const res = await fetch(`${API}${tipo === 'doctor' ? '/api/save-doctor' : '/api/save-enfermera'}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) { alert("REGISTRO EXITOSO"); e.target.reset(); setModo(tipo); }
                else { alert("ERROR AL GUARDAR"); }
            } catch { alert("ERROR DE CONEXIÓN"); }
        });
    </script>
</body>
</html>
