<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA OHS - REGISTRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f3f4f6; text-transform: uppercase; }
        .font-header { font-family: 'Playfair Display', serif; letter-spacing: 1px; }
        .gold-line { height: 3px; background: linear-gradient(90deg, #d4af37, #f1e5ac, #d4af37); }
        
        /* Inputs compactos estilo captura */
        .input-compact {
            border: none; border-bottom: 1px solid #e2e8f0;
            padding: 6px 0; font-size: 11px; font-weight: 700;
            letter-spacing: 0.5px; transition: all 0.3s; border-radius: 0;
            background: transparent; width: 100%; color: #1e293b;
        }
        .input-compact:focus { outline: none; border-bottom: 2px solid #1e3a8a; }
        
        /* Selectores de sección */
        .tab-doc { border-bottom: 3px solid #1e3a8a; color: #1e3a8a; font-weight: 800; }
        .tab-enf { border-bottom: 3px solid #10b981; color: #10b981; font-weight: 800; }
        .label-nancy { font-size: 9px; font-weight: 800; color: #1e3a8a; letter-spacing: 0.5px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2 md:p-6">
    <div class="w-full max-w-3xl bg-white shadow-2xl overflow-hidden rounded-sm">
        <div class="gold-line"></div>
        
        <div class="p-6 flex flex-col md:flex-row justify-between items-center bg-white">
            <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="h-10 mb-4 md:mb-0">
            <div class="text-center md:text-right">
                <h1 class="text-xl md:text-2xl font-header italic text-slate-800">REGISTRO DE PERSONAL</h1>
                <p class="text-[8px] tracking-[0.3em] text-blue-900 font-bold">SISTEMA MÉDICO OHS NANCY</p>
            </div>
        </div>

        <div class="flex border-b border-gray-100">
            <button onclick="updateMode('doctor')" id="t-doc" class="flex-1 py-3 text-[10px] tracking-widest tab-doc">🩺 SECCIÓN DOCTORES</button>
            <button onclick="updateMode('enfermera')" id="t-enf" class="flex-1 py-3 text-[10px] tracking-widest text-gray-300">💉 SECCIÓN ENFERMERAS</button>
        </div>

        <form id="form-registro" class="p-8 md:px-16 space-y-8">
            <input type="hidden" id="tipo_empleado" value="doctor">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                <div class="flex flex-col">
                    <label id="lbl-ci" class="label-nancy">C.I. PROFESIONAL MÉDICO</label>
                    <input type="text" id="ci_val" required class="input-compact">
                </div>
                <div class="flex flex-col">
                    <label class="label-nancy">NOMBRE COMPLETO</label>
                    <input type="text" id="nombre_val" required class="input-compact">
                </div>
                <div class="flex flex-col">
                    <label class="label-nancy">APELLIDO PATERNO</label>
                    <input type="text" id="paterno_val" required class="input-compact">
                </div>
                <div class="flex flex-col">
                    <label class="label-nancy">APELLIDO MATERNO</label>
                    <input type="text" id="materno_val" class="input-compact">
                </div>
                <div class="flex flex-col">
                    <label class="label-nancy">TURNO ASIGNADO</label>
                    <select id="turno_val" class="input-compact cursor-pointer">
                        <option value="MAÑANA">☀️ MAÑANA</option>
                        <option value="TARDE">🌤️ TARDE</option>
                        <option value="NOCHE">🌙 NOCHE</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label id="lbl-ext" class="label-nancy text-blue-800">ESPECIALIDAD MÉDICA</label>
                    <select id="extra_val" class="input-compact cursor-pointer"></select>
                </div>
            </div>

            <button type="submit" id="btn-save" class="w-full bg-[#1e293b] text-white py-4 text-[10px] font-bold tracking-[0.4em] hover:opacity-90 transition-all">
                GUARDAR REGISTRO EN LA NUBE
            </button>
        </form>

        <div class="pb-6 text-center">
            <p class="text-[7px] text-gray-300 tracking-[0.5em]">CALIDAD Y PRECISIÓN EN HISTORIALES CLÍNICOS © 2026</p>
        </div>
    </div>

    <script>
        const API = "https://historial-clinico-936s.onrender.com";
        const docs = ["HISTORIA CLINICA", "PSICOLOGO", "APTITUDES FISICAS", "APTITUDES LABORALES", "ESPIROMETRIA", "TRABAJO EN ALTURAS", "ELECTROENCEFALOGRAMA", "CARDIOLOGIA", "OSTEOMUSCULAR", "OFTALMOLOGIA"];
        const enfs = ["AUXILIAR DE ENFERMERIA", "LICENCIADA EN ENFERMERIA", "INSTRUMENTISTA", "ENFERMERA DE PLANTA"];

        function updateMode(tipo) {
            document.getElementById('tipo_empleado').value = tipo;
            const tD = document.getElementById('t-doc');
            const tE = document.getElementById('t-enf');
            const btn = document.getElementById('btn-save');
            const sel = document.getElementById('extra_val');
            const lCi = document.getElementById('lbl-ci');
            const lEx = document.getElementById('lbl-ext');

            sel.innerHTML = "";
            if(tipo === 'doctor') {
                tD.className = "flex-1 py-3 text-[10px] tracking-widest tab-doc";
                tE.className = "flex-1 py-3 text-[10px] tracking-widest text-gray-300";
                btn.style.backgroundColor = "#1e293b";
                lCi.innerText = "C.I. PROFESIONAL MÉDICO";
                lCi.style.color = "#1e3a8a";
                lEx.innerText = "ESPECIALIDAD MÉDICA";
                lEx.style.color = "#1e3a8a";
                docs.forEach(d => sel.add(new Option(d, d)));
            } else {
                tE.className = "flex-1 py-3 text-[10px] tracking-widest tab-enf";
                tD.className = "flex-1 py-3 text-[10px] tracking-widest text-gray-300";
                btn.style.backgroundColor = "#065f46";
                lCi.innerText = "C.I. PERSONAL ENFERMERÍA";
                lCi.style.color = "#10b981";
                lEx.innerText = "CARGO / NIVEL";
                lEx.style.color = "#10b981";
                enfs.forEach(e => sel.add(new Option(e, e)));
            }
        }

        updateMode('doctor');

        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tipo = document.getElementById('tipo_empleado').value;
            const p = {
                ci: document.getElementById('ci_val').value.trim(),
                n: document.getElementById('nombre_val').value.trim(),
                pa: document.getElementById('paterno_val').value.trim(),
                ma: document.getElementById('materno_val').value.trim(),
                tu: document.getElementById('turno_val').value,
                ex: document.getElementById('extra_val').value
            };

            const data = tipo === 'doctor' ? 
                { ci_doc: p.ci, nombre_doc: p.n, appaterno_doc: p.pa, apmaterno_doc: p.ma, turno_doc: p.tu, especialidad: p.ex } :
                { ci_enfe: p.ci, nombre_enfe: p.n, appaterno_enfe: p.pa, apmaterno_enfe: p.ma, turno_enfe: p.tu, edu_enfe: p.ex };

            try {
                const res = await fetch(`${API}${tipo === 'doctor' ? '/api/save-doctor' : '/api/save-enfermera'}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(res.ok) { alert("REGISTRO GUARDADO EXITOSAMENTE"); e.target.reset(); updateMode(tipo); }
                else { alert("ERROR AL GUARDAR"); }
            } catch { alert("ERROR DE CONEXIÓN CON EL SERVIDOR"); }
        });
    </script>
</body>
</html>
