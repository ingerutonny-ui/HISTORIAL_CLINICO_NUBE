<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - OHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #0a0e1a; padding: 20px; }
        .hoja-sistema { background: white; max-width: 1200px; margin: 0 auto; border-radius: 20px; padding: 40px; }
        .input-ohs { width: 100%; border: 2px solid #e2e8f0; padding: 15px; border-radius: 10px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="hoja-sistema">
        <h1 id="titulo-form" class="text-3xl font-black text-blue-900 mb-10">NUEVO REGISTRO</h1>
        <form id="form-registro" class="space-y-6">
            <input type="hidden" id="tipo_empleado" value="doctor">
            <div class="grid grid-cols-2 gap-6">
                <div><label>C.I.</label><input type="text" id="ci_val" class="input-ohs" required></div>
                <div><label>NOMBRES</label><input type="text" id="nombre_val" class="input-ohs" required></div>
                <div><label>APELLIDOS</label><input type="text" id="paterno_val" class="input-ohs" required></div>
                <div><label>ESPECIALIDAD</label><input type="text" id="especialidad_val" class="input-ohs"></div>
                <div><label>TURNO</label>
                    <select id="turno_val" class="input-ohs">
                        <option>MAÑANA</option><option>TARDE</option><option>NOCHE</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-700 text-white py-4 rounded-xl font-black">GUARDAR</button>
        </form>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const tipo = params.get('tipo');

        if(id) {
            document.getElementById('titulo-form').innerText = "EDITAR REGISTRO";
            document.getElementById('tipo_empleado').value = tipo;
            fetch(`https://historial-clinico-nube.onrender.com/${tipo}/${id}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('ci_val').value = id;
                document.getElementById('ci_val').readOnly = true;
                document.getElementById('nombre_val').value = data.nombre_doc || data.nombre_enfe;
                document.getElementById('paterno_val').value = data.appaterno_doc || data.appaterno_enfe;
                document.getElementById('especialidad_val').value = data.especialidad;
                document.getElementById('turno_val').value = data.turno_doc || data.turno_enfe;
            });
        }

        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const t = document.getElementById('tipo_empleado').value;
            const i = document.getElementById('ci_val').value;
            const payload = {
                ci: i,
                nombre: document.getElementById('nombre_val').value,
                apellidos: document.getElementById('paterno_val').value,
                especialidad: document.getElementById('especialidad_val').value,
                turno: document.getElementById('turno_val').value
            };

            const res = await fetch(`https://historial-clinico-nube.onrender.com/${t}/${id ? id : ''}`, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if(res.ok) { location.href = 'lista_personal.html'; } else { alert('Error al guardar'); }
        });
    </script>
</body>
</html>
