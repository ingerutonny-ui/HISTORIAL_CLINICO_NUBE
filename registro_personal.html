<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Personal - OHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0a0e1a; padding: 20px; font-family: sans-serif; text-transform: uppercase; }
        .hoja { background: white; max-width: 1000px; margin: auto; padding: 40px; border-radius: 20px; }
        .input-ohs { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; margin-top: 5px; }
        .btn-tipo { border: 2px solid #e2e8f0; padding: 20px; border-radius: 15px; cursor: pointer; text-align: center; }
        .active-doc { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
        .active-enf { border-color: #10b981; background: #ecfdf5; color: #10b981; }
    </style>
</head>
<body>
    <div class="hoja">
        <h1 id="titulo" class="text-3xl font-black mb-8">NUEVO REGISTRO</h1>
        <div class="grid grid-cols-2 gap-6 mb-8">
            <div id="btn-doc" class="btn-tipo" onclick="seleccionar('doctor')"><i class="fa-solid fa-user-doctor text-2xl"></i><br>DOCTOR</div>
            <div id="btn-enf" class="btn-tipo" onclick="seleccionar('enfermera')"><i class="fa-solid fa-user-nurse text-2xl"></i><br>ENFERMERA</div>
        </div>
        <form id="form" class="space-y-4">
            <input type="text" id="ci" placeholder="C.I." class="input-ohs" required>
            <input type="text" id="nombre" placeholder="NOMBRES" class="input-ohs" required>
            <input type="text" id="paterno" placeholder="APELLIDOS" class="input-ohs" required>
            <input type="text" id="especialidad" placeholder="ESPECIALIDAD" class="input-ohs">
            <select id="turno" class="input-ohs"><option>MAÑANA</option><option>TARDE</option><option>NOCHE</option></select>
            <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-xl font-black mt-4">GUARDAR</button>
        </form>
    </div>

    <script>
        let tipo = null;
        const params = new URLSearchParams(window.location.search);
        const idEdicion = params.get('id');
        const tipoEdicion = params.get('tipo');

        function seleccionar(t) {
            tipo = t;
            document.getElementById('btn-doc').className = `btn-tipo ${t === 'doctor' ? 'active-doc' : ''}`;
            document.getElementById('btn-enf').className = `btn-tipo ${t === 'enfermera' ? 'active-enf' : ''}`;
        }

        if (idEdicion && tipoEdicion) {
            document.getElementById('titulo').innerText = "EDITAR REGISTRO";
            seleccionar(tipoEdicion);
            fetch(`https://historial-clinico-nube.onrender.com/personal/`)
                .then(r => r.json())
                .then(data => {
                    const lista = tipoEdicion === 'doctor' ? data.doctores : data.enfermeras;
                    const item = lista.find(x => (x.ci_doc || x.ci_enfe) == idEdicion);
                    if (item) {
                        document.getElementById('ci').value = idEdicion;
                        document.getElementById('nombre').value = item.nombre_doc || item.nombre_enfe || '';
                        document.getElementById('paterno').value = item.appaterno_doc || item.appaterno_enfe || '';
                        document.getElementById('especialidad').value = item.especialidad || '';
                        document.getElementById('turno').value = item.turno_doc || item.turno_enfe || 'MAÑANA';
                    }
                });
        }

        document.getElementById('form').onsubmit = async (e) => {
            e.preventDefault();
            if (!tipo) return alert("Seleccione Doctor o Enfermera");
            
            const datos = {
                ci: document.getElementById('ci').value,
                nombre: document.getElementById('nombre').value,
                paterno: document.getElementById('paterno').value,
                especialidad: document.getElementById('especialidad').value,
                turno: document.getElementById('turno').value
            };

            const url = `https://historial-clinico-nube.onrender.com/${tipo === 'doctor' ? 'doctores' : 'enfermeras'}${idEdicion ? '/'+idEdicion : ''}`;
            
            try {
                const res = await fetch(url, {
                    method: idEdicion ? 'PUT' : 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(datos)
                });
                if (res.ok) window.location.href = 'lista_personal.html';
                else alert("Error al guardar");
            } catch (err) { alert("Error de conexión"); }
        };
    </script>
</body>
</html>
