<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Personal - OHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0e1a; margin: 0; padding: 20px; text-transform: uppercase; }
        .hoja-sistema { background-color: white; width: 100%; max-width: 1200px; margin: 0 auto; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); overflow: hidden; }
        .input-ohs { background-color: #f8fafc; border-radius: 12px; border: 2px solid #e2e8f0; padding: 16px; color: #1e293b; width: 100%; font-size: 12px; font-weight: 700; transition: all 0.3s; }
        .input-ohs:focus { border-color: #2563eb; outline: none; background-color: white; }
        .active-btn { border: 3px solid #2563eb; background-color: #eff6ff; color: #1e40af; }
        .inactive-btn { border: 2px solid #f1f5f9; background-color: #f8fafc; color: #94a3b8; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <div class="max-w-[1200px] mx-auto w-full mb-4">
        <button onclick="location.href='lista_personal.html'" class="bg-slate-800 text-white px-6 py-2 rounded-lg text-[10px] font-black">VOLVER</button>
    </div>
    <div class="hoja-sistema">
        <div class="p-8 border-b"><h1 id="titulo-form" class="text-4xl font-black text-blue-900">NUEVO REGISTRO</h1></div>
        <div class="p-12">
            <div class="grid grid-cols-2 gap-6 mb-12">
                <button type="button" id="btn-doc" onclick="setModo('doctor')" class="inactive-btn p-8 rounded-3xl font-black">DOCTOR</button>
                <button type="button" id="btn-enf" onclick="setModo('enfermera')" class="inactive-btn p-8 rounded-3xl font-black">ENFERMERA</button>
            </div>
            <form id="form-registro" class="space-y-8">
                <input type="hidden" id="tipo_empleado" value="doctor">
                <div class="grid grid-cols-2 gap-8">
                    <div><label class="text-[11px] font-black">C.I.</label><input type="text" id="ci_val" class="input-ohs" required></div>
                    <div><label class="text-[11px] font-black">NOMBRES</label><input type="text" id="nombre_val" class="input-ohs" required></div>
                    <div><label class="text-[11px] font-black">APELLIDOS</label><input type="text" id="paterno_val" class="input-ohs" required></div>
                    <div><label class="text-[11px] font-black">ESPECIALIDAD</label><input type="text" id="especialidad_val" class="input-ohs" required></div>
                    <div><label class="text-[11px] font-black">TURNO</label>
                        <select id="turno_val" class="input-ohs">
                            <option value="MAÑANA">MAÑANA</option><option value="TARDE">TARDE</option><option value="NOCHE">NOCHE</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-700 text-white py-5 rounded-xl font-black">GUARDAR REGISTRO</button>
            </form>
        </div>
    </div>

    <script>
        function setModo(tipo) {
            document.getElementById('tipo_empleado').value = tipo;
            document.getElementById('btn-doc').className = tipo === 'doctor' ? 'active-btn p-8 rounded-3xl font-black' : 'inactive-btn p-8 rounded-3xl font-black';
            document.getElementById('btn-enf').className = tipo === 'enfermera' ? 'active-btn p-8 rounded-3xl font-black' : 'inactive-btn p-8 rounded-3xl font-black';
        }
        
        setModo('doctor'); // Default

        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tipo = document.getElementById('tipo_empleado').value;
            // Endpoint plural para asegurar coincidencia con el backend
            const endpoint = tipo === 'doctor' ? 'doctores' : 'enfermeras';
            const id = document.getElementById('ci_val').value;
            
            const payload = tipo === 'doctor' ? {
                ci_doc: id, nombre_doc: document.getElementById('nombre_val').value, 
                appaterno_doc: document.getElementById('paterno_val').value, 
                especialidad: document.getElementById('especialidad_val').value, 
                turno_doc: document.getElementById('turno_val').value
            } : {
                ci_enfe: id, nombre_enfe: document.getElementById('nombre_val').value, 
                appaterno_enfe: document.getElementById('paterno_val').value, 
                especialidad: document.getElementById('especialidad_val').value, 
                turno_enfe: document.getElementById('turno_val').value
            };

            try {
                const res = await fetch(`https://historial-clinico-nube.onrender.com/${endpoint}/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) window.location.href = 'lista_personal.html';
                else alert("Error al guardar: Verifique que el C.I. no exista.");
            } catch(e) { alert("Error de conexión con la nube."); }
        });
    </script>
</body>
</html>
