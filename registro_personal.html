<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Personal - OHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0e1a; margin: 0; padding: 20px; text-transform: uppercase; }
        .hoja-sistema { background-color: white; width: 100%; max-width: 1200px; margin: 0 auto; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); overflow: hidden; }
        .input-ohs { background-color: #f8fafc; border-radius: 12px; border: 2px solid #e2e8f0; padding: 16px; color: #1e293b; width: 100%; font-size: 12px; font-weight: 700; }
        .btn-volver { background-color: #1e293b; color: white; padding: 10px 20px; border-radius: 8px; font-size: 10px; font-weight: 900; margin-bottom: 15px; display: inline-block; }
        .active-doc { border: 3px solid #2563eb; background-color: #eff6ff; }
        .active-enf { border: 3px solid #10b981; background-color: #ecfdf5; }
        .inactive-btn { border: 2px solid #f1f5f9; background-color: #f8fafc; color: #94a3b8; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <div class="max-w-[1200px] w-full mx-auto">
        <a href="lista_personal.html" class="btn-volver"><i class="fa-solid fa-arrow-left"></i> VOLVER</a>
    </div>
    <div class="hoja-sistema">
        <div class="p-10 border-b border-gray-100"><h1 class="text-4xl font-black text-blue-900" id="titulo-form">EDITAR REGISTRO</h1></div>
        <div class="p-12">
            <div id="selector-tipo" class="grid grid-cols-2 gap-8 mb-10">
                <div id="btn-doc" class="inactive-btn p-8 rounded-3xl text-center"><i class="fa-solid fa-user-doctor text-3xl"></i><br>DOCTOR</div>
                <div id="btn-enf" class="inactive-btn p-8 rounded-3xl text-center"><i class="fa-solid fa-user-nurse text-3xl"></i><br>ENFERMERA</div>
            </div>
            <form id="form-registro" class="space-y-6">
                <div class="grid grid-cols-2 gap-8">
                    <div><label class="text-[10px] font-black text-gray-400">C.I.</label><input type="text" id="ci_val" class="input-ohs" required></div>
                    <div><label class="text-[10px] font-black text-gray-400">NOMBRES</label><input type="text" id="nombre_val" class="input-ohs" required></div>
                    <div><label class="text-[10px] font-black text-gray-400">APELLIDOS</label><input type="text" id="paterno_val" class="input-ohs" required></div>
                    <div><label class="text-[10px] font-black text-gray-400">ESPECIALIDAD</label><input type="text" id="especialidad_val" class="input-ohs"></div>
                    <div><label class="text-[10px] font-black text-gray-400">TURNO</label>
                        <select id="turno_val" class="input-ohs">
                            <option value="MAÑANA">MAÑANA</option>
                            <option value="TARDE">TARDE</option>
                            <option value="NOCHE">NOCHE</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-700 text-white py-5 rounded-2xl font-black">GUARDAR REGISTRO</button>
            </form>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const ci = params.get('id');
        const tipo = params.get('tipo');
        let registroId = null;

        async function cargar() {
            const res = await fetch('https://historial-clinico-nube.onrender.com/personal/');
            const data = await res.json();
            
            const item = (tipo === 'doctor') 
                ? data.doctores.find(d => d.ci_doc === ci)
                : data.enfermeras.find(e => e.ci_enfe === ci);

            if (item) {
                // Aquí capturamos el ID real de la base de datos
                registroId = (tipo === 'doctor') ? item.id_doc : item.id_enfe;
                
                if (tipo === 'doctor') document.getElementById('btn-doc').className = 'active-doc p-8 rounded-3xl text-center';
                else document.getElementById('btn-enf').className = 'active-enf p-8 rounded-3xl text-center';
                
                document.getElementById('ci_val').value = ci;
                document.getElementById('nombre_val').value = item.nombre_doc || item.nombre_enfe || '';
                document.getElementById('paterno_val').value = item.appaterno_doc || item.appaterno_enfe || '';
                document.getElementById('especialidad_val').value = item.especialidad || '';
                document.getElementById('turno_val').value = item.turno_doc || item.turno_enfe || 'MAÑANA';
            }
        }

        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!registroId) return alert("Error: ID no cargado");
            
            const endpoint = (tipo === 'doctor') ? 'doctores' : 'enfermeras';
            const payload = (tipo === 'doctor') ? {
                ci_doc: document.getElementById('ci_val').value,
                nombre_doc: document.getElementById('nombre_val').value,
                appaterno_doc: document.getElementById('paterno_val').value,
                especialidad: document.getElementById('especialidad_val').value,
                turno_doc: document.getElementById('turno_val').value
            } : {
                ci_enfe: document.getElementById('ci_val').value,
                nombre_enfe: document.getElementById('nombre_val').value,
                appaterno_enfe: document.getElementById('paterno_val').value,
                especialidad: document.getElementById('especialidad_val').value,
                turno_enfe: document.getElementById('turno_val').value
            };

            const res = await fetch(`https://historial-clinico-nube.onrender.com/${endpoint}/${registroId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Guardado exitosamente");
                window.location.href = 'lista_personal.html';
            } else {
                alert("Error al guardar en el servidor");
            }
        });
        cargar();
    </script>
</body>
</html>
