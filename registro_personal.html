<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Registro - OHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0e1a; margin: 0; padding: 20px; text-transform: uppercase; }
        
        .hoja-sistema {
            background-color: white;
            width: 100%;
            max-width: 1200px; /* Tamaño igualado a la lista */
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .input-ohs { 
            background-color: #f8fafc; border-radius: 12px; border: 2px solid #e2e8f0; 
            padding: 16px; color: #1e293b; width: 100%; font-size: 12px; font-weight: 700;
            transition: all 0.3s;
        }
        .input-ohs:focus { border-color: #2563eb; outline: none; background-color: white; }

        .active-doc { border: 3px solid #2563eb; background-color: #eff6ff; color: #1e40af; }
        .active-enf { border: 3px solid #10b981; background-color: #ecfdf5; color: #065f46; }
        .inactive-btn { border: 2px solid #f1f5f9; background-color: #f8fafc; color: #94a3b8; }

        .btn-volver-top { max-width: 1200px; margin: 0 auto 15px auto; width: 100%; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="btn-volver-top">
        <button onclick="location.href='lista_personal.html'" class="bg-slate-800/80 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition text-[10px] font-black flex items-center gap-2 border border-slate-700 shadow-2xl">
            <i class="fa-solid fa-arrow-left"></i> VOLVER AL LISTADO
        </button>
    </div>

    <div class="hoja-sistema">
        <div class="p-8 md:p-10 flex flex-col md:flex-row justify-between items-center border-b border-gray-100 gap-6">
            <img src="logo.png" alt="Logo OHS" class="h-16 md:h-20">
            <div class="text-center md:text-right">
                <h1 class="text-3xl md:text-4xl font-black text-blue-900 tracking-tighter">NUEVO REGISTRO</h1>
                <p class="text-[10px] md:text-[12px] font-bold text-emerald-600 tracking-[0.3em]">OHS NANCY CLOUD</p>
            </div>
        </div>

        <div class="p-8 md:p-12">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                <button onclick="setModo('doctor')" id="btn-doc" class="active-doc p-8 rounded-3xl flex flex-col items-center gap-3 transition-all transform hover:scale-[1.02]">
                    <i class="fa-solid fa-user-doctor text-4xl"></i>
                    <span class="text-[12px] font-black tracking-widest">PERSONAL MÉDICO / DOCTORES</span>
                </button>
                <button onclick="setModo('enfermera')" id="btn-enf" class="inactive-btn p-8 rounded-3xl flex flex-col items-center gap-3 transition-all transform hover:scale-[1.02]">
                    <i class="fa-solid fa-user-nurse text-4xl"></i>
                    <span class="text-[12px] font-black tracking-widest">PERSONAL DE ENFERMERÍA</span>
                </button>
            </div>

            <form id="form-registro" class="space-y-8">
                <input type="hidden" id="tipo_empleado" value="doctor">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <label class="text-[11px] text-gray-400 font-black tracking-widest ml-1">NÚMERO DE C.I.</label>
                        <input type="text" id="ci_val" class="input-ohs" placeholder="INGRESE DOCUMENTO" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] text-gray-400 font-black tracking-widest ml-1">NOMBRE COMPLETO</label>
                        <input type="text" id="nombre_val" class="input-ohs" placeholder="INGRESE NOMBRES" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] text-gray-400 font-black tracking-widest ml-1">APELLIDO PATERNO Y MATERNO</label>
                        <input type="text" id="paterno_val" class="input-ohs" placeholder="INGRESE APELLIDOS" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] text-gray-400 font-black tracking-widest ml-1">TURNO DE TRABAJO</label>
                        <select id="turno_val" class="input-ohs">
                            <option>MAÑANA</option>
                            <option>TARDE</option>
                            <option>NOCHE</option>
                        </select>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" class="w-full bg-blue-700 text-white py-5 rounded-2xl font-black text-sm tracking-[0.3em] hover:bg-blue-800 transition shadow-2xl shadow-blue-200 transform hover:-translate-y-1">
                        <i class="fa-solid fa-cloud-arrow-up mr-3"></i> GUARDAR REGISTRO EN LA NUBE
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-gray-50 p-6 text-center border-t border-gray-100">
            <p class="text-[9px] text-gray-400 font-black tracking-widest">SISTEMA PROTEGIDO BAJO PROTOCOLO OHS 2026</p>
        </div>
    </div>

    <script>
        function setModo(t) {
            const btnDoc = document.getElementById('btn-doc');
            const btnEnf = document.getElementById('btn-enf');
            document.getElementById('tipo_empleado').value = t;

            if (t === 'doctor') {
                btnDoc.className = 'active-doc p-8 rounded-3xl flex flex-col items-center gap-3 transition-all transform hover:scale-[1.02]';
                btnEnf.className = 'inactive-btn p-8 rounded-3xl flex flex-col items-center gap-3 transition-all transform hover:scale-[1.02]';
            } else {
                btnDoc.className = 'inactive-btn p-8 rounded-3xl flex flex-col items-center gap-3 transition-all transform hover:scale-[1.02]';
                btnEnf.className = 'active-enf p-8 rounded-3xl flex flex-col items-center gap-3 transition-all transform hover:scale-[1.02]';
            }
        }

        document.getElementById('form-registro').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("✅ PERSONAL REGISTRADO EXITOSAMENTE");
            location.href = 'lista_personal.html';
        });
    </script>
</body>
</html>
