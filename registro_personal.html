<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO DE PERSONAL - OHS</title>
    <style>
        :root { --blue: #0046ad; --green: #2ecc71; --light: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e2e8f0; margin: 0; padding: 20px; text-transform: uppercase; }
        
        /* FORMULARIO GRANDE Y CENTRADO */
        .container { max-width: 1100px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-top: 8px solid var(--green); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .logo-grande { height: 100px; } /* LOGO AGRANDADO */
        
        .title-area { text-align: right; }
        .title-area h2 { color: var(--blue); margin: 0; font-size: 28px; font-weight: 900; }
        
        /* BOTONES DE CAMBIO CON ICONOS */
        .tab-buttons { display: flex; gap: 15px; margin-bottom: 30px; justify-content: center; }
        .tab { padding: 15px 35px; cursor: pointer; background: #cbd5e1; border-radius: 8px; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 10px; font-size: 18px; }
        .tab.active { background: var(--blue); color: white; transform: scale(1.05); }

        /* GRID RESPONSIVO */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 900; color: #475569; margin-bottom: 8px; }
        input, select { padding: 14px; border: 2px solid #e2e8f0; border-radius: 6px; font-size: 16px; font-weight: bold; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 8px rgba(0,70,173,0.2); }

        .btn-save { width: 100%; padding: 20px; color: white; border: none; font-weight: 900; cursor: pointer; border-radius: 8px; margin-top: 30px; font-size: 20px; letter-spacing: 1px; transition: 0.3s; }
        .bg-doctor { background: var(--blue); }
        .bg-enfermera { background: var(--green); }
        .btn-save:hover { opacity: 0.9; transform: translateY(-2px); }

        /* RESPONSIVO PARA MÓVILES */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            .header { flex-direction: column; text-align: center; }
            .title-area { text-align: center; margin-top: 15px; }
            .tab { padding: 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-grande">
        <div class="title-area">
            <h2>SISTEMA DE GESTIÓN OHS</h2>
            <p style="margin:0; color:#64748b;">REGISTRO DE PERSONAL AUTORIZADO</p>
        </div>
    </div>

    <div class="tab-buttons">
        <div class="tab active" onclick="switchTab('doctor')">
            👨‍⚕️ DOCTORES
        </div>
        <div class="tab" onclick="switchTab('enfermera')">
            👩‍⚕️ ENFERMERAS
        </div>
    </div>

    <form id="form-doctor">
        <div class="grid">
            <div class="form-group"><label>CÉDULA DE IDENTIDAD</label><input type="text" id="ci_doc" placeholder="EJ. 4634567" required></div>
            <div class="form-group"><label>NOMBRE(S)</label><input type="text" id="nombre_doc" required></div>
            <div class="form-group"><label>APELLIDO PATERNO</label><input type="text" id="appaterno_doc" required></div>
            <div class="form-group"><label>APELLIDO MATERNO</label><input type="text" id="apmaterno_doc"></div>
            <div class="form-group">
                <label>TURNO DE TRABAJO</label>
                <select id="turno_doc">
                    <option value="MAÑANA">☀️ MAÑANA</option>
                    <option value="TARDE">🌤️ TARDE</option>
                    <option value="NOCHE">🌙 NOCHE</option>
                </select>
            </div>
            <div class="form-group">
                <label>ESPECIALIDAD MÉDICA</label>
                <select id="especialidad">
                    <option value="MEDICINA DEL TRABAJO">MEDICINA DEL TRABAJO</option>
                    <option value="MEDICINA GENERAL">MEDICINA GENERAL</option>
                    <option value="PSICOLOGÍA">PSICOLOGÍA</option>
                    <option value="OFTALMOLOGÍA">OFTALMOLOGÍA</option>
                    <option value="AUDIOLOGÍA">AUDIOLOGÍA</option>
                    <option value="TRAUMATOLOGÍA">TRAUMATOLOGÍA</option>
                </select>
            </div>
        </div>
        <button type="button" class="btn-save bg-doctor" onclick="guardarPersonal('doctor')">💾 REGISTRAR MÉDICO EN LA NUBE</button>
    </form>

    <form id="form-enfermera" style="display:none;">
        <div class="grid">
            <div class="form-group"><label>CÉDULA DE IDENTIDAD</label><input type="text" id="ci_enfe" required></div>
            <div class="form-group"><label>NOMBRE(S)</label><input type="text" id="nombre_enfe" required></div>
            <div class="form-group"><label>APELLIDO PATERNO</label><input type="text" id="appaterno_enfe" required></div>
            <div class="form-group"><label>APELLIDO MATERNO</label><input type="text" id="apmaterno_enfe"></div>
            <div class="form-group">
                <label>TURNO DE TRABAJO</label>
                <select id="turno_enfe">
                    <option value="MAÑANA">☀️ MAÑANA</option>
                    <option value="TARDE">🌤️ TARDE</option>
                    <option value="NOCHE">🌙 NOCHE</option>
                </select>
            </div>
            <div class="form-group">
                <label>NIVEL DE FORMACIÓN / CARGO</label>
                <select id="edu_enfe">
                    <option value="LICENCIADA EN ENFERMERÍA">LICENCIADA EN ENFERMERÍA</option>
                    <option value="AUXILIAR DE ENFERMERÍA">AUXILIAR DE ENFERMERÍA</option>
                    <option value="TÉCNICO EN SALUD">TÉCNICO EN SALUD</option>
                </select>
            </div>
        </div>
        <button type="button" class="btn-save bg-enfermera" onclick="guardarPersonal('enfermera')">💾 REGISTRAR ENFERMERA EN LA NUBE</button>
    </form>
</div>

<script>
    function switchTab(tipo) {
        const tabs = document.querySelectorAll('.tab');
        if(tipo === 'doctor') {
            document.getElementById('form-doctor').style.display = 'block';
            document.getElementById('form-enfermera').style.display = 'none';
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        } else {
            document.getElementById('form-doctor').style.display = 'none';
            document.getElementById('form-enfermera').style.display = 'block';
            tabs[1].classList.add('active');
            tabs[0].classList.remove('active');
        }
    }

    function guardarPersonal(tipo) {
        alert("Paso 2 completado: Formulario listo. ¿Inge, pasamos al Backend para conectar esto?");
    }
</script>
</body>
</html>
