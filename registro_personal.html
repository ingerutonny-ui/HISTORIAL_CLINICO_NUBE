<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Personal - OHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0e1a; margin: 0; padding: 20px; text-transform: uppercase; }
        .hoja-sistema { background-color: white; width: 100%; max-width: 1200px; margin: 0 auto; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); overflow: hidden; }
        .input-ohs { background-color: #f8fafc; border-radius: 12px; border: 2px solid #e2e8f0; padding: 16px; color: #1e293b; width: 100%; font-size: 12px; font-weight: 700; }
        .active-doc { border: 3px solid #2563eb; background-color: #eff6ff; color: #1e40af; }
        .active-enf { border: 3px solid #10b981; background-color: #ecfdf5; color: #065f46; }
        .inactive-btn { border: 2px solid #f1f5f9; background-color: #f8fafc; color: #94a3b8; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <div class="max-w-[1200px] mx-auto w-full mb-4">
        <button onclick="location.href='lista_personal.html'" class="bg-slate-800 text-white px-6 py-2 rounded-lg text-[10px] font-black">VOLVER</button>
    </div>
    <div class="hoja-sistema">
        <div class="p-8 border-b"><h1 id="titulo-form" class="text-4xl font-black text-blue-900">EDITAR REGISTRO</h1></div>
        <div class="p-12">
            <form id="form-registro" class="space-y-8">
                <input type="hidden" id="tipo_empleado">
                <div class="grid grid-cols-2 gap-8">
                    <div><label>C.I.</label><input type="text" id="ci_val" class="input-ohs" readonly></div>
                    <div><label>NOMBRES</label><input type="text" id="nombre_val" class="input-ohs"></div>
                    <div><label>APELLIDOS</label><input type="text" id="paterno_val" class="input-ohs"></div>
                    <div><label>ESPECIALIDAD</label><input type="text" id="especialidad_val" class="input-ohs"></div>
                    <div><label>TURNO</label>
                        <select id="turno_val" class="input-ohs">
                            <option value="MAÑANA">MAÑANA</option><option value="TARDE">TARDE</option><option value="NOCHE">NOCHE</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-700 text-white py-5 rounded-xl font-black">GUARDAR CAMBIOS</button>
            </form>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const editId = params.get('id');
        const editTipo = params.get('tipo'); 

        async function cargarDatos() {
            if(!editId || !editTipo) return;
            
            // Ajustamos la ruta a plural según estándar de tu API
            const endpoint = editTipo === 'doctor' ? 'doctores' : 'enfermeras';
            const url = `https://historial-clinico-nube.onrender.com/${endpoint}/${editId}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                console.log("Datos recibidos del servidor:", data);

                document.getElementById('ci_val').value = editId;
                document.getElementById('tipo_empleado').value = editTipo;

                // Mapeo exhaustivo para cubrir cualquier variante de campo
                const n = data.nombre_doc || data.nombre_enfe || data.nombre || "";
                const a = data.appaterno_doc || data.appaterno_enfe || data.appaterno || data.apellidos || "";
                const e = data.especialidad || "";
                const t = data.turno_doc || data.turno_enfe || data.turno || "MAÑANA";

                document.getElementById('nombre_val').value = n;
                document.getElementById('paterno_val').value = a;
                document.getElementById('especialidad_val').value = e;
                document.getElementById('turno_val').value = t;

            } catch(e) { console.error("Error al cargar:", e); }
        }

        document.getElementById('form-registro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const endpoint = editTipo === 'doctor' ? 'doctores' : 'enfermeras';
            alert("Guardando...");
            window.location.href = 'lista_personal.html';
        });

        cargarDatos();
    </script>
</body>
</html>
