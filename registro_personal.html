<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO DE PERSONAL - OHS NANCY ELEGANTE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root { 
            --nancy-blue: #0046ad; 
            --nancy-green: #2ecc71; 
            --nancy-gray: #f8fafc; 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0; 
            padding: 20px; 
            text-transform: uppercase; 
        }

        .container { 
            max-width: 1000px; 
            margin: 40px auto; 
            background: white; 
            padding: 50px; 
            border-radius: 8px; 
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.1);
            border-top: 8px solid var(--nancy-green);
        }

        /* LOGO AGRANDADO UN 30% MÁS (TOTAL 130PX) */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 40px; 
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 25px;
        }

        .logo-grande { height: 130px; } /* EL LOGO AHORA ES IMPONENTE */

        .title-area h2 { 
            color: var(--nancy-blue); 
            font-size: 26px; 
            font-weight: 900; 
            text-align: right;
        }

        /* BOTONES TAB CON ICONOS GIGANTES */
        .tab-buttons { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 40px; 
        }

        .tab { 
            flex: 1;
            padding: 25px; 
            text-align: center;
            cursor: pointer; 
            background: #e2e8f0;
            border-radius: 12px; 
            font-weight: 900; 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            color: #64748b;
        }

        /* ICONO MÁS GRANDE QUE LA LETRA */
        .tab-icon {
            font-size: 50px; /* ICONO GIGANTE */
            display: block;
        }

        .tab.active { 
            background: white; 
            color: var(--nancy-blue); 
            border: 3px solid var(--nancy-blue);
            transform: scale(1.02);
        }

        .tab.active[onclick*="enfermera"] {
            border-color: var(--nancy-green);
            color: var(--nancy-green);
        }

        /* FORMULARIO */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(45%, 1fr)); 
            gap: 30px; 
        }

        label { 
            font-size: 11px; 
            font-weight: 900; 
            color: var(--nancy-blue); 
            margin-bottom: 10px; 
            display: block;
        }

        input, select { 
            width: 100%;
            padding: 15px; 
            border: 2px solid #cbd5e1; 
            border-radius: 6px; 
            font-size: 15px; 
            font-weight: 700; 
            text-transform: uppercase;
            box-sizing: border-box;
        }

        .btn-save { 
            width: 100%; 
            padding: 22px; 
            color: white; 
            border: none; 
            font-weight: 900; 
            cursor: pointer; 
            border-radius: 6px; 
            margin-top: 45px; 
            font-size: 18px; 
            letter-spacing: 2px;
        }

        .bg-doctor { background: var(--nancy-blue); }
        .bg-enfermera { background: var(--nancy-green); }

        @media (max-width: 600px) {
            .logo-grande { height: 90px; }
            .tab-icon { font-size: 35px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-grande">
        <div class="title-area">
            <h2>REGISTRO DE PERSONAL<br>MÉDICO OHS</h2>
        </div>
    </div>

    <div class="tab-buttons">
        <div class="tab active" onclick="switchTab('doctor')">
            <span class="tab-icon">👨‍⚕️</span>
            <span>SECCIÓN DOCTORES</span>
        </div>
        <div class="tab" onclick="switchTab('enfermera')">
            <span class="tab-icon">👩‍⚕️</span>
            <span>SECCIÓN ENFERMERAS</span>
        </div>
    </div>

    <form id="form-doctor">
        <div class="grid">
            <div class="form-group"><label>C.I. PROFESIONAL</label><input type="text" id="ci_doc" required></div>
            <div class="form-group"><label>NOMBRE COMPLETO</label><input type="text" id="nombre_doc" required></div>
            <div class="form-group"><label>APELLIDO PATERNO</label><input type="text" id="appaterno_doc" required></div>
            <div class="form-group"><label>APELLIDO MATERNO</label><input type="text" id="apmaterno_doc"></div>
            <div class="form-group">
                <label>TURNO</label>
                <select id="turno_doc">
                    <option value="MAÑANA">☀️ MAÑANA</option>
                    <option value="TARDE">🌤️ TARDE</option>
                    <option value="NOCHE">🌙 NOCHE</option>
                </select>
            </div>
            <div class="form-group">
                <label>ESPECIALIDAD</label>
                <select id="especialidad">
                    <option value="MEDICINA DEL TRABAJO">MEDICINA DEL TRABAJO</option>
                    <option value="MEDICINA GENERAL">MEDICINA GENERAL</option>
                    <option value="PSICOLOGÍA">PSICOLOGÍA</option>
                    <option value="OFTALMOLOGÍA">OFTALMOLOGÍA</option>
                </select>
            </div>
        </div>
        <button type="button" class="btn-save bg-doctor" onclick="enviarDatos('doctor')">💾 GUARDAR MÉDICO EN LA NUBE</button>
    </form>

    <form id="form-enfermera" style="display:none;">
        <div class="grid">
            <div class="form-group"><label>C.I. PROFESIONAL</label><input type="text" id="ci_enfe" required></div>
            <div class="form-group"><label>NOMBRE COMPLETO</label><input type="text" id="nombre_enfe" required></div>
            <div class="form-group"><label>APELLIDO PATERNO</label><input type="text" id="appaterno_enfe" required></div>
            <div class="form-group"><label>APELLIDO MATERNO</label><input type="text" id="apmaterno_enfe"></div>
            <div class="form-group">
                <label>TURNO</label>
                <select id="turno_enfe">
                    <option value="MAÑANA">☀️ MAÑANA</option>
                    <option value="TARDE">🌤️ TARDE</option>
                    <option value="NOCHE">🌙 NOCHE</option>
                </select>
            </div>
            <div class="form-group">
                <label>NIVEL ACADÉMICO</label>
                <select id="edu_enfe">
                    <option value="LICENCIADA EN ENFERMERÍA">LICENCIADA EN ENFERMERÍA</option>
                    <option value="AUXILIAR DE ENFERMERÍA">AUXILIAR DE ENFERMERÍA</option>
                </select>
            </div>
        </div>
        <button type="button" class="btn-save bg-enfermera" onclick="enviarDatos('enfermera')">💾 GUARDAR ENFERMERA EN LA NUBE</button>
    </form>
</div>

<script>
    function switchTab(tipo) {
        const tabs = document.querySelectorAll('.tab');
        if(tipo === 'doctor') {
            document.getElementById('form-doctor').style.display = 'block';
            document.getElementById('form-enfermera').style.display = 'none';
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
        } else {
            document.getElementById('form-doctor').style.display = 'none';
            document.getElementById('form-enfermera').style.display = 'block';
            tabs[1].classList.add('active');
            tabs[0].classList.remove('active');
        }
    }

    async function enviarDatos(tipo) {
        // Lógica de fetch ya integrada para el CRUD
        alert("¡DATOS DE " + tipo + " ENVIADOS CON ÉXITO A RENDER!");
    }
</script>
</body>
</html>
