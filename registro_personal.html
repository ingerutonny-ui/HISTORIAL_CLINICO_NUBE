<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO MÉDICO OHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; text-transform: uppercase; }
        .input-ohs { background-color: #1e293b; border-radius: 8px; border: 1px solid #334155; padding: 14px; color: white; width: 100%; font-size: 12px; }
        .active-doc { border-color: #3b82f6; background-color: #1e3a8a; color: white; }
        .active-enf { border-color: #10b981; background-color: #064e3b; color: white; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen p-4 md:p-10">
    <div class="max-w-4xl mx-auto bg-slate-900 rounded-3xl shadow-2xl overflow-hidden border border-slate-800">
        <div class="p-8 flex justify-between items-center border-b border-slate-800">
            <button onclick="location.href='lista_personal.html'" class="text-slate-400 hover:text-white transition">← VOLVER</button>
            <div class="text-right">
                <h1 class="text-xl font-black text-white">NUEVO REGISTRO</h1>
                <h2 class="text-[10px] font-bold text-blue-500 tracking-widest">OHS NANCY CLOUD</h2>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 px-10 my-8">
            <button onclick="setModo('doctor')" id="btn-doc" class="active-doc p-6 rounded-2xl flex flex-col items-center gap-2 transition-all">
                <i class="fa-solid fa-stethoscope text-3xl"></i>
                <span class="text-[9px] font-bold uppercase">Doctores</span>
            </button>
            <button onclick="setModo('enfermera')" id="btn-enf" class="p-6 rounded-2xl flex flex-col items-center gap-2 border border-slate-800 text-slate-600 transition-all">
                <i class="fa-solid fa-syringe text-3xl"></i>
                <span class="text-[9px] font-bold uppercase">Enfermeras</span>
            </button>
        </div>

        <form id="form-registro" class="px-10 pb-12 space-y-6">
            <input type="hidden" id="tipo_empleado" value="doctor">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div><label class="text-[9px] text-slate-500 font-bold block mb-2">C.I.</label><input type="text" id="ci_val" class="input-ohs" placeholder="DOCUMENTO"></div>
                <div><label class="text-[9px] text-slate-500 font-bold block mb-2">NOMBRE</label><input type="text" id="nombre_val" class="input-ohs" placeholder="NOMBRE"></div>
                <div><label class="text-[9px] text-slate-500 font-bold block mb-2">PATERNO</label><input type="text" id="paterno_val" class="input-ohs" placeholder="PATERNO"></div>
                <div><label class="text-[9px] text-slate-500 font-bold block mb-2">TURNO</label>
                    <select id="turno_val" class="input-ohs"><option>MAÑANA</option><option>TARDE</option><option>NOCHE</option></select>
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black tracking-widest hover:bg-blue-700 transition">GUARDAR EN LA NUBE</button>
        </form>
    </div>

    <script>
        function setModo(t) {
            document.getElementById('tipo_empleado').value = t;
            document.getElementById('btn-doc').className = t==='doctor' ? 'active-doc p-6 rounded-2xl flex flex-col items-center gap-2' : 'p-6 rounded-2xl flex flex-col items-center gap-2 border border-slate-800 text-slate-600';
            document.getElementById('btn-enf').className = t==='enfermera' ? 'active-enf p-6 rounded-2xl flex flex-col items-center gap-2' : 'p-6 rounded-2xl flex flex-col items-center gap-2 border border-slate-800 text-slate-600';
        }
        document.getElementById('form-registro').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("✅ ÉXITO: PERSONAL REGISTRADO EN LA NUBE (MODO VIRTUAL)");
            location.href = 'lista_personal.html';
        });
    </script>
</body>
</html>
