<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | FICHA OFTALMOLÓGICA LEGAL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --emerald: #10b981; --dark: #0f172a; --blue: #3b82f6; }
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; padding: 10px; color: var(--dark); font-size: 10px; }
        .form-container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border: 1.5px solid #000; }
        .header-nancy { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--emerald); padding-bottom: 8px; margin-bottom: 10px; }
        .header-nancy img { height: 40px; }
        .section-title { background: #000; color: #fff; padding: 3px 10px; margin: 6px 0; font-weight: 800; font-size: 10px; text-transform: uppercase; }
        .table-legal { width: 100%; border-collapse: collapse; margin-bottom: 8px; border: 1.5px solid #000; }
        .table-legal th, .table-legal td { border: 1px solid #000; padding: 2px 5px; vertical-align: middle; }
        .text-center { text-align: center; }
        .bg-grey { background: #f1f5f9; font-weight: 800; text-align: center; }
        .bg-green-soft { background: #eefdf5; }
        label { font-weight: 800; color: #64748b; text-transform: uppercase; font-size: 9px; }
        input, select, textarea { border: 1px solid #cbd5e1 !important; font-size: 10px !important; font-weight: 600 !important; text-transform: uppercase; padding: 2px 4px !important; border-radius: 0 !important; }
        .input-auto { background-color: #f8fafc !important; border: 1px solid #e2e8f0 !important; color: #1e293b; font-weight: 800 !important; }
        .signature-section { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin-top: 30px; text-align: center; }
        .signature-line { border-top: 1px solid #000; margin-top: 40px; padding-top: 5px; font-weight: 800; text-transform: uppercase; font-size: 9px; }
        @media print { .no-print { display: none !important; } body { padding: 0; background: white; } .form-container { width: 100%; max-width: 100%; box-shadow: none; border: 1.5px solid #000; } }
    </style>
</head>
<body>

<div class="form-container">
    <div class="no-print d-flex justify-content-between mb-3">
        <a href="d_menu.html" class="btn btn-secondary btn-sm" style="background:#64748b; border:none;">← VOLVER AL MENÚ</a>
        <button onclick="window.print()" class="btn btn-dark btn-sm">🖨️ IMPRIMIR</button>
    </div>

    <div class="header-nancy">
        <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" alt="Logo">
        <div class="text-end">
            <h6 class="m-0" style="font-weight: 900;">FICHA DE EVALUACIÓN OFTALMOLÓGICA</h6>
        </div>
    </div>

    <form id="oftalmoForm">
        <div class="no-print mb-3 p-2 bg-light border">
            <label>CÓDIGO PACIENTE:</label>
            <input type="text" id="codigo_search" class="form-control d-inline-block w-25" placeholder="INGRESE CÓDIGO">
            <button type="button" onclick="buscarPaciente()" class="btn btn-success" style="background:var(--emerald); border:none;">BUSCAR</button>
        </div>

        <div class="section-title">I. FILIACION DEL PACIENTE</div>
        <div class="row g-2 mb-2">
            <div class="col-5"><label>NOMBRE COMPLETO</label><input id="nombre_completo" class="form-control input-auto" readonly></div>
            <div class="col-2"><label>C.I.</label><input id="ci" class="form-control input-auto" readonly></div>
            <div class="col-1"><label>EDAD</label><input id="edad" class="form-control input-auto" readonly></div>
            <div class="col-1"><label>SEXO</label><input id="sexo" class="form-control input-auto" readonly></div>
            <div class="col-3"><label>OCUPACIÓN / PROFESIÓN</label><input id="ocupacion" class="form-control input-auto" readonly></div>
        </div>
        
        <div class="no-print mt-4">
            <button type="submit" class="btn btn-primary w-100 p-3">💾 GUARDAR REGISTRO FINAL</button>
        </div>
    </form>
</div>

<script>
    const API_BASE = 'https://historial-clinico-nube.onrender.com';
    let p_id = null;

    async function buscarPaciente() {
        const cod = document.getElementById('codigo_search').value.trim();
        if (!cod) { alert("INGRESE UN CÓDIGO"); return; }
        
        try {
            const resp = await fetch(`${API_BASE}/api/paciente-completo/${encodeURIComponent(cod)}`);
            if (!resp.ok) throw new Error("CÓDIGO NO ENCONTRADO");
            
            const respuesta = await resp.json();
            const data = respuesta.paciente;
            
            if (data) {
                document.getElementById('nombre_completo').value = `${data.nombre || ''} ${data.apellido || ''}`;
                document.getElementById('ci').value = data.ci || '';
                p_id = data.id; 
                alert("PACIENTE ENCONTRADO");
            }
        } catch (err) {
            alert(err.message);
        }
    }

    document.getElementById('oftalmoForm').onsubmit = async (e) => {
        e.preventDefault();
        if(!p_id) { alert("ERROR: PRIMERO DEBE BUSCAR UN CÓDIGO VÁLIDO"); return; }
        alert("GUARDANDO EN LA NUBE...");
    };
</script>
</body>
</html>
