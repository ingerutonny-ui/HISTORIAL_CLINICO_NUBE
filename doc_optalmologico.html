<script>
    const API = 'https://historial-clinico-936s.onrender.com';

    // JALADO DE 5 DATOS DE FILIACIÓN
    document.getElementById('codigo_search').addEventListener('change', async (e) => {
        const cod = e.target.value.trim();
        if(!cod) return;
        try {
            const resp = await fetch(`${API}/pacientes/codigo/${cod}`);
            const data = await resp.json();
            if(data) {
                // Datos básicos
                document.getElementById('nombre_completo').value = `${data.nombre} ${data.apellido}`;
                document.getElementById('ci').value = data.ci;
                window.p_id = data.id;

                // Datos de filiación extendidos
                const respF = await fetch(`${API}/api/paciente-completo/${data.id}`);
                const dF = await respF.json();
                if(dF.filiacion) {
                    document.getElementById('edad').value = dF.filiacion.edad || '';
                    document.getElementById('sexo').value = dF.filiacion.sexo || '';
                    document.getElementById('ocupacion').value = dF.filiacion.profesion_oficio || '';
                }
            }
        } catch (err) { alert("CÓDIGO NO ENCONTRADO"); }
    });

    // CORRECCIÓN DE GUARDADO (SIN ERROR 404)
    document.getElementById('oftalmoForm').onsubmit = async (e) => {
        e.preventDefault();
        if(!window.p_id) { alert("ERROR: PRIMERO JALE LOS DATOS CON EL CÓDIGO"); return; }
        
        const payload = {
            paciente_id: window.p_id,
            // Agrega aquí el mapeo completo de tus campos P1, P2, P3
            lentes: document.querySelector('[name="lentes"]:checked')?.value || 'NO'
        };

        try {
            // Ruta corregida según tu Backend
            const res = await fetch(`${API}/api/guardar-oftalmologia`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if(res.ok) { 
                alert("GUARDADO EXITOSO EN LA NUBE"); 
                window.print(); // Abre diálogo de impresión automáticamente
            }
        } catch (err) { alert("ERROR DE CONEXIÓN AL GUARDAR"); }
    };
</script>
