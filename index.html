<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HISTORIAL CLÍNICO NUBE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050a18; /* El tono oscuro profundo de la captura */
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Logo circular limpio sin bordes */
        .logo-circulo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 40px;
        }
        .logo-circulo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Títulos con negrilla exacta */
        h1 {
            font-size: 2.2rem;
            font-weight: 900; /* Negrilla extrema como la captura */
            margin: 0;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.7rem;
            color: #64748b;
            letter-spacing: 3px;
            margin-top: 5px;
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        /* Grid de Módulos */
        .grid-acceso {
            display: flex;
            gap: 20px;
            margin-bottom: 70px;
        }

        .card-modulo {
            background-color: #0f172a;
            width: 170px;
            height: 170px;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        .card-modulo:hover {
            transform: scale(1.03);
        }

        /* Iconos Idénticos */
        .icon-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .card-modulo i { font-size: 2.4rem; }
        
        /* Gris para los dos doctores */
        .icon-medico { color: #475569; }
        /* Azul para la serpiente */
        .icon-enfermera { color: #0ea5e9; }

        .card-modulo span {
            color: white;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Textos de Estado */
        .status-label {
            margin-top: 15px;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-align: center;
        }

        .active-text { color: #10b981; } /* Verde exacto */

        /* Botón Visor Inferior */
        .visor-container {
            border: 1px solid #1e293b;
            border-radius: 50px;
            padding: 10px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #475569;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 700;
            background-color: rgba(15, 23, 42, 0.5);
            text-transform: uppercase;
        }

        .visor-container i { color: #0ea5e9; }

        .footer-txt {
            position: fixed;
            bottom: 30px;
            font-size: 0.5rem;
            color: #334155;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="logo-circulo">
        <img src="puerta.jpeg" alt="OHS">
    </div>

    <h1>HISTORIAL CLÍNICO NUBE</h1>
    <div class="subtitle">PANEL DE CONTROL DE ACCESO</div>

    <div class="grid-acceso">
        <div class="flex-col items-center">
            <a href="lista_personal.html" class="card-modulo">
                <div class="icon-container">
                    <i class="fas fa-user-md icon-medico"></i>
                    <span style="color: #475569; font-size: 1.5rem;">/</span>
                    <i class="fas fa-user-nurse icon-medico"></i>
                </div>
                <span>MÉDICO</span>
            </a>
            <div class="status-label active-text">MÓDULO ACTIVO</div>
        </div>

        <div class="flex-col items-center">
            <a href="registro_paciente.html" class="card-modulo">
                <i class="fas fa-caduceus icon-enfermera" style="font-size: 2.8rem;"></i>
                <span style="margin-top: 8px;">ENFERMERA</span>
            </a>
            <div class="status-label active-text">MÓDULO ACTIVO</div>
        </div>
    </div>

    <a href="menu_visor.html" class="visor-container">
        <i class="fas fa-search"></i> VISOR DE HISTORIAL
    </a>

    <div class="footer-txt">SISTEMA DE GESTIÓN HOSPITALARIA V1.0</div>

</body>
</html>
