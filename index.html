<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-6">

    <div id="loader-screen" class="text-center">
        <div class="loader ease-linear rounded-full border-4 border-slate-900 h-12 w-12 mb-4 mx-auto"></div>
        <p class="text-slate-600 text-[9px] uppercase tracking-[0.4em] animate-pulse font-bold">Cargando Protocolos...</p>
    </div>

   <div id="portal" class="hidden text-center fade-in w-full max-w-lg">
        <div class="relative inline-block mb-8">
            <img src="puerta.jpeg" alt="Logo" class="w-32 h-32 mx-auto rounded-full border-4 border-slate-900 shadow-2xl object-cover">
        </div>

        <h1 class="text-white text-3xl font-bold uppercase tracking-tighter mb-1">Historial Clínico Nube</h1>
        <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] mb-12">Panel de Control de Acceso</p>

        <div class="flex flex-wrap gap-8 justify-center items-start">
            <div class="flex flex-col items-center">
                <button onclick="location.href='lista_personal.html'" 
                    class="w-40 py-10 bg-slate-900 rounded-[2.5rem] border border-slate-800 hover:border-blue-500 hover:bg-slate-900/80 transition-all duration-500 group flex flex-col items-center shadow-2xl shadow-black/50">
                    <div class="text-4xl mb-4 group-hover:scale-110 transition-transform duration-500 text-blue-500">👨‍⚕️</div>
                    <span class="text-[11px] font-bold text-slate-300 uppercase tracking-widest group-hover:text-blue-400">Personal</span>
                </button>
                <p class="text-[7px] text-blue-900 uppercase tracking-[0.3em] mt-4 font-bold">Módulo Activo</p>
            </div>

            <div class="flex flex-col items-center">
                <button onclick="location.href='pacientes.html'" 
                    class="w-40 py-10 bg-slate-900 rounded-[2.5rem] border border-slate-800 hover:border-emerald-500 hover:bg-slate-900/80 transition-all duration-500 group flex flex-col items-center shadow-2xl shadow-black/50">
                    <div class="text-4xl mb-4 group-hover:scale-110 transition-transform duration-500 text-emerald-500">⚕️</div>
                    <span class="text-[11px] font-bold text-slate-300 uppercase tracking-widest group-hover:text-emerald-400">Pacientes</span>
                </button>
                <p class="text-[7px] text-emerald-900 uppercase tracking-[0.3em] mt-4 font-bold">Módulo Activo</p>
            </div>
        </div>

        <script>
            setTimeout(() => {
                document.getElementById('loader-screen').classList.add('hidden');
                document.getElementById('portal').classList.remove('hidden');
            }, 2000);
        </script>
</body>
</html>
