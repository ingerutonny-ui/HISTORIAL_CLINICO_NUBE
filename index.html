<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HISTORIAL CLÍNICO NUBE - Panel de Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #0a0e1a;
            --card-bg: #161b2b;
            --accent-blue: #007bff;
            --accent-green: #28a745;
            --text-main: #ffffff;
            --text-dim: #6c757d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 20px;
            border: 3px solid var(--accent-blue);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .grid-container {
            display: flex;
            gap: 30px;
            margin-bottom: 50px;
        }

        .module-card {
            background-color: var(--card-bg);
            width: 180px;
            height: 180px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .module-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0, 123, 255, 0.2);
        }

        .module-card i, .module-card .icon-placeholder {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .icon-personal { color: #ffc107; }
        .icon-pacientes { color: #00d4ff; }

        .module-card span {
            color: var(--text-main);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .status-tag {
            font-size: 0.65rem;
            margin-top: 10px;
            color: #00ff88;
            font-weight: bold;
        }

        /* Botón Inferior Corregido */
        .viewer-btn {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-dim);
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .viewer-btn:hover {
            background-color: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .footer-text {
            position: fixed;
            bottom: 20px;
            font-size: 0.6rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="logo-container">
            <img src="puerta.jpeg" alt="Logo OHS">
        </div>
        <h1>HISTORIAL CLÍNICO NUBE</h1>
        <div class="subtitle">PANEL DE CONTROL DE ACCESO</div>
    </div>

    <div class="grid-container">
        <a href="lista_personal.html" class="module-card">
            <i class="fas fa-user-md icon-personal"></i>
            <span>PERSONAL</span>
            <div class="status-tag">MÓDULO ACTIVO</div>
        </a>

        <a href="registro_paciente.html" class="module-card">
            <i class="fas fa-notes-medical icon-pacientes"></i>
            <span>PACIENTES</span>
            <div class="status-tag">MÓDULO ACTIVO</div>
        </a>
    </div>

    <a href="menu_visor.html" class="viewer-btn">
        <i class="fas fa-search"></i> VISOR DE HISTORIAL
    </a>

    <div class="footer-text">SISTEMA DE GESTIÓN HOSPITALARIA V1.0</div>

</body>
</html>
