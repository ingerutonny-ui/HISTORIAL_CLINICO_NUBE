<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HISTORIAL CLÍNICO NUBE - Acceso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: #0f172a;
            --text-white: #ffffff;
            --text-dim: #64748b;
            --accent-blue: #0ea5e9;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-transform: uppercase;
        }

        /* Logo Circular */
        .logo-main {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 2px solid var(--accent-blue);
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.3);
        }

        .logo-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Títulos */
        h1 {
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 4px;
            margin-top: 8px;
            margin-bottom: 50px;
        }

        /* Contenedor de Módulos */
        .modules-grid {
            display: flex;
            gap: 25px;
            margin-bottom: 60px;
        }

        .card {
            background-color: var(--card-bg);
            width: 170px;
            height: 170px;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card:hover {
            transform: translateY(-5px);
            background-color: #1e293b;
        }

        /* Iconos específicos de la captura */
        .card i {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .icon-medico { color: #94a3b8; } /* Grisáceo como la captura */
        .icon-enfermera { color: #0ea5e9; } /* Azul brillante */

        .card span {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-white);
            letter-spacing: 1px;
        }

        /* Tags de estado inferiores */
        .status-container {
            margin-top: 15px;
            text-align: center;
        }

        .status-text {
            font-size: 0.55rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .status-active { color: #10b981; } /* Verde para Módulo Activo */

        /* Botón Visor */
        .visor-btn {
            background-color: rgba(15, 23, 42, 0.8);
            border: 1px solid #1e293b;
            color: var(--text-dim);
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .visor-btn:hover {
            color: white;
            border-color: var(--accent-blue);
        }

        /* Footer */
        .footer-info {
            position: fixed;
            bottom: 30px;
            font-size: 0.55rem;
            color: #334155;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="logo-main">
        <img src="puerta.jpeg" alt="OHS LOGO">
    </div>

    <h1>HISTORIAL CLÍNICO NUBE</h1>
    <div class="subtitle">PANEL DE CONTROL DE ACCESO</div>

    <div class="modules-grid">
        <div class="flex flex-col items-center">
            <a href="lista_personal.html" class="card">
                <i class="fas fa-user-md icon-medico"></i>
                <span>MÉDICO</span>
            </a>
            <div class="status-container">
                <div class="status-text status-active">MÓDULO ACTIVO</div>
            </div>
        </div>

        <div class="flex flex-col items-center">
            <a href="registro_paciente.html" class="card">
                <i class="fas fa-notes-medical icon-enfermera"></i>
                <span>ENFERMERA</span>
            </a>
            <div class="status-container">
                <div class="status-text status-active">MÓDULO ACTIVO</div>
            </div>
        </div>
    </div>

    <a href="menu_visor.html" class="visor-btn">
        <i class="fas fa-search"></i> VISOR DE HISTORIAL
    </a>

    <div class="footer-info">SISTEMA DE GESTIÓN HOSPITALARIA V1.0</div>

</body>
</html>
