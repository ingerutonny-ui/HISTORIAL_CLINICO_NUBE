<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | Inicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">
    <style>
        /* Aumentamos la escala base del body para que todo el contenido crezca un 25% */
        body { transform-origin: top center; }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen p-6 scale-[1.25]">

    <div id="loader-screen" class="text-center">
        <div class="loader ease-linear rounded-full border-4 border-slate-900 h-16 w-16 mb-4 mx-auto"></div>
        <p class="text-slate-600 text-[11px] uppercase tracking-[0.4em] animate-pulse font-bold">Cargando Protocolos...</p>
    </div>

    <div id="portal" class="hidden text-center fade-in w-full max-w-xl">
        <div class="relative inline-block mb-10">
            <img src="puerta.jpeg" alt="Logo" class="w-40 h-40 mx-auto rounded-full border-4 border-slate-900 shadow-2xl object-cover">
            <div class="absolute inset-0 rounded-full shadow-[inset_0_0_20px_rgba(0,0,0,0.5)]"></div>
        </div>

        <h1 class="text-white text-4xl font-bold uppercase tracking-tighter mb-2">Historial Clínico Nube</h1>
        <p class="text-slate-500 text-[12px] uppercase tracking-[0.4em] mb-14">Panel de Control de Acceso</p>

        <div class="flex flex-wrap gap-10 justify-center items-start">
            
            <div class="flex flex-col items-center">
                <button onclick="location.href='lista_personal.html'" 
                    class="w-52 py-12 bg-slate-900 rounded-[3rem] border border-slate-800 hover:border-blue-500 hover:bg-slate-900/80 transition-all duration-500 group flex flex-col items-center shadow-2xl shadow-black/50">
                    <div class="text-5xl mb-5 group-hover:scale-110 transition-transform duration-500">👨‍⚕️/👩‍⚕️</div>
                    <span class="text-[14px] font-bold text-slate-300 uppercase tracking-widest group-hover:text-blue-400 transition-colors">Médico</span>
                </button>
                <p class="text-[9px] text-emerald-900 uppercase tracking-[0.3em] mt-5 font-bold">Módulo Activo</p>
            </div>

            <div class="flex flex-col items-center">
                <button onclick="location.href='enfermera.html'" 
                    class="w-52 py-12 bg-slate-900 rounded-[3rem] border border-slate-800 hover:border-emerald-500 hover:bg-slate-900/80 transition-all duration-500 group flex flex-col items-center shadow-2xl shadow-black/50">
                    <div class="text-5xl mb-5 group-hover:scale-110 transition-transform duration-500 text-emerald-500">⚕️</div>
                    <span class="text-[14px] font-bold text-slate-300 uppercase tracking-widest group-hover:text-emerald-400 transition-colors">Enfermera</span>
                </button>
                <p class="text-[9px] text-emerald-900 uppercase tracking-[0.3em] mt-5 font-bold">Módulo Activo</p>
            </div>
        </div>

        <div class="mt-16 flex justify-center">
            <button onclick="location.href='opciones_visor.html'"
                class="flex items-center gap-3 px-8 py-3 bg-slate-900/50 border border-slate-800 rounded-full hover:bg-slate-800 hover:border-slate-700 transition-all duration-300 group">
                <span class="text-lg opacity-60 group-hover:opacity-100 transition-opacity">🔍</span>
                <span class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.2em] group-hover:text-slate-300">Visor de Historial</span>
            </button>
        </div>

        <div class="mt-10">
            <p class="text-slate-700 text-[10px] uppercase tracking-widest font-medium">Sistema de Gestión Hospitalaria v1.0</p>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('loader-screen').classList.add('hidden');
            document.getElementById('portal').classList.remove('hidden');
        }, 3000);
    </script>
</body>
</html>
