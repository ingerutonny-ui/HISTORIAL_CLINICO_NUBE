<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC NUBE | REGISTRO ENFERMERA</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .top-bar { width: 100%; background: #212529; padding: 12px 20px; color: white; display: flex; align-items: center; font-size: 13px; font-weight: 800; text-transform: uppercase; }
        .top-bar a { color: white; text-decoration: none; cursor: pointer; }
        .card { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 480px; text-align: center; margin-top: 40px; margin-bottom: 40px; }
        .logo-img { height: 50px; margin-bottom: 10px; }
        h2 { color: #1e293b; font-size: 1.5rem; margin-bottom: 30px; text-transform: uppercase; font-weight: 900; letter-spacing: -0.5px; }
        .input-group { text-align: left; margin-bottom: 18px; }
        label { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-left: 2px; }
        input, select { 
            width: 100%; padding: 14px; margin-top: 6px; border: 2px solid #e2e8f0; 
            border-radius: 12px; box-sizing: border-box; font-size: 16px; 
            font-weight: 700; text-transform: uppercase; transition: 0.3s; color: #1e293b;
        }
        input:focus, select:focus { border-color: #3b82f6; outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .btn-guardar { 
            width: 100%; background: #3b82f6; color: white; border: none; 
            padding: 18px; border-radius: 12px; font-weight: 900; font-size: 16px; 
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }
        .btn-guardar:hover { background: #2563eb; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="index.html">← VOLVER AL MENÚ</a>
</div>

<div class="card">
    <img src="https://ingerutonny-ui.github.io/HISTORIAL_CLINICO_NUBE/logo.png" class="logo-img">
    <h2>REGISTRO DE ENFERMERÍA</h2>

    <div class="input-group">
        <label>Cédula de Identidad (CI)</label>
        <input type="number" id="ci_enfe" placeholder="MÁXIMO 10 DÍGITOS" oninput="if(this.value.length > 10) this.value = this.value.slice(0, 10)">
    </div>

    <div class="input-group">
        <label>Apellido Paterno</label>
        <input type="text" id="appaterno_enfe" maxlength="15" placeholder="MÁX. 15 LETRAS">
    </div>

    <div class="input-group">
        <label>Apellido Materno</label>
        <input type="text" id="apmaterno_enfe" maxlength="15" placeholder="MÁX. 15 LETRAS">
    </div>

    <div class="input-group">
        <label>Nombres</label>
        <input type="text" id="nombre_enfe" maxlength="15" placeholder="MÁX. 15 LETRAS">
    </div>

    <div class="input-group">
        <label>Turno</label>
        <select id="turno_enfe">
            <option value="MAÑANA">MAÑANA</option>
            <option value="TARDE">TARDE</option>
            <option value="NOCHE">NOCHE</option>
        </select>
    </div>

    <div class="input-group">
        <label>Grado de Instrucción</label>
        <select id="edu_enfe">
            <option value="TEC.MED">TEC.MED</option>
            <option value="TEC.SUP">TEC.SUP</option>
            <option value="LIC.">LIC.</option>
        </select>
    </div>

    <button class="btn-guardar" onclick="guardarEnfermera()">REGISTRAR ENFERMERA</button>
</div>

<script>
    const API_URL = 'https://historial-clinico-936s.onrender.com';

    async function guardarEnfermera() {
        const datos = {
            ci_enfe: document.getElementById('ci_enfe').value,
            appaterno_enfe: document.getElementById('appaterno_enfe').value.toUpperCase(),
            apmaterno_enfe: document.getElementById('apmaterno_enfe').value.toUpperCase(),
            nombre_enfe: document.getElementById('nombre_enfe').value.toUpperCase(),
            turno_enfe: document.getElementById('turno_enfe').value,
            edu_enfe: document.getElementById('edu_enfe').value
        };

        if (!datos.ci_enfe || !datos.nombre_enfe) {
            alert("POR FAVOR, COMPLETE LOS CAMPOS OBLIGATORIOS.");
            return;
        }

        try {
            const response = await fetch(`${API_URL}/enfermeras/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });

            if (response.ok) {
                alert("✅ ENFERMERA REGISTRADA CORRECTAMENTE.");
                window.location.href = 'index.html';
            } else {
                alert("❌ ERROR AL GUARDAR. REVISE LOS DATOS.");
            }
        } catch (e) {
            alert("❌ ERROR DE CONEXIÓN CON EL SERVIDOR.");
        }
    }
</script>
</body>
</html>
