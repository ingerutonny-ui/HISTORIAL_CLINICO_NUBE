<!DOCTYPE html>

    <title>HC NUBE | Especialidades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">

<body class="bg-slate-950 flex flex-col items-center justify-center min-h-screen p-4">

    <a href="enfermera.html" class="mb-10 text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] hover:text-emerald-400 transition-colors">

            </div>

                <span class="text-[10px] font-bold text-slate-600 uppercase tracking-widest text-center">Osteomuscular</span>
                <div class="absolute inset-0 flex items-center justify-center bg-black/60 opacity-0 hover:opacity-100 transition-opacity">
                    <span class="text-[8px] text-emerald-400 font-black uppercase tracking-tighter">Próximamente</span>
